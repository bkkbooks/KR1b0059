body:
  text: 周傳七大誓書曰唯四月太子發上祭于畢下至于盟津之上乃告司徒司馬司空諸節允才豫無知以先祖先父之有德之臣左右小子豫受先公必力賞罰以定厥功于先祖之遺傳曰天子三公司徒公司馬公司空公每一公三卿佐之每一卿三大夫佐之每一大夫三元士佐之故有三公九卿二十七大夫八十一元士所與為天下者若此而已太子發升于舟鼓鐘惡觀臺惡將舟惡宗廟惡中流有白魚入于舟中跪取出涘以燎群公咸曰休哉有火流于王屋化為赤烏三足武王喜諸大夫皆喜周公曰茂哉茂哉天之見此以勸之也武王伐紂至于商郊停止宿郊夜士卒皆歡樂歌舞以待旦惟丙午王逮師前師乃鼓䵾躁師乃慆前歌後舞假于上下咸曰孜孜無怠正稽古立功立事可以永年丕天之大律武成武成武王與紂戰于牧之野紂之卒輻分紂之車瓦裂紂之甲魚鱗下賀乎武王紂死武王皇皇若天下之未定召太公而問曰入殷奈何太公曰臣聞之也愛其人者兼其屋上之烏不愛其人者及其𦙃餘何如武王曰不可召公趨而進曰臣聞之也有罪者殺無罪者活咸劉厥敵毋使有餘烈何如武王曰不可周公趨而進曰臣聞之也使各安其宅各田其田毋故毋親惟仁之親何如武王曠乎若天下之已定遂入殷封比干之墓表商容之閭發巨橋之粟散鹿臺之財歸傾宮之女而民知方曰王之于仁人也死者封其墓況于生者乎王之于賢人也亡者表其閭況于在者乎王之于財也聚者散之況于復籍乎王之于色也在者歸其父母況于復徵乎太公曰罵女毋歎唾女毋乾毋歎毋乾是謂艱難鴻笵武王勝殷繼公子祿父釋箕子之囚箕子不忍為周之釋走之朝鮮武王聞之因以朝鮮封之箕子既受周之封不得無臣禮故于十三祀來朝周武王因其朝而問鴻笵水火者百姓之所飲食也金木者百姓之所興作也土者萬物之所資生也是為人用八政何以先食傳曰食者萬物之始人事之本也故八政先食聖人者民之父母也母能生之能食之父能教之能誨之聖王曲備之者也能生之能食之能教之能誨之也為之城郭以居之為之宮室以處之為之庠序學校以教誨之為之列地制畝以飲食之故書曰作民父母以為天下王此之謂也貌屬木言屬金視屬火聽屬水思屬土火發于密水泄于深汩亂也不叶于極不麗于咎毋侮鰥寡而畏高明大誥周公先謀于同姓同姓從謀于朋友朋友從然後謀于天下天下從然後加之蓍龜是以君子聖人謀義不謀不義故謀必成卜義不卜不義故卜必吉以義擊不義故戰必勝是以君子聖人謀則吉戰則勝書曰民儀有十夫金縢武王殺紂立武庚而繼公子祿父使管叔蔡叔監祿父武王死成王幼周公盛養成王使召公奭為傅周公身居位聽天下為政管叔蔡叔疑周公流言于國曰公將不利于王奄君蒲姑謂祿父曰武王既死矣今王尚幼矣周公見疑矣此百世之時也請舉事然後祿父及三監叛也周公以成王之命殺祿父三年之後周公老于豐心不敢遠成王而欲事文武之廟然後周公疾曰吾死必葬于成周示天下臣于成王成王曰周公生欲事宗廟死欲聚骨于畢畢者文王之墓也故周公薨成王不葬于成周而葬之于畢示天下不敢臣也所以明有功尊有德故忠孝之道盛在成王周公之閒故魯郊成王所以禮周公也成王幼在襁褓微子之命微子將往朝周過殷之故墟見麥秀之蔪蔪兮禾黍之𣋋𣋋也曰此父母之國宗廟社稷之所立也志動心悲欲哭則為朝周俯泣則近婦人推而廣之作雅聲歌曰麥秀蔪蔪兮禾黍𣋋𣋋彼狡童兮不我好兮嘉禾成王之時有三苗貫桑葉而生同為一穗其大盈車長幾充箱民得而上諸成王王召周公而問之公曰三苗為一穗抑天下共和為一乎果有越常氏重譯而來交址之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重九譯而獻白雉曰道路悠遠山川岨深恐使之不通故重九譯而朝成王以歸周公公曰德澤不加焉則君子不饗其質政令不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黃耇曰久矣天之無別風淮雨意者中國有聖人乎有則盍往朝之周公乃歸之于王稱先王之神致以薦于宗廟周既衰于是稍絶康誥周公將作禮樂優游之三年不能作君子恥其言而不見從恥其行而不見隨將大作恐天下莫我知也將小作恐不能揚父祖功業德澤然後營雒以觀天下之心于是四方諸侯率其群黨各攻位于其庭周公曰示之以力役且猶至況導之以禮樂乎然後敢作禮樂書曰作新邑于東國雒四方民大和會此之謂也書曰惟乃丕顯考文王克明俊德周人以仁接民而天下莫不仁故曰大矣天之命文王非啍啍然有聲音也文王在位而天下大服施政而物皆聽令則行禁則止動搖而不逆天之道故曰天乃大命文王文王受命一年斷虞芮之質二年伐于三年伐密須四年伐畎夷五年伐耆六年伐崇七年而崩酒誥天子有事諸侯皆侍宗室有事族人皆侍尊卑之義也終日大宗已侍于賓奠然後燕私燕私者何也祭已而與族人飲也宗子燕族人于堂宗婦燕族人于房序之以昭穆不醉而出是不親也醉而不出是泄宗也出而不止是不忠也親而甚敬忠而不倦若是則兄弟之道備備者成也成者成于宗室也故曰飲而醉者宗室之意也德將無醉族人之志也是故祀禮有讓德施有復義之至也古者聖帝之治天下也五十以下非蒸社不敢游飲唯六十以上游飲也王曰封唯曰若圭璧圻者天子之境也諸侯曰境天子游不出封圻不告祖廟諸侯非朝聘不出境杍材老而無妻謂之矜老而無夫謂之寡幼而無父謂之孤老而無子謂之獨行而無資謂之乏居而無食謂之困此皆天下之至悲哀而無告者故聖人在上君子在位能者任職必先施此使無失職伯禽與康叔見周公三見而三笞康叔有駭色謂伯禽曰有商子者賢人也與子見之乃見商子而問焉商子曰南山之陽有木焉名曰喬二三子往觀之見橋實高高然而上反以告商子商子曰喬者父道也南山之陰有木焉名曰杍二三子復往觀焉見杍實晉晉然而俯反以告商子商子曰杍者子道也二三子明日復見周公入門而趨登堂而跪周公迎拂其首而勞之曰爾安見君子乎二子以實對公曰君子哉商子也召誥成王在豐欲宅雒邑使召公先相宅六日乙未王朝步自周則至于豐惟大保先周公相宅雒誥書曰乃女其悉自學功學效也傳曰當其效功也於卜雒邑營成周改正朔立宗廟序祭祀易羲牲制禮作樂一統天下合和四海而致諸侯皆莫不依紳端冕以奉祭祀者其下莫不自悉以奉其上者莫不自悉以奉其祭祀者此之謂也盡其天下諸侯之志而效天下諸侯之功也廟者貌也以其貌言之也宮室中度衣服中制犧牲中辟殺者中死割者中理搙辨者為文爨竈者有容椓杙者有數大廟之中繽乎其猶模繡也天下諸侯之悉來進受命于周而退見文武之尸者千七百七十三諸侯皆莫不磬折玉音金聲玉色然後周公與升歌而弦文武諸侯在廟中者伋然淵其志和其情愀然若復見文武之身然後曰嗟子乎此蓋吾先君文武之風也夫及執俎抗鼎執刀執匕者負牆而歌憤于其情發于中而樂節文故周人追祖文王而宗武王也是故周書自大誓就召誥而盛于雒誥故其書曰揚文武之德烈奉對天命和恆萬邦四方民是以見之也孔子曰吾于雒誥也見周公之德光明于上下勤施四方旁作穆穆至于海表莫敢不來服莫敢不來享以勤文王之鮮光以揚武王之大訓而天下大洽故曰聖之與聖也猶規之相周矩之相襲也伯禽封于魯周公曰於乎吾與女族倫吾文王之為子武王之為弟也成王之為叔父也吾於天下豈卑賤也豈乏士也所執質而見者十委質而相見者三十其來執質之士百我欲盡智得情者千人而吾僅得三人焉以正吾身以定天下是以敬其見者則隱者出矣謹諸乃以魯而驕人可哉尸祿之士猶可驕也正身之士去貴而為賤去富而為貧面目𩧋黑而不失其所是以文不滅而章不敗也慎諸乃以魯國而驕豈可哉周公攝政一年救亂二年克殷三年踐奄四年建侯衛五年營成周六年制禮作樂七年致政周公封以魯身未嘗居魯也伯禽將歸于魯周公謂伯禽之傅曰汝將行盍志而子美德乎對曰其為人寬好自用以慎此三者其美德也已周公曰嗚乎以人惡為美德乎君子好以道德故其民歸道彼其寬也出無辨矣是其好自用也是以斂益之也多士古者后夫人將侍于君前息燭後舉燭至于房中釋朝服襲燕服然後入御于君雞鳴太師奏雞鳴于階下夫人鳴佩玉于房中告去也然後應門擊柝告辟也然後少師奏質明于階下然後夫人入庭立君出朝毋佚書曰厥兆天子爵成王政遂踐奄踐之者籍之也籍之謂殺其身執其家豬其宮掩誥多方古者十稅一多于十稅一謂之大桀小桀少于十稅一謂之大貈小貈王者十一而稅而頌聲作矣故書曰越維有胥賦小大多政顧命天子之堂廣九雉三分其廣以二為內五分內以一為高東房西房北堂各三雉公侯七雉三分其廣以二為內五分內以一為高東房西房北堂各二雉伯子男五雉三分其廣以二為內五分內以一為高東房西房北堂各一雉士三雉三分其廣以二為內五分內以一為高有室無房堂其桷天子斫其材而礱之加密石焉大夫達棱士首本庶人到加天子賁庸諸侯疏杼大夫有石材庶人有石承康王之誥諸侯之宮三門三朝其外曰皋門次曰應門又次曰路門其皋門內曰外朝應門內曰內朝路門內曰路寢之朝原闕鮮誓古者百里之國三十里之遂二十里之郊九里之城三里之宮七十里之國二十里之遂九里之郊三里之城一里之宮五十里之國九里之遂三里之郊一里之城以城為宮遂郊之門執禁以譏異服譏異言周初淮浦徐州竝起為寇伯禽伐之于鮮作鮮誓𢾅乃擭敜乃阱女則有逸罰甫刑決關梁踰城郭而略盜者其刑臏男女不以義交者其刑宮觸易君命革輿服制度姦宄盜攘傷人者其刑劓非所事而事之出入不以道義而誦不詳之辭者其刑墨降畔寇賊劫略敓攘矯虔者其刑死子張曰堯舜之主一人不刑而天下治何則教誠而愛深也一夫而被此五刑子龍子曰未可謂能為書孔子曰不然也五刑有此教子曰古之聽民者察貧窮哀孤獨矜寡宥老幼不肖無告有過必赦小罪勿增大罪勿纍老弱不受刑有過不受罪是故老而受刑謂之悖弱而受刑謂之剋不赦有過謂逆率過以小謂之枳故與其殺不辜寧失有罪與其增以有罪寧失過以有赦君子之于人也有其語也無不聽者皇于聽獄乎必盡其辭矣聽獄者或從其情或從其辭聽獄之術大略有三治必寬寬之術歸於察察之術歸於義是故聽而不寬是亂也寬而不察是慢也古之聽訟者言不越情情不越義是故聽民之術怒必思思兼義小罪勿兼孔子曰古之刑者省之今之刑者䋣之其教古者有禮然後有刑是以刑省也今也反是無禮而齊之以刑是以䋣也書曰伯夷降禮折民以刑謂有禮然後有刑也又曰茲殷罰有倫今也反是諸侯不同聽每君異法聽無有倫是故法之難也獄貨非可寶也然寶之者未能行其法者也貪人之寶受人之財未有不受命以矯其上者也親下以矯其上者未有能成其功者也子曰聽訟雖得其指必哀矜之死者不可復生絶者不可復續也書曰哀矜哲獄子曰今之聽民者求所以殺之古之聽民者求所以生之不得其所以生之之道乃刑殺君與臣會焉子曰吳越之俗男女同川而浴其刑重而不勝由無禮也中國之教內外有分男女不同椸架不同巾楖其刑不重而勝由有禮也語曰夏后不殺不刑罰有罪而民不輕犯禹之君民也罰弗及饌而天下治一饌六兩古者中刑用鑽鑿有虞氏上刑上刑挾輕下刑挾重天齊乎人假我一日
