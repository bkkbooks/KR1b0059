body:
  text: 殷傳六帝告書曰施章乃服明上下未命為士者車不得朱軒及有飛軨不得乘飾車駢馬衣文繡命然後得以旌有德湯誓湯誓云夏人飲酒醉者持不醉者不醉者持醉者相和而歌曰盍歸于薄盍歸于薄薄亦大矣故伊尹退而閒居深聽歌聲更曰覺兮較兮吾大命假兮去不善而就善何樂兮伊尹入告于王曰大命之亡有日矣王僩然歎啞然笑曰天之有日猶吾之有民也日有亡哉日亡吾乃亡矣是以伊尹遂去夏適湯湯放桀居中野士民皆奔湯桀與其屬五百人南徙千里止于不齊不齊士民往奔湯桀與屬五百人徙于魯魯士民復奔湯桀曰國君之有也吾聞海外有人與五百人俱去湯放桀而歸于薄三千諸侯大會湯取天子之璽置之于天子之坐左復而再拜從諸侯之位湯曰此天子之位有道者可以處之矣夫天下非一家之有也唯有道者之有也唯有道者宜處之湯以此三讓三千諸侯莫敢即位然後湯即天子之位桀殺刑彌厚而民彌暴故爾梁遠遂以是亡獄省桀無道囚湯後釋之諸侯八譯來朝者六國湯代桀之後大旱七年史卜曰當以人為禱湯乃翦髮斷爪自以為牲而禱于桑林之社而雨大至方數千里景亳之命費昌為御般庚書曰若德明哉湯任父言卑應言古者諸侯始受封則有采地百里諸侯以三十里七十里諸侯以二十里五十里諸侯以十五里其後子孫雖有罪黜其采地不黜使其子孫賢者守之世世以祠其始受封之人此之謂興滅國繼絶世書曰茲豫大享于先王爾祖其從與享之此之謂也說命說命書曰高宗梁暗三年不言何為梁暗也傳曰高宗居凶廬三年不言此之謂梁暗子張曰何謂也孔子曰古者君薨世子聽于冢宰三年不敢服先王之服履先王之位而聽焉以臣民之義則不可一日無君矣不可一日無君猶不可一日無天也以孝子之隱乎則孝子三年弗居矣故曰義者彼也隱者此也遠彼而近此則孝子之道備矣高宗有親喪居廬三年然未嘗言國事而天下無背叛之心者何也及其為太子之時盡已知天下人民之所好惡是以雖不言國事也知天下無背叛之心高宗肜日武丁祭成湯有雉飛升鼎耳而雊武丁問諸祖己祖己曰雉者野鳥不當升鼎今升鼎者欲為用也無則遠方將有來朝者乎故武丁內反諸己以思先王之道三年編髮重譯來朝者六國孔子曰吾於高宗肜日見德之有報之疾也高宗之訓湯之後武丁之前先王道虧刑罰犯桑榖俱生于朝七日而大拱武丁召其相而問焉其相曰吾雖知之吾不能言也問諸祖己祖己曰桑榖者野草也野草生於朝亡乎武丁懼側身修行思昔先王之政興滅國繼絶世舉逸民明養老之禮諸侯重譯來朝者六國西伯戡耆文王一年質虞芮二年伐于三年伐密須四年伐畎夷紂乃囚之散宜生南宮括閎夭三子相與學訟於太公太公見三子知為賢人遂酌酒切脯除為師學之禮約為朋友四子遂見西伯于牖里散宜生遂之犬戎氏取美馬駮身朱鬣雞目取九六焉之西海之濱取白狐青翰之於陵氏取怪獸大不辟虎狼閒尾倍其身名曰虞之有參氏取美女之江淮之浦取大貝如車渠陳於紂之庭紂出見之還而觀之曰此何人也散宜生遂趨而進曰吾西蕃之臣昌之使者紂大悅曰非子罪也崇侯也遂遣西伯伐崇五年之初得散宜生等獻寶而釋文王文王出則克耆六年伐崇則稱王既伐于崇
