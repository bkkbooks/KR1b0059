body:
  text: 卷六略說上古者帝王躬率有司百執事而以正月朝迎日於東郊以為萬物先而尊事天也祀上帝於南郊所以報天德迎日之辭曰維某年月上日明光于上下勤施于四方旁作穆穆維豫一人某敬拜迎日東郊堯典曰寅賓出日此之謂也諸侯有德者一命以車服弓矢再命以虎賁三百人三命秬鬯諸侯三命者皆受天子之樂以祀其宗廟傳曰己有三牲必田狩者孝子之意以為己之所養不如天地自然之性逸豫肥美禽獸多則傷五穀因事兵事又不空設故因以捕禽獸所以共承宗廟示不忘武備又因以為田除害鮮者何也秋取嘗也秋取嘗何以也習鬥也者男子之事戰鬥不可不習故於搜狩以間之也間之者貫之也貫之者習之也凡祭取所餘獲陳於澤然後卿大夫相與射命中者雖不中也取命不中者雖中者不取何以也所以貴揖讓之取而賤勇力之取也鄉之取也於囿中勇力之取也今之取也於澤宮揖讓之取也天子諸侯必有公桑蠶室就川而為之築宮有三雉棘牆而外閉之大昕之朝三公之夫人浴種于川世婦卒蠶獻繭于夫人繅三盆手烟氛郊社不修山川不祝風雨不時霜雷不降責於天公臣多弒主孽多殺宗五品不訓責於人公城郭不繕溝池不修水泉不隆水為民害責於地公天子太子年十八曰孟侯孟侯者于四方諸侯來朝迎于郊者問其所不知也問之人民之所好惡土地所生美珍怪異山川之所有無及父在時皆知之大夫士七十而致仕老於鄉里大夫為父師士為少師耰鉏已藏祈樂已入歲事已畢餘子皆入學十五始入小學見小節踐小義十八入大學見大節踐大義距冬至四十五日始出學傅農事上老平明坐于右孰庶老坐于左孰餘子畢出然後皆歸夕亦如之餘子皆入父之齒隨行兄之齒鴈行朋友不相踰輕任并重任分頒白不提挈出入皆如之此之謂造士子夏曰昔者三王愨然欲錯刑遂罰平心而應之和然後行之然且曰吾意者以不平慮之乎吾意者以不平平之乎如此者三然後行之此之謂慎罰祭之為言察也察者至也至者人事也人事至然後祭祭者薦也薦之為言在也在者在其道也古之帝王者必立大學小學使王太子王子群后之子以至公卿大夫元士之適子十有三年始入小學見小節焉踐小義焉年二十入大學見大節焉踐大義焉故入小學知父子之道長幼之敘入大學知君臣之儀上下之位故為君則君為臣則臣為父則父為子則子小師取小學之賢者登之大學大師取大學之賢者登之天子天子以為左右略說下遂人為遂皇伏羲為戲皇神農為農皇也遂人以火紀火大陽也陽尊故託遂皇于天伏羲以人事紀故託戲皇于人蓋王非人不固人非天不成也神農以地紀悉地力種穀疏故託農皇于地天地人之道備而三五之運興矣堯八眉舜四瞳子禹其跳湯扁文王四乳八眉者如八字者也其跳者踦也扁者枯也言皆不善也伏羲氏沒神農氏作神農氏沒黃帝堯舜氏作伏羲氏作八卦天立五帝以為相四時施生法度明察春夏慶賞秋冬刑罰多聞而齊給命五史以書五帝之蠱事大庭氏王天下五風竝異夏后逆於廟庭殷人逆於堂周人逆於戶衣錦尚夏后氏主教以忠周人之教以文上教以文君子其失也小人薄伊尹母方孕行汲化為枯桑其夫尋至水濱見桑穴中有兒乃收養之伊尹相湯伐桀戰於鳴條狄人將攻大王亶甫大王亶甫召耆老而問焉曰狄人何欲耆老對曰欲得叔粟財貨大王亶甫曰與之每與而攻不免大王亶甫贅其耆老而問之曰狄人又何欲乎耆老對曰欲君之土地大王亶甫曰與之耆老曰君不為社稷乎大王亶甫曰社稷所以為民也不可以所為民亡民也耆老曰君縱不為社稷不為宗廟乎大王亶甫曰宗廟吾私也不可以吾私害民也遂杖策而去過梁山邑岐山國人束修奔走而從之者三千乘一止而成三千戶之邑周文王至磻溪見呂望釣文王拜之尚父曰望釣得魚腹中有玉璜刻曰周受命呂左檢德合于今昌來提公爵劉名也文王施政而物皆聽帝命周公踐阼朱草畼生周公輔幼主不矜功則蓂莢生成王削桐葉為圭以封唐叔周公思兼三王之道以施於春秋冬夏子夏讀書畢見夫子夫子問焉子何為於書子夏曰書之論事也昭昭如日月之代明離離若星辰之錯行上有堯舜之道下有三王之義商所受于夫子志之于心弗敢忘也雖退而巖居河泲之閒深山之中作壤室編蓬戶尚彈琴其中以歌先王之風則亦可以發憤慷慨忘己貧賤有人亦樂之無人亦樂之而忽不知憂患與死也夫子造然變色曰嘻子殆可與言書矣雖然見其表未見其裏也顏回曰何謂也子曰窺其門而不入其中觀其奧藏之所在乎然藏又非難也丘嘗悉心盡志以入其閒前有高岸後有大溪填填正立而已是故堯典可以觀美禹貢可以觀事咎繇可以觀治鴻笵可以觀度六誓可以觀義五誥可以觀仁甫刑可以觀誡通斯七觀書之大義舉矣宣王問於子春曰寡人欲行孝弟之義為之有道乎子春曰昔者衛聞之樂正子曰文王之治岐也五十者杖於家六十者杖於鄉七十者杖於朝見君揖杖八十者杖於朝見君揖杖君曰趣見客毋俟朝已朝乘車輲輪御為僕送至於家而孝弟之義達於諸侯九十杖而朝見君建杖君曰趣見毋俟朝已朝車送之舍天子重鄉養卜筮巫醫御於前祝饐祝梗以食乘車輲輪胥與就膳徹送至於家君如有欲問焉明日就其室以珍從而孝弟之義達於四海此文王之治岐也君如欲行孝弟之大義盍反文王之治岐子曰君子不可以不學見人不可以不飾不飾無貌無貌不敬不敬無禮無禮不立夫遠而有光者飾也近而逾明者學也譬之墟邪水潦集焉菅蒲生焉從上觀之誰知非源水也子張曰仁者何樂於山也孔子曰夫山者然高然高則何樂焉夫山草木生焉鳥獸蕃焉財用殖焉生財用而無私為四方皆伐焉每無私豫焉出雲雨以通乎天地之閒陰陽和合雨露之澤萬物以成百姓以饗此仁者之樂于山者也子貢曰葉公問政於夫子子曰政在附近而來遠魯哀公問政子曰政在於論臣齊景公問政子曰政在於節用三君問政夫子應之不同然則政有異乎子曰荊之地廣而都狹民有離志焉故曰在於附近而來遠哀公有臣三人內比周以惑其君外障距諸侯賓客以蔽其明故曰政在論臣齊景公奢於臺榭淫於苑囿五官之樂不解一旦而賜人百乘之家者三故曰政在節用晉平公問師曠曰吾行年七十欲學恐已暮矣師曠曰臣聞之老而學者如執燭之明執燭之明孰與昧行公曰善東郭子思問於子貢曰夫子之門何其雜也子貢曰夫櫽括之旁多枉木良醫之門多疾人砥礪之旁多頑鈍夫子聞之曰修道以俟天下來者不止是以雜也孔子如衛衛人謂曰公甫不能聽訟子曰非公甫之不能聽訟也公甫之聽獄也有罪者懼無罪者恥民近禮矣民擊壤而歌鑿井而飲耕田而食帝力何有王者躬耕所以共粢盛凡宗廟有先王之主曰都無曰邑大夫有污豬之宮殺君之地雖有美菜有義之士弗食王者德及皇天則祥風起王者德下究地之厚則朱草生詩云非知之艱行之惟艱夏不數浴非愛水也冬不數煬非愛火也剴切魏文侯問子夏子夏葉拱而進
