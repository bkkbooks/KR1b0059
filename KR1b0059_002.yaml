body:
  text: 虞傳二九共豫辨下土使民平平使民無敖舜彈五弦之琴歌南風之詩而天下治舜攝時三公九卿百執事此堯之官也故使百官事舜成王問周公曰舜之冠何如焉周公曰古之人有冒皮而句領者然鳳皇巢其樹麒麟聚其域也舜不登而高不行而遠拱揖於天下而天下稱仁子曰參女以為明主為勞乎昔者舜左禹而右皋陶不下席而天下治咎繇謨天子衣服其文華蟲作會宗彝璪火山龍諸侯作會宗彝璪火山龍子男宗彝璪火山龍大夫璪火山龍士山龍故書曰天命有德五服五章哉山龍青也華蟲黃也作會黑也宗彝白也璪火赤也天子服五諸侯服四次國服三大夫服二士服一六律者何黃鐘蕤賓無射大蔟夷則姑洗是也故天子左五鐘右五鐘天子將出則撞黃鐘之鐘右五鐘皆應之馬鳴中律步者皆有容駕者皆有文御者皆有數步者中規折還中矩立則磬折拱則抱鼓然後大師奏樂登車告出也入則撞蕤賓左五鐘皆應之以治容貌容貌得則氣得氣得則肌膚安肌膚安則色齊矣蕤賓聲狗吠彘鳴及倮介之蟲皆莫不延頸以聽蕤賓在內者皆玉色在外者皆金聲然後少師奏樂登堂就席告入也此言至樂相和物動相生同聲相應之義也古者天子必有四鄰前曰疑後曰承左曰輔右曰弼天子有問無以對責之疑可志而不志責之承可正而不正責之輔可揚而不揚責之弼其爵視上卿其祿視次國之君天子中立而聽朝則四聖維之是以慮無失計舉無過事故書曰欽四鄰此之謂也古之處師八家而為鄰三鄰而為朋三朋而為里五里而為邑十邑而為都十都而為師州有十二師焉家不盈三口者不朋由命士以上不朋古者帝王升歌清廟之樂大琴練弦達越大瑟朱弦達越以韋為鼓謂之搏拊何以也君子有大人聲不以鐘鼓竽瑟之聲亂人聲清廟升歌者歌先人之功烈德澤也故欲其清也其歌之呼也曰於穆清廟於者歎之也穆者敬之也清者欲其在位者遍聞之也故周公升歌文王之功烈德澤苟在廟中嘗見文王者愀然如復見文王故書曰搏拊琴瑟以詠祖考來格此之謂也維五祀奏鐘石論人聲乃及鳥獸咸變於前故更箸四時推六律六呂詢十有二變而道宏廣五作十道孝力為右秋養耆老而春食孤子乃浡然招樂興于大鹿之野報事還歸二年䜎然乃作大唐之歌其樂曰舟張辟雍鶬鶬相從八風回回鳳皇喈喈歌者三年昭然乃知乎王世明有不世之義招為賓客而雍為主人始奏肆夏納以孝成舜為賓客而禹為主人樂正進贊曰尚考大室之義唐為虞賓至今衍于四海成禹之變垂於萬世之後于時卿雲聚俊乂集百工相和而歌卿雲帝乃倡之曰卿雲爛兮禮縵縵兮日月光華旦復旦兮八伯咸進稽首而和曰明明上天爛然星陳日月光華宏豫一人帝乃載歌曰日月有常星辰有行四時從經萬姓允誠於豫論樂配天之靈還于賢聖莫不咸聽鼚乎鼓之軒乎舞之菁華已竭褰裳去之于時乃八風修通卿雲藂藂蟠龍賁信于其藏蛟魚踊躍于其淵龜魚咸出于其穴遷虞而事夏也維十有三祀帝乃稱王而入唐郊猶以丹朱為尸於是百執事咸昭然乃知王世不絶爛然必自有繼祖守宗廟之君還歸二年而廟中苟有歌大化大訓六府九原而夏道興維十有四祀鍾石笙管變聲樂未罷疾風發屋天大雷雨帝乃雍而歌者重篇沈首而笑曰明哉非一人之天下也乃見于鍾石笙管乎維十有五祀祀者二尸元首明哉股肱良哉元首君也股肱臣也翊輔也天功人其代之傳曰夫成天地之功者未嘗不蕃昌也有德者尊其位而重其祿豫辛壬娶塗山癸甲生啓
