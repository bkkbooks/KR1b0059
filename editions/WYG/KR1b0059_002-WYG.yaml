front:
  text: 唯四月太子發上祭于畢下至于盟津之上乃告於司馬司徒司空諸節亢才予無知以先祖先父之有徳之臣左右小子予受先公戮力賞罰以定厥功明于先祖之遺太子發渡於中流白魚入于舟王跪取以燎羣公咸曰休哉今文尚書
  hash: sha256:d342681c9b0cb6f0ed104973b679d251071410dec2fc130c30ec1c3f7c841aa1
