body:
  text: 鄭𤣥曰燔魚以祭變禮也武王伐紂戰于牧野紂之卒輻分紂之車瓦裂紂之甲如鱗下賀於武王也選注引大傳武王入殷表商容之閭歸傾宫之女武王殺紂繼公子禄父鄭𤣥曰繼者以武庚為商後也武王伐紂都洛邑未成隂寒大雪深丈餘甲子旦不知何五大夫乗馬車從兩騎止於門外王使師尚父謝賔幸臨之尚父使人持一器粥出進五車兩騎軍使者具以告尚父曰五車兩騎四海之神與河伯雨師耳尚父各以其名進之五神皆驚相視而嘆洪範五行傳武王釋箕子之囚箕子不忍周之釋走之朝鮮武王聞之因以朝鮮封之箕子既受周之封不得無臣禮故於十二祀來朝武王因其朝而問洪範惟王后元祀帝令大禹歩於上帝維時洪範六沴用咎于下是用知不畏而神之怒若六沴作見若是共禦一作供御帝用不差神則不怒五福乃降用章於下若六沴作見若不共禦六伐既侵六極其下禹乃共辟厥徳受命休令爰用五事建用王極鄭𤣥曰王謂禹也帝舜也歩推也令禹推衍天道五事象五行則王極象天也長事一曰貌貌之不恭是謂不肅厥咎狂厥罰恒一作常雨厥極惡時則有服妖白虎通引大傳作服乗龜孽雞禍下體生於上之痾青𤯝青祥唯金沴木次二事曰言言之不從是謂不乂厥咎僣厥罰恒𤾉厥極憂時則有詩妖介蟲之孽犬禍口舌之痾白𤯝白祥維木沴金次三事曰視視之不明是謂不悊厥咎荼厥罰恒燠厥極疾時則有草妖倮蟲之孽羊禍目痾赤𤯝赤祥惟水沴火次四事曰聼聼之不聰是謂不謀厥咎急厥罰恒寒厥極貧時則有鼔妖魚孽豕禍耳痾黑𤯝黑祥惟火沴水次五事曰思心思心之不容一作睿是謂不聖厥咎霿一作雺厥罰恒風厥極㓙短折時則有脂液之妖華孽牛禍心腹之痾黄𤯝黄祥金木水火沴土王之不極是謂不建厥咎眊厥罰恒隂厥極弱時則有射妖龍蛇之孽馬禍下人代一作伐上之痾日月亂行星辰逆行鄭𤣥曰肅敬也君貌不恭則是不能敬其事也君臣不敬則倨慢如狂貌曰木木主春春氣生生氣失則踰其節故常雨也服貌之飾也龜蟲之生于水而游於春者属木鷄畜之有冠翼者也属貌痾病也貌氣失之病也青木色也眚生於此祥自外來也沴殄也乂治也君言不從則是不能治其事也君臣不治則僣差矣金主秋秋氣殺殺氣失故常𤾉也殺氣失故於人為憂詩之言志也蝝螽蜩蟬之類生於秋而藏於秋者也屬金犬畜之以口吠者屬言言氣失之病視瞭也君視不明則是不能瞭其事也荼一作舒君臣不瞭則舒緩矣視曰火火主夏夏氣長長氣失故常燠長氣失故於人為疾草視之物可見者莫衆於草蠶螟蟲之類蟲之生于火而藏於秋者也倮一作蠃羊畜之逺視者也屬視君聼不聰則是不能謀其事也君臣不謀則急矣聼曰水水主冬冬氣藏藏氣失故常寒藏氣失故於人為貧鼓聼之應也魚蟲之生於水而游於水者也豕畜之居閑衛而聼者也屬聼儀禮鄭注引尚書傳羊屬火豕屬水聼氣失之痾未齓曰㓙未冠曰短未婚曰折王君也不名體而言王者五事象五行則王極象天也天變化為隂為陽覆成五行眊大傳作瞀瞀思心之咎同耳王極象天天隂養萬物隂氣失故常隂天為剛徳剛氣失故於人為弱愚懦不壯毅曰弱射王極之變也射人將發矢必先於此儀之發則中於彼矣君將出政亦先於朝廷度之出則應于民心射其象也龍蟲之生於淵行無形遊於天者也屬天蛇龍之類也天行健馬畜之疾行者也屬王極夏侯勝説伐宜為代書亦或作代隂陽之神曰精神性情之神曰魂魄君行不由常侜張無度則是魂魄傷也王極氣失之病也天於不中之人恒耆其毒増以為病將以開賢代之也春秋所謂奪伯有魄者是也不名病者病不著於身體也亂謂薄食鬭並見逆謂縮反明經天守舍之類也惟五位復辟厥沴曰二月三月惟貌是司四月五月維視是司六月七月維言是司八月九月維聴是司十月十一月維思心是司十二月與正月維王極是司凡六沴之作嵗之朝月之朝日之朝則后王受之嵗之中月之中日之中則正卿受之嵗之夕月之夕日之夕則庶民受之其二辰以次相將其次受之鄭𤣥曰自正月盡四月謂嵗之朝自五月盡八月為嵗之中自九月盡十二月為嵗之夕上旬為月之朝中旬為月之中下旬為月之夕平旦至食時為日之朝隅中至日昳為日之中晡時至黄昏為日之夕受之受其㓙咎也二辰謂日月也假令嵗之朝也日月中則上公受之日月夕則下公受之嵗之中也日月朝則孤卿受之日月夕則大夫受之嵗之夕也日月朝則上士受之日月中則下士受之其餘差以尊卑多少則悉矣星辰莫同是離逢非沴維鮮之功禦貌於喬忽以其月從其禮祭之參乃從禦言於訖衆以其月從其禮祭之參乃從禦視於忽似以其月從其禮祭之參乃從禦聴於怵攸以其月從其禮祭之參乃從禦思心於有尤以其月從其禮祭之參乃從禦王極於宗始以其月從其禮祭之參乃從六沴之禮散齋七日致齋三日新器潔祀用赤黍三日之朝于中庭祀四方從東方始卒於北方其祀禮曰格祀曰某也方祀曰播國率相行祀曰若爾神靈洪祀六沴是合無差無傾無有不正若民有不敬事則㑹批之六沴六事之機以懸示我我民人無敢不敬事上下王祀鄭𤣥曰格祀篇名也今亡沴殄也凡貌言視聴思心一事失則逆人之心人心逆則怨木金水火土氣為之傷傷則衝勝來乗殄之於是民怨神怒將為禍亂故五行先見變異以譴告人也及妖孽禍痾𤯝祥皆其氣類暴作非常為時怪者也各以物象為之占也田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直棄法律逐功臣殺太子以妾為妻則火不炎上治宫室飾臺榭内淫亂犯親戚侮父兄則稼穡不成好攻戰輕百姓飾城郭㑴邉境則金不從革簡宗廟不禱祠廢祭祀逆天時則水不潤下鄭𤣥曰不宿不宿禽也角主天兵周禮四時習兵因以田獵禮志曰天子不合圍諸侯不掩羣過此則㬥天物為不宿禽角南有天庫將軍騎宫享獻也禮志曰天子諸侯無事則嵗三田一為乾豆二為賔客三為充君之庖周禮獸人冬獻狼夏獻麋春秋獻獸物此獻禮之大畧也角為天門房有三道出入之象也房心農時之候也季冬之月命農計耦耕事是時房心晨中春秋傳曰晨為農祥后稷之所經緯也亢為朝廷房心為明堂謀事出政之象君行此五者為逆天東宫之政東宫於地為木木性或曲或直人所用為器也無故生不暢茂多折槁是為木不曲直東井主法令也功臣制法律者也五行火生上天文以參繼東井四時以秋代夏殺太子之象也軒轅為后妃屬南宫其大星女主之位女御在前妾為妻之象也君行此四者為逆天南宫之政於地為火火性炎上然行人所用烹飪者也無故因見作熱燔熾為害是為火不炎上五行傳謂土失其性而為災也參伐為武府攻戰之象輕之者不重民命昴畢間為天街甘氏經曰天街保塞孔塗道衢保塞城郭之象也畢主邉兵君行此四者為逆天西宫之政西宫於地為金金性從刑而革人所用為器者也無故冶之不銷或入火飛亡或鑄之裂形是為金不從革虚危為宗廟牽牛主祭祀之牲月在星紀周以為正月在𤣥枵殷以為正皆不得四時之正逆天時之象也君行此四者為逆天北宮之政也北宫于地為水水性漫潤下流人所用灌溉者也無故源流遏絶川澤以涸是為水不潤下其他變異皆屬沴也天一生水地二生火天三生木地四生金前四疇乃王極之體所以建故配其生數地六成水天七成火地八成木天九成金後四疇乃王極之用所以行故配其成數天五生土故配之以王極一二三四皆由五數而成六七八九是水火木金皆賴乎土而成此王極所以為八疇之要樞也太平御覽八政何以先食食者萬物之始人之所本者也北堂書抄引大傳周以至動殷以萌夏以芽天有三統物有三變故正色有三天有三生三死故土有三王王特一生死檀弓公羊疏引書傳畧説太平御覽引尚書大傳鄭𤣥曰謂三王之正月也至動冬日至物始動也異時生者恒異時死夏以孟春月為正殷以季冬月為正周以仲冬月為正夏以十三月為正色尚黒以平旦為朔殷以十二月為正色尚白以鷄鳴為朔周以十一月為正色尚赤以夜半為朔不以二月後為正者萬物不齊莫適所統故必以三㣲之月也白虎通引尚書大傳子曰心之精神是謂聖孔子集語引大傳雲者起於山彌於天天氣亂故其罰恒隂選注北堂書抄引尚書五行傳君道虧則日蝕人憤怨則水涌溢隂氣積則下代上郭璞疏引洪範傳晦而月見西方謂之脁朔而月見東方謂之朒亦謂之側匿側匿侯王其肅脁則侯王其舒月生三日謂之魄尚書五行傳鄭𤣥曰魄亦作脁行疾貌朒行遲貌元首寛則望舒脁侯王肅則月匿影葢君舒緩則臣驕慢故日行遲而月行疾也月行中道移節應期徳厚受福重華畱之尚書洪範記明王踐位則日儷其精重光以見吉祥文選注心之大星天王也其前星太子也後星庶子也洪範五行傳辰星者北方水精也選注北辰謂之曜魄北堂書抄引尚書大傳祀上帝於南郊所以報天徳詩疏黄帝將亡則地裂尚書説地者成萬物者也北堂書抄引鴻範五行傳聖人者民之父母也母能生之能養之父能教之能誨之聖人曲偹之者也能生之能食之能教之能誨之也為之城郭以居之為之宫室以處之為之庠序之學以教誨之為之列地制畆以飲食之故書曰天子作民父母以為天下王此之謂也天中記引大傳乃命五史以書五帝之蠱事彼為訓者正以太古之時旡為旡事也今言蠱者是卦之惑亂也時既漸澆一作繞物情惑亂故事業因之而起惑矣左傳云女惑男風落山謂之蠱伏曼引尚書大傳夏不數浴非愛水也冬不數煬非愛火也魯桓公五年大雩旱也先是殺君而立有危亡之心而下有悲慟之氣外結大國娶于齊以為夫人後比二年天子使大夫來聘桓公上得天子之意下得大國之援則有亢陽之心以御臣下興邢丘之役以勞百姓則臣下離心而不從故應是而秋大旱也魯宣公十年秋大旱是時公與齊伐萊夫伐國亢陽節也師徒百姓所不欲也故應而大旱旱所謂常陽不謂常陽而謂旱者以旱為災也旱之為言乾也萬物傷於乾而不得水也君持亢陽之節暴虐于下興師旅勞民衆以起城邑臣下悲怨而心不從故陽氣盛而失度旱災應也枉矢者弓矢之象也枉矢之所觸天下之所伐滅亡之象也七國之兵戰于梁地故天狗先降梁壘見以其象也狗者守禦之類也所降以威守禦也蜮如鼈三足生於南越南越婦人多淫故其地多蜮淫女惑亂之氣所生詩疏榖梁疏引洪範五行傳蓍之為言耆也百年一本生百莖此草木之夀亦知吉凶者聖人以問鬼神周易音義藝文類聚引洪範五行傳季夏可以大赦罪人尚書大傳歴者聖人所以揆天行而紀萬國也北堂書抄引尚書洪範五行傳雷與天地為長子以其􅈡長萬物與其出入也霜者殺伐之表雨雪者隂之蓄積甚也夫握方諸之鏡處深澤之下而上引太清物類相隨可不慎耶秦昭王三十八年上郡大飢山木盡死蜂食民苗民無所食飢而不損兹謂泰厥灾水厥咎亡谷永傳引洪範尚書大傳卷二欽定四庫全書尚書大傳卷三松陽縣教諭孫之騄輯金縢傳成王之幼云在襁褓褓縛兒被也詩疏引大傳古尚書説武王崩時成王年十二後二年管蔡作亂周公東辟之王與大夫盡弁以開金縢之書時成王年十四公羊疏王命周公踐祚朱草暢生王者徳下究地之厚則朱草生徳光地序則朱草生選注引尚書大傳王者徳及皇天則祥風起周公輔幼主不矜功則蓂莢生鄭𤣥曰矜夸也成王問周公舜何人也曰其政好生而惡殺古之王者必立大學小學使王子公卿大夫元士之適子十有五年始入小學見小節焉踐小義焉二十始入大學見大節焉踐大義焉故入小學知父母之道長幼之序入大學知君臣之儀上下之位小胥取小學之賢者登之天子天子以為左右鄭𤣥曰小學在公宫之左大學在郊天子當為太子周公居攝踐祚而治元世子法於伯禽使之左右所以養成王也元記為亢伯禽與康叔朝於成王見于周公三見而三笞康叔有駭色謂伯禽曰有商子者賢人也與子見之乃見商子而問焉商子曰南山之陽有木焉名曰橋二子往視之見橋實髙髙然而上反以告商子商子曰橋者父道也南山之隂有木焉名曰梓二子復往觀焉見梓實晉晉而循反以告商子商子曰梓者子道也二子明日見周公入門而趨登堂而跪拂其首勞而食之曰汝安見君子乎二子以實對公曰君子哉商子也文選注藝文類聚成王問周公曰舜之冠何如焉周公曰古之人有冒皮而勾􅏋然鳳皇巢其樹麒麟聚其域也北堂書抄引大傳古人衣上有冒而句領者荀子注引尚書大傳鄭𤣥曰言在徳不在服也古人三皇時也冒覆頂也句領繞頸也禮正服方領天子太子年十八曰孟侯孟侯者于四方諸侯來朝迎于郊問其所不知也問人民之所好惡土地所生山川所有無及父在時皆知之儀禮疏詩正義禮行人疏俱引書傳畧説天中記引大傳鄭𤣥曰孟迎也十八嚮入太學為成人博問庶事玉海曰孟侯者四方諸侯來朝迎於郊或可逺郊勞使世子為之是以孝經注亦云世子郊迎郊迎即郊勞也雖據夏法周亦然管叔蔡叔監禄父武王死成王幼周公盛養成王使召公奭為傅周公身居位聴天下為政管叔疑周公而流言于國曰公將不利於王奄君蒲姑一作薄姑謂禄父曰武王既死矣成王尚幼矣周公見疑矣此百世之一時也請舉事然後禄父及三監叛奄君導之禄父遂與三監叛周公疾曰吾死必𦵏於成周示天下臣於成王也周公死天乃雷雨以風禾盡偃大木斯拔國恐王與大夫開金縢之書執書以泣曰周公勤勞王家予幼人弗及知乃不𦵏于成周而𦵏之於畢示天下不敢臣師古引尚書大傳一本周公薨成王欲𦵏之于成周天乃雷電以風禾即盡偃大木斯拔周人大恐王乃𦵏周公于畢示不敢臣也鄭𤣥曰昔周公𦵏不如禮天乃動威尚書五行傳云周公死成王不圖大禮故天大雷雨禾偃大木拔及成王寤金縢之䇿改周公之𦵏尊以王禮申命魯郊而天立復風雨禾稼盡起
