body:
  text: 尚書大傳書類附録提要臣等謹案尚書大傳三卷補遺一卷國朝孫之騄輯之騄字晴川錢塘人按漢書藝文志伏生所傳經二十九卷傳四十一篇隋志作尚書大傳三卷鄭康成序謂章句之外别撰大義劉子政校書得而上之其篇次與藝文志合舊唐書志云伏勝注大傳三卷暢訓三卷新唐書志則作伏勝注大傳三卷又暢訓一卷已闕二卷至宋史藝文志暢訓遂不著録葢已散佚故自明代以來僅留大傳殘本脱畧漫漶殆不可讀之騄詮次其文又博采諸書所引補其佚闕以成此本凡卷中不注出處者皆殘本之原文其注某書某書者皆之騄所蒐輯也刻成之後續有所得不及逐條附入因又别為補遺一卷綴之卷末近揚州别有刻本相較頗有異同葢亦雜采補綴今與此本並著于録以存古書之梗概總之皆非伏生之舊矣其注乃鄭康成作今殘本尚題其名新舊唐書並作伏生注大傳葢史文之悞也乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書尚書大傳卷一松惕縣教諭孫之騄輯易曰河出圖雒出書聖人則之書之所起逺矣至孔子得黄帝𤣥孫帝魁之書迄於秦穆公凡三千二百四十篇斷逺取近定可為世法者凡百二篇而為之序遭秦滅學燔書漢興旁求儒雅聞故秦博士伏勝能傳其業詔太常使掌故晁錯往受焉而伏生年且百嵗不能正言言不可曉使其女誦二十八篇口授晁錯曰堯典臯陶謨禹貢甘誓湯誓盤庚髙宗肜日西伯戡黎微子牧誓洪範金縢大誥康誥酒誥梓材召誥洛誥多方多士立政無逸君奭顧命呂刑文侯之命費誓秦誓凡二十八篇自是傳其學者有歐陽大小夏侯宣帝時復有河内女子得泰誓一篇獻之與伏生女所誦合二十九篇漢志所謂經二十九卷是也故言書者始濟南伏生伏生創大傳四十一篇以授同郡張生張生授千乗歐陽生歐陽生授同郡兒寛寛授歐陽生之子世世傳之至曾孫歐陽髙謂之尚書書是本名尚則伏生所加也歐陽之學又有夏侯都尉受業於張生以授族子始昌始昌傳族子勝為大夏侯之學勝傳從子建别為小夏侯之學故有歐陽大小夏侯三家並立迄漢東京相傳弗絶中興書目云伏生為秦博士至孝文時且百嵗張生歐陽生從其學而授之生終後數子各論所聞以己意彌縫其間别作章句因經屬指名之曰傳劉向校書得而上之凡四十一篇至鄭康成始銓為八十三篇及晉永嘉之亂歐陽大小夏侯尚書並亡濟南伏生之傳唯劉向父子所著五行傳是其本法而又多乖戾隋志大傳三卷鄭元注顧彪撰音二卷舊唐書志伏生注大傳三卷又暢訓三卷新唐書伏生暢訓一卷暢訓已不復傳而隋志所稱大傳者今遺缺漫滅前後差舛無卷帙倫次可理余披覽羣籍鈔綴殘文尋其端委釐成三卷仍舊名也至伏生之四十一篇與康成銓次之八十三篇之文篇目既亡孰從而詢焉虞書三五傳燧人以火紀陽也陽尊故托燧皇於天伏羲以人事紀故托羲皇於人盖天非人不因人非天不成也神農悉地力植穀故託農皇於地天地人之道偹而三五之運興矣燧人為燧皇以火紀官藝文類聚伏羲氏作八卦路史注伏羲氏没神農氏作神農氏没黄帝堯舜氏作羅璧識遺黄帝者光也厚也中和之色徳施四序與地同功故先黄以别之也風俗通顓者順也頊者信也慤也言其承文治之以質使天下遵化皆貴真慤也嚳者考也成也言其考明法度美譽醇然若酒之芬香也堯者髙也明也言其隆興煥炳最髙明也舜者准也循也言其准行道以循堯緒也禹者輔也輔續舜後庶績洪茂自堯以上王者子孫據國而紀功徳浸盛故造諡舜禹本以白衣砥美行顯名升為天子雖復制諡不如名著故因名焉湯者攘也言其攘除不軌改亳為商成就王道天下熾昌文武皆以其長能擅國之謂王能制殺生之威之謂王唐傳克明峻徳苟子書曰克明明徳以親九族九族既睦陳思工表引傳辯章百姓索隠引今文尚書歐陽説云九族乃異姓有親屬者父族四母族三妻族二鄭𤣥曰辯别也章明也神農始治農功正節氣審寒温以為蚤晚之期故立歴名一作日容成作歴黄帝命容成造葢天儀日者陽徳之母陽外發故日以晝明名曰曜靈月羣隂之宗光内影以宵曜名曰夜光主春者張昏中可以種稷一作穀主夏者火昏中可以種黍主秋者虚昏中可以種麥主冬者􅄧昏中可以収斂葢藏畋獵斷伐當告於天子而天子賦之民故天子南面而視四星之中知民之緩急急則不賦籍不舉力役故曰敬授民時此之謂也周禮疏及太平御覽鄭𤣥曰籍公家之常徭辯秩東作索隠引大傳辯秩南譌辯秩西成周禮疏辯秩據書傳而言書曰分命和仲度西曰栁榖周禮注疏云書曰者是濟南伏生書鄭𤣥曰五色聚為栁日入時具五色便在伏物索隠引大傳以正月朝迎日於東郊所以為萬物先而尊事天也迎日之詞曰維某年某月上日明光於上下勤施於四方旁作穆穆維予一人一夲無一人二字某敬拜迎日於郊宋書志引尚書大傳書傳畧説云祀上帝於南郊即春迎日於東郊東方者何也物之動也物之動何以謂之春春出也物之出也故謂東方春也南方者何也任方也任方者物之方任何以謂之夏夏者假也吁荼萬物養之外者也故曰南方夏也西方者何也鮮方也鮮訊也訊者始入之貌始入者何以謂之秋秋者愁也愁者物方愁而入也故曰西方者秋也北方者何伏方也伏方者萬物之方伏也伏方何以謂之冬冬者中也中也者物方藏於中也故曰北方冬也陽盛則吁荼萬物而養之外也隂盛則隂吸萬物而藏之内也故曰呼吸者隂陽之交接萬物之始終否不也文選注引大傳古之王者必有命民民能敬長憐孤取舍好讓舉事力者于其君得命然後得乗飾車駢馬衣文錦未有命者不得衣不乗車車衣者有罰藝文類聚玉藻疏唐傳云古者有命民有飾車駢馬衣錦未命為士不得朱軒車不得有飛鈴文選注鄭𤣥曰軒輿也士以朱飾之飛鈴如今窻車士乗飾車兩馬庻人單馬木車衣布帛選注公羊疏碩人詩曰衣錦尚蘏説文引大傳堯時麒麟在郊藪選注詩疏引唐傳外無曠夫内無怨女詩疏孔子對子張曰舜父頑毋嚚無室家之端故謂之鰥尚書正義詩疏引唐傳虞傳舜販於頓丘一作須丘就時負夏陶於河濵漁雷澤之中堯致舜天下贈以昭華之玉藝文類聚贈以苕華之玉一本堯得舜推而尊之贈以昭華之玉鄭𤣥曰負夏衛地雷澤兖州澤今屬濟隂堯推尊舜屬諸侯致天下於大麓之野路史引虞夏傳鄭𤣥曰山足曰麓麓者録也古者天子命大事命諸侯則為壇國之外堯聚諸侯命舜陟位居攝致天下之事使大録之舜讓於徳不怡索隠引今文正月上日受終於文祖作璿璣玉衡以齊七政璿璣者何也曰璿者還也璣者幾也㣲也其變幾㣲而所動者大謂之璿璣是故璿璣謂之北極受謂舜也上日元日也文祖堯文徳之祖廟鄭𤣥曰轉運者為璣持正者為衡索隠鄭注大傳云渾儀中筩為璇璣外規為玉衡也文祖五府之大名猶周之明堂也七政謂春秋冬夏天文地理人道所以為政也人道正而萬事順成又七政布位日月時之正五星時之紀日月有薄食五星有錯聚七者得失在人君之政故謂之為政玉海引大傳類祭天名也以祀類祭之奈何天位在南方就南郊祭之事也今文尚書夏侯歐陽説月令疏引萬物非天不生非地不載非春不動非夏不長非秋不収非冬不藏故書曰禋於六宗此之謂也生一作覆鄭𤣥曰六宗星辰司中司命風伯雨師也星五緯也辰謂日月所㑹十二次也司中司命文昌第五第四星也風師箕也雨師畢也歐陽和伯夏侯建曰六宗上不謂一作及天下不謂地傍不謂四方在六者之間助隂陽變化者也古者圭必有冒一作瑁言下之必有冐不敢專達也天子執冐瑁以朝諸侯見則覆之故冒圭者天子所與諸侯為瑞也瑞也者屬也無過行者得復其圭以歸其國有過行者留其圭能改過者復之三年圭不復少黜以爵六年圭不復少黜以地九年圭不復而地畢削此謂諸侯之於天子也義則見屬不義則不見屬周禮疏白虎通及山堂考索鄭𤣥曰君恩覆之臣敢進古者諸侯之於天子五年一朝朝見其身述其職述其職者述其所職也選注五年一朝王者亦貴得天下之歡心以事其先王因助祭以述其職故分四方諸侯為四輩輩主一時公羊疏引虞傳五嶽謂岱山霍山華山恒山嵩山也白虎通大傳又爾雅疏引虞夏傳霍山為南嶽江河淮濟為四瀆風俗通引大傳五嶽視三公四瀆視諸侯其餘山川視伯小者視子男尚書正義云其尊卑所視王制及書傳之文鄭𤣥曰謂視其牲幣粢盛籩豆爵獻之數五岳皆觸石出雲扶寸而合不崇朝而雨天下後漢章帝紀注藝文類聚引大傳鄭𤣥曰四指為寸扶音膚惟元祀廵守一作狩四嶽八伯壇四奥沉四海封十有二山兆十有二州樂正定樂名元祀代泰山貢兩伯之樂焉東嶽陽伯之樂舞侏一作株離其歌聲比余謡名曰晳陽儀伯之樂舞鼚哉其歌聲比大南名曰南陽中祀大交霍山貢兩伯之樂焉夏伯之樂舞謾哉一作或其歌聲比中謡名曰初慮羲伯之樂舞將陽其歌聲比大謡名曰朱干干一作于秋祀栁榖華山貢兩伯之樂焉秋伯之樂舞蔡俶其歌聲比小謡名曰苓落和伯之樂舞𤣥鶴其歌聲比中謡名曰歸來祀幽都宏山貢兩伯之樂焉冬伯之樂舞齊落齊一作濟歌曰縵縵并論八音四㑹歸格於禰祖用特五載一廵守群后徳讓貢正聲而九族奏具成鄭𤣥曰沉祭名祭水曰沈兆域也為營域以祭十二州之分星也陽伯春伯秩宗伯夷為之路史引大傳曰伯夷之子為西岳株離舞曲名言象物生株離也儀伯羲仲之後鼚動貌哉始也南任也夏伯夏官司馬棄為之羲伯羲叔之後秋伯秋官士也臯陶為之和伯和叔之後蔡哀也俶始也宏山即恒山冬伯冬官司空垂為之樂者人性所自有也故聖王廵十有二州觀其風俗習其情性因論十有二俗定以六律五聲八音七始五音天音也八聲天化也七始天統也選注北堂書抄詩譜見諸侯問百年太師陳詩以觀民命風俗命市納賈以觀民好惡山川神祗有不舉者為不敬不敬者削以地宗廟有不順者為不孝不孝者黜以爵變禮易樂為不從不從者君流改制度衣服為畔畔者君討有功者賞之白虎通引尚書大傳天子命諸侯輔助為政所以通賢共治示不獨尊重民之至大國舉三人次國舉二人小國舉一人公羊疏云書傳文矜寡孤獨天民之窮而無告者皆有常餼詩疏唐虞象刑而民不敢犯苗民用刑而民漸興犯唐虞之象刑上刑赭衣不純中刑雜屨下刑墨幪公羊疏引唐傳今入虞傳鄭𤣥曰純縁也時人尚徳義犯刑者但易之衣服自為大恥屨履也幪巾也使不得冠飾子張曰堯舜之聖一人不刑而天下治何則教誠而愛深也一夫而被此五刑子龍子曰未可謂能為書孔子不然也五刑有此教路史注引大傳子贛曰堯舜之王一人不刑而天下冶敬誠而愛深也鄭𤣥曰二人俱罪吕侯之説刑也被此五刑喻犯數罪也故子曰教然耳犯數罪猶以上一罪刑之子曰古之聼民者有過必赦小罪勿増大罪勿纍老弱不受刑有過不受罰是故老而受刑謂之悖弱而受刑謂之剋不赦有過謂之賊率過以小謂之枳故與其殺不辜寧失有罪與其増以有罪寧失過以有赦鄭𤣥曰延罪無辜曰纍惟刑之謐哉今文大夫有石材庶人有石承鄭𤣥曰石材柱下礩也石承當柱下布也以外出為飾舜入唐郊以丹朱為尸禮正義惟十有三祀帝乃稱王而入唐郊鄭𤣥曰舜承堯帝猶反側晨興闢四門來仁賢選注詩疏孔子曰舜以天徳嗣堯西王母來獻白玉琯白虎通溝瀆壅遏水為民害田廣不墾則責之司空百姓不親五品不順則責之司徒蠻夷猾夏冦賊姦軌則責之司馬藝文類聚北堂書抄舜無登而髙不行而逺拱揖於天下而天下稱仁舜好生惡殺鳳凰巢其木一作樹仁閔覆下則稱旻天説文引虞書今尚書歐陽説春曰昊天夏曰蒼天秋曰旻天冬曰上天詩周禮爾雅疏舜將禪禹八風脩一作循通歌大化大訓六府九原而夏道興鄭𤣥曰四章皆歌禹之功所謂九叙惟歌九徳之歌于此猶可攷惟五祀奏鍾石奏一作定論人聲及乃鳥獸咸變於前秋養耆老而春食孤子一作春食餔於乃浡然招樂興於大麓之野報一作執事還歸二年談然談一作䜎一作􅨳乃作大唐之歌其樂曰舟張辟雝鶬鶬相從八風囬囬鳳皇喈喈歌者三年昭然乃知乎王世明有不世之義招為賔客雍為主人始奏肆夏納以孝成舜為賔而禹為主人樂正道贊曰尚考太室之義唐為虞賔至今衍於四海成禹之變時俊乂百工相和而歌卿雲帝唱之曰卿雲爛兮禮一作糺一作紏李善引大傳作體縵縵兮一作漫漫日月光華旦復旦兮八伯咸進稽首曰明明上天爛然星陳日月光華𢎞於一人帝乃載歌曰日月有辰一作常一作恒星辰有行四時從一作順經萬姓幾誠一作百姓允臧一作萬物允成施于論樂配天之靈遷於賢聖莫不咸聼鼚乎皷之軒乎儛之精華已竭一作英華欲遂褰裳去之於時八風循涌卿雲藂藂蟠龍僨信於其藏蛟魚躍踊於其淵魚鱉咸出於其穴遷虞而事夏也鄭𤣥曰舜始欲改堯樂百獸之屬率舞談猶灼也大唐之歌美堯禪也招雍皆樂章名也賔入奏招主入奏雍也始謂尸入時也納謂薦獻時也肆夏孝成指樂章名也舜既使禹攝天子之事于祭祀避之居賔客之位獻酒則為亞獻尚考猶言古考謂徃時也太室明堂之中央室也義當為儀儀禮也謂祭太室禮堯為舜賔之也衍猶溢也言堯之禪天下至於今其徳義溢於四海也縵縵教化廣逺也復旦明明相代也藂藂言和氣相應也十有四祀鐘石笙筦變聲樂未罷疾風發屋天大雷雨帝沈首而笑曰明哉非一人天下也乃見於鐘石路史聖人與聖也猶規之相周矩之相襲文選注九共傳書曰予辯下土使民平平使民無傲玉海虞傳有九共篇夏書禹之君民也罰弗及強而天下治天子衣服其文華蟲作繢宗彛藻火山龍諸侯作繢宗彛藻火山龍子男宗彛藻火山龍大夫藻火山龍士山龍又曰山龍青也華蟲黄也作繢黒也宗彛白也藻火赤也天子服五諸侯四次國服三大夫服二士服一山堂考索引大傳鄭𤣥曰𤣥或疑焉華蟲五色之蟲藻水草蒼色予欲聞六律五聲八音七始詠漢律厯志索隠曰七始詠古文在治忽今文采政忽史記作來始滑古者天子必有四鄰前曰疑後曰丞一作承左曰輔右曰弼天子有問無以對責之疑可志而不志責之丞承可正而不正責之輔可揚而不揚責之弼其爵視卿其禄視大國之君孝經疏大國作次國搏拊鼓振以秉琴瑟練絲徽絃鳴者貴玉聲也白虎通古者帝王升歌清廟大瑟練絃達越大琴朱絃達越以韋為鼓謂之搏拊鄭𤣥曰清廟樂章名越下孔也山堂考索引尚書大傳曰大琴敬絃達越大瑟朱絃達越葢越底孔也疏達通之也朱絃練而朱之也葢絲不練則勁而聲清練則熟而聲濁孔小則聲急大者聲遲故疏越以遲其聲然後不至於太急練絲以濁其聲然後不失之太清拊革著以穅白虎通引尚書大傳今書傳無著穅之文鄭元注樂記拊者以韋為表装之以穅穅一名相因以名焉今齊人或謂穅為相故知穅為相即拊也余按孔安國傳搏拊以韋為之實之以穅所以節樂疑非伏傳以白虎通引存焉正朔所不加即君子所不臣也白虎通引大傳元首明哉股肱良哉元首君也股肱臣也選注引大傳禹貢傳湛濁為地又曰積隂為地故地者濁隂也地不滿東南故水潦塵埃歸焉子張曰仁者何樂乎山也子曰夫山者恺然髙恺然髙則何樂焉山草木生焉禽獸畜焉財用殖焉生財用而無私為四方皆伐無私與焉出雲雨以通乎天地之間隂陽和合雨露之澤萬物以成百姓以饗此仁者之樂於山也圻者天子之境也諸侯曰境天子游不出封圻諸侯非朝聘不出境路史注引大傳河色黄赤衆川之流葢濁之積也百里一小曲千里一大曲一直非水無以准萬物之平非水無以通道任重也下而平者謂之隰隰之猶言濕也往古之時四極廢九州裂於是女媧殺黒龍以祭冀州鄭𤣥曰冀州取地以為名也其地有險有易帝王所都亂則冀治弱則冀强荒則冀豐也東原底平大而髙平者謂之太原郡取稱焉水經注引大傳堯南撫交趾於禹貢荆州之南垂幽荒之外故越也水經注㳙一作洧盤之水出崦嵫山禺鐵在遼西索隠今文尚書滎播既都今文被明都今文文皮千合索隠數兩謂之合也予辛壬娶塗山癸甲生啟索隠曰葢今文尚書百川趨於海大水小水東流洶洶礚礚皆水聲也文選注夏成五服外薄四海東海魚須魚目南海魚革珠璣大貝西海魚骨魚幹魚脅北海魚釼魚石出填擊閭河魭江鱓大龜五湖元唐鉅野蓤鉅定嬴濟中瞻諸孟諸靈龜隆谷一作隂谷大都魚魚刀青丘青䨼丹丘丹雘此二句山海經廣注引大傳咸㑹於中國初學記太平御覽俱引大傳鄭𤣥曰言徳廣之所及所貢物魚須今以為簮又魚目今以雜珠魚革今以飾小車兵室之口貝古以為貨魚幹魚脅未詳魚釼魚兵如釼也魚石頭中石也出填狀如凝脂在水上擊閭狀如鮐魚大五六尺今海家謂之缺字魭當作黿黿狀如鼈而大鱓或作鼉鼉狀如蜥蜴長六七尺鱓或為鱣鱣鯉也五湖揚州浸也今屬呉元唐未聞鉅大也野魯藪今屬山陽蔆芰鉅定澤也今屬樂安有故縣屬齊蠃蝸牛瞻諸鼃黽也孟諸宋藪也龜俯者靈周禮天龜曰靈屬隆讀如釐降之降或如函谷今河南榖城西闗山也大都明都魚今江南以為鮑魚魚刀魚兵如刀者也言徳能及之異物來至也禹貢合注引大傳曰禹成五服齒革羽毛器乃備甘誓傳戰者憚警之也白虎通藝文類聚天子三公一曰司徒公二曰司馬公三曰司空公各兼二卿周禮正義山堂考索引大傳鄭𤣥曰夏書云六卿者后稷司徒秩宗司馬作士共工也周禮天子六卿與太宰司徒同職者則謂之司徒公與宗伯司馬同職者則謂之司馬公與司寇司空同職者則謂之司空公一公兼二卿舉下以是稱是其中參六官之事貌屬木言屬金視屬火聼屬水思屬土水火者百姓之求飲食也金木者百姓之所興作也土者萬物之所資生也是為人用尚書正義王者一質一文據天地之道白虎通正朔三而改文質再而復三統者所以序生也三正者所以統天也是故三統三正也三王之統若循連環周則又始窮則反本也選注太平御覽詩疏云三正者謂夏與唐虞也正朔三而改夏以建寅為正則舜當以建子堯當以建丑是謂三正也尚書大傳卷一欽定四庫全書尚書大傳卷二松陽縣教諭孫之騄輯商書殷傳帝告篇書曰施章乃服明上下玉海湯誓傳桀無道囚湯後釋之諸侯八譯來者六國北堂書抄引大傳伊尹母孕行汲水化為枯桑其夫尋至水濵見桑穴中有兒乃収養之夏人飲酒醉者持不醉者不醉者持醉者相和而歌曰盍歸於亳亳亦大矣故伊尹退而閑居深聼樂聲更曰覺兮較兮吾大命格兮去不善而就善何樂兮伊尹入告於桀一作王曰大命之亡亡一作去有日矣桀啞笑曰天之有日猶吾之有民民一作人日有亡哉日亡吾亦亡矣是以伊尹遂去夏適湯鄭𤣥曰深聼樂聲思其故也是時伊尹仕桀覺兮謂先知者較兮謂直道者也格至也吾語桀也自比於天言常在也比於日言去復來也伊尹相湯伐桀戰於鳴條春秋地名考引大傳湯放桀也居中野士民皆奔湯桀與其屬五百人南徙千里止于不齊士民往奔湯桀與其屬五百人徙於魯魯士民復奔湯桀曰國君之有也吾聞海外有人與五百人俱去行而無資謂之乏居而無食謂之困周禮疏引大傳鄭𤣥曰止曰居食謂米也咸乂傳亳有祥桑榖共生於朝七日大拱索隠引尚書大傳鄭𤣥曰兩手搤之曰拱説命傳詩曰非知之艱行之惟艱周禮疏引尚書傳髙宗肜日傳武丁祭成湯有雉飛升鼎耳而雊問諸祖己曰雉者野鳥也不當升鼎升於鼎者欲為用也無則逺方將有來朝者乎故武丁内反諸已以思先王之道三年辮髮重譯至者六國孔子曰吾於髙宗肜日見徳之有報之疾也西伯戡黎傳書正義西伯戡黎引伏生傳春子曰文王治岐玉海引大傳施政而物皆聼文選注周文王至磻溪見吕望文王拜之尚父望釣得玉璜刻曰周受命呂佐檢徳合於令昌來提西伯既戡黎紂囚之羑里爾雅疏引尚書大傳太公之羑里見文王散宜生遂至犬戎氏取美馬駮身朱鬛雞目者之西海之濵取白狐青翰之於氏一作於陵氏取怪獸尾倍其身名曰虞之有參氏一作莘取美女之江淮之浦取大貝如車渠陳於紂庭紂悦曰非子罪也崇侯也遂遣西伯伐崇鄭𤣥曰翰長毛也虞葢騶虞也散宜生閎夭南宫括三子者學於太公太公見三子之為賢人遂酌酒切脯除為師學之禮約為朋友散宜生南宮适閎夭三子相與學訟於太公四子遂見西伯於羑里獻寳以免文王孔子曰文王得四臣吾亦得四友自吾得回也門人加親是非胥附耶自吾得賜也逺方之士日至是非奔奏耶自吾得師也前有光後有輝是非先後耶自吾得繇也惡言不至門是非禦侮耶文王有四臣以免虎口丘亦有四友以禦侮公羊疏詩疏引殷傳曰西伯得四友獻寳免於虎口而克耆又引大傳曰得三子獻寳紂釋文王而出伐黎㣲子傳大夫七十而致仕老于鄉里名曰父師士曰少師以教鄉人子弟於門塾之基而教之學焉儀禮疏引書傳畧説七十杖於朝鄭𤣥曰朝當為國者致仕者以朝乗車輲輪鄭𤣥曰乗車安車言輲輪明其小也㣲子將朝周過殷之墟見麥秀之蔪蔪曰此父母之國宗廟社稷之所立也志動心悲欲哭則朝周俯泣則婦人推而廣之作雅聲為麥秀之歌歌曰麥秀漸漸兮禾黍油油彼狡童兮不我好仇選注鄭𤣥曰狡童謂紂也周書周傳狄人將攻太王亶父召耆老而問焉曰狄人何欲耆老對曰欲菽粟財貨太王亶父曰與之毎與狄人至不止太王亶父贅其耆老而問之曰狄人又何欲乎耆老對曰又欲土地太王亶父曰與之耆老曰君不為社稷乎太王亶父曰社稷所以為民也不可以所為民亡民也耆老對曰君縱不為社稷不為宗廟乎太王亶父曰宗廟吾私也不可以私害民遂䇿杖而去過梁山邑於岐山國人束脩奔而從之者二千乗一止而成三千戸之邑鄭𤣥曰岐山在梁山西南贅為屬虞人與芮人質其成於文王入文王之境則見其人萌讓為士大夫入其國則見士大夫讓為卿二國相謂曰此其君亦讓以天下而不居也讓其所争以為閒田文選注文王受命一年斷虞芮之訟二年伐䢴禮記正義引大傳作伐鬼方三年伐宻須四年伐犬戎五年伐耆六年伐崇七年而崩文王受命四年伐昆夷采薇為伐昆夷而作鄭𤣥曰犬夷昆夷也詩曰昆夷喙矣泰誓傳泰誓本非伏生所傳今并歸於伏生故史遷及儒林傳云伏生獨得二十九篇以教齊魯太子發升舟中流白虎通引尚書曰太子發升於舟白魚入於王舟王跪取出燎羣公咸曰休哉今文惟丙午王還劉歆三統歴引今文泰誓云丙午逮師師乃鼓譟師乃慆前歌後舞格於上天下地咸曰孜孜無怠大明疏引泰誓鄭𤣥曰慆喜也衆大喜前歌後舞也鄭司農引書傳曰前師乃鼔譟亦謂喜也司馬在前大明疏引泰誓周禮序引夏傳王肅曰司馬太公也正稽古立功立事可以永年丕天之大律律郊祀志引今文鄭𤣥曰丕大也律法也王升舟入水鼓鍾亞觀臺亞將舟亞宗廟亞周禮注有火自上復於下至於王屋流為烏其色赤其聲魄今文泰誓歐陽尚書火流于王屋化為鴉其聲魄索隠云按今文泰誓流為鵰牧誓傳唯四月太子發上祭于畢下至于盟津之上乃告於司馬司徒司空諸節亢才予無知以先祖先父之有徳之臣左右小子予受先公戮力賞罰以定厥功明于先祖之遺太子發渡於中流白魚入于舟王跪取以燎羣公咸曰休哉今文尚書鄭𤣥曰燔魚以祭變禮也武王伐紂戰于牧野紂之卒輻分紂之車瓦裂紂之甲如鱗下賀於武王也選注引大傳武王入殷表商容之閭歸傾宫之女武王殺紂繼公子禄父鄭𤣥曰繼者以武庚為商後也武王伐紂都洛邑未成隂寒大雪深丈餘甲子旦不知何五大夫乗馬車從兩騎止於門外王使師尚父謝賔幸臨之尚父使人持一器粥出進五車兩騎軍使者具以告尚父曰五車兩騎四海之神與河伯雨師耳尚父各以其名進之五神皆驚相視而嘆洪範五行傳武王釋箕子之囚箕子不忍周之釋走之朝鮮武王聞之因以朝鮮封之箕子既受周之封不得無臣禮故於十二祀來朝武王因其朝而問洪範惟王后元祀帝令大禹歩於上帝維時洪範六沴用咎于下是用知不畏而神之怒若六沴作見若是共禦一作供御帝用不差神則不怒五福乃降用章於下若六沴作見若不共禦六伐既侵六極其下禹乃共辟厥徳受命休令爰用五事建用王極鄭𤣥曰王謂禹也帝舜也歩推也令禹推衍天道五事象五行則王極象天也長事一曰貌貌之不恭是謂不肅厥咎狂厥罰恒一作常雨厥極惡時則有服妖白虎通引大傳作服乗龜孽雞禍下體生於上之痾青𤯝青祥唯金沴木次二事曰言言之不從是謂不乂厥咎僣厥罰恒𤾉厥極憂時則有詩妖介蟲之孽犬禍口舌之痾白𤯝白祥維木沴金次三事曰視視之不明是謂不悊厥咎荼厥罰恒燠厥極疾時則有草妖倮蟲之孽羊禍目痾赤𤯝赤祥惟水沴火次四事曰聼聼之不聰是謂不謀厥咎急厥罰恒寒厥極貧時則有鼔妖魚孽豕禍耳痾黑𤯝黑祥惟火沴水次五事曰思心思心之不容一作睿是謂不聖厥咎霿一作雺厥罰恒風厥極㓙短折時則有脂液之妖華孽牛禍心腹之痾黄𤯝黄祥金木水火沴土王之不極是謂不建厥咎眊厥罰恒隂厥極弱時則有射妖龍蛇之孽馬禍下人代一作伐上之痾日月亂行星辰逆行鄭𤣥曰肅敬也君貌不恭則是不能敬其事也君臣不敬則倨慢如狂貌曰木木主春春氣生生氣失則踰其節故常雨也服貌之飾也龜蟲之生于水而游於春者属木鷄畜之有冠翼者也属貌痾病也貌氣失之病也青木色也眚生於此祥自外來也沴殄也乂治也君言不從則是不能治其事也君臣不治則僣差矣金主秋秋氣殺殺氣失故常𤾉也殺氣失故於人為憂詩之言志也蝝螽蜩蟬之類生於秋而藏於秋者也屬金犬畜之以口吠者屬言言氣失之病視瞭也君視不明則是不能瞭其事也荼一作舒君臣不瞭則舒緩矣視曰火火主夏夏氣長長氣失故常燠長氣失故於人為疾草視之物可見者莫衆於草蠶螟蟲之類蟲之生于火而藏於秋者也倮一作蠃羊畜之逺視者也屬視君聼不聰則是不能謀其事也君臣不謀則急矣聼曰水水主冬冬氣藏藏氣失故常寒藏氣失故於人為貧鼓聼之應也魚蟲之生於水而游於水者也豕畜之居閑衛而聼者也屬聼儀禮鄭注引尚書傳羊屬火豕屬水聼氣失之痾未齓曰㓙未冠曰短未婚曰折王君也不名體而言王者五事象五行則王極象天也天變化為隂為陽覆成五行眊大傳作瞀瞀思心之咎同耳王極象天天隂養萬物隂氣失故常隂天為剛徳剛氣失故於人為弱愚懦不壯毅曰弱射王極之變也射人將發矢必先於此儀之發則中於彼矣君將出政亦先於朝廷度之出則應于民心射其象也龍蟲之生於淵行無形遊於天者也屬天蛇龍之類也天行健馬畜之疾行者也屬王極夏侯勝説伐宜為代書亦或作代隂陽之神曰精神性情之神曰魂魄君行不由常侜張無度則是魂魄傷也王極氣失之病也天於不中之人恒耆其毒増以為病將以開賢代之也春秋所謂奪伯有魄者是也不名病者病不著於身體也亂謂薄食鬭並見逆謂縮反明經天守舍之類也惟五位復辟厥沴曰二月三月惟貌是司四月五月維視是司六月七月維言是司八月九月維聴是司十月十一月維思心是司十二月與正月維王極是司凡六沴之作嵗之朝月之朝日之朝則后王受之嵗之中月之中日之中則正卿受之嵗之夕月之夕日之夕則庶民受之其二辰以次相將其次受之鄭𤣥曰自正月盡四月謂嵗之朝自五月盡八月為嵗之中自九月盡十二月為嵗之夕上旬為月之朝中旬為月之中下旬為月之夕平旦至食時為日之朝隅中至日昳為日之中晡時至黄昏為日之夕受之受其㓙咎也二辰謂日月也假令嵗之朝也日月中則上公受之日月夕則下公受之嵗之中也日月朝則孤卿受之日月夕則大夫受之嵗之夕也日月朝則上士受之日月中則下士受之其餘差以尊卑多少則悉矣星辰莫同是離逢非沴維鮮之功禦貌於喬忽以其月從其禮祭之參乃從禦言於訖衆以其月從其禮祭之參乃從禦視於忽似以其月從其禮祭之參乃從禦聴於怵攸以其月從其禮祭之參乃從禦思心於有尤以其月從其禮祭之參乃從禦王極於宗始以其月從其禮祭之參乃從六沴之禮散齋七日致齋三日新器潔祀用赤黍三日之朝于中庭祀四方從東方始卒於北方其祀禮曰格祀曰某也方祀曰播國率相行祀曰若爾神靈洪祀六沴是合無差無傾無有不正若民有不敬事則㑹批之六沴六事之機以懸示我我民人無敢不敬事上下王祀鄭𤣥曰格祀篇名也今亡沴殄也凡貌言視聴思心一事失則逆人之心人心逆則怨木金水火土氣為之傷傷則衝勝來乗殄之於是民怨神怒將為禍亂故五行先見變異以譴告人也及妖孽禍痾𤯝祥皆其氣類暴作非常為時怪者也各以物象為之占也田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直棄法律逐功臣殺太子以妾為妻則火不炎上治宫室飾臺榭内淫亂犯親戚侮父兄則稼穡不成好攻戰輕百姓飾城郭㑴邉境則金不從革簡宗廟不禱祠廢祭祀逆天時則水不潤下鄭𤣥曰不宿不宿禽也角主天兵周禮四時習兵因以田獵禮志曰天子不合圍諸侯不掩羣過此則㬥天物為不宿禽角南有天庫將軍騎宫享獻也禮志曰天子諸侯無事則嵗三田一為乾豆二為賔客三為充君之庖周禮獸人冬獻狼夏獻麋春秋獻獸物此獻禮之大畧也角為天門房有三道出入之象也房心農時之候也季冬之月命農計耦耕事是時房心晨中春秋傳曰晨為農祥后稷之所經緯也亢為朝廷房心為明堂謀事出政之象君行此五者為逆天東宫之政東宫於地為木木性或曲或直人所用為器也無故生不暢茂多折槁是為木不曲直東井主法令也功臣制法律者也五行火生上天文以參繼東井四時以秋代夏殺太子之象也軒轅為后妃屬南宫其大星女主之位女御在前妾為妻之象也君行此四者為逆天南宫之政於地為火火性炎上然行人所用烹飪者也無故因見作熱燔熾為害是為火不炎上五行傳謂土失其性而為災也參伐為武府攻戰之象輕之者不重民命昴畢間為天街甘氏經曰天街保塞孔塗道衢保塞城郭之象也畢主邉兵君行此四者為逆天西宫之政西宫於地為金金性從刑而革人所用為器者也無故冶之不銷或入火飛亡或鑄之裂形是為金不從革虚危為宗廟牽牛主祭祀之牲月在星紀周以為正月在𤣥枵殷以為正皆不得四時之正逆天時之象也君行此四者為逆天北宮之政也北宫于地為水水性漫潤下流人所用灌溉者也無故源流遏絶川澤以涸是為水不潤下其他變異皆屬沴也天一生水地二生火天三生木地四生金前四疇乃王極之體所以建故配其生數地六成水天七成火地八成木天九成金後四疇乃王極之用所以行故配其成數天五生土故配之以王極一二三四皆由五數而成六七八九是水火木金皆賴乎土而成此王極所以為八疇之要樞也太平御覽八政何以先食食者萬物之始人之所本者也北堂書抄引大傳周以至動殷以萌夏以芽天有三統物有三變故正色有三天有三生三死故土有三王王特一生死檀弓公羊疏引書傳畧説太平御覽引尚書大傳鄭𤣥曰謂三王之正月也至動冬日至物始動也異時生者恒異時死夏以孟春月為正殷以季冬月為正周以仲冬月為正夏以十三月為正色尚黒以平旦為朔殷以十二月為正色尚白以鷄鳴為朔周以十一月為正色尚赤以夜半為朔不以二月後為正者萬物不齊莫適所統故必以三㣲之月也白虎通引尚書大傳子曰心之精神是謂聖孔子集語引大傳雲者起於山彌於天天氣亂故其罰恒隂選注北堂書抄引尚書五行傳君道虧則日蝕人憤怨則水涌溢隂氣積則下代上郭璞疏引洪範傳晦而月見西方謂之脁朔而月見東方謂之朒亦謂之側匿側匿侯王其肅脁則侯王其舒月生三日謂之魄尚書五行傳鄭𤣥曰魄亦作脁行疾貌朒行遲貌元首寛則望舒脁侯王肅則月匿影葢君舒緩則臣驕慢故日行遲而月行疾也月行中道移節應期徳厚受福重華畱之尚書洪範記明王踐位則日儷其精重光以見吉祥文選注心之大星天王也其前星太子也後星庶子也洪範五行傳辰星者北方水精也選注北辰謂之曜魄北堂書抄引尚書大傳祀上帝於南郊所以報天徳詩疏黄帝將亡則地裂尚書説地者成萬物者也北堂書抄引鴻範五行傳聖人者民之父母也母能生之能養之父能教之能誨之聖人曲偹之者也能生之能食之能教之能誨之也為之城郭以居之為之宫室以處之為之庠序之學以教誨之為之列地制畆以飲食之故書曰天子作民父母以為天下王此之謂也天中記引大傳乃命五史以書五帝之蠱事彼為訓者正以太古之時旡為旡事也今言蠱者是卦之惑亂也時既漸澆一作繞物情惑亂故事業因之而起惑矣左傳云女惑男風落山謂之蠱伏曼引尚書大傳夏不數浴非愛水也冬不數煬非愛火也魯桓公五年大雩旱也先是殺君而立有危亡之心而下有悲慟之氣外結大國娶于齊以為夫人後比二年天子使大夫來聘桓公上得天子之意下得大國之援則有亢陽之心以御臣下興邢丘之役以勞百姓則臣下離心而不從故應是而秋大旱也魯宣公十年秋大旱是時公與齊伐萊夫伐國亢陽節也師徒百姓所不欲也故應而大旱旱所謂常陽不謂常陽而謂旱者以旱為災也旱之為言乾也萬物傷於乾而不得水也君持亢陽之節暴虐于下興師旅勞民衆以起城邑臣下悲怨而心不從故陽氣盛而失度旱災應也枉矢者弓矢之象也枉矢之所觸天下之所伐滅亡之象也七國之兵戰于梁地故天狗先降梁壘見以其象也狗者守禦之類也所降以威守禦也蜮如鼈三足生於南越南越婦人多淫故其地多蜮淫女惑亂之氣所生詩疏榖梁疏引洪範五行傳蓍之為言耆也百年一本生百莖此草木之夀亦知吉凶者聖人以問鬼神周易音義藝文類聚引洪範五行傳季夏可以大赦罪人尚書大傳歴者聖人所以揆天行而紀萬國也北堂書抄引尚書洪範五行傳雷與天地為長子以其􅈡長萬物與其出入也霜者殺伐之表雨雪者隂之蓄積甚也夫握方諸之鏡處深澤之下而上引太清物類相隨可不慎耶秦昭王三十八年上郡大飢山木盡死蜂食民苗民無所食飢而不損兹謂泰厥灾水厥咎亡谷永傳引洪範尚書大傳卷二欽定四庫全書尚書大傳卷三松陽縣教諭孫之騄輯金縢傳成王之幼云在襁褓褓縛兒被也詩疏引大傳古尚書説武王崩時成王年十二後二年管蔡作亂周公東辟之王與大夫盡弁以開金縢之書時成王年十四公羊疏王命周公踐祚朱草暢生王者徳下究地之厚則朱草生徳光地序則朱草生選注引尚書大傳王者徳及皇天則祥風起周公輔幼主不矜功則蓂莢生鄭𤣥曰矜夸也成王問周公舜何人也曰其政好生而惡殺古之王者必立大學小學使王子公卿大夫元士之適子十有五年始入小學見小節焉踐小義焉二十始入大學見大節焉踐大義焉故入小學知父母之道長幼之序入大學知君臣之儀上下之位小胥取小學之賢者登之天子天子以為左右鄭𤣥曰小學在公宫之左大學在郊天子當為太子周公居攝踐祚而治元世子法於伯禽使之左右所以養成王也元記為亢伯禽與康叔朝於成王見于周公三見而三笞康叔有駭色謂伯禽曰有商子者賢人也與子見之乃見商子而問焉商子曰南山之陽有木焉名曰橋二子往視之見橋實髙髙然而上反以告商子商子曰橋者父道也南山之隂有木焉名曰梓二子復往觀焉見梓實晉晉而循反以告商子商子曰梓者子道也二子明日見周公入門而趨登堂而跪拂其首勞而食之曰汝安見君子乎二子以實對公曰君子哉商子也文選注藝文類聚成王問周公曰舜之冠何如焉周公曰古之人有冒皮而勾􅏋然鳳皇巢其樹麒麟聚其域也北堂書抄引大傳古人衣上有冒而句領者荀子注引尚書大傳鄭𤣥曰言在徳不在服也古人三皇時也冒覆頂也句領繞頸也禮正服方領天子太子年十八曰孟侯孟侯者于四方諸侯來朝迎于郊問其所不知也問人民之所好惡土地所生山川所有無及父在時皆知之儀禮疏詩正義禮行人疏俱引書傳畧説天中記引大傳鄭𤣥曰孟迎也十八嚮入太學為成人博問庶事玉海曰孟侯者四方諸侯來朝迎於郊或可逺郊勞使世子為之是以孝經注亦云世子郊迎郊迎即郊勞也雖據夏法周亦然管叔蔡叔監禄父武王死成王幼周公盛養成王使召公奭為傅周公身居位聴天下為政管叔疑周公而流言于國曰公將不利於王奄君蒲姑一作薄姑謂禄父曰武王既死矣成王尚幼矣周公見疑矣此百世之一時也請舉事然後禄父及三監叛奄君導之禄父遂與三監叛周公疾曰吾死必𦵏於成周示天下臣於成王也周公死天乃雷雨以風禾盡偃大木斯拔國恐王與大夫開金縢之書執書以泣曰周公勤勞王家予幼人弗及知乃不𦵏于成周而𦵏之於畢示天下不敢臣師古引尚書大傳一本周公薨成王欲𦵏之于成周天乃雷電以風禾即盡偃大木斯拔周人大恐王乃𦵏周公于畢示不敢臣也鄭𤣥曰昔周公𦵏不如禮天乃動威尚書五行傳云周公死成王不圖大禮故天大雷雨禾偃大木拔及成王寤金縢之䇿改周公之𦵏尊以王禮申命魯郊而天立復風雨禾稼盡起大誥傳周公先謀於同姓同姓從然後謀於朋友朋友從然後謀於天下天下從然後加之蓍龜是以君子聖人謀義不謀必成卜義不卜不義故卜必以義擊不義故戰必勝是以君子聖人謀則吉戰則勝太平御覽引大傳嘉禾傳大傳篇目有九共帝告嘉禾揜誥之類三苗貫葉一作桑而生子為一穗周公曰和氣所生以獻於文王之廟成王時有苗異莖而生同為一穗其大盈車長幾充箱人有上之者王召周公而問之公曰三苗為一穗天下其和為一乎果有越裳氏重譯而來交趾之南有越裳國周公居攝六年制禮作樂天下和越裳氏以三象重譯而獻白雉曰道路悠逺山川阻深音使不通故重譯而朝成王以歸周公公曰徳不加焉則君子不饗其質政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黄耉曰久矣天之無别風淮雨一作烈風淫雨意者中國有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦於宗廟周既衰於是稍絶鄭𤣥曰重譯欲其轉相曉也選注引康誥傳兹殷罰有倫今也反是諸侯不同聴每君異法聴無有倫是故法之難也父子兄弟罪不相及左傳苑何忌云杜注尚書康誥父不慈子不祗兄不友弟不恭不相及也左傳胥臣云又見後漢章帝詔天子有事諸侯皆侍尊卑之義儀禮疏鄭𤣥曰事謂祭祀宗室有事族人皆侍終日大宗已侍於賔奠然後燕私儀禮疏燕私者合而與族人飲飲而不醉是不親醉而不出是不敬詩疏鄭𤣥曰謂卿大夫以下宗室大宗之家尚書酒誥疏云大傳因此言宗室將有事族人皆入侍得有醉與不醉而出與不出之事酒誥傳酒誥曰王曰封唯曰若圭璧盖脱簡之文也法言曰酒誥之篇俄空焉今亡夫召誥傳乃社于新邑羊一牛一豕一侯甸任衛作國伯謂殷也大社唯松東社唯栢南社唯梓西社唯栗北社唯槐白虎通引尚書洛誥傳古之處師八家而為隣三隣而為朋三朋而為里五里而為邑十邑而為都十都而為師州十有二師焉家不盈三口者不朋由命士以上者不朋鄭𤣥曰州凡四十三萬二千家葢虞夏之數也周公攝政四年建侯衛五年營成周六年制禮作樂七年致政成王鄭𤣥曰建侯衛是封衛侯康叔論封衛之事是四年作康誥也召誥論營洛邑成周之事是五年作召誥也洛誥論致政成王之事是七年作洛誥也周公將作禮樂優游之三年不能作君子恥其言而不見其從恥其行而不見其隨將大作恐天下莫我知將小作恐不能揚父祖功業徳澤然後營洛以觀天下之心于是四方諸侯率其羣黨各攻位于其庭周公曰示之以力役且猶至況導之以禮樂乎然後敢作禮樂書曰作新大邑於東國洛四方民大和㑹此之謂也詩疏引大傳卜洛邑營成周改正朔立宗廟序祭祀易犧牲制禮樂一統天下合和四海而致諸侯皆莫不衣紳端冕以奉祭祀者太廟之中繽乎其猶模繡也天下諸侯之悉來進受命於周公而退見文武之尸者千七百七十三諸侯皆莫不磬折玉音金聲玉色然後周公與升歌而弦文武諸侯在廟中者伋然淵其志和其聲愀然若復見文武之身然後曰嗟子乎此盖吾先君文武之風也夫周禮疏引大傳鄭𤣥曰八州州立二百一十國畿内九十三國磬樂器其形曲折於穆清廟周公升歌文王之功烈徳澤尊在廟中嘗見文王者愀然如復見文王文選注於者歎之穆者敬之詩疏引大傳肅雝顯相四海敬和明徳來助祭以敬和為諸侯者義得兩通也詩疏王者躬耕所以供粢盛選注引大傳祭之為言察也察者至也至者人事也人事至然後祭祭者薦也薦之為言在也在也者在其道也藝文類聚引尚書大𫝊曰祭之為察也薦至也言人事至於神也廟者貌也以其一作其以貌言之也宗子燕族人於堂宗婦燕族人於房序之以昭穆儀禮疏引大𫝊綴之以食而弗殊有族食族燕之禮也夏后逆於廟庭殷人逆於堂周人逆於户公羊疏引書𫝊戰鬭不可不習故於蒐狩以閑之也閑之者貫之也貫之者習之也凡祭取餘獲陳於澤然後卿大夫相與射也中者雖不中也取不中者雖中也不取何以然所以貴揖讓之取也而賤勇力之取曏之取也於囿中勇力之取爾雅疏曏之取於囿中勇力之取也今之取也於澤宫揖讓之取也澤習禮之處非所以行禮其射又主中此主皮之射與天子大射張皮侯賔射張五采之侯燕射張獸侯儀禮鄭注引大𫝊鄭𤣥曰澤射宫也周禮疏引書傳云戰者男子之事因蒐狩以閲之閲之者串之多士傳武王入殷周公曰各安其宅各田其田無故無新唯仁之新申屠剛傳注引大傳天子堂九雉諸侯七雉伯子男五雉雉長三丈度髙以髙度長以長周禮疏詩疏鄭𤣥曰雉長三丈髙一丈則墻髙一丈儀禮疏天子堂廣九雉三分其廣以二為内五分其内以一為髙東房西房北堂各三雉明堂位正義天子賁庸諸侯疏杼鄭𤣥曰賁大也言大墻正直也疏衰也杼亦墻也言衰殺其上下不得正直天子將出撞黄鍾之鐘右五鐘皆應入則撞㽔賔之鐘左五鐘皆應太師于是奏樂周禮注鄭𤣥曰黄鍾陽聲之音陽主動出則撞之右五鐘謂林鐘至應鐘右主静是動以告静者㽔賔在午隂生之月隂主静入亦是静左五鐘謂大吕至中吕左陽主動入静以告動也太府于時奏采薺肆夏古者后夫人將侍君前息燭后舉燭至房中釋朝服襲燕服然後入御于君鷄初鳴太師奏鷄鳴於陛夫人鳴佩玉於房中告去也然後應門擊柝告闢也然後少師告質明於陛下然後夫人入庭君出朝凡羣妃御見之法月與后妃其象也卑者宜先尊者宜後自九嬪以下九九而御于王所女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕十五日而徧望後反之凡進御君所女史必書其日月授之以環以進退之生子月辰則以金環退之當御者以銀環進之蓍著于左手既御蓍著于右手孔子曰日者天之明月者地之理隂契制故月上屬為天使婦從夫放月紀一本有陽字鄭𤣥曰朝服展衣燕服褖衣陛周禮疏作簷下黄帝妃嫫母于四妃之班居下貌甚醜而最賢心每自退多方傳周公居攝一年救亂二年克殷三年伐奄多方魏収曰周公居攝乃云一年救亂似不稱元曰惟五月丁亥王來自奄遂踐奄踐之者籍之也籍之謂殺其身執其家瀦其宫詩疏引多方傳鄭𤣥曰奄國在淮夷之旁周公居攝之時亦叛王與周公征之三年滅之自此而來歸殺君之室雖生美菜有義之士弗食大夫有汙瀦之宫雖生美菜有義之士不食二本不同古者十稅一多于十稅一謂之大桀小桀少于十稅一謂之大貊小貊王者十一而税而頌聲作矣故書曰越唯有胥賦小大多政公羊傳古者什一而藉多乎什一大桀小桀寡乎什一大貊小貊無逸傳厥兆天子爵白虎通引書無逸傳古者百里之國三十里之遂二十里之郊九里之城三里之宫七十里之國二十里之遂九里之郊五里之城一里之宫五十里之國九里之遂三里之郊一里之城以城為宫周禮疏引無逸傳鄭𤣥曰𤣥或疑焉按詩疏引書傳云三十里之國三里之郊立政傳古者天子三公每一公三卿佐之每一卿三大夫佐之每一大夫三元士佐之藝文類聚天子三公一曰司徒二曰司馬三曰司空九卿二十七大夫八十一元士凡百二十在天為山川北堂書抄引今尚書夏侯歐陽説太師天公也太傅地公也太保人公也烟氛不修山川不祀風雨不時雪霜不降責在天公城郭不繕溝池不脩水泉不隆責在地公臣多弑主孽多殺宗五品不訓責在人公聖人在位其君不誦無用之言其工不作無用之器其商不通無用之物周人之教以文上教以文君子其失也小人薄文選注鄭𤣥曰文謂尊卑之差制也習文法無悃誠也周民可比屋而封選注引大傳君奭傳徐幹中論云召公見周公之既反政而猶不知疑其貪位周公為之作君奭然後悦君奭曰昔在上帝周田觀文王之徳記緇衣呂刑傳夏后氏不殺不刑死罪罰二千饌索隠引大傳馬融曰饌音選決闗梁踰城郭而畧盗者其刑臏男女不以義一作禮交者其刑宫觸易一作逆君命革輿服制度姦軌盜攘傷人者其刑劓非事而事之出入不以道義而誦不詳一作祥之辭者其刑墨降畔冦賊劫畧奪攘矯䖍者其刑死此二千五百罪之目畧也其刑書則亡夏刑大辟二百臏辟三百宫辟五百劓墨各千周禮疏鄭𤣥曰周改臏作刖刖斷足也宫丈夫割其勢女子椓其隂閉于宫中非事而事之今所不當為也犯劓者赭衣大辟者布衣文選注墨罰疑赦其罰百率夏侯歐陽説上刑挾輕下刑挾重劉愷傳犯墨者蒙巾犯劓者赭其衣犯臏者象其臏犯大辟者衣無領北堂書抄引尚書大𫝊天齊乎人假我一日後漢楊賜𫝊獄貨非可寳也然寳之者未能行其法者也貪人之實受人之財未有不受命以矯其上者也親下以矯其上者未有能成其功者也子夏曰昔者三王慤然欲錯刑遂罰遂罰平心而應之和然後行之然且曰吾意者以不平慮之乎吾意者以不和平之乎如此者三然後行之此之謂慎罰鄭𤣥曰錯處也遂行也子曰古之刑者省之今之刑者繁之古者有禮然後有刑是以刑省也今也反是無禮而齊之以刑是以繁也書曰伯夷降典折民以刑謂有禮然後有刑也聴訟之術大畧有三治必寛寛之術歸于察察之術歸于義是故聴而不寛是亂也寛而不察是慢也古之聴訟者言不越情情不越義是故聴民之術怒必畏畏思義小罪勿兼鄭𤣥曰怒責也因責之罪必思兼謂思其辭思其義思義重罪小可求以出之也子曰今之聴民者求所以殺之古之聴民者求所以生之不得其所以生之之道乃刑殺君與臣㑹焉子曰聴訟者雖得其情必哀矜之死者不可復生斷者不可復續也子如衛人謂曰公甫不能聴獄子曰非公甫不能聴獄也公甫之聴獄也有罪者懼無罪者恥民近禮矣子曰呉越之俗男女同川而浴其刑重而不勝由無禮也中國之教内外有别男女不同椸架不同巾櫛其刑重而勝由有禮也語曰夏后不殺不刑罰有罪而民不輕犯夏刑三千條唐長孫律疏序引尚書大傳晉傳古者一弓百矢周禮疏云尚書文侯之命平王賜晉文侯古者諸侯之於天子三年一貢士一適謂之攸好徳再適謂之賢賢三適謂之有功有功者天子賜之車服弓矢號曰命諸侯有不貢士謂之不率正一不適謂之過再不適謂之傲三不適謂之誣誣者天子絀之一絀以爵再絀以地三絀而爵地畢也黄瓊傳注鄭𤣥曰適猶得也山堂考索引伏生大傳曰諸侯之於天子三年一貢士一適謂之好徳再適謂之賢賢三適謂之有功一不適謂之過再不適謂之傲三不適謂之誣其適則有衣服弓矢秬鬯虎賁之賞其不適則有黜爵之罰以兵屬於得專征伐者鄭𤣥曰謂七命以下不得弓矢賜者奏百人之樂致𤣥鶴之舞北堂書抄引尚書大傳晉平公問師矌曰吾年七十欲學恐已暮師矌曰臣聞老而學者如執燭之明執燭之明孰與昧行公曰善魏文侯問子夏子夏遷延而退選注引大𫝊魯傳周公封以魯身未嘗居魯也選注伯禽將歸于魯周公謂伯禽之傅曰汝將行盍志而子美徳乎對曰其為人寛好自用以慎此三者其美徳也已周公曰嗚呼以人惡為美徳虖君子好以道徳故其民歸道彼其寛也出無辨矣是其好自用也以斂益之也彼其慎也是其所以淺也吾語女吾文王之子武王之弟成王之叔父吾於天下不賤矣然而吾所執贄而見者十人還贄而相見者三十人貌執之士者百有餘人欲言而請畢事者千有餘人於是吾僅得三士焉以正吾身以定天下吾所以得三士者亡於十人與三十人中乃在百人與千人之中故上士吾薄為之貌下士吾厚為之貌人人皆以我為越踰好士然故士至士至而後見物見物然後知是非之所在戒之哉汝其以魯國驕人幾矣荀子注引大傳鄭𤣥曰贄者所執以至也君子見於所尊敬必執贄以將其厚意也十人公卿之中也三十人羣士之中也百人羣大夫之中也周初淮浦徐州並起為寇伯禽伐之于鮮誓鮮誓史記伯禽作肹誓索隠曰按尚書大傳作鮮誓周禮注粊誓曰􅖏乃獲敜乃阱爾雅郭璞注引費誓曰汝則有逸罰䟽云今文子貢曰葉公問政于夫子子曰政在于附近而來逺魯哀公問政子曰政在於論臣齊景公問政子曰政在於節用三君問政夫子應之不同然則政有異乎子曰荆之地廣而都狹民有離志焉故曰政在於附近而來逺哀公有臣三人内比周以惑其君外障拒諸侯賔客以蔽其明故曰政在論臣齊景公奢於臺榭淫於苑囿五官之樂不解一旦而賜人百乗之家者三故曰政在節用秦誓傳書曰邦之榮懐亦尚一人之慶知秦穆之霸也白虎通引尚書書序傳子曰參女以明王為勞乎昔者舜左禹而右臯陶不下席而天下治子曰君子不可以不學見人不可以不飾不飾無貌無貌不敬不敬無禮無禮不立夫逺而光者飾也近而逾明者學也譬之如汙邪水潦集焉菅蒲生焉從上觀之誰知其非源水也稷鉏已藏嵗事欲畢餘子皆學十三始入小學見小節踐小義十八始入大學見大節踐大義書傳畧説太平御覽藝文類聚俱引尚書大傳多文一作聞而齊給索隠引大傳鄭𤣥曰齊疾也堯八眉舜四瞳子禹其跳湯扁文王四乳八者如八字者也其跳者踦也扁者枯也言皆不善也鄭𤣥曰其發聲也踦歩足不能相通也枯言湯體半小象偏枯東郭子思問於子貢曰夫子之門何其雜也子貢曰夫隠栝之家多枉木良醫之門多疾人砥礪之旁多頑鈍夫子聞之曰修道以俟天下來者不止是以雜也六誓可以觀義五誥可以觀仁甫刑可以觀誠洪範可以觀度禹貢可以觀事臯陶可以觀治堯典可以觀美子夏讀書畢見夫子夫子問焉子何為於書子夏對曰書之論事也昭昭如日月之代明離離如一作若參辰一作星之錯行上有堯舜之道下有三王之義商所受於夫子者志之不敢忘也雖退而窮居一作巖居河濟之間深山之中作壤室編蓬户常於此彈琴以詠先王之道則可發憤慷慨矣孔子謂子夏曰子見其表未見其裏也尚書大傳者漢伏生勝之所作也孔子刪書斷自虞始迄秦穆公据古書三千二百四十篇定百有二篇率三十而取一葢其慎也書罹秦火澌滅殆盡秦博士伏生勝能誦習其書既使其女口授􅄯掌故錯二十八篇漢世列之為經又創以己意為大傳四十一萹别授同時張生由是學者逓相傳習為伏氏尚書之學劉向校之凡四十一篇鄭康成銓次為八十三篇至晉永嘉之亂而大傳無完書矣隋志大傳三卷舊唐書志亦云然近世亦復希覯又惡覩所謂四十一篇八十三篇者哉獨時時散見於他説而尚書經生家多漫不措意但知蔡傳及兩孔氏註疏辨析孰為古文今文之有無同異而已孫君晴川博學嗜古惜此書為九十老生從秦燼之餘苦心掇拾昌明聖緒輔翼典常不忍聴其等於隕籜飄風終歸冺没於是旁搜羣籍凡傳紀百家所援大傳單辭儷句莫不心識手抄都為一書釐成三卷合於隋唐志舊目虞夏商周仍以時代相次典謨誓誥各從其類咸有條貫無相紊越使千百年古學之遺散而幾完斷而復續可謂有功昔賢嘉惠來哲而孫君猶以目未覩四十一篇八十三篇者為憾好學深思之士立心固如是雖然漢太史遷不云乎其言尤雅其所表見皆不虚此三卷者後有藝文志當為首録矣晴川沈繹祖拜䟦尚書大傳卷三欽定四庫全書尚書大傳補遺松陽縣教諭孫之騄輯五帝傳堯見天因邰而生后稷詩疏引論衡引大傳曰鳳凰在列樹蕭索輪囷是謂卿雲楊升菴引尚書大傳髙山大川五嶽四瀆之屬史記正義引書傳曰澤障曰陂新唐書引書謂菜為茹詩疏政者齊中也謂春秋冬夏天文地理人道所以為政也道正而萬事順成故天道政之大也史記正義前玉海所引無首句天子諸侯必有公桑蠶室就川而為之大昕之朝夫人浴種於川齊民要術引古者聖帝之治天下也五十已下非烝祭不敢遊飲唯六十以上遊飲也大戴記注引男三十而娶女二十而嫁書曰有鰥在下曰虞舜仝上引大傳古學彚纂引大傳曰男三十而娶女二十而嫁通於織紝紡績之事黼黻文章之美不若是則上無以孝于舅姑而下無以事夫養子堯為天子丹朱為太子舜為左右堯知丹朱之不肖必將壊其宗廟滅其社稷而天下同賊之故堯推尊舜而尚之屬諸侯致天下於大麓之野太平御覽引尚書大傳三王之治如環之無端如水之勝火仝上髙宗有親䘮居廬三年然未嘗言國事而天下無背叛之心者何也及其為太子之時盡以知天下人民之所好惡是以雖不言國事也知天下無背叛之心仝上子張問曰髙宗梁闇三年不言何也孔子曰古者君薨王世子聴於冡宰三年不敢服先王之服履先王之位而聴焉以臣民之義則不可一日無君矣不可一日無君猶不可一日無天也以孝子之隠乎則三年弗居矣故曰義者彼也隠者此也逺彼而近此則孝子之道備矣升菴集引古者諸侯始受封則有采地百里諸侯以三十里七十里諸侯以二十里五十里諸侯以十五里其後子孫雖有罪黜其采地不黜使其子孫賢者守之世世以祠其始受封之人此之謂興滅國繼絶世書曰兹予大享于先王爾祖其從與享之此之謂也路史國名記引大傳引盤庚曰若徳明哉湯任父言卑應言大傳引大誥曰民儀有十夫玉海書大傳云嵗事既畢餘子皆入學十五入小學十八入大學距冬至四十五日始出學𫝊農事上老平明坐於右塾庶老坐於左塾餘子畢出然後歸夕亦如之餘子皆入父之齒隨行兄之齒鴈行朋友不相踰輕任并重任分頒白不提挈出入皆如之此之謂造士困學紀聞尚書大傳曰愛人者兼其屋上之烏然則惡而知其善愛而知其惡者寡矣埤雅傳記火發於宻水洩於深萬卷菁華前集引大傳道是周公也克是太公也按大戴記賈子新書克作充弼是召公也丞一作承是史佚也故成王中立而聴朝則四聖而維之仝上引大傳舜之在位也端由北極仝上引大傳按淮南覽㝠訓有之或非傳文也清而明者天之體晉天文悉引鴻範傳正月雷㣲動而雉雊雷諸侯之象也雉亦人君之類也初學記引人君嫉賢疾善在下謀上則日蝕雨電殺走獸太平御覽引凡有所害謂之災無所害而異於常謂之異害為已至異為方來仝上雲者起於山彌於天隂氣也王者失中臣下敢蔽君不明則雲隂象多蔽天光有雲如衆謂風師法有大兵仝上沙簏者山林也長狄之人長盖五丈餘也洪範五行傳曰若煩數溷瀆或不精嚴神不告也或觀卦察兆吉不得也或龜不神蓍不靈此其所以過差聖人不得專用也龜筮共違於人神靈不祐也魏襄王十三年張儀詐得罪於秦而去相魏將為秦而欺奪魏君是嵗魏有女子化為丈夫者天若語魏曰勿用張儀隂變為陽神將為君神疑臣是時魏王亦覺之不用張儀儀免去歸秦魏無害仝上秦始皇九年四月寒凍民有死者以上俱御覽桀殺刑彌厚而民彌暴路史注引傳曰狂夫之言而明主擇焉鼂錯傳引尚書傳言周將興之時有大赤鳥銜榖之種而集王屋之上者武王喜諸大夫皆喜周公曰茂哉茂哉天之見此以勸之也春秋繁露尚書大傳曰反必告廟也穆天子傳郭注引呂尚釣於磻溪得魚腹中有玉璜御覽伏生大傳云周公兼思三王之道以施於春秋冬夏困學紀聞螭猛獸也歐陽尚書説尚書大傳曰周書自泰誓就召誥而盛於洛誥傳曰士卒鳬藻言其和睦歡恱如鳬之戱於水藻也埤雅引古者中刑用鑚鑿御覽引周人以仁接人而天下莫不仁故曰大矣有徳者尊其位而重其禄諸侯之義非天子之命不得動衆起兵殺不義者所以强幹弱枝尊天子卑諸侯也撞㽔賔在外者皆金聲在内者皆玉色御覽大傳云周成王時州靡國獻狒狒呉任臣字彚補尚書大傳宣王問於春子曰寡人欲行孝弟之義為之有道乎春子曰昔者衛聞之樂正子曰文王之治岐也云云困學紀聞子夏葉拱而進困學紀聞引大傳余居龍塢之明年借書於趙子公千得困學紀聞太平御覽二書公千好學而樂與朋友共之其識見有過人者今録大傳四十餘則皆前書未有得趙子書而補之不能忘所自也夫以余之孤陋無所知曉使遇天下好學者皆如趙子或藉是可漸補伏書之缺不厚幸與噫燕朋逆師燕辟廢學吾又嘆世之面朋而不心者何多也矧余於公千未謀面與南漳子尚書大傳補遺
