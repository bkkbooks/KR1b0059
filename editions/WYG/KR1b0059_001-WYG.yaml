  - {type: page-break, offset: 66, content: '', id: KR1b0059_WYG_001-9b, image: WYG0068/WYG0068-0390d.png}
body:
  text: 鄭𤣥曰君恩覆之臣敢進古者諸侯之於天子五年一朝朝見其身述其職述其職者述其所職也選注五年一朝王者亦貴得天下之歡心以事其先王因助祭以述其職故分四方諸侯為四輩輩主一時公羊疏引虞傳五嶽謂岱山霍山華山恒山嵩山也白虎通大傳又爾雅疏引虞夏傳霍山為南嶽江河淮濟為四瀆風俗通引大傳五嶽視三公四瀆視諸侯其餘山川視伯小者視子男尚書正義云其尊卑所視王制及書傳之文鄭𤣥曰謂視其牲幣粢盛籩豆爵獻之數五岳皆觸石出雲扶寸而合不崇朝而雨天下後漢章帝紀注藝文類聚引大傳鄭𤣥曰四指為寸扶音膚惟元祀廵守一作狩四嶽八伯壇四奥沉四海封十有二山兆十有二州樂正定樂名元祀代泰山貢兩伯之樂焉東嶽陽伯之樂舞侏一作株離其歌聲比余謡名曰晳陽儀伯之樂舞鼚哉其歌聲比大南名曰南陽中祀大交霍山貢兩伯之樂焉夏伯之樂舞謾哉一作或其歌聲比中謡名曰初慮羲伯之樂舞將陽其歌聲比大謡名曰朱干干一作于秋祀栁榖華山貢兩伯之樂焉秋伯之樂舞蔡俶其歌聲比小謡名曰苓落和伯之樂舞𤣥鶴其歌聲比中謡名曰歸來祀幽都宏山貢兩伯之樂焉冬伯之樂舞齊落齊一作濟歌曰縵縵并論八音四㑹歸格於禰祖用特五載一廵守群后徳讓貢正聲而九族奏具成鄭𤣥曰沉祭名祭水曰沈兆域也為營域以祭十二州之分星也陽伯春伯秩宗伯夷為之路史引大傳曰伯夷之子為西岳株離舞曲名言象物生株離也儀伯羲仲之後鼚動貌哉始也南任也夏伯夏官司馬棄為之羲伯羲叔之後秋伯秋官士也臯陶為之和伯和叔之後蔡哀也俶始也宏山即恒山冬伯冬官司空垂為之樂者人性所自有也故聖王廵十有二州觀其風俗習其情性因論十有二俗定以六律五聲八音七始五音天音也八聲天化也七始天統也選注北堂書抄詩譜見諸侯問百年太師陳詩以觀民命風俗命市納賈以觀民好惡山川神祗有不舉者為不敬不敬者削以地宗廟有不順者為不孝不孝者黜以爵變禮易樂為不從不從者君流改制度衣服為畔畔者君討有功者賞之白虎通引尚書大傳天子命諸侯輔助為政所以通賢共治示不獨尊重民之至大國舉三人次國舉二人小國舉一人公羊疏云書傳文矜寡孤獨天民之窮而無告者皆有常餼詩疏唐虞象刑而民不敢犯苗民用刑而民漸興犯唐虞之象刑上刑赭衣不純中刑雜屨下刑墨幪公羊疏引唐傳今入虞傳鄭𤣥曰純縁也時人尚徳義犯刑者但易之衣服自為大恥屨履也幪巾也使不得冠飾子張曰堯舜之聖一人不刑而天下治何則教誠而愛深也一夫而被此五刑子龍子曰未可謂能為書孔子不然也五刑有此教路史注引大傳子贛曰堯舜之王一人不刑而天下冶敬誠而愛深也鄭𤣥曰二人俱罪吕侯之説刑也被此五刑喻犯數罪也故子曰教然耳犯數罪猶以上一罪刑之子曰古之聼民者有過必赦小罪勿増大罪勿纍老弱不受刑有過不受罰是故老而受刑謂之悖弱而受刑謂之剋不赦有過謂之賊率過以小謂之枳故與其殺不辜寧失有罪與其増以有罪寧失過以有赦鄭𤣥曰延罪無辜曰纍惟刑之謐哉今文大夫有石材庶人有石承鄭𤣥曰石材柱下礩也石承當柱下布也以外出為飾舜入唐郊以丹朱為尸禮正義惟十有三祀帝乃稱王而入唐郊鄭𤣥曰舜承堯帝猶反側晨興闢四門來仁賢選注詩疏孔子曰舜以天徳嗣堯西王母來獻白玉琯白虎通溝瀆壅遏水為民害田廣不墾則責之司空百姓不親五品不順則責之司徒蠻夷猾夏冦賊姦軌則責之司馬藝文類聚北堂書抄舜無登而髙不行而逺拱揖於天下而天下稱仁舜好生惡殺鳳凰巢其木一作樹仁閔覆下則稱旻天説文引虞書今尚書歐陽説春曰昊天夏曰蒼天秋曰旻天冬曰上天詩周禮爾雅疏舜將禪禹八風脩一作循通歌大化大訓六府九原而夏道興鄭𤣥曰四章皆歌禹之功所謂九叙惟歌九徳之歌于此猶可攷惟五祀奏鍾石奏一作定論人聲及乃鳥獸咸變於前秋養耆老而春食孤子一作春食餔於乃浡然招樂興於大麓之野報一作執事還歸二年談然談一作䜎一作􅨳乃作大唐之歌其樂曰舟張辟雝鶬鶬相從八風囬囬鳳皇喈喈歌者三年昭然乃知乎王世明有不世之義招為賔客雍為主人始奏肆夏納以孝成舜為賔而禹為主人樂正道贊曰尚考太室之義唐為虞賔至今衍於四海成禹之變時俊乂百工相和而歌卿雲帝唱之曰卿雲爛兮禮一作糺一作紏李善引大傳作體縵縵兮一作漫漫日月光華旦復旦兮八伯咸進稽首曰明明上天爛然星陳日月光華𢎞於一人帝乃載歌曰日月有辰一作常一作恒星辰有行四時從一作順經萬姓幾誠一作百姓允臧一作萬物允成施于論樂配天之靈遷於賢聖莫不咸聼鼚乎皷之軒乎儛之精華已竭一作英華欲遂褰裳去之於時八風循涌卿雲藂藂蟠龍僨信於其藏蛟魚躍踊於其淵魚鱉咸出於其穴遷虞而事夏也鄭𤣥曰舜始欲改堯樂百獸之屬率舞談猶灼也大唐之歌美堯禪也招雍皆樂章名也賔入奏招主入奏雍也始謂尸入時也納謂薦獻時也肆夏孝成指樂章名也舜既使禹攝天子之事于祭祀避之居賔客之位獻酒則為亞獻尚考猶言古考謂徃時也太室明堂之中央室也義當為儀儀禮也謂祭太室禮堯為舜賔之也衍猶溢也言堯之禪天下至於今其徳義溢於四海也縵縵教化廣逺也復旦明明相代也藂藂言和氣相應也十有四祀鐘石笙筦變聲樂未罷疾風發屋天大雷雨帝沈首而笑曰明哉非一人天下也乃見於鐘石路史聖人與聖也猶規之相周矩之相襲文選注九共傳書曰予辯下土使民平平使民無傲玉海虞傳有九共篇夏書禹之君民也罰弗及強而天下治天子衣服其文華蟲作繢宗彛藻火山龍諸侯作繢宗彛藻火山龍子男宗彛藻火山龍大夫藻火山龍士山龍又曰山龍青也華蟲黄也作繢黒也宗彛白也藻火赤也天子服五諸侯四次國服三大夫服二士服一山堂考索引大傳鄭𤣥曰𤣥或疑焉華蟲五色之蟲藻水草蒼色予欲聞六律五聲八音七始詠漢律厯志索隠曰七始詠古文在治忽今文采政忽史記作來始滑古者天子必有四鄰前曰疑後曰丞一作承左曰輔右曰弼天子有問無以對責之疑可志而不志責之丞承可正而不正責之輔可揚而不揚責之弼其爵視卿其禄視大國之君孝經疏大國作次國搏拊鼓振以秉琴瑟練絲徽絃鳴者貴玉聲也白虎通古者帝王升歌清廟大瑟練絃達越大琴朱絃達越以韋為鼓謂之搏拊鄭𤣥曰清廟樂章名越下孔也山堂考索引尚書大傳曰大琴敬絃達越大瑟朱絃達越葢越底孔也疏達通之也朱絃練而朱之也葢絲不練則勁而聲清練則熟而聲濁孔小則聲急大者聲遲故疏越以遲其聲然後不至於太急練絲以濁其聲然後不失之太清拊革著以穅白虎通引尚書大傳今書傳無著穅之文鄭元注樂記拊者以韋為表装之以穅穅一名相因以名焉今齊人或謂穅為相故知穅為相即拊也余按孔安國傳搏拊以韋為之實之以穅所以節樂疑非伏傳以白虎通引存焉正朔所不加即君子所不臣也白虎通引大傳元首明哉股肱良哉元首君也股肱臣也選注引大傳禹貢傳湛濁為地又曰積隂為地故地者濁隂也地不滿東南故水潦塵埃歸焉子張曰仁者何樂乎山也子曰夫山者恺然髙恺然髙則何樂焉山草木生焉禽獸畜焉財用殖焉生財用而無私為四方皆伐無私與焉出雲雨以通乎天地之間隂陽和合雨露之澤萬物以成百姓以饗此仁者之樂於山也圻者天子之境也諸侯曰境天子游不出封圻諸侯非朝聘不出境路史注引大傳河色黄赤衆川之流葢濁之積也百里一小曲千里一大曲一直非水無以准萬物之平非水無以通道任重也下而平者謂之隰隰之猶言濕也往古之時四極廢九州裂於是女媧殺黒龍以祭冀州鄭𤣥曰冀州取地以為名也其地有險有易帝王所都亂則冀治弱則冀强荒則冀豐也東原底平大而髙平者謂之太原郡取稱焉水經注引大傳堯南撫交趾於禹貢荆州之南垂幽荒之外故越也水經注㳙一作洧盤之水出崦嵫山禺鐵在遼西索隠今文尚書滎播既都今文被明都今文文皮千合索隠數兩謂之合也予辛壬娶塗山癸甲生啟索隠曰葢今文尚書百川趨於海大水小水東流洶洶礚礚皆水聲也文選注夏成五服外薄四海東海魚須魚目南海魚革珠璣大貝西海魚骨魚幹魚脅北海魚釼魚石出填擊閭河魭江鱓大龜五湖元唐鉅野蓤鉅定嬴濟中瞻諸孟諸靈龜隆谷一作隂谷大都魚魚刀青丘青䨼丹丘丹雘此二句山海經廣注引大傳咸㑹於中國初學記太平御覽俱引大傳鄭𤣥曰言徳廣之所及所貢物魚須今以為簮又魚目今以雜珠魚革今以飾小車兵室之口貝古以為貨魚幹魚脅未詳魚釼魚兵如釼也魚石頭中石也出填狀如凝脂在水上擊閭狀如鮐魚大五六尺今海家謂之缺字魭當作黿黿狀如鼈而大鱓或作鼉鼉狀如蜥蜴長六七尺鱓或為鱣鱣鯉也五湖揚州浸也今屬呉元唐未聞鉅大也野魯藪今屬山陽蔆芰鉅定澤也今屬樂安有故縣屬齊蠃蝸牛瞻諸鼃黽也孟諸宋藪也龜俯者靈周禮天龜曰靈屬隆讀如釐降之降或如函谷今河南榖城西闗山也大都明都魚今江南以為鮑魚魚刀魚兵如刀者也言徳能及之異物來至也禹貢合注引大傳曰禹成五服齒革羽毛器乃備甘誓傳戰者憚警之也白虎通藝文類聚天子三公一曰司徒公二曰司馬公三曰司空公各兼二卿周禮正義山堂考索引大傳鄭𤣥曰夏書云六卿者后稷司徒秩宗司馬作士共工也周禮天子六卿與太宰司徒同職者則謂之司徒公與宗伯司馬同職者則謂之司馬公與司寇司空同職者則謂之司空公一公兼二卿舉下以是稱是其中參六官之事貌屬木言屬金視屬火聼屬水思屬土水火者百姓之求飲食也金木者百姓之所興作也土者萬物之所資生也是為人用尚書正義王者一質一文據天地之道白虎通正朔三而改文質再而復三統者所以序生也三正者所以統天也是故三統三正也三王之統若循連環周則又始窮則反本也選注太平御覽詩疏云三正者謂夏與唐虞也正朔三而改夏以建寅為正則舜當以建子堯當以建丑是謂三正也尚書大傳卷一欽定四庫全書尚書大傳卷二松陽縣教諭孫之騄輯商書殷傳帝告篇書曰施章乃服明上下玉海湯誓傳桀無道囚湯後釋之諸侯八譯來者六國北堂書抄引大傳伊尹母孕行汲水化為枯桑其夫尋至水濵見桑穴中有兒乃収養之夏人飲酒醉者持不醉者不醉者持醉者相和而歌曰盍歸於亳亳亦大矣故伊尹退而閑居深聼樂聲更曰覺兮較兮吾大命格兮去不善而就善何樂兮伊尹入告於桀一作王曰大命之亡亡一作去有日矣桀啞笑曰天之有日猶吾之有民民一作人日有亡哉日亡吾亦亡矣是以伊尹遂去夏適湯鄭𤣥曰深聼樂聲思其故也是時伊尹仕桀覺兮謂先知者較兮謂直道者也格至也吾語桀也自比於天言常在也比於日言去復來也伊尹相湯伐桀戰於鳴條春秋地名考引大傳湯放桀也居中野士民皆奔湯桀與其屬五百人南徙千里止于不齊士民往奔湯桀與其屬五百人徙於魯魯士民復奔湯桀曰國君之有也吾聞海外有人與五百人俱去行而無資謂之乏居而無食謂之困周禮疏引大傳鄭𤣥曰止曰居食謂米也咸乂傳亳有祥桑榖共生於朝七日大拱索隠引尚書大傳鄭𤣥曰兩手搤之曰拱説命傳詩曰非知之艱行之惟艱周禮疏引尚書傳髙宗肜日傳武丁祭成湯有雉飛升鼎耳而雊問諸祖己曰雉者野鳥也不當升鼎升於鼎者欲為用也無則逺方將有來朝者乎故武丁内反諸已以思先王之道三年辮髮重譯至者六國孔子曰吾於髙宗肜日見徳之有報之疾也西伯戡黎傳書正義西伯戡黎引伏生傳春子曰文王治岐玉海引大傳施政而物皆聼文選注周文王至磻溪見吕望文王拜之尚父望釣得玉璜刻曰周受命呂佐檢徳合於令昌來提西伯既戡黎紂囚之羑里爾雅疏引尚書大傳太公之羑里見文王散宜生遂至犬戎氏取美馬駮身朱鬛雞目者之西海之濵取白狐青翰之於氏一作於陵氏取怪獸尾倍其身名曰虞之有參氏一作莘取美女之江淮之浦取大貝如車渠陳於紂庭紂悦曰非子罪也崇侯也遂遣西伯伐崇鄭𤣥曰翰長毛也虞葢騶虞也散宜生閎夭南宫括三子者學於太公太公見三子之為賢人遂酌酒切脯除為師學之禮約為朋友散宜生南宮适閎夭三子相與學訟於太公四子遂見西伯於羑里獻寳以免文王孔子曰文王得四臣吾亦得四友自吾得回也門人加親是非胥附耶自吾得賜也逺方之士日至是非奔奏耶自吾得師也前有光後有輝是非先後耶自吾得繇也惡言不至門是非禦侮耶文王有四臣以免虎口丘亦有四友以禦侮公羊疏詩疏引殷傳曰西伯得四友獻寳免於虎口而克耆又引大傳曰得三子獻寳紂釋文王而出伐黎㣲子傳大夫七十而致仕老于鄉里名曰父師士曰少師以教鄉人子弟於門塾之基而教之學焉儀禮疏引書傳畧説七十杖於朝鄭𤣥曰朝當為國者致仕者以朝乗車輲輪鄭𤣥曰乗車安車言輲輪明其小也㣲子將朝周過殷之墟見麥秀之蔪蔪曰此父母之國宗廟社稷之所立也志動心悲欲哭則朝周俯泣則婦人推而廣之作雅聲為麥秀之歌歌曰麥秀漸漸兮禾黍油油彼狡童兮不我好仇選注鄭𤣥曰狡童謂紂也周書周傳狄人將攻太王亶父召耆老而問焉曰狄人何欲耆老對曰欲菽粟財貨太王亶父曰與之毎與狄人至不止太王亶父贅其耆老而問之曰狄人又何欲乎耆老對曰又欲土地太王亶父曰與之耆老曰君不為社稷乎太王亶父曰社稷所以為民也不可以所為民亡民也耆老對曰君縱不為社稷不為宗廟乎太王亶父曰宗廟吾私也不可以私害民遂䇿杖而去過梁山邑於岐山國人束脩奔而從之者二千乗一止而成三千戸之邑鄭𤣥曰岐山在梁山西南贅為屬虞人與芮人質其成於文王入文王之境則見其人萌讓為士大夫入其國則見士大夫讓為卿二國相謂曰此其君亦讓以天下而不居也讓其所争以為閒田文選注文王受命一年斷虞芮之訟二年伐䢴禮記正義引大傳作伐鬼方三年伐宻須四年伐犬戎五年伐耆六年伐崇七年而崩文王受命四年伐昆夷采薇為伐昆夷而作鄭𤣥曰犬夷昆夷也詩曰昆夷喙矣泰誓傳泰誓本非伏生所傳今并歸於伏生故史遷及儒林傳云伏生獨得二十九篇以教齊魯太子發升舟中流白虎通引尚書曰太子發升於舟白魚入於王舟王跪取出燎羣公咸曰休哉今文惟丙午王還劉歆三統歴引今文泰誓云丙午逮師師乃鼓譟師乃慆前歌後舞格於上天下地咸曰孜孜無怠大明疏引泰誓鄭𤣥曰慆喜也衆大喜前歌後舞也鄭司農引書傳曰前師乃鼔譟亦謂喜也司馬在前大明疏引泰誓周禮序引夏傳王肅曰司馬太公也正稽古立功立事可以永年丕天之大律律郊祀志引今文鄭𤣥曰丕大也律法也王升舟入水鼓鍾亞觀臺亞將舟亞宗廟亞周禮注有火自上復於下至於王屋流為烏其色赤其聲魄今文泰誓歐陽尚書火流于王屋化為鴉其聲魄索隠云按今文泰誓流為鵰牧誓傳
