front:
  text: 與諸侯為瑞也瑞也者屬也無過行者得復其圭以歸其國有過行者留其圭能改過者復之三年圭不復少黜以爵六年圭不復少黜以地九年圭不復而地畢削此謂諸侯之於天子也義則見屬不義則不見屬周禮疏白虎通及山堂考索
  hash: sha256:b6b0398c92d4a6b948279e5a3bd332fd4e3f7b5e837dd089aa1a0d5d662e4fd6
