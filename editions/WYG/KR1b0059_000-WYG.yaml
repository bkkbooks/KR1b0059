  text: 欽定四庫全書經部二
  hash: sha256:0cc932f81e16f40609470aaa0474e8369dec60a220254d8de2f21651552b055d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0059_WYG_000-1a, image: WYG0068/WYG0068-0385a.png}
body:
  text: 尚書大傳書類附録提要臣等謹案尚書大傳三卷補遺一卷國朝孫之騄輯之騄字晴川錢塘人按漢書藝文志伏生所傳經二十九卷傳四十一篇隋志作尚書大傳三卷鄭康成序謂章句之外别撰大義劉子政校書得而上之其篇次與藝文志合舊唐書志云伏勝注大傳三卷暢訓三卷新唐書志則作伏勝注大傳三卷又暢訓一卷已闕二卷至宋史藝文志暢訓遂不著録葢已散佚故自明代以來僅留大傳殘本脱畧漫漶殆不可讀之騄詮次其文又博采諸書所引補其佚闕以成此本凡卷中不注出處者皆殘本之原文其注某書某書者皆之騄所蒐輯也刻成之後續有所得不及逐條附入因又别為補遺一卷綴之卷末近揚州别有刻本相較頗有異同葢亦雜采補綴今與此本並著于録以存古書之梗概總之皆非伏生之舊矣其注乃鄭康成作今殘本尚題其名新舊唐書並作伏生注大傳葢史文之悞也乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書尚書大傳卷一松惕縣教諭孫之騄輯易曰河出圖雒出書聖人則之書之所起逺矣至孔子得黄帝𤣥孫帝魁之書迄於秦穆公凡三千二百四十篇斷逺取近定可為世法者凡百二篇而為之序遭秦滅學燔書漢興旁求儒雅聞故秦博士伏勝能傳其業詔太常使掌故晁錯往受焉而伏生年且百嵗不能正言言不可曉使其女誦二十八篇口授晁錯曰堯典臯陶謨禹貢甘誓湯誓盤庚髙宗肜日西伯戡黎微子牧誓洪範金縢大誥康誥酒誥梓材召誥洛誥多方多士立政無逸君奭顧命呂刑文侯之命費誓秦誓凡二十八篇自是傳其學者有歐陽大小夏侯宣帝時復有河内女子得泰誓一篇獻之與伏生女所誦合二十九篇漢志所謂經二十九卷是也故言書者始濟南伏生伏生創大傳四十一篇以授同郡張生張生授千乗歐陽生歐陽生授同郡兒寛寛授歐陽生之子世世傳之至曾孫歐陽髙謂之尚書書是本名尚則伏生所加也歐陽之學又有夏侯都尉受業於張生以授族子始昌始昌傳族子勝為大夏侯之學勝傳從子建别為小夏侯之學故有歐陽大小夏侯三家並立迄漢東京相傳弗絶中興書目云伏生為秦博士至孝文時且百嵗張生歐陽生從其學而授之生終後數子各論所聞以己意彌縫其間别作章句因經屬指名之曰傳劉向校書得而上之凡四十一篇至鄭康成始銓為八十三篇及晉永嘉之亂歐陽大小夏侯尚書並亡濟南伏生之傳唯劉向父子所著五行傳是其本法而又多乖戾隋志大傳三卷鄭元注顧彪撰音二卷舊唐書志伏生注大傳三卷又暢訓三卷新唐書伏生暢訓一卷暢訓已不復傳而隋志所稱大傳者今遺缺漫滅前後差舛無卷帙倫次可理余披覽羣籍鈔綴殘文尋其端委釐成三卷仍舊名也至伏生之四十一篇與康成銓次之八十三篇之文篇目既亡孰從而詢焉虞書三五傳燧人以火紀陽也陽尊故托燧皇於天伏羲以人事紀故托羲皇於人盖天非人不因人非天不成也神農悉地力植穀故託農皇於地天地人之道偹而三五之運興矣燧人為燧皇以火紀官藝文類聚伏羲氏作八卦路史注伏羲氏没神農氏作神農氏没黄帝堯舜氏作羅璧識遺黄帝者光也厚也中和之色徳施四序與地同功故先黄以别之也風俗通顓者順也頊者信也慤也言其承文治之以質使天下遵化皆貴真慤也嚳者考也成也言其考明法度美譽醇然若酒之芬香也堯者髙也明也言其隆興煥炳最髙明也舜者准也循也言其准行道以循堯緒也禹者輔也輔續舜後庶績洪茂自堯以上王者子孫據國而紀功徳浸盛故造諡舜禹本以白衣砥美行顯名升為天子雖復制諡不如名著故因名焉湯者攘也言其攘除不軌改亳為商成就王道天下熾昌文武皆以其長能擅國之謂王能制殺生之威之謂王唐傳克明峻徳苟子書曰克明明徳以親九族九族既睦陳思工表引傳辯章百姓索隠引今文尚書歐陽説云九族乃異姓有親屬者父族四母族三妻族二鄭𤣥曰辯别也章明也神農始治農功正節氣審寒温以為蚤晚之期故立歴名一作日容成作歴黄帝命容成造葢天儀日者陽徳之母陽外發故日以晝明名曰曜靈月羣隂之宗光内影以宵曜名曰夜光主春者張昏中可以種稷一作穀主夏者火昏中可以種黍主秋者虚昏中可以種麥主冬者􅄧昏中可以収斂葢藏畋獵斷伐當告於天子而天子賦之民故天子南面而視四星之中知民之緩急急則不賦籍不舉力役故曰敬授民時此之謂也周禮疏及太平御覽鄭𤣥曰籍公家之常徭辯秩東作索隠引大傳辯秩南譌辯秩西成周禮疏辯秩據書傳而言書曰分命和仲度西曰栁榖周禮注疏云書曰者是濟南伏生書鄭𤣥曰五色聚為栁日入時具五色便在伏物索隠引大傳以正月朝迎日於東郊所以為萬物先而尊事天也迎日之詞曰維某年某月上日明光於上下勤施於四方旁作穆穆維予一人一夲無一人二字某敬拜迎日於郊宋書志引尚書大傳書傳畧説云祀上帝於南郊即春迎日於東郊東方者何也物之動也物之動何以謂之春春出也物之出也故謂東方春也南方者何也任方也任方者物之方任何以謂之夏夏者假也吁荼萬物養之外者也故曰南方夏也西方者何也鮮方也鮮訊也訊者始入之貌始入者何以謂之秋秋者愁也愁者物方愁而入也故曰西方者秋也北方者何伏方也伏方者萬物之方伏也伏方何以謂之冬冬者中也中也者物方藏於中也故曰北方冬也陽盛則吁荼萬物而養之外也隂盛則隂吸萬物而藏之内也故曰呼吸者隂陽之交接萬物之始終否不也文選注引大傳古之王者必有命民民能敬長憐孤取舍好讓舉事力者于其君得命然後得乗飾車駢馬衣文錦未有命者不得衣不乗車車衣者有罰藝文類聚玉藻疏唐傳云古者有命民有飾車駢馬衣錦未命為士不得朱軒車不得有飛鈴文選注鄭𤣥曰軒輿也士以朱飾之飛鈴如今窻車士乗飾車兩馬庻人單馬木車衣布帛選注公羊疏碩人詩曰衣錦尚蘏説文引大傳堯時麒麟在郊藪選注詩疏引唐傳外無曠夫内無怨女詩疏孔子對子張曰舜父頑毋嚚無室家之端故謂之鰥尚書正義詩疏引唐傳虞傳舜販於頓丘一作須丘就時負夏陶於河濵漁雷澤之中堯致舜天下贈以昭華之玉藝文類聚贈以苕華之玉一本堯得舜推而尊之贈以昭華之玉鄭𤣥曰負夏衛地雷澤兖州澤今屬濟隂堯推尊舜屬諸侯致天下於大麓之野路史引虞夏傳鄭𤣥曰山足曰麓麓者録也古者天子命大事命諸侯則為壇國之外堯聚諸侯命舜陟位居攝致天下之事使大録之舜讓於徳不怡索隠引今文正月上日受終於文祖作璿璣玉衡以齊七政璿璣者何也曰璿者還也璣者幾也㣲也其變幾㣲而所動者大謂之璿璣是故璿璣謂之北極受謂舜也上日元日也文祖堯文徳之祖廟鄭𤣥曰轉運者為璣持正者為衡索隠鄭注大傳云渾儀中筩為璇璣外規為玉衡也文祖五府之大名猶周之明堂也七政謂春秋冬夏天文地理人道所以為政也人道正而萬事順成又七政布位日月時之正五星時之紀日月有薄食五星有錯聚七者得失在人君之政故謂之為政玉海引大傳類祭天名也以祀類祭之奈何天位在南方就南郊祭之事也今文尚書夏侯歐陽説月令疏引萬物非天不生非地不載非春不動非夏不長非秋不収非冬不藏故書曰禋於六宗此之謂也生一作覆鄭𤣥曰六宗星辰司中司命風伯雨師也星五緯也辰謂日月所㑹十二次也司中司命文昌第五第四星也風師箕也雨師畢也歐陽和伯夏侯建曰六宗上不謂一作及天下不謂地傍不謂四方在六者之間助隂陽變化者也古者圭必有冒一作瑁言下之必有冐不敢專達也天子執冐瑁以朝諸侯見則覆之故冒圭者天子所
