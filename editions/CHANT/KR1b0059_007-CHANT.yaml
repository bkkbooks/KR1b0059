body:
  text: 卷七鴻笵五行傳維王后元祀帝令大禹步于上帝維時洪祀六沴用咎于下是用知不畏而神之怒若六沴作見若是共禦帝用不差神則不怒五福乃降用章于下若六沴作見若不共禦六伐既侵六極其下禹乃共辟厥德受命休令爰用五事建用王極長事一曰皃皃之不恭是謂不肅厥咎狂厥罰恆雨厥極惡時則有服𡝩時則有龜㜸時則有雞𣄸時則有下體生于上之痾時則有青眚青祥維金沴木次二事曰言言之不從是謂不艾厥咎僭厥罰恆陽厥極憂時則有詩𡝩時則有介蟲之㜸時則有犬𣄸時則有口舌之痾時則有白眚白祥維木沴金次三事曰視視之不明是謂不悊厥咎荼厥罰恆燠厥極疾時則有艸𡝩時則有倮蟲之㜸時則有羊𣄸時則有目痾時則有赤眚赤祥維水沴火次四事曰聽聽之不聰是謂不謀厥咎急厥罰恆寒厥極貧時則有鼓𡝩時則有魚㜸時則有豕𣄸時則有耳痾時則有黑眚黑祥維火沴水次五事曰思心思心之不容是謂不聖厥咎雺厥罰恆風厥極凶短折時則有脂夜之𡝩時則有夸㜸時則有牛𣄸時則有心腹之痾時則有黃眚黃祥維木金水火沴土王之不極是謂不建厥咎瞀厥罰恆陰厥極弱時則有射𡝩時則有龍蛇之㜸時則有馬𣄸時則有下人伐上之痾時則有日月亂行星辰逆行維五位復建辟厥沴曰二月三月維皃是司四月五月維視是司六月七月維言是司八月九月維聽是司十月十一月維思心是司十二月與正月維王極是司凡六沴之作歲之朝月之朝日之朝則后王受之歲之中月之中日之中則正卿受之歲之夕月之夕日之夕則庶民受之其二辰以次相將其次受之星辰莫同是離逢非沴維鮮之功禦皃于喬忿以其月從其禮祭之參乃從禦言于訖眾以其月從其禮祭之參乃從禦視于忽似以其月從其禮祭之參乃從禦聽于怵攸以其月從其禮祭之參乃從禦思心于有尤以其月從其禮祭之參乃從禦王極于宗始以其月從其禮祭之參乃從六沴之禮散齊七日致齊三日新器絜以祀用赤黍三日之朝于中庭祀四方從東方始自南至西卒于北方其祀禮曰格祀曰某也方祀曰播國率相行事其祝也曰若爾神靈洪祀六沴是合無差無傾無有不正若民有不敬事則會批之于六沴六事之機以垂示我我民人無敢不敬事上下王祀東方之極自碣石東至日出榑木之野帝太皞神句芒司之自冬日至數四十六日迎春于東堂距邦八里堂高八尺堂階八等青稅八乘旂旐尚青田車載矛號曰助天生倡之以角舞之以羽此迎春之樂也孟春之月御青陽左个禱用牡索祀于艮隅皃必恭厥休時雨朔令曰挺群禁開閉闔通穹窒達障塞待優游其禁毋伐林木仲春之月御青陽正室牲先脾設主于戶索祀于震正朔令曰棄怨惡解役罪免憂患休罰刑開關梁其禁田獵不宿飲食不享出入不節奪民農時及有姦謀季春之月御青陽右个薦用鮪索祀于巽隅朔令曰宣庫財和外怨撫四方行柔惠止剛強九門磔禳出疫于郊以禳春氣南方之極自北戶南至炎風之野帝炎帝神祝融司之自春分數四十六日迎夏于南堂距邦七里堂高七尺堂階七等赤稅七乘旂旐尚赤田車載弓號曰助天養倡之以徵舞之以鼓鞉此迎夏之樂也孟夏之月御明堂左个嘗麥用彘索祀于巽隅視必明厥休時燠朔令曰爵有德賞有功惠賢良舉力農其禁毋隓隄防仲夏之月御明堂正室牲先肺設主于竈索祀于離正朔令曰振貧窮惠孤寡慮囚疾出太祿行大賞其禁棄法律逐功臣殺太子以妾為妻乃令民雩季夏之月御明堂右个牲先心設主于中霤索祀于坤隅思必容厥休時風朔令曰起毀宗立無後封廢國立賢輔卹喪疾中央之極自昆侖中至大室之野帝黃帝神后土司之土王之日禱用牲迎中氣于中室樂用黃鍾之宮為民祈福命世婦治服章令民其禁治宮室飾臺榭內淫亂犯親戚侮父兄西方之極自流沙西至三危之野帝少皞神蓐收司之自夏日至數四十六日迎秋于西堂距邦九里堂高九尺堂階九等白稅九乘旌旄尚白田車載兵號曰助天收倡之以商舞之以干戚此迎秋之樂也孟秋之月御總章左个嘗穀用犬索祀于坤隅言必從厥休時暘朔令曰審用法備盜賊禁姦衺飾群牧謹貯聚其禁毋弛戎備仲秋之月御總章正室牲先肝設主于門索祀于兌正朔令曰謹功築遏溝瀆修囷倉決刑獄趣收斂其禁好攻戰輕百姓飾城郭侵邊竟乃令民畋醵庶氓畢入于室曰時殺將至毋罹其菑季秋之月御總章右个薦用田禽索祀于乾隅朔令曰除道路守門閭陳兵甲戒百官誅不法除道成梁以利農夫北方之極自丁令北至積雪之野帝顓頊神玄冥司之自秋分數四十六日迎冬于北堂距邦六里堂高六尺堂階六等黑稅六乘旌旄尚黑田車載甲鐵號曰助天誅倡之以羽舞之以干戈此迎冬之樂也孟冬之月御玄堂左个祈年用牲索祀于乾隅聽必聰厥休時寒朔令曰申群禁修障塞畢積聚繫牛馬收澤賦其禁毋作淫巧仲冬之月御玄堂正室牲先腎設主于井索祀于坎正朔令曰搜外徒止夜禁誅詐偽省醞釀謹閉關其禁簡宗廟不禱祠廢祭祀逆天時乃令民罷土功季冬之月御玄堂右个薦用魚索祀于艮隅朔令曰省牲牷修農器收秸薪築囹圄謹蓋藏乃大儺以禳疾命國為酒以合三族君子說小人樂田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直棄法律逐功臣殺太子以妾為妻則火不炎上治宮室飾臺榭內淫亂犯親戚侮父兄則稼穡不成好攻戰輕百姓飾城郭侵邊竟則金不從革簡宗廟不禱祠廢祭祀逆天時則水不潤下子曰心之精神是謂聖晦而月見西方謂之朓朓則侯王其荼朔而月見東方謂之朒一謂之側匿側匿則侯王其肅北辰謂之燿魄地者成萬物者也天一生水地二生火天三生木地四生金地六成水天七成火地八成木天九成金天五生土人君嫉賢疾善在下謀上則日蝕雨雹殺走獸君道虧則日蝕人憤怨則水涌溢陰氣積則下伐上正月雷微動而雉雊雷諸侯之象也雉亦人君之類也雷與天地為長子以其首長萬物與其出入也霜者殺伐之表雨雪者陰之蓄積甚者也雲者起於山彌於天陰氣也王者失中臣下敢蔽君明則雲陰象多蔽天光有雲如象謂風師法有大兵風屬中央雨屬東方清而明者天之體地不滿東南故水潦塵埃歸焉地者成萬物者也日者陽德之母陽外發故日以晝明名曰曜靈月群陰之宗光內影以宵曜名曰夜光月生三日謂之霸心之大星天王也其前星太子也後星庶子也辰星者北方水精也明王踐位則日儷其精重光以見吉祥季夏可以大赦罪人沙麓者山林也長狄之人長蓋五丈餘也凡有所害謂之災無所害而異於常謂之異害為已至異為方來蓍之為言耆也百年一本生百莖此艸木之壽亦知吉凶者聖人以問鬼神夫握方諸之鏡處深澤之下而上引太清物類相隨可不慎耶
