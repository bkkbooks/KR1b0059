  - {type: variant, offset: 247, length: 2, content: 觀兵, WYG: 戰}
  - {type: variant, offset: 250, length: 833, content: 孟津有火流于王屋化爲赤烏三足御覽百八十一居處部九周將興之時有大赤烏銜穀之種而集王屋之上者武王喜諸大夫皆喜周公曰茂哉茂哉天下之見此以勸之也恐恃之春秋䌓露同類相勸篇引尙書傳言武王伐紂至于商郊停止㝛夜士卒皆歡樂歌舞以待旦禮記祭統正義案曰正義云舞莫重于武㝛夜者皇氏云師說書傳云云武㝛夜其樂名也此據書傳釋武㝛夜最確王升舟入水鼓鐘惡觀臺惡將舟惡宗廟惡注惡皆爲亞亞次也觀臺靈臺知天時占候者也宗廟遷主周禮肆師注引尙書傳十七字惡仍作亞儀禮經傳通解續因事之祭卷二十六上引傳注案曰周禮肆師疏曰王升舟以下者謂說武王於文王受命十一年觀兵之時武王於孟津渡河升舟入水在前鐘鼓亞亞王舟後觀臺亞者觀臺可以望氛祥亞鼔鐘後將舟亞者以社主主殺戮而軍將同故名社主爲將將舟亞在觀臺後宗廟亞者宗廟則遷主也亞在將舟後惟丙午王逮師前師乃鼓䵾譟師乃慆前歌後舞注慆喜也衆大喜前歌後舞也御覽四百六十七人事部一百八引傳注全惟前師無前字此句六字又見周禮大司馬注又御覽五百七十四樂部十二案曰周禮大司馬注引書曰前師乃鼓䵾譟賈疏云書傳文彼說武王伐紂事隷釋魏大饗碑士有拊譟之歡民懷惠康之德拊譟與䵾譟同文選二十一秋胡詩注引班彪冀州賦曰感鳬藻以進樂兮後漢書杜詩傳士卒鳬藻劉陶傳武旅有鳬藻之士錢詹事大昕廿二史考異曰鳬藻卽䵾譟也王逸楚詞章句曰武王三軍人人樂戰並馳驅赴敵爭先前歌後舞鳬噪讙呼惠徵君棟後漢書補注曰䵾譟漢人讀爲鳬噪言如鳬之噪呼杜詩劉陶傳又作鳬藻釋云如鳬之戲於藻非尙書之義也壽祺謂䵾譟鳬藻字别而聲義同此或歐陽夏侯之異李賢後漢書注言如鳬之戲於藻所謂望文生義差之遠矣蔡邕集上加元服與羣臣上壽表云臣等不勝踴躍鳬藻魏志文帝紀注臣妾遠近莫不鳬藻此亦均本大傳用爲讙呼之義矣顔延年秋胡詩鳬藻馳目成似與李賢注同意亦失之又案藝文類聚引樂緯稽耀嘉曰武王承命興師誅於商萬國咸喜軍渡孟津前歌後舞是書傳所說伐紂之事也丕天之大律注云律法也奉天之大法唐律疏義卷一又翻譯名義集九卷案曰漢書郊祀志引大誓曰正稽古立功立事可以永年丕天之大律是此五字乃古文大誓詞而大傳載之也, WYG: ''}
