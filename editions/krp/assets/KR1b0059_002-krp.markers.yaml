  - {type: variant, offset: 10011, length: 0, content: '', WYG: 祀上帝於南郊所以報天徳詩疏黄帝將亡則地裂尚書説地者成萬物者也北堂書抄引鴻範五行傳聖人者民之父母也母能生之能養之父能教之能誨之聖人曲偹之者也能生之能食之能教之能誨之也為之城郭以居之為之宫室以處之為之庠序之學以教誨之為之列地制畆以飲食之故書曰天子作民父母以為天下王此之謂也天中記引大傳乃命五史以書五帝之蠱事彼為訓者正以太古之時旡為旡事也今言蠱者是卦之惑亂也時既漸澆一作繞物情惑亂故事業因之而起惑矣左傳云女惑男風落山謂之蠱伏曼引尚書大傳夏不數浴非愛水也冬不數煬非愛火也魯桓公五年大雩旱也先是殺君而立有危亡之心而下有悲慟之氣外結大國娶于齊以為夫人後比二年天子使大夫來聘桓公上得天子之意下得大國之援則有亢陽之心以御臣下興邢丘之役以勞百姓則臣下離心而不從故應是而秋大旱也魯宣公十年秋大旱是時公與齊伐萊夫伐國亢陽節也師徒百姓所不欲也故應而大旱旱所謂常陽不謂常陽而謂旱者以旱為災也旱之為言乾也萬物傷於乾而不得水也君持亢陽之節暴虐于下興師旅勞民衆以起城邑臣下悲怨而心不從故陽氣盛而失度旱災應也枉矢者弓矢之象也枉矢之所觸天下之所伐滅亡之象也七國之兵戰于梁地故天狗先降梁壘見以其象也狗者守禦之類也所降以威守禦也蜮如鼈三足生於南越南越婦人多淫故其地多蜮淫女惑亂之氣所生詩疏榖梁疏引洪範五行傳蓍之為言耆也百年一本生百莖此草木之夀亦知吉凶者聖人以問鬼神周易音義藝文類聚引洪範五行傳季夏可以大赦罪人尚書大傳歴者聖人所以揆天行而}
