  - {type: variant, offset: 8884, length: 1063, content: 野帝太皞神勾􅉭司之自冬日至數四十六日迎春於東堂距邦八里堂高八尺堂階八等靑稅八乘旂旐尙靑田車載矛號曰助天生倡之以角舞之以羽此迎春之樂也孟春之月御靑陽左个禱用牡索祀於艮隅貌必恭厥休時雨朔令曰挺羣禁開閉闔通窮室達障塞待優游其禁母伐林木仲春之月御靑陽正室牲先脾設主於戸索祀於震正朔令曰棄怒惡解役罪免優患休罰刑閉關梁其禁田獵不宿飮食不享出入不節奪民農時及有姦謀季春之月御靑陽右个薦用鮪索祀於㢲隅朔令曰宣庫財和外怨撫四方行柔惠止剛强九門磔禳出疫於郊以禳春氣南方之極自北戸南至炎風之野帝炎帝神祝融司之自春分數四十六日迎夏於南堂距邦七里堂高七尺堂階七等赤稅七乘旂旐尙赤田車載弓號曰助天養倡之以徵舞之以鼓鼗此迎夏之樂也孟夏之月御明堂左个嘗麥用彘索祀於㢲隅視必明厥休時燠朔令曰爵有德賞有功惠賢良舉力農其禁母隳防仲夏之月御明堂正室牲先肺設主於竃索祀於離正朔令曰振貧窮惠孤寡慮休疾出大祿行大賞其禁棄法律逐功臣殺太子以妾爲妻乃令民雩季夏之月御明堂右个牲先心設主於中霤索祀於坤隅思必睿案曰睿當爲容厥休時風朔令曰起毁宗立無後封廢國立賢輔䘏喪疾中央之極自昆侖中至大室之野帝黃帝神后土司之土王之曰禱用牲迎中氣於中室樂用黃鍾之宫爲民祈福命世婦治服章令民口虐案曰虐字有誤盧氏本缺此字其禁治宮室飾臺榭內淫亂犯親戚侮父兄西方之極自流沙西至三危之野帝少皞神蓐收司之自夏日至數四十六日迎秋於西堂距邦九里堂高九尺堂階九等白稅九乘旌旄尙白田車載兵號曰助天收唱之以商舞之以干戚此迎秋之樂也孟秋之月御總章左个嘗穀用犬索祀於坤隅言必從厥休時暘案曰暘當作陽朔令曰審用法僃盜賊禁姦邪飭羣牧謹貯聚其禁母弛戎僃仲秋之月御總章正室牲先肝設主於門索祀於兌正朔令曰謹功築遏溝瀆修囷倉决刑獄趣收斂其禁好攻戰輕百姓飾城郭侵邊竟乃令民畋醵庶甿畢入于室曰時殺將至母罹其菑季秋之月御總章右个薦用田禽索祀於乾隅朔令曰除道路守門閭陳兵甲戒百官誅不法除道成梁以利農夫北方之極自丁令北至積雪之野帝顓頊神糸㝠司之自秋分數四十六日迎冬於北堂距邦六里堂高六尺堂階六等黑稅六乘旗旄尙黑田車載甲鐵號曰助天誅唱之以羽舞之以于戈此迎冬之樂也孟冬之月御􅏏堂左个祈年用牲索祀於乾隅聽必聰厥休時寒朔令曰申羣禁修障塞畢積聚繫牛馬收澤賦其禁母作淫巧仲冬之月御􅏏堂正室牲先腎設主於井索祀於坎正朔令曰􅊧外徒止夜樂誅詐僞省醖釀謹閉關其禁簡宗廟不禱祀廢祭祀逆天時乃令民罷土功季冬之月御􅏏堂右个薦用魚索祀於艮隅朔令曰省牲牷修農器收秸薪築囹圄謹葢藏乃大儺以禳疾命國爲酒以合三族君子說小人樂以上自東方之極至此見明黃佐六藝流別卷十七五行篇案曰六藝流別全載, WYG: 魄尚書}
