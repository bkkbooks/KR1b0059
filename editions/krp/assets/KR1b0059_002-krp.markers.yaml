  - {type: variant, offset: 1691, length: 1043, content: 大傳自首至封之止並注又御覽二百一封建部四路史後紀十二並節引汩亂也華嚴經第七十八音義卷下案曰此疑洪範傳汨陳五行之訓水火者百姓之所飮食也金木者百姓之所興作也土者萬物之所資生也是爲人用尙書洪範正義引書傳八政何以先食傳曰食者萬物之始人事之本也故八政先食尙書洪範正義文選籍田賦注又白帖食御覽八百四十七飮食部五洪範曰不叶于極不麗于咎毋侮鰥寡而畏高明困學紀聞卷二引大傳聖人在上其君子不誦無用之言其工不作無用之器其商不通無用之物御覽四百一人事部四十二聖人者民之父母也母能生之能食之父能敎之能誨之聖王曲僃之者也能生之能食之能敎之能誨之也爲之城郭以居之爲之宮室以處之爲之庠序學校以敎誨之爲之列地制畝以飮食之故書曰作民父母以爲天下王此之謂也御覽四百一人事部四十二晦而月見西方謂之朓注朓條也條達行疾貌朓則侯王其荼注荼緩也朔而月見東方謂之側匿注側匿猶縮縮行遲貌側匿則侯王其肅注肅急也日君象也月臣象也君政急則日行疾月行徐臣逡遁不進君政緩則日行徐月行疾臣放恣也太平御覽四引傳注全注君政緩上誤衍朓則侯王其徐徐緩也十字又誤荼爲徐今刪又周禮保章氏疏引傳又散見文選元皇后哀䇿文月賦舞賦注藝文類聚一穀梁傳序疏後漢書蔡邕傳注文選月賦注引鄭注作朓條達行疾貌也元皇后哀策文注引鄭注作朓猶條達也當从之側匿猶縮縮當作猶縮朒案曰文選舞賦注引鄭􅏏尙書五行傳注闇跳行疾皃是鄭注條達一作闇跳也側匿一作朒一作朏說文朏月未成之名晦而月見西方謂之朓朔而月見東方謂之縮朒此則側匿與縮朒聲近義一也漢書五行志晦而月見西方謂之朓朔而見東方謂之仄匿仄匿則侯王其肅朓則侯王其舒劉向以爲朓者疾也君舒緩則臣驕慢故日行遲而月行疾也仄匿者不進之意君肅急則臣恐懼故日行疾而月行遲不敢迫近君也不舒不急以正失之者食朔日劉歆以爲舒者侯王展意顓事臣下促急故月行疾也肅者王侯縮朒不任事臣下弛縱故月行遲也當春秋時侯王率多縮朒不任事故食二日仄匿者十八食晦日朓者一此其效也案此漢志據伏生書傳爲說仄匿并作仄慝字之譌而劉歆則作縮朒側匿猶縮朒也孟康注漢書曰朓者月行疾在日前故早見仄匿者行遲在日後當没而更見是也蔡卞毛詩名物解禮曰大明生於東月生於西蓋朔而月出西方夕見暮見也故王者早見曰朝暮見曰夕義取諸此所謂朝夕放於日月者也至望然後出於東方夕見尙書大傳以爲晦而月見西方謂之朏朔而月見東方謂之朒蓋言異也又事文類聚亦引尙書大傳晦而月見西方謂之朓朔而月見東方謂之朏諸書所引朓朒朏闇跳側匿縮朒各字每相互異攷後漢書盧植傳植上封事諫曰臣聞日晦而月見謂之朓王侯其舒李賢注五行傳劉向所著字與此小異然則伏劉諸本固有别矣, WYG: ''}
