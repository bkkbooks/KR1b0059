  - {type: page-break, offset: 202, content: '', id: KR1b0059_WYG_001-16a, image: WYG0068/WYG0068-0394a.png}
  - {type: variant, offset: 203, length: 4, content: 三雖弗請, WYG: 有四祀鐘石笙筦變聲樂未罷疾風發屋天大雷雨帝沈首而笑曰明哉非一人天下也乃見}
  - {type: punctuation, offset: 204, content: ), id: KR1b0059_krp_001-bkkpn15}
  - {type: variant, offset: 208, length: 186, content: 天子而征之可也征而歸其地於天子注征伐也注見儀禮通解集注有不貢士謂之不率正者注率循也正由也注見儀禮通解集注天子絀之一不適謂之過注謂三年時也再不適謂之敖注謂六年時也三不適謂之誣注謂九年時也注見禮記射義正義誣者天子絀之一絀少絀以爵注言少絀明以漸也再絀少絀以地三絀而爵地畢注凡十五年後漢書左周黃傳論注儀禮經傳通解王制之已有不貢士以下十字通解引作諸侯之有不率正者又見禮記射義正義小異, WYG: 鐘石}
