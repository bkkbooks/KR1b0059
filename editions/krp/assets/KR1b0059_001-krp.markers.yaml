  - {type: variant, offset: 18740, length: 257, content: 煙則事止燔燎据此大傳字从火㫄垔作煙故鄭注直釋之曰祭也周禮大宗伯疏引尙書洛誥注云禋芬芳之祭康成注周禮以禋祀祀昊天上帝云禋之言煙周人尙臭煙氣之臭聞者也是鄭据書堯典煙于六宗之文以解禮也他書誤爲湮字則注語不可通矣史晨祀孔子廟碑以供煙祀樊毅修西嶽廟記奠柴燎煙西京賦升高煙于太乙魏受禪碑煙于六宗與大傳合古者圭必有冒言不敢專達之義也天子執冒以朝諸侯見則覆之注君恩覆之臣敢進周禮玉人疏古者圭必有冒言下之必有冒不敢專達也天子執冒以朝諸侯見則覆之故冒圭者天子所與諸侯爲瑞也瑞也者屬也無過行者得復其圭以歸其國有過行者畱其圭能改過者復其圭, WYG: 伐鬼方}
