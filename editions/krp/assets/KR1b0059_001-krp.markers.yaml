  - {type: variant, offset: 2646, length: 377, content: 拊何以也注練弦朱弦互文也越下孔也凡練弦達越搏拊者象其德寬和君子有大人聲不以鐘鼓竽瑟之聲亂人聲淸廟升歌者歌先人之功烈德澤也注烈業也故欲其淸也其歌之呼也注呼出聲也曰於穆淸廟肅雝顯相注肅雝顯相四海敬和明德來助祭傳注肅雝以下共十七字見毛詩淸廟正義於者歎之也穆者敬之也淸者欲其在位者徧聞之也故周公升歌文王之功烈德澤苟在廟中嘗見文王者愀然如復見文王故書曰搏拊琴瑟以詠祖考來假此之謂也儀禮經傳通解集傳集注卷二十七樂記全引傳注又見通解續宗廟樂舞二十五又禮記樂記正義引首二句云虞書傳又樂記正義引以章爲鼓以下八字又毛詩文王周頌譜淸廟序淸廟諸正義文選江文通雜體詩白帖琴朱子詩集傳陳暘樂書並節引拊革裝之以穅周禮太師疏載白虎通引尙書大傳又見禮記樂記正義引白虎通曲阜孔廣林曰周禮禮記疏兩引白虎通如此賈孔皆云今書傳無其文案白虎通今亦無此文其禮樂篇引書傳云搏拊鼓振以秉疑卽革裝以穅之譌博, WYG: ''}
