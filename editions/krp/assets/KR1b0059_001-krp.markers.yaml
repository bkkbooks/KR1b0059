  - {type: variant, offset: 2337, length: 246, content: 傳通解集傳集注王制之丙玉海卷百二十又史記夏本紀注漢書伏湛傳注太平御覽卷七十六路史後紀並節引古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子中立而聽朝則四聖維之是以慮無失計舉無過事故書曰欽四鄰此之謂也通鑑前編帝舜元載注天子必有四鄰前儀後丞左輔右弼直立而敢斷廣心而從欲輔善而相承謂之輔廉潔而切直謂之弼華嚴經第八十音義卷下案曰直立而敢斷下當脫謂之儀三字廣心而從欲下篇脫謂之丞三字以下文輔弼二句文法知之案曰萬卷菁華前集引云道是周公也克是太公也弼是召公也丞是史佚也故成王中立而聽朝則四聖維之與前篇所引不同此, WYG: 疏}
