  - {type: variant, offset: 1451, length: 327, content: 繪宗彝純黑藻純白火純赤以此相間而爲五采後周故事升日月於旌旗乃闕三辰而章無十二但有山龍華蟲作繪宗彝藻火粉米黼黻乃與三公不異開皇中就裏欲生分別故衣重宗彝裳重黼黻合重二物以就九章爲十二等但每一物上下重行衮服用九鷩服用七今重此三物乃非典故據此虞世基旣言近代服依書傳而後周於山龍華蟲作繪宗彝藻火之外仍有粉米黼黻此章數也大傳以山龍爲靑華蟲爲黄作繢宗彝四字連讀爲黑藻爲白火爲赤陳祥道引云作繢黑也宗彝白也藻火赤也分作繢宗彝爲二合藻火爲一非伏生本文由所見大傳本誤當從隋志更正又引云子男宗彝藻火山龍以次國服三核之子男下宗彝亦誤衍宐刪陳氏反以是疑傳文自戾過矣說文十三糸部繪會五采繡也引虞書山龍華蟲作繪以後漢書明帝紀乘輿刺繡公卿已下皆織成攷之則大傳五服亦皆謂繡非畵也鄭康成注尙書, WYG: 來}
