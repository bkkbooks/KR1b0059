  - {type: variant, offset: 27967, length: 444, content: 今文牧誓載史記微子之命似當爲微子麥秀之歌當在行遯時作歸禾似當爲嘉禾大傳之序有嘉禾至所載鄭氏大傳注如下刑墨幪注幪音蒙三字乃文選求賢良詔注及七命注之文八伯注八伯者據畿外八州畿内不置伯鄕遂之吏主之十九字乃鄭志答張逸問之文舞株離注詩云彼黍離離六字乃周禮鞮鞻氏正義文魚魚刀注字夾注渠成切三字乃玉海王會解注後王伯厚語高宗梁闇注闇讀如䳺䳺謂廬也八字乃禮記鄭注文決關梁踰城郭而略盜者其刑髕一條注此二千五百罪之目略也至閉于宫中三十九字乃周禮司刑注文師乃鼓䵾譟注音符二字乃周禮大司馬釋文語盧學士考異在旋機玉衡條載别本有鄭注云轉運者爲機持正者爲衡案此乃鄭尙書注文見文選李蕭遠運命論注白魚入于舟中條載别本有鄭注云燔魚以祭變禮也亦鄭尙書注文見後漢書杜篤傳注四年營侯衞條載别本有鄭注云建侯衞是封衞侯云云五十四字乃毛詩豳風譜正義文遂踐奄條載詩正義引此云多方傳鄭有注云奄國在淮夷之㫄云云三十字案破斧正義引書傳三年伐奄下引多方云云注云云乃孔穎達引尙書及鄭君尙書注之文凡此皆舛繆之甚不可不亟正者也尙書大傳卷五受業嘉應吳蘭修校, WYG: ''}
