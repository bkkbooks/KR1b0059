  - {type: variant, offset: 127, length: 4, content: 賢賢三適, WYG: 剋不赦有過}
  - {type: 'kr:newline', offset: 133, content: '

      ', id: KR1b0059_krp_001-bkkkrnewl9}
  - {type: line-break, offset: 133, content: '', id: KR1b0059_SBCK_001-1a10}
  - {type: variant, offset: 133, length: 0, content: '', WYG: 賊率過以小謂之枳故與其殺不辜寧失}
  - {type: variant, offset: 134, length: 0, content: '', WYG: 罪與其増以有罪寧失過以有赦鄭𤣥曰延罪無辜曰纍惟刑之謐哉今文大夫有石材庶人有石承鄭𤣥曰石材柱下礩也石承當柱下布也以外出為飾舜入唐郊以丹朱為尸禮正義惟十有三祀帝乃稱王而入唐郊鄭𤣥曰舜承堯帝猶反側晨興闢四門來仁賢選注詩疏孔子曰舜以天徳嗣堯西王母來獻白玉琯白虎通溝瀆壅遏水為民害田廣不墾則責之司空百姓不親五品不順則責之司徒蠻夷猾夏冦賊姦軌則責之司馬藝文類聚北堂書抄舜無登而髙不行而逺拱揖於天下而天下稱仁舜好生惡殺鳳凰巢其木一作樹仁閔覆下則稱旻天説文引虞書今尚書歐陽説春曰昊天夏曰蒼天秋曰旻天冬曰上天詩周禮爾雅疏舜將禪禹八風脩一作循通歌大化大訓六府九原而夏道興鄭𤣥曰四章皆歌禹之}
  - {type: page-break, offset: 134, content: '', id: KR1b0059_WYG_001-13b, image: WYG0068/WYG0068-0392d.png}
  - {type: page-break, offset: 134, content: '', id: KR1b0059_WYG_001-14a, image: WYG0068/WYG0068-0393a.png}
  - {type: variant, offset: 135, length: 0, content: '', WYG: 所謂九叙惟歌九徳之歌于此猶可攷惟五祀奏鍾石奏一作定論人聲及乃鳥獸咸變於前秋養耆老而春食孤子一作春食餔於乃浡然招樂興於大麓之野報一作執事還歸二年談然談一作䜎一作􅨳乃作大唐之歌其樂曰舟張辟雝鶬鶬相從八風囬囬鳳皇喈喈歌者三年昭然乃知乎王世明}
  - {type: page-break, offset: 135, content: '', id: KR1b0059_WYG_001-14b, image: WYG0068/WYG0068-0393b.png}
  - {type: variant, offset: 136, length: 2, content: 功者, WYG: 不世之義招為賔客雍為主人始奏肆夏納以孝成舜為賔而禹為主人樂正道贊曰尚考太室之義唐為虞賔至今衍於四海成禹之變時俊乂百工相和而歌卿雲帝唱之曰卿雲爛兮禮一作糺一作紏李善引大傳作體縵縵兮一作漫漫日月光華旦復旦兮八伯咸進稽首曰明明上天爛然星陳日月光華𢎞於一人帝乃載歌曰日月有辰一作常一作恒星辰有行四時從一作順經萬姓幾誠一作百姓允臧一作萬物允成施于論樂配天之靈遷於賢聖莫不咸聼鼚乎皷之軒乎儛之精華已竭一作英華欲遂褰裳去之於時八風循涌卿雲藂藂蟠龍僨信於其藏蛟魚躍踊於其淵魚鱉咸出於其穴遷虞而事夏也鄭𤣥曰舜始欲改堯樂百獸之屬率舞談猶灼也大唐之歌美堯禪也招雍皆樂章名也賔入奏招主入奏雍也始謂尸入時也納謂薦獻時也肆夏孝成指樂章名也舜既使禹攝}
  - {type: page-break, offset: 136, content: '', id: KR1b0059_WYG_001-15a, image: WYG0068/WYG0068-0393c.png}
  - {type: page-break, offset: 136, content: '', id: KR1b0059_WYG_001-15b, image: WYG0068/WYG0068-0393d.png}
