  - {type: variant, offset: 6332, length: 482, content: 注肜日尙書篇名御覽皇王部八又後漢書郞顗傳注武丁之時外紀卷二此句上有成湯之後四字下有王道虧三字困學紀聞卷二此句下有先王道虧刑罰犯七字桑穀俱生於朝七曰而大拱注兩手搤之曰拱生七日而見其大滿兩手也注上六字又見史記殷本紀集解生七日以下十一字惟見尙書咸乂正義武丁召其相而問焉其相曰吾雖知之吾不能言也問諸祖已曰桑穀野艸也注此木也而云草未聞劉向以爲艸妖野艸生於朝亾乎武丁懼側身脩行思昔先王之政興滅國繼絕世舉逸民明養老之禮重譯來朝者六國注九州之外國也太平御覽八十三皇王部八引傳注惟無注生七日以下十一字又尙書咸乂正義引七日大拱四字又漢書五行志引傳俱生於朝二句又外紀卷二記纂淵海卷六十六朕兆又史記殷本紀集解索隱並節引又繹史十七引重譯上有三年之後四字案曰外紀劉恕曰按伏生劉向以武丁有桑穀而向著說苑以大戊武丁時俱有桑穀吕氏春秋湯時穀生於廷比旦而大供韓詩外傳三日而大拱皆與書序不同壽祺案尙書咸又正義引帝王世紀亦以爲大戊事鄭注所引劉氏說乃劉向五行傳論語見漢書五行志西伯戡耆案曰尙書音義黎尙書大傳作耆外紀卷二西伯勝黎伏生司馬遷作耆路史國名紀卷一大傳作西伯戡耆卷六云大傳作戡耆漢藝文志考證卷一大傳以, WYG: ''}
