  - {type: variant, offset: 4407, length: 305, content: 多說司徒司馬司空注坐而論道謂之三公通職名無正官名考工記序工疏引夏傳注司馬在前周禮序官疏引夏傳古者天子三公每一公三卿佐之每一卿三大夫佐之每一大夫三元士佐之故有三公九卿二十七大夫八十一元士所與爲天下者若此而已御覽二百二職官部二儀禮經傳通解王制之戊集傳集注三十二又藝文類聚四十五職官一引至三元士佐之注自三公至元士凡百二十此夏時之官也周之官三百六十禮志曰有虞氏官五十夏后百殷二百周三百近之未得其實也據夏周推其差則有虞之官六十夏后氏百二十殷二百四十周三百六十爲有所法儀禮集傳集注三十二又御覽二百三引首三句舜攝時三公九卿百執事此堯之官也故使百官事舜路史後紀陶唐注所謂六卿者后稷司徒秩宗司馬士共工爲六卿路史後紀十四夏后紀下引, WYG: ''}
