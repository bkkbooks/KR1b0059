  - {type: variant, offset: 4716, length: 264, content: 注又禮記曲禮下正義案曰路史引此條爲夏書注則是注說有虞之官制如此也上條引舜攝時堯之官制當與此注相屬故人之夏傳此篇當是說甘誓乃召六卿之文天子諸侯必有公桑𧖟室就川而爲之築官有三尺注官當爲宫雉長三丈高一丈度長以長度高以高則𧖟宫高一丈禮志曰仞有三尺七尺曰仞案曰毛詩瞻卬正義引此傅注云彼文直云宫有三尺宫下當脫仞字也棘牆而外閉之大昕之朝注季春朔日之朝也三宮之夫人浴種於川世婦卒𧖟獻繭於夫人注此諸侯之禮天子則獻繭於后繅三盆手注手猶親也言后夫人親以手總之也毛詩瞻卬正義分引傳注云尙書夏傳文又齊民要術卷五節引傳首三句大昕之朝二句又儀禮鄕射記疏引注尙, WYG: 尚}
