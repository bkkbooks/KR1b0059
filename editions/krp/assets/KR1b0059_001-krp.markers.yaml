  - {type: variant, offset: 1779, length: 473, content: 云繪讀爲繢凡畵者爲繢與伏許異作繪何以爲黑也說文十上黑部䵳沃黑色十二下女部嬒女黑色也繪之爲黑此其義六律者何黃鍾㽔賓無射太蔟夷則姑洗是也故天子左五鍾右五鍾注六律爲陽六吕爲陰凡律吕十二各一鍾天子宫縣黃鍾㽔賓在南北其餘則在東西天子將出則撞黃鍾周禮樂師注引黃鍾下有之鍾二字右五鍾皆應注黃鍾在陽陽氣動西五鍾在陰陰氣靜君將出故以動吿靜靜者皆和也馬鳴中律步者皆有容駕者皆有文御者皆有數步者中規折還中矩立則磬折拱則枹鼓注言聲合於樂體比於禮也然後太師奏登車吿出也注周禮王出入奏王夏入則撞㽔賓周禮樂師注引㽔賓下有之鍾二字左五鐘皆應注㽔賓在陰東五鍾在陽君入故以靜吿動動者則亦皆和之也以治容貌容貌得則氣得氣得則肌膚安肌膚安則色齊矣注入故欲其靜也㽔賓聲狗吠彘鳴及倮介之蟲皆莫不延頸以聽㽔賓注皆守物及陰之類也在內者皆玉色在外者皆金聲注玉色反其正性也金聲其事殺然後少師奏登堂就席吿入也注少師佐成大師之事者也此言至樂相和物動相生同聲相應之義也以上傳注全見儀禮經傳通解集傳集注卷二十七樂記又周禮樂師注儀禮大射儀疏禮記玉藻正義後漢書班固傳注文選東都賦注太平御覽三百八十八卷人事部二十九, WYG: 滑}
