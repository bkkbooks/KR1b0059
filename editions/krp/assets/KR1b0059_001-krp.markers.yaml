  - {type: variant, offset: 24003, length: 3208, content: 廟中苟有歌大化大訓六府九原而夏道興通鑑前編歌大化大訓六府九原而夏道興注四章皆歌禹之功困學紀聞卷二於時卿雲聚俊乂集百工相和而歌卿雲御覽人事部四十六又天部八又藝文類聚天部上祥瑞部上後漢書崔駰傳注文選江文通雜體顔特進侍宴詩注竝引小異於時俊乂百工相和而歌卿雲帝乃倡之曰卿雲爛兮注和氣之明者也糺縵縵兮注敎化廣遠或以爲雲出岫回薄而難名狀也日月光華旦復旦兮注言明明相代八伯咸進稽首曰明明上天爛然星陳日月光華弘於一人帝乃載歌旋持衡曰日月有常星辰有行四時從經萬姓允誠於予論樂配天之靈遷於賢聖莫不咸聽鼚乎鼓之軒乎舞之菁華已竭褰裳去之於時八風循通卿雲藂藂注藂或爲蔟言和氣應也蟠龍賁信於其藏注蟠屈也蛟魚踴躍於其淵龜鼈咸出於其穴遷虞而事夏也通鑑前編帝舜十五載又御覽樂部九引帝乃倡之至末引傳及注又御覽八天部八引舜時卿雲見於時百工和歌舜歌日云云又御覽九天部九御覽八百七十二休徵部一事類賦二雲注卷十一歌注藝文類聚四十三祥瑞部上文選東京賦注别賦注曲水詩序注潘正叔贈陸機詩注七命注竝分别載歌藝文四十三御覽五百七十一並作再歌舞之御覽作無之循通御覽作循涌賁作僨他書循通作脩通非於其藏文選七命注于作越旋持衡三字御覽無今從前編增旋上依宋書符瑞志當有擁字前編亦脫案日􅨳然作大唐之歌徐陵梁禪陳策文云精華旣竭耄勤已倦則抗首而笑惟賢是與䜎然作歌簡能斯授悉用尙書大傳事而䜎字作䜎路史亦作䜎据鄭注􅨳猶灼也則作䜎者誤又北堂書鈔引大傳沈首而笑徐陵文作抗首通鑑外紀作枕首尋其文義抗首是也又宋書符瑞志云舜乃擁璿持衡而笑北齊書文宣帝紀云重華握厤持衡擁璇通鑑前編引大傳帝乃載歌旋持衡旋上當脫擁字載歌藝文類聚四十三御覽五百七十一引竝作再歌外紀說此事亦然惟於歌卿雲後云帝乃再歌擁旋持衡枕首而笑曰時哉夫天下非一人之天下也亦見乎鐘石竽瑟此則上下舛亂劉道原所据大傳已失其舊矣案曰宋書符瑞志禹乃與九招之樂致異物鳳皇來翔又曰舜在位十有四年奏鐘石笙筦未罷而天大雷雨疾風發屋拔木桴鼓播地鐘磬亂行舞人頓伏樂正狂走舜乃擁璿持衡而笑曰明哉乎天下非一人之天下也亦乃見於鐘石笙筦乎乃薦禹於天使行天子事於時和氣普應慶雲興焉若煙非煙若雲非雲郁郁紛紛蕭索輪囷百工相和而歌卿雲帝乃倡之日慶雲爛兮糺縵縵兮日月光華旦復旦兮羣臣咸進稽首日明明上天爛然星陳日月光華宏予一人帝乃再歌曰日月有常星辰有亦四時從經萬姓允誠於予論樂配天之靈遷於聖賢莫不咸聽鼚乎鼓之軒乎舞之精華旣竭褰裳去之於是八風脩通慶雲藂藂蟠龍奮迅於其藏蛟魚踊躍於其淵龜鼈咸出其穴遷虞而事夏宋志此文蓋悉本大傳今大傳舜五祀十二祀十四祀十五祀之事錯見書籍所引闕佚不全又先後乖舛吳中舊本徒据太平御覽樂部九所引一條實多闕漏考路史後紀十二有虞紀言維五祀定鐘石論人聲興韶於大麓之野還歸二年作大唐之歌聲成而絑鳳至故其樂曰舟張辟雍鶬鶬相從八風回回鳳皇喈喈困學紀聞卷二引大傳樂曰以下四句是宐與大唐之歌相屬也御覽樂部九引歌者三年乃知乎王世明有不世之義此十七字亦宐綴樂日四句之下葢所謂歌者卽歌大唐之歌也所謂明有不世之義卽指堯禪舜而言也儀禮經傳通解續卷二十二引維十有三祀帝乃稱王而入唐郊猶以丹朱爲尸正說舜受禪事下言百執事咸知王世不絕必有繼祖守宗廟之君與乃知王世明有不世之義正相對照是此段宜與歌者三年三句相屬也路史發揮五注引虞傳云十四祀笙管變天大雷雨疾風爲遜禹之事北堂書鈔引維十有四祀鐘石笙筦變云云通鑑前編引維十有四祀帝乃雍而歌者重篇是此數條宐相屬也宋書符瑞志說舜十四年奏樂事甚詳與北堂書鈔所引大傳合則宋志之爲全採大傳無疑書鈔所引有不備者當据宋書路史補之也路史後紀十二敘舜咨禹而㢲位下云鐘石渝笙筦變未及終天大雷電烈風大木盡拔大屋盡發宫羽盡革二工伏柷以操雅帝乃雍而歌者重篇樂人重贊舞人復綴乃更容貳節僃十有二變奏肆夏而納以孝成四岳三公曁百執事咸贊于帝者尙稽太室唐爲虞賓始而狂然汔兹羡于四海誠禹之命敷于四海韶爲賓而雍爲主人矣尋路史此段多本大傳其次第略可見帝乃雍而歌者重篇在鐘石笙筦變之下尙有樂正重贊舞人復綴數語而始奏肆夏納以孝成尙稽太室唐爲虞賓一節据文選曲水詩序注乃十有五祀事路史乃與歌雍重篇聯爲一時今詳審文義納以敎成以上當爲十四祀事下當接歌者二年而廟中苟有歌大化大訓六府九原而夏道興舜爲賓客以下當從選注爲十五祀事其上當据前編増祀者貳尸一語如此則文從而不紊矣聖賢羣輔錄云十有五祀後又有百工相和而歌慶雲八伯稽首而進見是卿雲之歌在十五祀後也通鑑前篇引虞夏傳維十有四祀帝乃雍而歌者重篇下卽接云于時俊乂百工相和而歌卿雲云云亦失次今參訂諸書所徴更定之如左今重定傳文維五祀定鐘石論人聲乃及鳥獸咸變於前故更箸四時推六律六吕詢十有二變而道宏廣五作十道孝力爲右秋養耆老而春食孤子乃浡然招樂興於大鹿之野報一作執事還歸二年􅨳然乃作大唐之歌樂曰舟張辟雍鶬鶬相從八風回回鳳皇喈喈歌者三年昭然乃知乎王世明有不世之義維十有三祀帝乃稱王而入唐郊猶以丹朱爲尸於時百執事咸昭然乃知王世不絕爛然必自有繼祖守宗廟之君維十有四祀鐘石笙筦變聲樂未罷疾風發屋天大雷雨帝沈首而笑曰明哉非一人之天下也乃見於鐘石案曰雷雨下當依宋書符瑞志補桴鼓播地鐘磬亂行舞人頓伏樂正狂走帝乃擁璿持衡凡二十二字又發屋下補拔木二字明哉下補天下二字乃見于鐘石下補笙筦乎三字帝乃雍而歌者重篇此下當依路史後紀十二補樂正重贊舞人復綴乃更容貳節僃十有二變凡十八字招爲賓客而雍爲主人始奏肆夏納以孝成還歸二年而廟中苟有歌大化大訓六府九原而夏道興維十有五祀祀者貳尸舜爲賓客而禹爲主人樂正進贊曰尙考太室之義唐爲虞賓至今衍於四海成禹之變垂於萬世之後於時卿雲聚俊乂集百工相和而歌卿雲帝乃倡之曰卿雲爛兮礼案曰礼字當作糺縵縵兮日月光華旦復旦兮八伯咸進稽首曰明明上天爛然星陳日月光華宏予一人帝乃再案曰再字一作載歌旋持衡曰日月有常星辰有行四時從經萬姓允誠於予論樂配天之靈遷于賢聖莫不咸聽鼚乎鼓之軒乎舞之菁華已竭褰裳去之于時八風循通卿雲藂藂蟠龍賁信於其藏蛟魚踊躍於其淵龜鼈咸出於其穴遷虞而事夏也尙書大傳卷一下受業嘉應吳蘭修校尙書大傳辨譌尙書大傳南宋時已多佚脫今坊間盛行盧氏雅雨堂本譌漏不可勝舉如納之大麓之野烈風雷雨不迷致之以昭華之玉乃尙書逸篇文見水經濁漳水注而誤入唐傳厥兆天子爵乃尙書逸篇文見白虎通爵篇而誤入母逸傳太平御覽兵部三十五引白虎通曰戰者何謂也尙書大傳曰戰者憚驚之也又曰諸侯之義非天子之命不得動衆𧺫伐殺不義者所以強幹弱枝尊天子卑諸侯也又曰以下仍是白虎通文見今本誅伐篇而誤入鮮誓傳困學紀聞云費誓說文作粊史記作肹太傳作鮮度作刑以誥四方周禮注云度作詳刑案此大傳作鮮四字斷句度作刑以下又一事而誤連鮮度作刑以誥四方爲句入甫刑傳學禮帝入東學至化輯于下矣一段乃大戴禮􅍖傅篇文注亦盧辯注而誤連宣王問於春子條入略說補遺所採亦多誤毛詩生民正義偁上傳云下傳云皆謂毛傳又引五帝傳云堯見天因邰而生后稷因之案此乃卽有邰家室句毛傳文疏五帝二字有譌而誤仞爲大傳文選應休璉與從弟君苗君胄書注引尙書大傳曰扶寸而合不崇朝而雨天下鄭􅏏曰四指爲扶下云扶音膚此三字乃李善語而誤并爲鄭注毛詩文王正義書傳之美太公言其翼佐文武身有殊勛世祚太公以表東海案正義所偁書傳似泛舉傳記非謂伏生大傳盧學士文弨續補遺載神農始治農功一條二十二字出楊泉物理論容成作厤一條出世本竝見藝文類聚卷五歲時部下及御覽卷十六日者陽德之母一條十八字月羣陰之宗一條十五字竝出皇甫謐年厤見藝文類聚卷一天部御覽天四湛濁爲地至故地者濁陰也一條三句首句出神農書下二句出黃帝素問竝見類聚卷六地部分引河色黃赤一條二十五字出物理論見類聚卷八水部上及御覽六十一往古之時至女媧殺黑龍以祭冀州一條二十一字出淮南子下引鄭注云冀州取地以爲名也云云三十一字乃釋名文竝見類聚卷六州部連引堯南撫交阯一條見水經三十七淹水注惟首五字是大傳文其下于禹貢荆州之南云云十五字乃酈道元語洧盤之水出崦嵫山一條出禹大傳此別一古書見楚詞章句五年一朝一條見公羊傳桓元年注惟首四字疏云虞傳文其下王者亦貴得天下之歡心云云三十五字乃何休語, WYG: 崩}
