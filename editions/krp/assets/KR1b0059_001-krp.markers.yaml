  - {type: variant, offset: 27690, length: 274, content: 曰􅖏乃擭敜乃阱引見周禮注下句亦引見說文攴部眞古文也今竟依賈疏斷爲今文皆不足據其篇次之亂者如古者處師一條雜記正義引作洛誥傳五嶽視三公一條王制正義引作夏傳此本竝入咎繇謨天子三公一條据考工記序工正義引鄭夏傳注云云又古者天子三公一條通解王制之戊引注云此夏時之官是兩文竝在夏傳中而此本一入堯典傳一入太誓傳周以至動一條檀弓正義公羊傳隱元年疏竝云略說文而此本入甘誓傳古之帝王必有大學小學一條王制正義引作周傳天子諸侯必有公桑𧖟室一條毛詩瞻卬正義引作夏傳祭之爲言察也一條御覽五百二十四引作周傳此本皆誤入略說又說命傳似當爲毋逸傳毋佚其在高宗乃或諒陰三年不言武成傳似當爲, WYG: 流為鵰}
