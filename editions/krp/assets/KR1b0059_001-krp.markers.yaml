  - {type: variant, offset: 19846, length: 4155, content: 命注初學記二十白帖象刑荀子正論篇注竝節引唐虞之象刑上刑赭衣不純中刑雜屨下刑墨幪以居州里而反於禮注純緣也時人尙德義犯刑者但易之衣服自爲大恥周禮罷民亦然上刑易三中刑易二下刑易一輕重之差公羊傳襄二十九年疏案曰傳末而反於禮四字公羊襄二十九年疏作而民恥之據路史後紀十一紀陶唐云唐傳作而反于禮甫刑傳以三刑爲有虞氏者非今依改案又曰路史引而反於禮四字爲唐傳下卽言三刑非有虞制是此四字與上刑中刑下刑云云相屬皆在唐傳中路史此下又釋云純緣也幪巾也周禮罷民亦然上刑易三下刑易一輕重之差也皆用鄭注文則唐傳有此節傳注甚明吳中本以此四字上條而民恥之下非也唐虞象刑犯墨者蒙皂巾犯劓者赭其衣犯臏者以墨幪其臏處而畫之犯大辟者布衣無領北堂書鈔象刑酉陽雜俎卷八引首九字無蒙字皂舊譌爲帛今從雜俎引改雜俎下引白虎通墨者額也取漢法火之勝金帝猶反側晨興闢四門來仁賢文選刻漏銘注又毛詩關雎正義引首句書曰三歲考績三考黜陟幽明其訓曰三歲而小考者正職而行事也九歲而大考者黜無職而賞有功也其賞有功也諸侯賜弓矢者得專征賜鉄鉞者得專殺賜圭瓚者得爲鬯以祭不得專征者以兵屬於得專征之國注春秋傳曰魯賦八百邾賦六百以兵屬於晉由是也不得專殺者以獄屬於得專殺之國不得賜圭瓚者資鬯於天子之國然後祭注資取儀禮集傳集注三十三王制之已又儀禮經傳通解續宗廟路史發揮五禮記王制正義竝節引又路史後紀十二有虞紀引作周傳考績訓案曰周書無考績之文周當爲唐字之誤路史賞有功也下尙有一之三以至九年云云三十八字其文詞不類大傳葢羅氏泌之語今不錄三年一使三公絀陟公羊隱八年何休解詁疏云書傳文堯南撫交阯水經注三十七淹水注堯時麒麟在郊藪毛詩麟趾序正義引唐傳云堯使契爲田路史發揮卷四注引伏氏書弃爲田路史後紀十一云伏書亦謂弃爲田虞傳案曰尙書正義卷二云伏生雖有一虞夏傳以外亦有虞傳夏傳九共傳案曰困學紀聞卷二云虞傳有九共篇漢藝文志考證云大傳篇有九共書曰予辯下土使民平平使民無敖困學紀聞卷二玉海卷三十七路史後紀十一引作民以無敖九共以諸侯來朝各述其土地所生美惡人民好惡爲之貢賦政敎略能記其語曰予辯下土使民平平使民無敖薛季宣書古文訓十六引伏生稱五年一朝公羊桓元年注徐疏云虞傳文古者諸侯之於天子五年一朝朝見其身述其職述其職者述其所職也文選二十六謝靈運之郡初發都詩注又上林賦注張景陽雜虞夏傳案曰禮記王制正義云伏生書傳有虞夏傳堯爲天子丹朱爲太子舜爲左右注左右助也若周之冡宰典國事堯知丹朱之不肖注肖似也史記五帝本紀索隱亦引此三字必將壞其宗廟滅其社稷而天下同賊之故堯推尊舜而尙之屬諸侯焉致天下於大麓之野注堯受運衡知天命之所在而授又深知朱之不似不欲命於天誅如桀紂也御覽百四十六皇親部十二引傳並注堯推尊舜屬諸侯致天下於大麓之野注山足曰麓麓者錄也古者天子命大事命諸侯則爲壇國之外堯聚諸侯命舜陟位居攝致天下之事使大錄之路史發揮五引虞夏傳及鄭康成注云堯得舜推而尊之贈以昭華之玉文選石闕銘注曲水詩序注堯致舜天下贈以昭華之玉御覽八百四珍寶部三又見事類賦九案曰此上二條當與路史所引爲一尙書曰堯將禪舜納之大麓之野烈風雷雨不迷致之以昭華之玉水經濁漳水注引尙書案曰疑尙書逸篇之文且與文選注御覽所引異恐非尙書傳舜耕于厯山堯妻之以二女屬其九子也贈以昭華之玉初學記帝玉部維元祀巡守四嶽八伯注祀年也元年謂月正元日舜假于文祖之年也巡行也視所守也天子以天下爲守堯始得羲和命爲六卿其主春夏秋冬者并掌方嶽之事是爲四嶽出則爲伯其後稍死鵃吺共工等代之乃分置八伯注見儀禮通解續二十六亦見周禮序御覽皇王部六禮儀部十六又通鑑前編節引壇四奧沈四海封十有二山兆十有二州注奧內也安也四方之內人所安居也爲壇祭之謂祭四方之帝四方之神也祭水曰沈注見儀禮通解續又見文選宋郊祀歌注御覽禮儀部十六亦引此句祭者必封封亦壇也十有二山十有二州之鎭也兆域也爲營域以祭十二州之分星也壇沈封兆皆因所宐爲之名御覽八十一皇王部六引維元祀至此下有濬川二字宐從之注見儀禮通解續樂正定樂名注樂正樂官之長周禮曰大司樂注見儀禮通解續元祀代泰山注元始也歲二月東巡守始祭代氣於泰山也東稱代書曰至于岱宗柴注見儀禮通解續貢雨伯之樂焉陽伯之樂注陽伯猶言春伯春官秩宗也伯夷掌之毛詩小雅鼓鐘疏引虞傳陽伯上有東嶽二字儀禮經傳通解續二十六通鑑前編竝同注見儀禮通解續舞株離注株離舞曲名言象物生育離根株也注見儀禮通解續又毛詩鼓鐘正義周禮鞮鞻氏疏引注株離至此其歌聲比余謠注徒歌謂之謠其聲淸濁比如余謠然後應律也注見儀禮通解續名曰晳陽注晳當爲析春厥民析晳陽樂正所定名也是時契爲司徒掌地官矣後又舉禹掌天官注見儀禮通解續儀伯之樂注儀當爲羲羲仲之後也注見儀禮通解續舞鼚哉其歌聲比大謠名曰南陽注鼚動貌哉始也言象物應雷而動始出見也南任也注見儀禮通解續中祀大交霍山爾雅釋地疏引虞夏傳霍山爲南嶽貢兩伯之樂焉注中仲也古字通春爲元夏爲仲五月南巡守仲祭大交氣於霍山也南交稱大交書曰宅南交是也注見通鑑前編夏伯之樂注夏伯夏官司馬也棄掌之舞謾彧聖賢羣輔錄謾彧作漫哉舞下有武字一無武字玉海同其歌聲比中謠名曰初慮羣輔錄作祁盧玉海同注謾猶曼也彧長貌言象物之滋曼彧然也初慮陽上極陰始謀也謾或爲謗羲伯之樂注羲伯羲叔之後也舞將陽其歌聲比大謠名曰朱于案曰羣輔錄作朱華玉海同詩考作于注將陽言象物之秀實動搖也于大也秋祀桺穀華山貢兩伯之樂焉注八月西巡守祭桺穀之氣於華山也桺聚也齊人語秋伯之樂注秋伯秋官士也咎陶掌之舞蔡俶其歌聲比小謠名曰苓落案日苓羣輔錄作零注蔡猶衰也俶始也言象物之始衰也和伯之樂注和伯和仲之後也案日注和仲儀禮通解續及路史後紀引作和叔非今改正舞􅏏鶴其歌聲比中謠名曰歸來注􅏏鶴言象陽鳥之南也歸來言反其本也幽都弘山祀注弘山恆山也十有一月朔巡守祭幽都之氣於恆山也互言之者明祭山北稱幽都也貢兩伯之樂焉冬伯之樂注冬伯冬官司空也垂掌之舞齊落注齊落終也言象物之終也齊或爲聚歌曰縵縵垂爲冬伯舞丹鳳一曰齊落歌曰齊樂一曰縵縵注和伯樂闕聖賢羣輔錄引又玉海百二十五引大傳云見羣輔錄注和伯樂闕四字見通鑑前編案日一日齊落一日縵縵二句疑鄭注之文非大傳文也幷論八音四會注此上下有脫辭其說未聞羣輔錄歸假于禰祖用特五載一巡守羣后德讓貢正聲而九族具成注族當爲奏言諸侯貢其正聲而天子九奏之樂乃具成也以上傳自維元祀至此見儀禮經傳通解續二十六上因事之祭全引又通鑑前編帝舜元載引虞夏傳維元祀至用特止又御覽八十一禮儀部十六引維元祀至兆十有二州路史餘論卷八引舜元祀後紀十二有虞紀引維元祀至八伯竝云虞夏傳毛詩小雅鼓鐘正義引東嶽陽伯之樂尙書堯典正義引說舜典之四岳及羲伯和伯周禮鞮鞻氏疏引陽伯之樂舞株離並云虞傳又周禮序文選上林賦注長笛賦注顏延年郊祀歌注御覽皇王部六禮記王制正義路史後紀十二通鑑前編帝堯元載玉海詩攷小學紺珠聖賢羣輔錄並引以上注自夏伯至此並見儀禮經傳通解續二十六五載一巡守羣后德讓貢正聲而九族具成雖禽獸之聲猶悉關於律樂者人性之所自有也故聖王巡十有二州觀其風俗習其性情因論十有二俗定以六律五聲八音七始著其素蔟以爲八此八伯之事也分定於五此五嶽之事也五聲天音也八音天化也七始天統也通鑑前編帝舜六載引書大傳又北堂書鈔樂隋書音樂志禮書百十七路史後紀十二詩地理考並節引注族當爲奏言諸侯貢其正聲而天子九奏之樂乃具成也關猶入也入路史後紀引作統今詩國風是也案日此因論十有二俗下注五聲宫商角徵羽也八音鐘鼓笙磬塤篪柷敔琴也七始黃鐘林鍾大蔟南吕姑洗應鍾𬎼賓也歌聲不應此則去之素猶始也蔟猶聚也樂音多聚以爲八也五謂塤在北方鼓抂東方之屬天所以理陰陽也注見通鑑前編全引又隋書音樂志禮書百十七維五祀定鐘石論人聲乃及鳥獸咸變於前故更箸四時推六律六吕詢十有二變而道宏廣五作十道孝力爲右秋養耆老而春食孤子乃浡然招樂興於大鹿之野執事還歸二年􅨳然乃作大唐之歌通鑑前編帝舜五載引虞夏傳又宋書禮志路史後紀十二有虞紀路史發揮五詩攷注詢均也五作五教也十道謂君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽者也興成也樂以致天神出地祇致人鬼爲成也􅨳猶灼也大唐之歌美堯之禪也注見通鑑前編帝舜五載又路史後紀十二引五作十道注樂曰舟張辟雍鶬鶬相從八風回回鳳皇喈喈玉海音樂又六藝流别卷一案日路史後紀十二云維五祀定鐘石論人聲鳥獸咸變乃更著四時推律吕均十有二變而道宏廣于是勃然興韶于大麓之野執事還歸二年䜎然乃作大唐之歌以聲帝美聲成而絑鳳至故其樂日舟張辟雍鶬鶬相從八風回回鳳皇喈喈据此則樂日以下當與上文相屬但疑尙有脫文耳􅨳作䜎字之誤又案日尙書無劮無或侜張爲幻爾疋釋訓侜張誑也說文解字侜有壅蔽也揚雄國三老箴姦寇侏張侏張卽侜張之異文鄭注周禮甸祝禂今侏大也注論語朱張爲侏張與夷逸皆不作人名解鄭意夷逸謂夷于逸民侏張謂狂士張大皃也尙書大傳舟張辟雍舟卽侜之省同聲假借言辟雍之形有壅蔽而張大也維五祀定鐘石論人聲注舜始欲改堯樂乃及鳥獸咸變於前注百獸率舞之屬秋養耆老而春食孤子乃浡然招樂興於大鹿之野報事還歸二年􅨳然乃作大唐之歌注􅨳猶灼也大唐之歌美堯之禪也歌者三年昭然乃知乎王世明有不世之義招爲賓客而雍爲主人注招雍皆樂章名也賓入奏招主人入奏雍也始奏肆夏納以孝成注始謂尸入時也納謂薦獻時也肆夏孝成皆樂章名舜爲賓客而禹爲主人注舜旣使禹攝天子之事於祭祀避之居賓客之位獻酒則爲亞獻也樂正道贊曰尙考太室之義唐爲虞賓注尙考猶言往時也太室明堂中央室也義當爲儀儀禮儀也謂祭太室之禮堯爲舜賓也至今衍於四海成禹之變垂於萬世之後注衍猶溢也言舜之禪天下至於今其德業溢滿四海也御覽五百七十一樂部九又御覽天部八人事部四十六詩考維十有三祀帝乃稱王而入唐郊猶以丹朱爲尸於時百執事咸昭然乃知王世不絕爛然必自有繼祖守宗廟之君注舜承堯猶子承父雖已改正易樂猶祭天於唐郊以丹朱爲尸至十三年天下旣知已受堯位之意矣將自正郊而以丹朱爲王者後欲天下昭然知之然後爲之故稱王也晉祀夏郊以董伯爲尸知當以丹朱爲王者後使祭其郊也祖或爲體儀禮經傳通解續二十二天神引傳及注又禮記曲禮正義載異義引虞夏傳舜入唐郊二句禮書七十四尸通鑑前編帝堯七十載引同維十有四祀帝乃雍而歌者重篇通鑑前編帝舜十四載引虞夏傳維十有四祀鐘石笙筦變聲樂未罷疾風發屋天大雷雨帝沈首而笑曰明哉非一人天下也乃見於鐘石北堂書鈔石又路史發揮五注引虞傳云維五祀興韶樂於大鹿之野十四祀笙管變天大雷雨疾風爲遜禹之事也維十有五祀祀者貳尸通鑑前編帝舜十五載引虞夏傳維十有五祀舜爲賓客禹爲主人樂正進贊曰尙考太室之義唐爲虞賓文選王元長曲水詩序引尙書大傳還歸二, WYG: ''}
