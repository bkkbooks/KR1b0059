  - {type: variant, offset: 57, length: 2, content: 也三, WYG: 五}
  - {type: variant, offset: 61, length: 0, content: '', WYG: 朝朝見其身述其職述其職者述其所職也選注五年一朝王者亦貴得天下之歡心以事其先王因助祭以述其職故分四方諸侯為四輩輩主一時公羊疏引虞傳五嶽謂岱山霍山華山恒山嵩山也白虎通大傳又爾雅疏引虞夏傳霍山為南嶽江河淮濟為四瀆風俗通引大傳五嶽視三公四瀆視諸侯其餘山川視伯小者視子男尚書正義云其尊卑所視王制及書傳之文鄭𤣥曰謂視其牲幣粢盛籩豆爵獻之數五岳皆觸石出雲扶寸而合不崇朝而雨天下後漢章帝紀注藝文類聚引大傳鄭𤣥曰四指為寸扶音膚惟元祀廵守一作狩四嶽八伯壇四奥沉四海封十有二山兆十有二州樂正定樂名元祀代泰山}
  - {type: page-break, offset: 61, content: '', id: KR1b0059_WYG_001-10a, image: WYG0068/WYG0068-0391a.png}
  - {type: page-break, offset: 61, content: '', id: KR1b0059_WYG_001-10b, image: WYG0068/WYG0068-0391b.png}
  - {type: variant, offset: 62, length: 0, content: '', WYG: 兩伯之樂焉東嶽陽伯之樂舞侏一作株離其歌聲比余謡名曰晳陽儀伯之樂舞鼚哉其歌聲比大南名曰南陽中祀大交霍山貢兩伯之樂焉夏伯之樂舞謾哉一作或其歌聲比中謡名曰初慮羲伯之樂舞將陽其歌聲比大謡名曰朱干干一作于秋祀栁榖華山貢兩伯之樂焉秋伯之樂舞蔡俶其歌聲比小謡名曰苓落和伯之樂舞𤣥鶴其歌聲比中謡名曰歸來祀幽都宏山貢兩伯之樂焉冬伯之樂舞齊落齊一作濟歌曰縵縵并論八音四㑹歸格於禰祖用特五載一廵守群后徳讓貢正聲而九族奏具成鄭𤣥曰沉祭名祭水曰沈兆域也為營域以祭十二州之分星也陽伯春伯秩宗伯夷為之路史引大傳曰伯夷之子為西岳株離舞曲名言象物生株離也儀伯羲仲之後鼚動貌哉始也南任也夏伯夏官司馬棄為之羲伯羲叔之後秋伯秋官}
  - {type: page-break, offset: 62, content: '', id: KR1b0059_WYG_001-11a, image: WYG0068/WYG0068-0391c.png}
  - {type: variant, offset: 63, length: 0, content: '', WYG: 也臯陶為之和伯和叔之後蔡哀也俶始也宏山即恒山冬伯冬官司空垂為之樂者人性所自有也故聖王廵十有二州觀其風俗習其情性因論十有二俗定以六律五聲八音七始五音天音也八聲天化也七始天統也選注北堂書抄詩譜見諸侯問百年太師陳詩以觀民命風俗命市納賈以觀民好惡山川神祗有不舉者為不敬不敬者削以地宗廟有不順者為不孝不孝者黜以爵變禮易樂為不從不從者君流改制度衣服為畔畔者君討有功者賞之白虎通引尚書大傳}
  - {type: page-break, offset: 63, content: '', id: KR1b0059_WYG_001-11b, image: WYG0068/WYG0068-0391d.png}
  - {type: page-break, offset: 63, content: '', id: KR1b0059_WYG_001-12a, image: WYG0068/WYG0068-0392a.png}
