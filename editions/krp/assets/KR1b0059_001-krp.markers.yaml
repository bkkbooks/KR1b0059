  - {type: variant, offset: 7517, length: 681, content: 序正義引書傳散宜生等受學於太公太公除師學之禮酌酒切脯約爲朋友公羊定四年疏引書傳散宜生閎夭南宮括三子者學乎太公太公見三子知爲賢人遂酌酒切脯除爲師學之禮約爲朋友太平御覽四百六人事部四十七散宜生閎夭南宮适三子者學乎太公見三子知三子之爲賢人遂酌酒切脯約爲朋友御覽六十二飯食部二十又藝文類聚七十二食物部閎夭南宫适散宜生三子學於太公望望曰嗟乎西伯賢君也四子遂見西伯於羑里注散宜生文王四臣之一也吕尙有勇而爲將散宜生有文德而爲相繹史十九太公之羑里見文王散宜生遂之犬戎氏取美馬駮身朱鬛雞目六字又見山海經海内北經注又爾雅翼卷十八引作驄身朱髦此下有除凡取九六焉六字之西海之濱取白狐靑翰注翰毛之辰大者注見文選羽獵賦憿吳將校部曲注又藝文類聚祥瑞部下作長毛也之於陵氏取怪獸案曰吳中本取怪獸下有大不辟虎狼閒六字傳文無騶字注有閒大也虞蓋騶虞也八字尾倍其身名曰騶虞八字見御覽八百九十獸部二之有參氏取姜女之江淮之浦取大貝如車渠注渠車罔也注見文選江賦注引鄭元曰陳於紂之廷紂出見之還而觀之曰此何人也散宜生遂趨而進曰吾西蕃之臣昌之使者見繹史十九引此三十字紂大悅曰非子罪也崇侯也遂遣西伯伐崇御覽六百四十一刑法部七又御覽人百七珍寶部六又御覽八百九十獸部二又尙書顧命正義儀禮士喪禮貝三實于笄疏周禮天府疏藝文類聚八十四寶玉部下九十九祥瑞部下文選江賦注爾雅翼十八路史國名紀路史餘論五夢溪筆談二十二記纂淵海四藝文類聚文選注御覽珍寶部獸部引此文之上並有文王囚於羑里六字案曰六韜亦說散宜生等獻寶事與此小異文王以閎天太公望南宮括散宜生爲四友玉海官制周文王胥附奔輳先後禦侮謂之四隣以免於羑里之害懿子曰夫子亦有四隣乎繹史九十五, WYG: ''}
