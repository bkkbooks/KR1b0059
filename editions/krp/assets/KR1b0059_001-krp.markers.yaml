  - {type: variant, offset: 8636, length: 10101, content: 黍禾之油油爲箕子歌亦誤曲阜孔廣林說史繩祖云史記尙書傳所載之歌只差末句一句惟書傳序與歌蔪蔪不同宋玉笛賦枚乘七發皆作麥秀蔪兮注麥􅉭也字之稍差不爲要切但史記以爲箕子而書大傳以爲微子且稱父母之國尤爲有理不知司馬何所據而與書傳扺梧耶尙書大傳卷二受業嘉應吳蘭修校尙書大傳卷一序錄史記儒林傳言尙書自濟南伏生漢書儒林傳漢興言書自濟南伏生伏生者裴駰集解張晏曰伏生名勝伏氏碑云案曰漢書儒林傳注引張晏曰名勝伏生碑云史記索隱曰案張華云名勝漢紀云字子賤華當爲晏字之誤濟南人也故爲秦博士孝文帝時欲求能治尙書者天下無有乃聞伏生能治欲召之是時伏生年九十餘矣不能行於是乃詔太常使掌故朝錯往受之秦時焚書伏生壁藏之其後兵大𧺫流亾漢定伏生求其書亾數十篇獨得二十九篇卽以敎於齊魯之間學者由是頗能言尙書諸山東大師無不涉尙書以敎矣伏生敎濟南張生及歐陽生歐陽生敎千乘兒寛兒寛旣通尙書以文學應郡舉詣博士受業受業孔安國張生亦爲博士而伏生孫以治尙書徵不能明也自此之後魯周霸孔安國雒陽賈嘉頗能言尙書事漢書儒林傳同漢書蓺文志尙書經二十九卷本注大小夏矦二家歐陽經三十二卷師古曰此二十九卷伏生傳授者案漢志三字舊亦作二誤今據玉海所引改傳四十一篇歐陽章句三十一卷大小夏矦解故二十九篇歐陽說義二篇劉向五行傳記十一卷許商五行傳記一篇易曰河出圖雒出書聖人則之故書之所𧺫遠矣至孔子篹焉上斷於堯下訖於秦凡百篇而爲之序言其作意秦燔書禁學濟南伏生獨壁藏之漢興亾失求得二十九篇以敎齊魯之間訖孝宣世有大小夏矦氏立於學官劉向以中古文校歐陽大小夏矦三家經文酒誥脫簡一召誥脫簡二率簡二十五字者脫亦二十五字簡二十二字者脫亦二十二字文字異者七百有餘脫字數十漢書儒林傳顏師古注引衞宏定古文官書序云案曰官舊作尙近金壇段若膺始據韓昌黎集正其誤今从之伏生老不能正言言不可曉也使其女傳言敎錯齊人語多與潁川異錯所不知者凡十二三略以其意屬讀而已儒林傳贊曰自武帝立五經博士開弟子員設科射策勸以官祿訖於元始百有餘年傳業者寖盛支葉蕃滋一經說至百餘萬言案曰儒林傳言信都秦恭延君增師法至百萬言桓譚新論亦云大師衆至千餘人葢祿利之路然也初書唯有歐陽至孝宣世復立大小夏矦尙書後漢書伏湛傳九世祖勝字子賤所謂濟南伏生者也初自伏生已後世傳經學淸静無競故東州號爲伏不鬭云顏氏家訓書證篇曰孔子弟子虙子賤爲單父宰卽虙羲之後俗字亦爲宓或復加山今兖州永昌郡城舊單父地也東門有子賤碑漢世所立乃云濟南伏生卽子賤之後是虙之與伏古來通字誤以爲宓較可知矣案曰伏生旣爲虙子賤之後不應與其遠祖同字而史記索隱引漢紀以爲伏生字子賤恐卽因漢碑而展轉致誤漢碑固不誤也今漢紀無此文不知小司馬何據然范蔚宗後漢書實云伏生名勝字子賤其名則是其字則非也湖本史記載索隱引漢紀作紀年引張晏作張華皆誤尙書正義按伏生所傳三十四篇謂之今文則夏侯勝夏侯建歐陽和伯三家所傳及蔡邕所勒石經是也隋志三家並立而歐陽是盛晉永嘉之亂歐陽大小夏侯尙書並亡史記正義引七錄云三家至西晉並亡梅頤本尙書序伏生口以傳授裁二十餘篇伏生以舜典合於堯典益稷合於皋陶謨盤庚三篇合爲一康王之誥合於顧命經典釋文曰卽馬鄭所注二十九篇案曰二十九篇古文分合皆與伏生本同惟顧命一篇馬分王出在應門以下爲康王之誥耳今之舜典古文今文皆合於堯典今之益稷古文今文皆合於皋陶謨蓋百篇固別有舜典益稷古文益稷作棄稷而漢世求之不得僞孔乃于堯典皋謨各謬析爲二篇也漢書五行志董仲舒治公羊春秋始推陰陽爲儒者宗宣元之後劉向治穀梁春秋數其禍福傳以洪範與仲舒錯至向子歆治左氏傳其春秋意已乖矣言五行傳又頗不同孝武時夏矦始昌通五經善推五行傳以傳族子夏矦勝下及許商皆以敎所賢弟子其傳與劉向同唯劉歆傳獨異漢書楚元王傳成帝卽位詔向頜校中五經秘書向見尙書洪範箕子爲武王陳五行陰陽休咎之應向乃集合上古以來厯春秋六國至秦漢符瑞灾異之記推迹行事連傅禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之贊曰劉氏洪範論發明大傳著天人之應漢書夏侯勝傳從始昌受尙書及洪範五行傳說灾異會昭帝崩昌邑王嗣立數出勝當乘輿前諫曰天久陰而不雨臣下有謀上者陛下出欲何之王怒謂勝爲妖言縛以屬吏吏白大將軍霍光是時光與車騎將軍張安世謀欲廢昌邑王光讓安世以爲泄語安世實不言廼召問勝勝對言在洪範傳曰皇之不極厥罰常陰時則下人有伐上者惡察察言故云臣下有謀光安世大驚以此益重經術士漢書李尋傳治尙書獨好洪範灾異晉書五行志文帝時宓生創紀大傳其言五行庶徵僃矣班固據大傳采仲舒劉向劉歆著五行志宋書五行志伏生剏紀大傳五行之體始詳水經注卷五河水篇漯水又東逕漢徵君伏生墓南碑碣尙存以明經爲秦博士秦坑儒士伏生隱焉漢興敎於齊魯之間撰五經尙書大傳文帝安車徵之年老不行乃使掌故歐陽生等受尙書於徵君號曰伏生者也案曰伏生未嘗徧撰五經掌故受尙書者乃􅏯錯非歐陽生水經注有誤後漢書鄭􅏏傳凡􅏏所注周易尙書毛詩儀禮禮記論語孝經尙書大傳中候乾象厤又著天文七政論魯禮禘祫議六藝論毛詩譜駮許愼五經異議答臨孝存周禮難凡百餘萬言孝經序疏鄭志目錄記鄭之所注五經之外有中候大傳七政論乾象厤六藝論毛詩譜答臨碩難周禮許愼異義釋廢疾發墨守箴膏肓答甄守然等書經典釋文序錄尙書大傳三卷伏生作隋書經籍志尙書大傳三卷鄭􅏏注大傳音三卷顧彪撰尙書洪範五行傳論十一卷漢光祿大夫劉向注伏生尙書傳四十一篇以授同郡張生張生授千乘歐陽生濟南伏生之傳惟劉向父子所著五行傳是其本法而又多乖戾隋書五行志易以八卦定吉凶書以九疇論休咎春秋以灾祥驗行事漢時有伏生董仲舒京房劉向之倫能言灾異六經有足觀者初學記伏生爲尙書傳四十一篇歐陽大小夏矦傳其學各有能名是曰今文尙書劉向五行傳蔡邕勒石經皆其本舊唐書經籍志尙書暢訓三卷伏勝注案曰尙書大傳有略說一篇諸經義疏每引之隋志無大傳而有暢訓伏生無此書暢訓當爲略說形近之譌三卷當爲一卷此伏生所撰不可謂注舊志此條多謬新唐書亦然第新書列大傳三卷又出暢訓一卷疑舊志尙有脫誤尙書洪範五行傳論十一卷劉向撰唐書藝文志伏勝注大傳三卷暢訓一卷劉向洪範五行傳論十一卷册府元龜顧彪撰大傳音三卷崇文總目尙書大傳三卷漢濟南伏勝撰後漢大司農鄭􅏏注伏生本秦博士以章句授諸儒故博引異言援經而申證云見文獻通考中興書目鄭康成敘曰葢自伏生也伏生爲秦博士至孝文時年且百歲張生歐陽生從其學而授之音聲猶有譌誤先後猶有差舛重以篆隷之殊不能無失生終後數子各論所聞以已意彌縫其闕別作章句又特撰大義因經屬指名之曰傳劉子政校書得而上之凡四十一篇至􅏏始詮次爲八十三篇見玉海卷三十七郡齋讀書志尙書大傳三卷右秦伏生勝撰鄭康成注下與中興書目同今本四卷首尾不倫直齋書錄解題尙書大傳凡八十有三篇當是其徒歐陽張生之徒雜記所聞然未必當時本書也印板刓闕合更求完善本葉夢得曰自安國學行歐陽氏遂廢今世所見惟伏生大傳首尾不倫言不雅馴至以天地人四時爲七政以金縢作於周公殁後何可盡據其流爲劉向五行傳夏矦氏灾異之說失孔子本意益遠遂初堂書目尙書類尙書大傳不注卷數文獻通攷經籍攷尙書大傳三卷通志藝文略伏生大傳三卷鄭􅏏注洪範五行傳論十一卷漢光祿大夫劉向五行傳記一篇漢許商宋史藝文志伏勝大傳三卷鄭􅏏注宋史李燾傳尙書大傳雜記一卷孫退谷承澤庚子銷夏記唐王維伏生圖摩詰妙畫傳世者人止知有江干雪霽圖余曾一見之乃後人臨本至人物之妙有非唐人所能及者伏生圖一老儒生伏几而坐手持一卷乃授經圖也宋高宗題簽云王維寫濟南伏生上用乾卦小圓璽卷舊在金陵黃琳家顧遯園客座贅譚載都元敬嘗在黃美之家見此圖驚嘆不置不知何年入故內今復傳出劉體仁公㦷七頌堂識小錄伏生圖席地憑几短鬚雞皮眞九十老人而眉目靜遠則大儒也宣和題王維寫伏生數字字極楷上用乾卦印背亦精絹装朱彜尊王維伏生圖跋右王維所畫伏生上有宋思陵題字庚戌十月觀于退谷孫侍郞齋生濟南人也予遊濟南于長白山之陰相生墓案曰水經注漯水又東逕漢徵君伏生墓南云云見其祠宇庳隘至不容筵几有司牲醪歲時之饗或闕焉不修世人無知重生者葢經學之不明久矣思秦之時書生訟言封禪致有坑儒之禍生爲秦博士得免其明哲有過人者及漢興隱士負一時之望莫若商山四皓初未聞講習經義傳之弟子則其年雖八十餘衣冠甚偉與土木何異生獨能于微言旣絕之時敎學齊魯老而益勤卒傳之晁錯斯文未喪天若有意于生而錫之年者百世之後宜師其人而識其貌焉維之所畫特想像爲之而已然蓺事旣神其精思所感必或見之觀是圖者不問知其爲生此思陵所以寶惜而親題之也世之法書善畫多祕之內府人旣未得觀間復流傳于世藏之者非其人則觀者亦取非其人此書畫之厄也是圖之得歸孫氏非至幸與再題王維伏生圖是圖庚戌冬觀于北平孫侍郞塾室因跋其尾旣而歸干棠邨梁相國今爲漫堂宋公所藏主雖三易不墮秦會之賈師憲嚴惟中之手濟南生亦幸矣桉中興書目館閣續錄桉曰宋嘉定間人編次維所畫濟南伏生圖曾歸祕閣儲藏故宋元以來題跋獨少宋公定爲眞蹟知孫梁二公賞鑒略同也案曰宣和畫譜王維寫濟南伏生像亦見淸河書畫舫建立伏博士始末載陽湖孫氏平津館叢書嘉慶元年十二月十一日署按察使司孫咨山東學院曹爲咨呈事本司査國家擇先聖賢之後置五經博士授以世職所以崇儒重道典禮優渥其制仿自明景泰時歴代增置至我朝修明祀典自孔門十哲上溯周公旁及關裔下至宋儒皆爲置立五經博士至周至備考列朝五經博士之設或以制禮作樂或以身通六藝或以闡揚道統惟漢代諸儒承秦絶學之後傳授經文經義去古不遠皆親得七十子之傳若伏生鄭康成其功在經學絕續之際較七十子爲難又迥在唐宋諸儒之上今世祠墓子孫現在本屬鄒平高密之境允宜會同貴院將二賢學行奏請國家予以曠典以昭先賢傳道之報考尙書出於伏生壁藏又口授其義始有今文廿八篇顯於世及孔壁得古文書孔安國以今文讀之其無今文可証者凡十六篇竟不能讀又無能註者謂之逸書存于故府今之孔傳梅頥所上非孔壁古文朱文公疑之是漢無伏生則尙書不傳傳而無伏生亦不明其義卽古文書後出孔壁無伏生之今文亦不能識讀是伏生一人爲唐虞三代微言道統之所寄今鄒平有伏氏諸城有宓氏皆其後也鄭康成爲東州大儒於易書詩禮論語孝經皆有傳註欽定諸經義疏多引鄭注唐儒正義推闡其說宋儒章句沿襲其詞至乎三代禮儀服物典章周程張朱註解不出鄭註範圍亦或遜其精密故范史以孔書遂明稱之核其行事見于史傳亦無可議今其祠墓子孫現在高密前學院阮曾加修葺又爲設奉祀生或以前代置五經博士重在道統不知道存乎經統本于堯舜禹湯文武伏生不傳尙書道何所存統何所述東晉板蕩經師失傳諸經之義豈能臆說賴鄭康成集漢儒之大成經義無康成則淵源幾絕唐宋諸儒何由復傳道統幸値我國家久道化成興廢繼絕伏生鄭康成祠墓子孫適在東省地方官自宜陳請增置五經博士以爲世職維學院有激揚風化之責事關崇奉先賢本司不便專政爲此咨呈貴院挈本司銜名具稿上聞並祈指正裁奪賜覆施行嘉慶三年十二月初三日鄒平縣知縣李詳濟南府金爲查明先賢嫡裔詳請承襲以隆祀典事卷查嘉慶二年正月初四日蒙本府票內開一件爲咨呈事嘉慶元年十二月十六日蒙學院曹牌開嘉慶元年十二月十一日據署臬司孫咨稱先儒伏生鄭康成宜陳請增置五經博士等情到院查五經博士承襲定例由藩司核議詳請撫部院具題咨部辦理兹據呈請增設事關題請應飭該地方官查明伏生鄭康成嫡裔開造事實淸册妥議通詳等因到府合行轉飭又於嘉慶三年五月二十一日蒙本府憲票前事內開本年五月十二日蒙布政司票開前准臬司咨查先儒伏生後裔伏氏係鄒平縣人增置五經博士以光祀典等因當經抄錄行查去後迄今日久未據詳覆合行飭催等因到縣蒙此遵卽差查去後嗣據卑縣伏生鄕伏中興同伏敬祖呈稱爲遵諭陳明懇恩轉詳事切身始祖名勝爲秦博士及漢文時口授傳今文尙書宋咸平三年追封乘氏伯居古濟南城東關今祠墓在鄒平城者十八里二世三世四世名諱無考至五世祖孺當漢武時客東武因家焉六世七世亦無考八世祖名理當代名儒受詩于匡衡九世祖名湛漢成時拜大司徒封陽都侯家藏宗圖二世三世四世以及六世七世闕名與漢書所載伏氏世系適相符合實無從再爲確查闕文十世祖名翕爲湛之子亦嗣陽都侯爵至十六世祖典當漢獻時國除累世傳至元代有名伏步者當順帝末年靑州府屬縣兵荒特甚遷居鄒平北鄕載在家乘步係始祖四十六世孫湛祖三十八世孫此回籍鄒平之始祖也又傳至六十一世名永芳前任縣主程於康熈三十五年選爲奉祀乾隆十一年前任縣主雷又選身父名紹先爲奉祀均蒙賜給縣文可驗又傳至身爲始祖六十三世孫身姪孫爲始祖六十五世孫現今蒙各憲飭查後裔宜陳請增置五經博士身年已老邁不堪承襲身姪孫敬祖年十歲現在從師肄業於嘉慶元年奉祀陪祭爲始祖六十五世孫爲湛祖五十七世孫守墓祭奠歴經數百年矣理合將遷徙回籍緣由懇請轉詳上憲奏請授敬祖世襲五經博士以昭二千餘年曠典伏祈恩准轉詳計粘呈宗圖一紙等情據此卑職會同儒學覆查無異該鄒平縣知縣李瓊林查看得奉憲飭査先儒伏生後裔請增置五經博士一案緣伏生名勝爲秦博士及漢文時口授今文尙書至宋咸平時追封乘氏伯居古濟南城東關今祠墓在卑職城北十八里伏生鄕春秋官爲致祭伏生五世孫伏儒漢武時遷居東武卽今之靑州府屬也載在漢書至元代有名伏步者係伏生四十六世孫當順帝末年値靑屬兵荒遷居卑縣城北伏生鄕累世相傳至六十一世名永芳康熈年間前任程令選爲奉祀令其陪祭至乾隆十一年間前任雷令又選六十二世孫伏繼宗之兄伏紹先爲奉祀生均未詳給部照今紹先之子伏中興係伏生六十三世孫現在年老務農不能承襲惟査六十五世孫敬祖年甫十齡從師讀書克承儒業卑職伏思國家崇儒重道凡先賢後裔咸增置五經博士以昭曠典今查先儒伏生自秦火之後口授尙書今文二十八篇以顯於世是漢無伏生則尙書不傳傳而無伏生亦不明其義誠如前臬憲所咨伏生一人爲唐虞三代微言道統之所寄允宜選擇嫡裔早爲承襲以昭褒崇盛典今查伏敬祖是否係伏生嫡派長支長孫除宗圖之外别無考証惟盡卑縣境内現在除伏繼宗伏中興伏敬祖三人並無伏姓其人則伏敬祖爲伏生嫡派似無疑義應請卽令伏敬祖承襲五經博士以符盛典緣奉飭議理合取具宗圖並地隣戸族甘結造具履歴淸册加具印結會同儒學具文祥請憲臺察核施行嘉慶五年十二月初十日布政使司全詳巡撫部院惠爲詳請增設五經博士以光祀典事嘉慶五年四月初三日蒙前巡撫部院蔣批據鄒平縣先儒伏生增設五經博士緣由蒙批查增設五經博士事關鉅典未便草率據詳先儒伏氏祠墓子孫俱在該縣城北有無碑誌書籍考証其祠堂建始何年現在作何修理墓道何所曾否設有奉祀生現在本支人數若干詳內均未查明聲敘礙難核辨仰布政司轉飭詳細確切查明祠墓實據取具世系宗譜圖說詳請察奪仍候學院批示繳等因批司蒙此當經錄批轉飭詳查祠墓實據去後兹據濟南府知府德生詳據鄒平縣知縣李瓊林詳稱遵卽覆査據卑縣伏生鄕伏繼宗呈稱緣身始祖名勝前爲秦博士宋咸平二年追封乘氏伯爵配享聖廟東廡墓在鄒平縣城北一十八里伏生鄕卽今縣誌所載古濟南郡東關也其祠之創建年遠莫稽墓前碑記至順二年重修禮部尙書張起巖撰文後歴元明以及國朝重修數次俱有縣誌碑文可考縣誌内載伏墓林煙圖爲邑十六景之一又載墓有牆旁有祠祠旁有書院爲朔望講學之所今墓與書院俱廢僅有墓坵墓道碑在鄒邑城東七里舖東西大路北與墓南北對値相隔十八里墓東南旁現有祠三間東西書樓二座祭庭三間大門一座查漢書載伏生世系始祖名勝卽傳經之伏生二世無名三世有記載無名四世無名五世名儒武帝時客東武因家焉六世七世俱無名八世名理當代大儒以詩授成帝至湛爲始祖九世孫光武徵拜大司徒封陽都侯漢書與身家所傳譜系相合雖有闕名實足信古而傳後且嘗考家乘圖說有始祖四十六世孫名步爲身十七世祖當元朝末年自靑歸鄒世守祠墓治祭陪祭已數百餘年至康熈三十五年前任縣主程選身父名永芳爲奉祀名載重修碑記乾隆十二年前任縣主雷又選身堂兄名紹先爲奉祀給縣印札實未領有部照紹先係現在詳請承襲五經博士伏敬祖之曾祖也現今本支人數身爲始祖六十二世孫外惟姪曾孫敬祖爲始祖六十五世孫身年七十六歲無子嗣敬祖年十歲祖父皆没從師温習四書並熟易書詩三經則爲乘氏伯嫡裔大宗堪充添設五經博士選者止有敬祖一人身伏思傳經支葉閱二千餘年之久僅存此一老一幼零丁狐獨如一線之未絕耳懇恩轉詳計粘宗圖一紙等情據此卑職覆查無異擬合取具宗圖具文詳請本府核轉等情到府卑府覆查無異擬合將送到宗圖册結轉詳本使司核轉等情到司據此該本使司查得先儒伏生爲有漢大儒口授尙書于秦火之餘厥功甚鉅似宜選擇嫡裔承襲博士以光祀典兹據濟南府縣查明伏生六十五代孫伏敬祖克承儒業堪膺充補五經博士之職取造册結宗圖前來理合備由具文詳請憲臺察核施行嘉慶七年正月十九日山東巡撫和疏題爲請詳增設五經博士以光祀典事云云該臣看得先儒伏生爲有漢大儒口授尙書於秦火之餘厥功甚鉅似宜選擇嫡裔承襲博士以光祠典今據布政使吳俊詳稱據濟南府行據鄒平縣查明伏生六十五代孫伏敬祖克承儒業堪以充補五經博士之職取造册結宗圖墨搨碑文並伏生所載縣誌文記詳送到司擬合詳情㑹核具題等情呈詳前來臣覆查無異除册結宗圖墨搨文記送部外謹會同學政臣劉合詞具題伏祈皇上睿鑒勅部議覆施行謹會題請旨嘉慶七年四月初二日禮部疏題前事云云該臣等議得自古先賢鉅儒博考經濟垂世立敎或顯達未及其身斯旌揚宜歸於後兹據該撫疏稱先儒伏生六十五代孫伏敬祖請設爲五經博士等語臣等伏查伏勝爲秦博士秦時焚書六經幾至息傳漢孝文時求能治尙書者天下無有賴伏勝口授尙書於晁錯自是典謨誓誥之文藉以不墜其傳經之功甚鉅旣據該撫查明伏勝祠墓碑記遺蹟尙存嫡泒子孫世系可考似應添設世襲五經博士一員以廣酧庸之典以昭崇文之治應如該撫所請伏勝六十五代孫伏敬祖立爲五經博士先行咨部註册俟伊年及十五以上給咨送部考試驗其文理明順再行題請承襲咨吏部給劄恭候命下之日行文吏部並該撫查照辦理臣等未敢擅便謹題請旨本月初四日奉旨依議欽此嘉慶十年十二月十七日禮部疏題爲請旨事准前任山東巡撫全保咨稱前准禮部議覆前任山東巡撫和寕題請伏生後裔添設五經博士一疏內開伏勝六十五代孫伏敬祖應請立爲五經博士俟年及十五以上給咨送部考試再行題請承襲等因於嘉慶七年四月初二日題初四日奉旨依議欽此欽遵在案今據署布政司金光悌詳稱據濟南府詳據鄒平縣查明應襲五經博士伏敬祖年十七歲應令赴部考試取具印甘各結呈送轉請給咨赴部考試等情詳送前來理合給咨該博士親賫赴部投逓考試等因移咨到部該臣等議得例載先儒後裔應承襲五經博士人員年十五歲以上者由該省督撫給咨赴部考試如果文理明順題准承襲等語查先儒後裔前經臣部于嘉慶七年題准添設五經博士俟伊六十五代孫伏敬祖年及十五以上該撫送部考試驗其文理明順再行題請承襲等因在案今據前任山東巡撫全保咨稱伏勝後裔伏敬祖現年十七歲例應送部考試前來經臣部考試得伏敬祖文理明順與承襲之例相符應准其承襲五經博士恭候命下臣部行知吏部照例給劄臣等未敢擅便謹題請旨本月十九日奉旨依議欽此重修伏生祠記暴秦焚滅經籍欲愚黔首黔首固未可愚祇自愚以速滅亡而經籍之在人心者如日月之揭乎天固亦不可得而滅也噫秦灰已冷漢業聿新孰謂禍難㪚亡之餘間有伏生巋然久存獨能壽遺經於胸臆以傳來學而新生民之耳目哉是盖天相斯人卑之以九十之年而其所以託之者有在也濟南鄒平縣治東北十餘里號伏生鄕伏生之墓在焉卽墓所有祠歲久弊漏縣尹大寕曹明叔視事之歲躬拜祠下顧瞻徘徊睠先賢之所藏仰遺像之有託慨然興懷營修完飾輪奐一新率邑人士與凡在官者具牲醴以祀復專其子獻來請曰願有述起巖緬維先生之有功於斯文天下所共知後世論次其功贈乘氏伯號曰大儒從享孔廟天下通祀惟鄒以其鄕獲私展其敬旣列祠縣學又卽墓建祠其趨向可知也會曹尹復能崇墓葺祠俾邑人益知有以景仰前哲而進于學於以化民成俗是眞能舉其職矣起巖濟產也聞其請故不敢辭旣書其事因附所見俾來者有攷仍繫以銘按漢儒林傳伏生名勝爲秦博士壁藏書以避禁兵後亡數十篇獨以二十九篇敎于齊魯文帝欲召時年已九十餘老不能行詔掌故晁錯往受之衞宏云伏生老不能正言言不可曉使其女傳語敎錯孔安國書序但云失其本經口以傳授藝文志尙書二十九篇乃其所受者漢儒謂之今文隋經藉志乃云伏生口傳二十八篇作書傳四十一篇以授同郡張生張生授千乘歐陽生歐陽生授倪寛寛授歐陽之子世傳至曾孫高謂之歐陽學又張生傳夏侯都尉有大小夏侯學宋葉夢得以書出伏生者二十三篇傳歐陽歙崇文總目尙書大傳二卷爲伏勝撰晁氏以爲勝終之後歐陽生張生各誦所聞特撰大義名之曰傳其說互有不同要之今文尙書出於伏生者則一也先生爲秦博士秦坑儒無所施其學其學至漢始傳然則先生之學旣施於漢而名以顯於後世故余不繫之秦而繫之漢題曰漢濟南伏先生祠碑云銘曰於維先生始焉則屯終焉則亨獨抱遺經以淑後人以慰幽貞行法俟命天錫耄年庸待治平竟以所授列於學宮其道大明書以人傳人以書顯垂萬世名稽古之力斯文與俱兹不曰榮從祀孔廟徧於寰區罔不敬承矧兹梁鄒鄕墓攸在礪世作程沉沉亢扃體魄斯安祠以妥靈茂宰尙賢有壞必葺遹觀厥成於鄕於學祀享相望閱千百齡穹碑有銘被之絃歌用侑爾牲元至順二年禮部尙書張起巖撰尙書大傳卷一上受業嘉應吳蘭修校主春者張昏中可以種穀主夏者火昏中可以種黍主秋者虚昏中可以種麥主冬者昴昏中可以收歛以上見禮書卷三十五尙書堯典正義又周禮司寤氏疏引穀作稷收歛下多葢藏二字黍下多菽字又周禮考工記疏北堂書鈔太平御覽二十一時序部六八百三十八百穀部二八百四十二百穀部六並節引案曰太平御覽時序部引尙書考靈曜曰鳥星爲春候火星爲夏期專陽相助同精感符虚星爲秋候昴星爲冬期陰氣相佐德乃弗邪子助母收母合子符鄭康成注虚星北方㝛也昴星西方㝛也陰指母也禮記月令正義引尙書考靈曜曰主春者鳥星昏中可以種稷主夏者心星昏中可以種黍主秋者虚昏中可以種麥主冬者昴星昏中則入山可以斬伐具器械王者南面而坐視四星之中者而知民之緩急急則不賦力役故敬授民時書緯之言與伏生書傳同淮南子主術訓張昏中則務種穀大火中則種黍菽虚中則種㝛麥昴中則收斂畜積伐薪木此卽本大傳秋昏虚星中可以種麥注虚北方􅏏武之㝛八月昏中見於南方齊民要術二主冬者昴昏中可以收斂田獵斷伐當上吿之天子而下賦之民故天子南面而視四星之中知民之緩急急則不賦籍不舉力役故曰敬授人時此之謂也注籍公家之常徭太平御覽二十六時序部十一又尙書堯典正義北堂書鈔路史後紀十一引小異東方者何也動方也物之動也何以謂之春春出也故謂東方春也太平御覽十八時序部三又藝文類聚三春出也萬物之出也廣韻十八眞南方者何也任方也任方者物之方任何以謂之夏夏者假也吁荼萬物養之外者也故曰南方夏也御覽二十一時序部六夏者假也吁荼萬物而養之外也注吁荼讀曰嘘舒事類賦注末六字是鄭注西方者何也鮮方也鮮訊也訊者始入之皃始入者何以謂之秋秋者愁也愁者萬物愁而入也故曰西方者秋也注秋收斂皃御覽二十四時序部凢案曰愁當如禮記作揫字之誤注秋字亦當作揫北方者何也伏方也伏方也者萬物伏藏之方伏藏之方則何以謂之冬冬者中也中也者萬物方藏於中也故曰北方冬也陽盛則吁荼萬物而養之外也陰盛則呼吸萬物而藏之內也注吁荼氣出而温呼吸氣入而寒温則生寒則殺也故曰吁吸也者陰陽之交接萬物之終始御覽二十六時序部十一又藝文類聚三記纂淵海卷三節引又事類賦五中春辯秩東作中夏辯秩南譌中秋辯秩西成中冬辯在朔易周禮馮相氏注賈公彥疏云據書傳而言便秩東作史記五帝紀集解引尙書傳辯秩東作史記五帝紀索隱引尙書傳便在伏物史記五帝紀索隱引尙書傳分命和仲度西曰桺穀周禮縫人注賈疏云是濟南伏生書傳文寅餞入日辯秩西成傳曰天子以秋命三公將率選士厲兵以征不義決獄訟斷刑罰趣收斂以順天道以佐秋殺御覽二十四時序部九辯在朔易日短朔始也傳曰天子以冬命三公謹葢藏閉門閭固封境入山澤田獵以順天道以佐冬固藏也御覽二十六時序部十一案曰伏生尙書大傳引書日短下無星昴二字或傳寫失之或以日短斷句注否不也文選羽獵賦注引鄭元尙書大傳注案曰此疑否德之注孔子對子張曰男子三十而娶女子二十而嫁女二十而通織絍績紡之事黼黻文章之美不若是則上無以孝於舅姑下無以事夫養子也周禮媒氏疏無女二十而四字通典五十九嘉禮四又毛詩摽有梅正義婦人八歲僃數十五從嫡二十承事君子公羊隱七年解詁徐疏云書傳文孔子曰舜父頑母嚚不見室家之端故謂之鰥毛詩桃夭序正義引唐傳又尙書堯典正義通鑑前編帝堯七十載注堯典正義曰鰥者無妻之名不拘老少書傳以舜年尙少爲之說耳男三十而娶女二十而嫁書有鰥在下曰虞舜大戴禮本命篇盧辨注舜生姚墟風俗通山澤弟十謹案尙書云云姚墟在濟陰城陽縣案曰尙書無此文此葢尙書傳文昔舜耕于厯山陶于河濱注厯山在河東毛詩魏譜正義又尙書大禹謨正義注厯山在河東今有舜井水經瓠子水注御覽四十二地部七井作墓引鄭元云販于頓丘就時負夏史記五帝紀索隱又御覽八百二十九資產部九引上句舜漁于雷澤之中注雷夏沇州澤今屬濟陰史記五帝紀集解御覽七十二地部三十七又八百三十三資產十三引傳正月上日受終于文祖抂旋機玉衡以齊七政齊中也七政者謂春秋冬夏天文地理人道所以爲政也道正而萬事順成故天道政之大也旋機者何也傳曰旋者還也機者幾也微也其變幾微而所動者大謂之旋機是故旋機謂之北極受謂舜也上日元日御覽二十九時序部十四又史記五帝紀正義天官書索隱玉海天文上引大傳與此不同葢誤案曰隋書天文志引尙書攷靈曜璇璣中而星未中爲急急則日過其度月不及其㝛璇璣未中而星中爲舒舒則日不及其度月過其㝛璇璣中而星中爲調調則風雨時庶艸蕃蕪而百穀登萬事康也玉海天文門引此文首有昏明主時乃命中星者九字是書緯言抂旋機以定中星之法也注渾儀中筩爲旋機外規爲玉衡也史記天官書索隱引鄭元注大傳云萬物非天不生非地不載非春不動非夏不長非秋不收非冬不藏故書曰煙于六宗此之謂也注煙祭也字當爲禋馬氏以爲六宗謂日月星辰泰山河海也經曰肆類于上帝禋于六宗望秩于山川徧于羣神月令天子祈來年于天宗如此則六宗近謂天神也以周禮差之則爲星辰司中司命風師雨師也御覽十八時序部三儀禮經傳通解續二十六上因事之祭又御覽五百二十八禮儀部七績漢祭祀志中注北堂書鈔引並無注案曰注司中宋本御覽作司人非煙舊作湮路史餘論五云禋于六宗, WYG: ''}
