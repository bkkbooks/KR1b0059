  - {type: line-break, offset: 19004, content: '', id: KR1b0059_SBCK_001-29a02}
  - {type: variant, offset: 19008, length: 837, content: 圭不復少黜以地九年圭不復而地畢此所謂諸侯之朝於天子也義則見屬不義則不見屬禮書五十二又御覽八百六珍寶部五文獻通考節引畱其圭下有三年二字天子執瑁以朝諸侯見則覆之故圭瑁者天子所與諸侯爲瑞也瑞也者屬也諸侯執所受圭與璧以朝於天子無過者得復其圭以歸其國其餘有過者畱其圭能正行者復還其圭三年圭不復少絀以爵六年圭不復少絀以地九年圭不復而地削此謂諸侯之朝于天子也義則見屬不義則不見屬白虎通文質篇又路史後紀十二山堂考索演䌓露玉海竝節引古者巡守以遷廟之主行出以幣帛皮圭吿於祖遂奉以載於齊車每舍奠焉然後就舍反必吿奠卒斂幣玉藏之兩階之間蓋貴命也路史後紀十二疏仡紀有虞見諸侯問百年命大師陳詩以觀民風俗命市納賈以觀民好惡山川神祇有不舉者爲不敬不敬者削以地宗廟有不順者爲不孝不孝者黜以爵變禮易樂爲不從不從者君流改衣服制度爲畔畔者君討有功者賞之尙書曰明試以功車服以庸白虎通巡守篇注百年老成人見尊之之至也路史後紀十二疏仡紀有虞引鄭康成注云舜修五禮五玉三帛廣韻入聲二十陌帛字注以賢制爵以庸制祿故人愼德興功輕利而興義路史後紀十一陶唐氏三年一使三公絀陟公羊隱八年何休解詁疏云書傳文五年親自巡守巡猶循也狩猶守也循行守視之辭亦不可國至人見爲煩擾故至四嶽知四方之政而已公羊隱八年解詁𬞞云堯典文案曰堯典無此文蓋皆出伏生堯典傳疏脫傳字耳今附錄於此古之帝王必有命民能敬長矜孤取舍好讓者命於其君然後得乘飾車駢馬衣文錦未有命者不得衣不得乘乘衣者有罰後漢書王符傳注又藝文類聚舟車部引同惟無命於其君四字不得乘作不乘車又禮書卷十四引同未有命者作民之未命者又毛詩都人士正義禮記大學正義御覽八百十五布帛部二路史後紀十一並節引好讓下有舉事力三字注飾漆之駢併也周禮巾車疏引鄭注云注居士錦帶禮書十四引鄭氏釋之曰古者有命民有飾車駢馬衣錦禮記玉藻正義引唐傳云唐虞象刑而民不敢犯苗民用刑而民興相漸唐虞之象刑上刑赭衣不純中刑雜屨下刑墨幪以居州里而民恥之注純緣也時人尙德義犯刑者但易之衣服自爲大恥屨履也幪巾也使不得冠飾御覽六百四十五刑法部十一又文選求賢良詔注, WYG: 伐崇}
