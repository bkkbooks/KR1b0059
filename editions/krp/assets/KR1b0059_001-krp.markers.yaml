  - {type: variant, offset: 691, length: 442, content: 次國服三大夫服一士服一注元或疑焉禮書卷一又卷三案此注有闕又御覽六百九十服章部七注五采相錯非一色也隋書禮儀志引鄭􅏏議已非之云案曰續漢書輿服志孝明皇帝永平二年初詔有司采周官禮記尙書皋陶篇乘輿從歐陽氏說公卿以下從大小夏侯氏說又曰衣裳玉佩備章采乘輿刺繡公侯九卿以下皆織成又曰顯宗初服旒冕衣裳赤舄絇屨以祠天地養三老五更于三雍天子三公九卿特進侯侍祠侯祀天地明堂皆冠旋冕衣裳􅏏上纁下乘輿備文日月星辰十二章三公諸侯用山龍九章九卿以下用華蟲七章皆備五采後漢書明帝紀永平二年注引董巴輿服志日顯宗初服冕衣裳以祀天地衣裳以􅏏上纁下乘輿備文日月星辰十二章三公諸侯用山龍九章卿已下用華蟲七章皆五色采乘輿刺繡公卿已下皆織成陳留襄邑獻之徐廣車服注曰漢明帝案古禮備其服章天子郊廟衣皂上絳下前三幅後四幅衣畵而裳繡然則顯宗更定服章所謂從歐陽夏侯說卽此是也然書傳之文無日月星辰而云天子服五何與陳祥道禮書卷三引尙書大傳山龍靑也宗彝白藻火赤陳氏辨之曰大夫之服自􅏏冕而下士之服自皮弁而下固無藻火山龍矣旣日子男宗彝藻火山龍士山龍又曰, WYG: ''}
