  - {type: variant, offset: 4092, length: 0, content: '', WYG: 注引大傳河色黄赤衆川之流葢濁之積也百里一小曲千里一大曲一直非水無以准萬物之平非水無以通道任重也下而平者謂之隰隰之猶言濕也往古之時四極廢九州裂於是女媧殺黒龍以祭冀州鄭𤣥曰冀州取地以為名也其地有險有易帝王所都亂則冀治弱則冀强荒則冀豐也東原底平大而髙平者謂之太原郡取稱焉水經注引大傳堯南撫交趾於禹貢荆州之南垂幽荒之外故越也水經注㳙一作洧盤之水出崦嵫山禺鐵在遼西索隠今文尚書滎播既都今文被明都今文文皮千合索隠數兩謂之合也予辛壬娶塗山癸甲生啟索隠曰葢今文尚書百川趨於海大水小水東流洶洶礚礚皆水聲也文選注夏成五服外薄四海東海魚須魚目南海魚革珠璣大貝西海魚骨魚幹魚脅北海魚釼魚石出填擊閭河魭江鱓大龜五湖元唐鉅野蓤鉅定嬴濟中瞻諸孟諸靈龜隆谷一作隂谷大都魚魚刀青丘青䨼丹丘丹雘此二句山海經廣注引大傳咸㑹於中}
