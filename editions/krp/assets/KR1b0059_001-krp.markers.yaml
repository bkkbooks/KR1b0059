  - {type: line-break, offset: 89, content: '', id: KR1b0059_SBCK_001-1a08}
  - {type: variant, offset: 102, length: 0, content: '', WYG: 公羊疏云書傳文矜寡孤獨天民之窮而無告者皆有常餼詩疏唐虞象刑而民不敢犯苗民用刑而民漸興犯唐虞之象刑上刑赭衣不純中刑雜屨下刑墨幪公羊疏引唐傳今入虞傳鄭𤣥曰純縁也時人尚徳義犯刑者但易之衣服自為大恥屨履也幪巾也使不得冠飾子張曰堯舜之聖}
  - {type: page-break, offset: 102, content: '', id: KR1b0059_WYG_001-12b, image: WYG0068/WYG0068-0392b.png}
  - {type: variant, offset: 103, length: 1, content: 適, WYG: 人不刑而天下治何則教誠而愛深也一夫而被此五刑子龍子曰未可謂能為書孔子不然也五刑有此教路史注引大傳子贛曰堯舜之王一人不刑而天下冶敬誠而愛深也鄭𤣥曰二人俱罪吕侯之説刑也被此五刑喻犯數罪也故子曰教然耳犯數罪猶以上一罪刑之子曰古之聼民者有過必赦小罪勿増大罪勿纍老弱不受刑有過不受罰是故老而受刑}
  - {type: variant, offset: 106, length: 19, content: 攸好德注適猶得也注見後漢書蔡邕傳注再適, WYG: 悖弱而受刑}
  - {type: 'kr:newline', offset: 109, content: '

