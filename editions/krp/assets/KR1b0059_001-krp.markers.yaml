  - {type: variant, offset: 195, length: 7, content: 經傳通解集注三, WYG: 也謂祭太室禮堯為舜賔之也衍猶溢也言堯之禪天下至於今其徳義溢於四海也縵縵教化廣逺也復旦明明相代也藂藂言和氣相應也}
