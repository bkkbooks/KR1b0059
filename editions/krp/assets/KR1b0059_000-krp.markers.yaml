  - {type: variant, offset: 701, length: 0, content: '', WYG: 卷仍舊名也至伏生之四十一篇與康成銓次之八十三篇之文篇目既亡孰從而詢焉虞書三五傳燧人以火紀陽也陽尊故托燧皇於天伏羲以人事紀故托羲皇於人盖天非人不因人非天不成也神農悉地力植穀故託農皇於地天地人之道偹而三五之運興矣燧人為燧皇以火紀官藝文類聚伏羲氏作八卦路史注伏羲氏没神農氏作神農氏没黄帝堯舜氏作羅璧識遺黄帝者光也厚也中和之色徳施四序與地同功故先黄以别之也風俗通顓者順也頊者信也慤也言其承文治之以質使天下遵化皆貴真慤也嚳者考也成也言其考明法度美譽醇然若酒之芬香也堯者髙也明也言其隆興煥炳最髙明也舜者准也循也言其准行道以循堯緒也禹者輔也輔續舜後庶績洪茂自堯以上王者子孫據國而紀功徳浸盛故造諡舜禹本以白衣砥美行顯名升為天子雖復制諡不如名著故因名焉湯者攘也言其攘除不軌改亳為商成就王道天下熾昌文武皆以其長能擅國之謂王能制殺生之威之謂王唐傳克明峻徳苟子書曰克明明徳以親九族九族既睦陳思工表引傳辯章百姓索隠引今文尚書歐陽説云九族乃異姓有親屬者父族四母族三妻族二鄭𤣥曰辯别也章明也神農始治農功正節氣審寒温以為蚤晚之期故立歴名一作日容成作歴黄帝命容成造葢天儀日者陽徳之母陽外發故日以晝明名曰曜靈月羣隂之宗光内影以宵曜名曰夜光主春者張昏中可以種稷一作穀主夏者火昏中可以種黍主秋者虚昏中可以種麥主冬者􅄧昏中可以収斂葢藏畋獵斷伐當告於天子而天子賦之民故天子南面而視四星之中知民之緩急急則不賦籍不舉力役故曰敬授民時此之謂也周}
