body:
  text: 附荀子堯問篇伯禽將歸于魯周公謂伯禽之傅曰女將行盍志而子美德乎對曰其爲人寛好自用以愼此三者其美德已周公曰嗚乎以人惡爲美德乎君子好以道德故其民歸道彼其寛也出無辨矣女又美之彼其好自用也是所以窶小也君子力如牛不與牛爭力走如馬不與馬爭走知如士不與士爭知彼爭者均者之氣也女又美之彼其愼也是其所以淺也聞之曰無越踰不見士見士問曰無乃不察乎不聞卽物少至少至則淺彼淺者賤人之道也女又美之吾語女我文王之爲子武王之爲弟成王之爲叔父吾於天下不賤矣然而吾所執贄而見者十人還贄而相見者三十人貎執之士百有餘人欲言而請畢事者千有餘人於是吾僅得三士焉以正吾身以定天下吾所以得三士者亾於十人與三十人中乃在百人與千人之中故上士吾薄爲之貎下士吾厚爲之貌人人皆以我爲越踰好士然故士至士至而後見物見物然後知是非之所在戒之哉女以魯國驕人幾矣夫仰祿之士猶可驕也正身之士不可驕也彼正身之士舍貴而爲賤舍富而爲貧舍佚而爲勞顏色黎黑而不失其所以是以天下之紀不息文章不廢也召誥成王在豐欲宅洛邑使召公先相宅六曰乙未曲阜孔廣林曰六日上當有脫文王朝步自周則至于豐惟太保先周公相宅注太保召公先周公視洛邑也太平御覽二百六職官部四洛誥書曰乃女其悉自學功悉盡也學效也傳曰當其效功也於卜洛邑營成周改正朔立宗廟序祭祀易犧牲制禮樂一統天下合和四海二句又見文選求自試表注而致諸侯皆莫不依紳端冕以奉祭祀者注紳大帶也其下莫不自悉以奉其上者莫不自悉以奉其祭祀者此之謂也盡其天下諸侯之志而效天下諸侯之功也廟者貌也以其貌言之也二句又見藝文類聚三十八禮部上宫室中度衣服中制犧牲中辟注辟法也殺者中死割者中理搙弁者爲文注搙弁或爲振非當言拚帚爨竃者有容椓杙者有數注杙者繋牲者也太廟之中繽乎其猶模繡也注言文章之可觀也模所㭬文章之範天下諸侯之悉來進受命於周而退見文武之尸者千七百七十三諸侯注八州州二百一十國畿内九十三國此周所因於殷九州諸侯之數天下諸侯以下又見周禮大司徒疏禮記王制正義並引作浴誥傳又見通鑑地理通釋一詩考𥙷遺皆莫不磬折玉音金聲玉色注玉音金聲言宏殺之調也二句又見文選西都賦咏懷詩箜篌引七啟四子講德論等注然後周公與升歌而弦文武注與諸侯升歌文王武王之德又以琴瑟播之諸侯在廟中者伋然淵其志和其情注伋讀曰播播然變動貌案曰注播當爲憣字之誤愀然若復見文武之身然後曰嗟子乎此葢吾先君文武之風也夫注子成王也案曰王侍郞伯申經義述聞云嗟子猶嗟咨注釋子爲成王非其義也及執俎抗鼎執刀執匕者負廧而歌憤於其情發於中而樂節文注卑賤者尙然而况尊貴者乎故周人追祖文王而宗武王也是故周書自大誓就召誥而盛於洛誥也故其書曰揚文武之德烈奉對天命和恆萬邦四方民是以見之也孔子曰吾於洛誥見周公之德光明於上下勤施四方㫄作穆穆至於海表莫敢不來服莫敢不來享以勤文王之鮮光以揚武王之大訓而天下大治故曰聖之與聖也猶規之相周矩之相襲也注聖言太祖儀禮經傳通解續二十九祭義全引傳注末三句又見文選皇太子釋奠詩注祭者察也至也言人事至於神也唐王涇大唐郊祀錄卷一注祭之爲言察也察者至也至者人事至也人事至然後祭祭者薦也薦之爲言在也在也者在其道也注禮志曰齋之日思其居處思其笑語思其志意思其所樂思其所耆齋三日乃見其所爲齋者祭之日入室僾然必有見乎其位周旋出戸肅然必有聞乎其容聲出戸而聽愾然必有聞乎其嘆息之聲是之謂至禮志曰君子生則敬養死則敬饗思終身不忘是之謂在其道太平御覽五百二十四禮儀部三引尙書大傳周傳全又儀禮經傳通解續祭義全引傳注又藝文類聚禮部上夏后氏迎於廟庭殷人迎於堂周人迎於戶公羊傳隱二年疏古者處師八家而爲鄰三鄰而爲朋三朋而爲里五里而爲邑十邑而爲都十都而爲師州十有二師焉注州凡四十三萬二千家此蓋虞夏之數也太平御覽百五十七州郡部三又禮記雜記正義節引傳注云洛誥傳又藝文類聚八州郡部初學記州郡部廣韻長安志卷二節引又玉海二十地理戸口引此注云洛誥家不盈三口者不朋由命士以上不朋注或云黃帝法玉海二十地理戸口八家爲鄰三鄰爲閭三閭爲里五里爲邑華嚴經第六十七音義卷下末有此虞夏之制也六字蓋音義之文案曰此朋字作閭疑誤周公攝政一年救亂二年克殷三年踐奄四年建侯衞五年營成周六年制禮作樂七年致政成王隋書李德林傳又通鑑外紀卷三又尙書康誥正義毛詩邶鄘衞譜豳風譜王城譜周頌譜淸廟序等正義周禮序官疏禮記明堂位正義通鑑前編成王五年通志詩地理考並分引二年克殷注誅管蔡及祿父等也毛詩邶鄘衞譜正義多士古者百里之國三十里之遂二十里之郊九里之城三里之宫七十里之國二十里之遂九里之郊三里之城一里之宫五十里之國九里之遂三里之郊一里之城以城爲宫遂郊之門執禁以譏異服譏異言注􅏏或疑焉周禮匠人營國方九里謂天子城也今大國九里則與天子同春秋傳曰中五之一小九之一以此推說小國大都之城方百步中都之城六十步小都之城三十二步三分之一非也然則大國七里之城次國五里之城小國三里之城焉爲近可也或者天子實十二里之城諸侯大國九里次國七里小國五里儀禮經傳通解王制之己集傳集注三十三全引傳注傳末十三字或誤入注非又禮書二十四引傳至以城爲宫止引注至末中有脫文又禮記王制正義節引云伏生多士傳文又毛詩文王有聲正義周禮典命疏左傳隱元年正義並節引傳注周禮疏引作無逸傳誤又見通典五十三天子之堂廣九雉三分其廣以二爲内五分内以一爲高東房西房北堂各三雉以上又見禮記明堂位正義引作多士傳公侯七雉三分其廣以二爲內五分內以一爲高東房西房北堂各二雉伯子男五雉三分其廣以二爲内五分內以一爲高東房西房北堂各一雉士三雉三分其廣以二爲內五分內以一爲高有室無房堂自首至此又見儀禮釋宮注注廣榮間相去也雉長三丈內堂東西序之內也高穹高也今士禮有房此云無房堂也其桷天子斲其材而礱之加密石焉二句又見毛詩閟宫正義禮記本脱其材而礱加密石焉八字今補大夫達稜士首本庶人到加注礱礪之也密石砥之也稜菱也天子賁庸注賁大也墻謂之庸大牆正直之牆天子賁庸至此傳注又見初學記二十四居處部太平御覽百八十七居處部十五節引注末句並作大牆正直也諸侯疏杼注疏猶衰也杼亦牆也言衰殺其上下不得正直大夫有石材注柱下礩也御覽百八十八居處部十六引注柱上多石材二字應補庶人有石承注當柱下而已不外出爲飾也御覽居處部十六引注當上多石承二字應補自首天子之堂至末傳注禮書四十三全引又朱子文集亦引多士傳案曰漢書􅏯錯傳家有一堂二內張晏注二內二房也論衡别通篇富人之宅以一丈之地爲內貧人之宅亦以一丈爲內此與大傳說內之義甚明王伯申侍郞經義述聞曰詩唐風山有樞篇子有廷內大雅抑篇洒掃廷內廷謂中廷內謂堂與室也周官寺人王之正內五人夏小正傳曰燕操泥而就家八人內此皆兼堂室而言之者也尙書大傳天子堂廣九雉三分其廣以二爲內二分其內以一爲高漢書􅏯䥘傳家有一堂二內史記封禪書有芝生殿房內中續外戚世家女亾匿內中牀下論衡以一丈之地爲內吉驗篇曰光武帝生於濟陽宫後殿第二內中此皆專指室而言之者也案又曰禮記禮器鄭注宫室之飾士首本大夫達稜諸侯斲而礱之天子加密石焉正義引禮緯合文嘉云大夫達稜謂斲爲四稜以達兩端士首本者士斲去木之首本令細與尾頭相應尙書大傳所言天子斲其材而礱之云云本之國語晉語又與禮緯合也然鄭君注大傳以菱訓棱與孔異義案大傳庶人到加到古倒字加當爲茄爾雅荷芙蕖其莖茄其本蔤文選西京賦曰蔕倒茄於藻井披紅葩之狎獵魯靈光殿賦曰圓淵方井反植荷蕖景福殿賦曰茄蔤倒植吐被芙蕖魏都賦曰綺井列疏以懸蒂華蓮垂葩而倒披李善引薛綜西京賦舊注曰以其莖倒植於藻井其華下向倒披又引風俗通曰今殿作天井井者東井之象也淮南子本經訓木巧之飾菱杼紾抱高誘注菱杼采實紾戾也抱轉也皆壯采相銜貌也案抱當爲軳廣雅軫軳轉戾也淮南子又曰橑檐榱題雕琢刻鏤喬枝菱阿夫容芰荷五采爭勝流漫陸離高誘注阿曲屋夫容蕅華也芰菱角交萏也荷夫蕖也據此達菱倒茄爲一類皆宫室之飾殿作天井以象東井菱茄水中之物所以示厭火天子宫殿施於藻井大夫以下惟施於桷而已庶人無垂葩之飾也書傳注義自可通又案漢書揚雄傳反離騷注師古曰茄亦荷字見張揖古今字詁毋逸案曰困學紀聞卷二云高宗亮陰大傳作梁闇書曰高宗梁闇三年不言何謂梁闇也傳曰高宗居倚廬三年不言百官總已以聽於冡宰而莫之違此之謂梁闇子張曰何謂也孔子曰古者君薨王世子聽於冡宰三年不敢服先王之服履先王之位而聽焉以民臣之義則不可一日無君矣不可一日無君猶不可一日無天也以孝子之隱乎則孝子三年弗居矣注隱痛也字或爲殷故曰義者彼也隱者此也遠彼而近此則孝子之道僃矣儀禮經傳通解續十五喪禮義引傳又卷五喪大記上引注案曰晉書二十禮志杜預等議喪服云至周公旦乃稱殷之高宗諒闇三年不言其傳曰諒信也闇黙也預所引書字作諒闇則古文尙書也所引傳解諒闇與大傳異則古文家說也論語作諒陰集解引孔安國注與預正同今僞孔書傳乃與之合豈僞孔襲用古文家說與禮記作諒闇鄭注以爲凶廬從大傳義高宗有親喪居廬三年然未嘗言國事而天下無背叛之心者何也及其爲太子之時盡以知天下人民之所好惡是以雖不言國事也知天下無背叛之心太平御覽百四十六皇親部十二揜誥案曰困學紀聞云大傳之序有揜誥曲阜孔廣林曰案百篇無揜誥疑揜卽奄也成王旣踐奄作成王政揜誥其卽成王政與壽祺案孔君此說甚善然竟以毛詩破斧正義所引大傳遂踐奄云云入此篇恐非今不從而以遂踐奄以下之文入金縢傳殺公子祿父下較合周傳古之帝王者必立大學小學注禮志曰小學在公官之左大學在郊使王太子王子羣后之子以至公卿大夫元士之適子十有三年始入小學見小節焉踐小義焉年二十入大學見大節焉踐大義焉故入小學知父子之道長幼之序入大學知君臣之義上下之位小師取小學之賢者登之大學大師取大學之賢者登之天子天子以爲左右注天子當爲太子禮志曰周公居攝踐祚而治亢世子法於伯禽使之與成王居欲使成王之知父子君臣長幼之義所以善成王也太平御覽百四十八皇親部十二又禮書四十八四十九御覽六百十三學部七大戴禮保傳注禮記王制正義節引尙書周傳各小異案曰禮記王制正義引尙書周傳云王子公卿大夫元士之適子十五入小學二十入大學是周傳有此文也大戴禮保傳注引白虎通曰八歲入小學十五入大學此太子之禮尙書大傳曰公卿之太子大夫元士之適子年十三始入小學見小節而履小義年二十入大學見大節而踐大義此世子入學之期也又曰十五入小學十八入大學謂諸子晚成者至十五入小學其早成者十八入大學盧辨此注分引書傳而疏通之最爲明晰其書傳後一條十五入小學云云禮記王制正義亦引以爲書傳略說文則與周傳兩篇分見審矣大戴注引公卿之太子云云御覽學部七儀禮經傳通解學制所引並同而王制正義與御覽皇親部兩引又各異今從御覽皇親部而他書異同附識於此使公卿之太子大夫元士之適子十有三年始入小學見小節焉踐小義焉年二十入大學見大節焉踐大義焉故入小學知父子之道長幼之序入大學知君臣之義上下之位故爲君則君爲臣則臣爲父則父爲子則子儀禮經傳通解卷九學制第十六引多末十六字多方古者十稅一多於十稅一謂之大桀小桀少於十稅一謂之大貊小貊王者十一而稅而頌聲作矣故書曰越維有胥賦小大多政困學紀聞卷二又文選報孫會宗書注引王者什一而稅臩命案曰漢藝文志攷證一大傳冏命爲臩命鮮誓案曰史記魯世家作肸誓索隱云大傳作鮮誓困學紀聞卷二云費誓說文作史記作肸大傳作鮮擭捕獸機檻經典釋文禮記中庸音義甫刑案曰漢藝文志攷證一大傳以呂刑爲甫刑有虞氏上刑赭衣不純中刑雜屨下刑墨􅞲以居州里而民恥之案曰路史後紀十一陶唐紀注引唐傳又云甫刑傳以三刑爲有虞氏者非案曰荀子正論篇曰世俗之爲說者曰治古無肉刑而有象刑墨黥楊倞注或曰墨黥當爲墨􅞲但以墨巾蒙其頂而已慅嬰注當爲澡纓謂澡濯其布爲纓禮記曰緦冠澡纓澡或讀爲草愼子作草纓也共艾畢注共未詳或衍字耳艾蒼白色畢與韠同紱也所以蔽前君以朱大夫素士爵韋令罪人服之故以蒼白色爲韠也菲對屨注對當爲䋽䋽枲也愼子作䋽對或作蒯殺赭衣而不純注純音準殺所介反治古如是是不然路史後紀十二注引愼子曰有虞氏之誅也以畫跪當黥以草纓當劓以履䋽當刖以艾畢當宮布衣無領以當大辟謂之戮上世用戮而民不犯羅氏曰畫跪一作􅞲巾履䋽一作菲履艾畢韠也草纓荀作慅黥墨刑也與甫刑傳之說不同布衣無領卽赭衣不純路史後紀陶唐紀謂而民恥之唐傳作而反於禮甫刑傳以三刑爲有虞氏者非又引愼子與甫刑傳之說不同是甫刑傳有有虞氏三刑之文甚明且末句唐傳作而反於禮則甫刑傳作而民恥之又明矣今據補入甫刑傳子張曰堯舜之王一人不刑而天下治何則敎誠而􅋢深也以上又見路史後紀十一陶唐紀子張作子貢曰下有傳云二字今一夫而被此五刑子龍子曰未可謂能爲書注二人俱罪甫侯之說刑也被此五刑喻犯數罪也孔子曰不然也五刑有此敎注敎然耳犯數罪猶以上一罪刑之太平御覽六百三十五刑法部一又御覽八十皇王部五引首二句案曰荀子議兵篇古者帝堯之治天下也葢殺一人刑二人而天下治此傳云一人不刑而天下治卽虞夏傳所謂唐虞象刑而民不犯之意也古者中刑用鑽鑿御覽七百六十四器物部九夏刑三千條唐律疏義卷一玉海律令引長孫無忌唐律疏夏后氏不殺不刑死罪罰二千饌史記平準書索隱禹之君民也罰弗及強而天下治一饌六兩注所出金鐵也死罪出三百七十五斤用財少爾路史後紀十三夏后氏紀引甫刑傳案曰饌他本作鐉非惟震澤王氏史記本不誤案又曰鄭注三百七十五斤適合千饌六千兩之數今文經云大辟疑赦其罰千率史記索隱引大傳死罪罰二千饌二字當衍決關梁踰城郭而略盜者其刑髕男女不以義交者其刑宫觸易君命革輿服制度奸軌盜攘傷人者注攘竊也其刑劓非事而事之注令原作今誤今改所不當爲也以上注見御覽刑法部十四出入不以道義而誦不詳之辭者其刑墨降叛冦賊刼略奪攘矯䖍者其刑死周禮司刑注又太平御覽百四十八刑法部十四引至其刑墨止詳作祥㚥軌盜攘作奸凶攘傷案曰其刑髕諸書引作臏惟華嚴經第七十三音義卷下引傳首三句作髕音義云字從骨今依改又尙書吕刑正義毛詩召旻正義北堂書鈔並節引孔子曰古之刑者省之今之刑者䌓之其敎古者有禮然後有刑是以刑省也今也反是無禮而齊之以刑是以䌓也書曰伯夷降典禮折民以刑謂有禮然後有刑也又曰兹殷罰有倫今也反是諸侯不同聽注聽議獄也每君異法聽無有倫是故知法難也御覽六百三十五刑法部一又孔子集語卷下引至是以䌓也止案曰孔叢用此文諸侯不同聽聽作德其義長疑注聽議獄也四字當在傳文聽無有倫之下子曰吳越之俗男女同川而浴其刑重而不勝由無禮也中國之敎内外有別男女不同椸架不同巾櫛其刑重而勝由有禮也語曰夏后氏不殺不刑罰有罪而民不輕犯孔子集語卷下子曰今之聽民者求所以殺之古之聽民者求所以生之不得其所以生之之道乃刑殺君與臣會焉孔子集語卷下案曰孔叢用此文漢書刑法志引孔子曰今之聽獄者四句不言大傳子曰古之聽民者察貧窮哀孤獨矜寡宥老幼不肖無吿有過必赦小過勿增大罪勿纍注延罪無辜曰纍注見御覽刑法部一又刑法部十八老弱不受刑有過不受罰是故老而受刑謂之悖弱而受刑謂之暴不赦有過謂之賊率過以小謂之枳孔子集語卷下又御覽六百三十五刑法部一引有過至謂之賊案曰孔叢用此文故與其殺不辜寕失有罪與其增以有罪寕失過以有赦御覽六百五十二刑法部十八聽訟之術大略有三治必寬寬之術歸於察察之術歸於義注祭猶審也是故聽而不寬是亂也寬而不察是慢也古之聽訟者言不越辭辭不越情是故聽民之術怒必思兼思意小罪勿兼注怒責也責囚之罪必思意兼謂思其辭思其義思義罪小可求以出之罪也御覽六百三十九刑法部五案曰孔叢用此文辭不越情下有情不越義一句子曰聽訟者雖得其情必哀矜之死者不可復生􅍘者不可復續也孔子集語卷下案曰孔叢用此文書曰哀矜哲獄困學紀聞卷二獄貨非可寶也然後寶之者未能行其法者也貪人之寶受人之財未有不受命以矯其上者也親下以矯其上者未有能成其功者也御覽六百四十一刑法部七子夏曰昔者三王慤然欲錯刑遂罰注錯處也遂行也平心而應之和然後行之然且曰吾意者以不平慮之乎吾意者以不和平之乎如此者三然後行之此之謂愼罰御覽六百三十五刑法部一孔子如衞人謂曰公甫不能聽訟注公甫魯大夫子曰非公甫之不能聽獄也注答而反之公甫之聽獄也有罪者懼無罪者恥民近禮矣御覽六百三十九刑法部五非字作不知從孔子集語卷下引改集語無公甫之聽獄也六字君子之於人也有其語也無不聽者皇於聽獄乎注皇猶况也必盡其辭矣聽獄者或從其情或從其辭案曰孔叢用此文大夫有汙豬之宫殺君之地雖有美菜有義之士弗食藝文類聚八十二草部下御覽九百七十六菜部一尙書大傳卷四受業嘉應吳蘭修校
