front:
  text: 尙書大傳卷四大誥書曰民儀有十夫困學紀聞卷二周公先謀於同姓同姓從謀於朋友朋友從然後謀於天下天下從然後加之蓍龜是以君子聖人謀義不謀不義故謀必成卜義不卜不義故卜必吉以義擊不義故戰必勝是以君子聖人謀則吉戰則勝太平御覽四百五十人事部九十一又六藝流別卷二十金縢案曰葉夢得云伏生大傳以天地四時爲七政以金縢作於周公殁後武王殺紂毛詩邶鄘衞譜正義引此下有立武庚三字而繼公子祿父注繼者以武庚爲商後也使管叔蔡叔監祿父注不及霍叔者葢赦之也武王死成王幼周公盛養成王注盛猶長也使召公奭爲傅周公身居位聽天下爲政通鑑前編引爲作之管叔疑周公毛詩邶鄘衞譜豳風破斧正義左傳定四年正義並引此傳管蔡流言是管叔下當有察叔二字御覽無之宜据詩疏增流言于國曰公將不利于王奄君薄姑注元或疑焉薄姑齊地非奄君名也謂祿父曰武王旣死矣今王尙幼矣毛詩左傳正義引此句作成王幼周公見疑矣此世之將亂也毛詩左傳正義引此句作百世之時也請舉事注言周弱且不和欲伐之而復政也然後祿父及三監叛也周公以成王之命殺祿父太平御覽六百四十七刑法部十三又御覽封建部四四夷部一刑法部七毛詩邶鄘衞譜豳風破斧齊譜左傳定四年諸正義通鑑前編成王二年釋史二十二遂踐奄踐之云者謂殺其身執其家瀦其官毛詩豳風破斧正義經典釋文成王政序下案曰曲阜孔氏廣林本以遂踐奄云云人成王政篇恐非成王幼在襁褓毛詩斯干正義引書傳說成王之幼云在襁褓褓小兒被也案曰在襁褓三字當在上傳成王幼之下周公致政封魯老于周心不敢遠成王欲事文武之廟公疾曰吾死必葬成周示天下臣於成王及死成王葬之畢而云示天下不敢臣故公封於魯身未嘗居魯路史後紀十高辛紀下注又詩地理考五引周公封於魯未嘗居魯也案曰荀子儒效篇周公歸周反籍於成王而天下不輟事周楊倞注周公所封畿内之國亦名周春秋周公黑肩葢其後也言周公自歸其國也此周公老於周之事三年之後此句上當依路史所引增周公致政封魯六字周公老于豐心不敢遠成王而欲事文武之廟然後周公疾曰吾死必葬於成周示天下臣於成王成王曰周公生欲事宗廟死欲聚骨於畢畢者文王之墓也故周公薨成王不葬於成周而葬之於畢示天下不敢臣也所以明有功尊有德故忠孝之道咸在成王周公之間故魯郊成王所以禮周公也通鑑前編成王十一年又儀禮經傳通解續卷五喪大記上注節引周公疾曰吾死必葬於成周示天下臣於成王也周公死案曰此下當依儒林傳注增成王欲葬之於成周八字天乃雷雨以風禾盡偃大木斯抜國恐案曰當依漢書儒林傳注引作國人大恐王與大夫開金縢之書執書以泣曰周公勤勞王家子幼人弗及知乃不葬於成周而葬之於畢示天下不敢臣漢書梅福傳注周公死成王欲葬之於成周天乃雷雨以風禾盡偃大木斯拔國人大恐王乃葬周公於畢示不敢臣也漢書儒林傳注又後漢書張奐傳注雨作電嘉禾案曰漢藝文志攷證云大傳序又有嘉禾揜誥今本闕成王之時有三苗貫桑葉而生同爲一穗其大盈車長幾充箱民得而上諸成王尙書歸禾序正義成王時有苗異莖而生同爲一穟人有上之者王召周公而問之公曰三苗爲一穟抑天下共和爲一乎果有越裳氏重譯而來太平御覽八百三十九百穀部三又初學記二十七草部又記纂淵海卷四引並無末九字記纂作異畞同穗初學記穟並作穗拔而貢之尙書歸禾序正義案曰尙書正義引成王之時云云又引下傳云拔而貢之其文不僃今盧本大傳有越裳氏上有拔而貢之文王之廟八字記纂淵海卷四引孫氏瑞應圖曰周時嘉禾三本同穗貫桑而生其穗盈箱生於唐叔之國以獻周公曰此嘉禾也太和氣之所生焉此文王之德乃獻文王之廟據此則大傳當有拔而貢之文王之廟之語而書疏僅存上四字餘無所徵因錄瑞應圖之文以僃攷記纂淵海又引大傳嘉禾莖長五尺三十五穗恐非大傳文不錄交阯之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻白雉曰道路悠遠山川阻深音使不通故重譯而朝成王以歸周公公曰德不加焉則君子不饗其質注質亦贄也政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黃耉曰久矣天之無烈風澍雨意者中國有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦於宗廟周德旣衰於是稍絕太平御覽七百八十五四夷部六又御覽天部九後漢書馬融傳注文選王元長曲水詩序注事類賦三成王之時越裳重譯而來朝曰道路悠遠山川阻深恐使之不通故重三譯而朝也注鄭元曰欲其轉相曉也文選應吉甫華林園集詩注案曰御覽引但云重譯文選應吉甫詩注引作重三譯王元長文注引作重九譯周公辭不受曰正朔不施則君子不臣也通典七十四賓禮一正朔所不加君子所不臣白虎通卷三王者不臣篇周公謂越裳之譯曰德澤不加焉則君子不享其質政令不施焉則君子不臣毛詩臣工正義案詩疏引此較御覽多澤字令字惟白虎通通典引政令作正朔當是傳本各異久矣天之無烈風澍雨注暴雨也御覽十天部十案曰御覽天部一本引作天之無烈風東西南北來也下六字當是注文誤入傳案又曰劉勰文心雕龍云尙書大傳別風淮雨帝王世紀作列風淫雨列淫義當而不奇别淮理違而新異乃謂大傳字作別淮攷御覽先引尙書說曰淮雨注淮暴雨之名也下又引尙書大傳曰久矣天之無烈風澍雨注暴雨也兩書兩注各不同則尙書說非伏氏大傳而大傳作澍不作淮明矣御覽四夷部六又引作注字此寫誤也藝文類聚天部引作烈風迅雨亦非而烈字諸書不異鄭君亦無注則大傳作烈不作別又明矣恐彥和適見誤本大傳執以爲說未可據也尙書舜典正義毛詩蓼蕭序周頌譜正義並引作烈風淫雨則唐人因彥和之語改從帝王世紀並易澍爲淫耳毛詩周頌譜正義引越裳作越常裳常古通疑大傳舊本如此康誥周公將作禮樂優游之三年不能作君子恥其言而不見從恥其行而不見隨將大作恐天下莫我知也將小作恐不能揚父祖功業德澤然後營洛以觀天下之心於是四方諸侯率其羣黨各攻位於其庭周公曰示之以力役且猶至况導之以禮樂乎然後敢作禮樂書曰作新大邑于東國洛四方民大和會此之謂也毛詩周頌譜正義又禮記明堂位正義尙書康誥正義文選聖主得賢臣頌注並節引書曰惟乃丕顯考文王克明俊德困學紀聞卷二天之命文王非啍啍然有聲音也文王在位而天下大服施政而物皆聽命則行禁則止動搖而不逆天之道故曰天乃大命文王文王受命一年斷虞芮之質二年伐于三年伐密須四年伐畎夷五年伐耆六年伐崇七年而崩通鑑外紀卷二又毛詩文王序正義引文王受命至末云尙書周傳又尙書戡黎正義又通鑑前編紂十七祀引文王受命至伐崇又文選褚淵碑文注毛詩緜皇矣二雅譜正義左傳襄三十一年正義禮記文王世子正義並節引畎從皇矣正義作禮記正義邘作鬼方誤注畎夷混夷也詩云混夷駾矣四年伐之南仲一行并平二冦毛詩采薇序正義案曰毛詩皇矣正義云混夷書傳作畎夷蓋畎混聲相近或作犬夷則畎字之省也二雅譜正義引作昆夷禮記文王世子正義引作鬼方並誤案又曰通鑑前編紂十有八祀西伯伐邘注引徐廣曰邘城在野王縣西北大傳作于然則大傳邘字作于也史記集解引徐廣說下云音于是史記本作邗不作䢴諸家引並作䢴非子夏曰昔者三王慤然欲錯刑遂罰注錯處也遂行也平心而應之和然後行之然且曰吾意者以不平慮之乎吾意者以不和平之乎如此者三然後行之此之謂愼罰太平御覽六百三十五刑法部一酒誥天子有事諸侯皆侍尊卑之義注事謂祭祀儀禮特牲饋食疏引書傳康誥云曲阜孔廣林云儀禮疏康當爲酒之誤宗室有事族人皆侍終日大宗已侍於賓奠然後燕私案曰儀禮特牲疏云大宗已侍於賓奠者或有作𧃊或有作餕皆誤以奠爲正也注謂卿大夫以下宗室大宗子之家也禮志云别子爲祖繼別爲大宗繼禰爲小宗賓僚友助祭者燕私者何也祭已而與族人飮也儀禮經傳通解卷五五宗傳第七引傳及注又儀禮特牲鄭注毛詩湛露正義尙書酒誥正義並引傳儀禮特牲疏亦引傳及注宗子燕族人於堂宗婦燕族人於房序之以昭穆儀禮喪服不杖章疏不醉而出是不親也注出猶去也醉而不出是媟宗也出而不止是不忠也注忠厚親而甚敬忠而不倦若是則兄弟之道僃僃者成也成者成於宗室也故曰飮而醉者宗室之意也德將無醉族人之意也是故祀禮有讓德施有復義之至也注復反也儀禮經傳通解卷五五宗第七引傳注連上宗室有事至族人飮也爲一條古者聖帝之治天下也五十以下非蒸社不敢遊飮在六十以上遊飮也大戴禮四曾子立事篇盧注王曰封惟曰若圭璧困學紀聞卷二漢藝文志攷證一案曰王伯厚以此傳八字爲尙書之逸文考今文與古文章句多寡異同非止一二酒誥篇有王曰封我聞惟曰在昔殷先哲王之語大傳所引疑或此處之異文未必爲逸句也梓材案曰金履祥尙書表注案大傳今文當有周公曰而無封字又云梓材伏生今文作周公敎伯禽之書通鑑前編成土七年載梓材云按伏生今文當作周公曰而無封字又云按梓材之書伏生大傳以爲周公命伯禽之書又云梓材之事伏生誤以爲周公命伯禽之書大傳所說喬梓之事固非梓材之本意然以爲周公命伯禽之書則篇首當有周公曰之語無王曰封之語矣伯禽與康叔見周公三見而三笞之康叔有駭色謂伯禽曰有商子者賢人也與子見之乃見商子而問焉商子曰南山之陽有木焉名喬二三子往觀之見喬實高高然而上反以告商子商子曰喬者父道也南山之陰有木焉名梓二三子復往觀焉見梓實晉晉然而俯反以吿商子商子曰梓者子道也二三子明日見周公入門而趨登堂而跪周公迎拂其首勞而食之曰爾安見君子乎世說新語注卷七排調伯禽與康叔朝於成王見乎周公三見而三笞之二子有駭色乃問於商子曰吾二子見於周公三見而三笞之何也商子曰南山之陽有木名橋南山之陰有木名梓二子盍往觀焉於是二子如其言而往觀之見橋木高而仰梓木晉而俯注晉肅貎此注惟見藝文類聚反以吿商子商子曰橋者父道也梓者子道也二子明日復見入門而趨登堂而跪周公迎拂其首而勞之曰汝安見君子乎二子以實吿公曰君子哉商子也文選王文憲集序注又左太冲招隱詩謝靈運經湖中瞻眺詩注引相與觀乎南山之陽又長笛賦注引觀乎南山之陰又藝文類聚八十九節引晉而俯句作晉然實而俯拂其首而勞之作拂其首勞而食之它書引實而俯無晉然二字又錦繡萬花谷前集卷十六記纂淵海卷九十六藝流别繹史二十一並節引六藝流别南山之陰作北山之陰非案曰太平御覽五百十八宗親十八引周書說苑建本篇皆與此文略同伯禽封於魯周公曰於乎吾與女族倫吾文王之爲子也武王之爲弟也今王之爲叔父也吾於天下豈卑賤也豈乏士也所執質而見者十二委質而相見者三十其未執質之士百我欲盡智得情者千人而吾僅得三人焉案千一本作十以正吾身以定天下是以敬其見者則隱者出矣謹諸乃以魯而驕人可哉尸祿之士猶可驕也正身之士去貴而爲賤去富而爲貧面目􅷪黑而不失其所是以文不滅而章不敗也愼諸女乃以魯國而驕豈可哉通鑑前編成王元年又外紀用此文案曰此篇盧氏本入洛誥蓋以爲王命周公後之傳也今以類入梓材注贄者所執以至也君子見於所尊敬必執贄以將其厚意也十人公卿之中也三十人羣大夫之中也百人羣士之中也荀子堯問篇楊倞注引鄭注云案曰荀子注引鄭注作十人則前編引傳作十二誤是其好自用也以歛益之也荀子堯問篇注曲阜孔廣林曰楊倞注荀子堯問篇彼其好自用句云大傳作是其好自用也云云而通鑑前編所載無之葢前編止取後文未經全載當以荀子文參攷
