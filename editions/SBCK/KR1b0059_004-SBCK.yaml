front:
  text: 尙書大傳卷五
  hash: sha256:0742c3b1d0856d24031f6575c7efa8c04597f0dc870b0ec1303761ced84856be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0059_SBCK_004-1a}
body:
  text: 略說遂火爲遂皇伏羲爲戲皇神農爲農皇也遂人以火紀火太陽也陽尊故託遂皇於天伏羲以人事紀故託戲皇於人葢天非人不因人非天不成也神農悉地力種穀疏故託農皇於地天地人之道僃而三五之運興矣風俗通皇霸第一引尙書大傳說又太平御覽七十七皇王部二又七十八皇王部三又火部一初學記九事􅀋賦注藝文􅀋聚十一帝王路史因提紀並節引案曰孫之騄本首列此條目爲三五傳無據不可從今姑入之略說爲近似伏羲氏没神農氏作神農氏没黃帝堯舜氏作羅璧識遺卷二引大傳言案曰識遺云敘三五傳次甚明伏羲氏作八卦路史後紀卷一太昊紀上注天立五帝以爲相四時施生法度明察春夏慶賞秋冬刑罰帝者任德設刑以則象之言其能行天道舉錯審諦也黃帝始制冠冕垂衣裳上棟下宇以避風雨禮文法度興事創業黃者光也厚也中和之色德施四季與地同功故先黃以别之也顓者專也頊者信也言其承易文之以質使天下􅀩化皆貴貞慤也嚳者考也成也言其考明法度醇美嚳然若酒之芬香也堯者高也饒也言其隆興煥炳最高明也舜者推也循也言其推行道德案曰四字原文誤在舜者推也之上今移此循堯緒也風俗通義皇霸卷一五帝篇謹案易尙書大傳云云又御覽七十七皇王部二載風俗通同惟無黃帝始制以下二十五字又無嚳然二字饒也二字􅀩化之􅀩作遵末四句作舜者准也循也言其准行道以循堯緒也當從之准循與舜聲近推則遠矣今本風俗通字誤堯八睂舜四瞳子禹其跳湯扁文王四乳八睂者如八字者也其跳者踦也注其發聲也踦步足不能相過也扁者枯也注言湯體半小象扁枯言皆不善也御覽三百六十三人事部四又玉篇卷四目部初學記九帝王部路史有虞紀荀子非相篇注案曰荀子非相篇曰禹跳湯偏堯舜參眸子楊倞注引尸子曰舜兩眸子是謂重明作事成法出言成章又引尸子曰禹之勞十年不窺其家手不爪脛不生毛偏枯之病步不相過人曰禹歩吕氏春秋曰禹通水濬川顏色黎黑步不相過多聞而齊給注齊疾也史記五帝本紀索隱案曰此葢尙書大傳說黄帝語乃命五史以書五帝之蠱事李鼎祚周易集解載伏曼容註引此釋云然爲訓者正以太古之時无爲无事也成王問周公曰舜之冠何如焉周公曰古之人有冒皮而勾領者然鳳皇巢其樹麒麟聚其域也北堂書鈔冠成王問周公曰舜何人也周公曰其政也好生而惡殺文􅃟檄蜀文注路史後紀十二有虞紀注舜好生惡殺鳳皇巢其樹御覽九百十五羽族部二又九百二十八羽族部十五事􅀋賦注十八玉海百九十九古之人衣上有冒而勾領注言在德不在服也古之人三皇時也冒覆項也勾領繞頸也禮正服方領也荀子哀公篇楊倞注周公對成王云古人冒而勾領注古人謂三皇時以冐覆頭勾領繞頸至黃帝則有冕也禮記冠義篇目正義引略說案曰禮記冠義疏引此文爲略說則自北堂書鈔以下四條皆略說文也晏子曰古者有紩衣攣領而王天下者矣淮南子曰古有鍪頭而卷領以王天下與略說同意荀子哀公篇魯哀公問舜冠於孔子孔子不對三問不對哀公曰寡人問舜冠於子何以不言也孔子對曰古之王者有務而拘領者矣其政好生而惡殺焉注務讀爲冒拘與勾同是以鳳在列樹麟在郊野鳥鵲之巢可俯而窺也君不問而問舜冠所以不對也荀子作哀公問孔子書傳作成王問周公傳聞異詞舜不登而高不行而遠拱揖於天下而天下稱仁御覽八十一皇王部六又四百十九人事部六十夏后氏主敎以忠儀禮士喪禮疏引書傳略說周人之敎以文上敎以文君子其失也小人薄注文謂尊卑之差制也習文法無悃誠也文􅃟運命論注案曰士喪禮疏引夏后氏主敎以忠稱書傳畧說此文􅃟注所引周人之敎以文云云當相連屬中間尙有脫文及說殷人之敎耳帝命周公踐阼朱草暢生御覽八百七十三休徵部二周公輔幼主不矜功則􅕴莢生注矜夸也御覽八百七十三休徵部二引傳又文􅃟鮑昭詠史詩注引傳及注又記纂淵海卷四王者德及皇天則祥風􅁸御覽九天部九又八百七十二休徵部二初學記一王者德下究地之厚則朱草生御覽八百七十三休徵部二又文􅃟魯靈光殿賦注王元長曲水詩序注非有先生論注記纂淵海卷四又開元占經竹木草藥占篇引曰德光地序則朱草生文選注同狄人將攻太王亶甫御覽甫作父此下重亶父二字召耆老而問焉曰狄人何欲耆老對曰欲得菽粟財貨太王亶甫曰與之每與狄人至不止太王亶甫贅其耆老而問之毛詩綿正義引贅作屬案曰桑柔正義引孟子曰太王屬其耆老書傳云贅其耆老是贅爲屬據此則緜正義作屬者誤也今改正曰狄人又何欲乎耆老對曰又欲君土地太王亶甫曰與之耆老曰君不爲社稷乎太王亶甫曰社稷所以爲民也不可以所爲民亾民也耆老對曰君縱不爲社稷不爲宗廟乎太王亶甫曰宗廟吾私也不可以私害民遂策杖而去逾梁山邑岐山注梁山在岐山東北注見毛詩公劉正義岐山在梁山西南注見毛詩緜正義周人奔而從之者三千乘一止而成三千戶之邑毛詩緜正義引書傳略說又御覽七百九十九四夷部二又禮記哀公問正義毛詩豳風譜正義並引書傳畧說又毛詩桑柔天作正義節引周人禮記正義作國人案曰毛詩緜正義引書傳又引韓奕箋云梁山在馮翊夏陽縣西北鄭於書傳注云岐山在梁山西南然則梁山之袤其東當夏陽縣西北其西當岐山東北自豳適周當踰之也宣王問於春子曰寡人欲行孝弟之義爲之有道乎注宣王齊君陳敬仲之後也春子曰昔者衞聞之樂正子注樂正子曾子弟子也曰文王之治岐也五十者杖於家六十者杖於鄕七十者杖於朝注朝當爲國見君揖杖注揖當爲去八十者杖於朝見君揖杖注揖挾也君曰趣見客毋俟朝注不欲久停老者也古者七十致仕來者客之也以朝乘車輲輪注乘車安車也言輲輪明其小也案曰此注見禮記曲禮正義引書傳略說案曰儀禮通解引注無言輲輪以下七字云見前乘安車注葢通解前引曲禮載疏引書傳及注之文故此處不重載鄭注也今補御爲僕送至於家注御君之御也而孝弟之義達於諸侯九十杖而朝見君建杖注建樹也君曰趣見毋俟朝以朝車送之舍天子重鄕養注舍館也重猶尊也養以禮食之也卜筮巫醫御於前祝咽祝哽以食禮書引作祝饐祝鯁乘車輲輪胥與就膳徹注胥樂官也就成也胥成膳徹謂以樂食之也送至於家君如有欲問明日就其室以珍從注明日明旦而孝弟之義達於四海此文王之治岐也君如欲行孝弟之大義盍反文王之治岐儀禮經傳通解十九五學引傳注又玉海七十四未引注九十以下至達於四海又見禮書五十篇首見困學紀聞卷五案曰禮記曲禮正義引書傳略說致仕者以朝乘車輲輪在此篇呂氏春秋春居問於齊宣王王稱之春居王氏困學紀聞以爲卽大傳所謂春子家語言養老事則孔子之問哀公疑王肅剽書傳而爲之大夫士七十而致仕老於鄕里大夫爲父師士爲少師注所謂里庶尹也古者仕焉而已者歸敎於閭里耰鉏已藏祈樂已入注祈樂當爲新穀歲事已畢餘子皆入學注餘子猶衆子也古者適子恆代父而仕也十五始入小學見小節踐小義十八入大學見大節踐大義焉注小節小義正謂始口典口師受業大節大義謂博習盡識也距冬至四十五日始出學傅農事注立春學止上老平明坐於右塾庶老坐於左塾餘子畢出然後皆歸夕亦如之注上老父師也庶老少師也餘子皆入父之齒隨行兄之齒鴈行朋友不相踰輕任并重任分頒白者不提􅂝出入皆如之儀禮通解卷九學制第十六引傳注全又禮書四十九引傳全又儀禮鄕飮酒疏禮記曲禮王制正義並節引稱書傳略說又尙書洛誥正義禮記學記正義藝文􅀋聚三十八禮部御覽五百三十四禮儀部十三並節引􅀋聚御覽已畢並作欲畢又見文獻通考玉海困學紀聞卷八案曰門塾之學漢書食貨志白虎通公羊傳宣十年注禮記學記注皆有此說葢本書傳尙書洛誥正義引書傳此文而釋之曰是敎農人以義也以爲予其明農哉之證然則略說亦是申解洛誥此句經文耳傳曰已有三牲必田狩者孝子之意以爲已之所養不如天地自然之性逸豫肥美禽獸多則傷五穀因習兵事又不空設故因以捕禽獸所以共承宗廟示不忘武僃又因以爲田除害鮮者何也秋取嘗也注取禽嘗祭秋取嘗何以也習鬥也習鬥也者男子之事也然而戰鬥不可空習故於蒐狩閑之也閑之者貫之也貫之者習之也己祭取餘􅀗陳於澤注澤射宫也然後卿大夫相與射命中者雖不中也取命不中者雖中也不取何以也所以貴揖讓之取而賤勇力之取也鄕之取也於囿中勇力之取也於澤揖讓之取也儀禮集傳集解卷三十六王制之壬引傳注又儀禮鄕射記注引戰鬥以下至末何以也也作然又毛詩六月正義周禮大司馬囿人疏禮記郊特牲射義正義玉海射並節引案曰此條諸書所引不言何篇盧氏本入之略說無所據觀傳文專􅇚鮮字爲秋取嘗疑是鮮誓之傳未敢斷也天子太子年十八曰孟侯注孟迎也注惟見毛詩豳譜正義孟侯者於四方諸侯來朝迎於郊者問其所不知也問之人民之所好惡土地所生美珍怪異山川之所有無及父在時皆知之注十八嚮入太學爲成人博問庶事也太平御覽百四十六皇親部十二引全惟傳首無天子二字注無孟迎也三字毛詩豳風譜正義節引作書傳略說有天子二字又尙書康誥正義毛詩采菽正義儀禮覲禮疏禮記月令正義周禮大行人疏藝文􅀋聚十六儲宫部古者帝王躬率有司百執事而以正月朝迎日於東郊以爲萬物先而尊事天也祀上帝於南郊所以報天德迎日之辭曰維某年月上日明光於上下勤施於四方㫄作穆穆維予一人某敬拜迎日東郊迎日謂春分迎日也堯典曰寅賓出日此之謂也儀禮通解續二二十三天神又禮記玉藻正義引祀上帝於南郊卽春迎日於東郊作書傳略說又毛詩噫嘻正義禮記郊特牲正義宋書禮志玉海王者存二王之後與已爲三所以通三統立三正周人以至日爲正殷人以日至後三十日爲正夏人以日至後六十日爲正天有三統土有三王三王者所以統天下也注所存二王後者命使郊天以天子禮祭其始祖受命之王自行其正朔服色此謂通天三統尙書微子之命正義引傳注案曰末句三統或作之統案毛詩生民正義云王者存先代所以通天三統此用書傳及鄭注作通天三統是也案曰漢書成帝紀十綏和元年詔曰蓋聞王者必存二王之後所㠯通三統也本此天有三統物有三變故正色有三天有三生三死故土有一王王特一生死禮記檀弓上正義引書傳略說周以至動殷以萌夏以牙注謂三王之正也至動冬日至物始動也物有三變故正色有三天有三生三死故土有三王王特一生死是故周人以日至爲正殷人以日至三十日爲正夏以日至六十日爲正是故三統三正若循連環周則又始窮則反本公羊傳隱元年疏引書傳略說夏以孟春爲正殷以季冬爲正周以仲冬爲正夏以十三月爲正色尙黑以平旦爲朔殷以十二月爲正色尙白以雞鳴爲朔周以十一月爲正色尙赤以夜半爲朔不以二月後爲正者萬物不齊莫適所統故必以三微之月也三正之相承若順連環也白虎通三正篇又御覽二十九時序部十四引同惟二月作二三月所統作所立末句無順字又御覽二十六時序部十一初學記歲時下夏以十三月爲正色尙黑以平旦爲朔殷以十二月爲正色尙白以雞鳴爲朔周以十一月爲正色尙赤以夜半爲朔必以三微之月爲正者當爾之時物皆尙微王者受命當扶微理得章成之義也後漢書章帝紀注又通典賓禮一引末云必用三微之月爲正時物尙微以明王者受命扶微章成此正使其道重大正始也案曰書傳說正朔二字最晰周以至動殷以萌夏以牙注謂三王之政也至動冬至日物始動也物有三變故正色有三天有三生三死注異時生者恆異時死是故周人以日至爲正殷人以日至三十日爲正夏以日至六十日爲正天有三統土有三王注統本也三統者所以序生也三正者所以統天下也三統若循連環周則又始窮則反本也夏以孟春爲正者貴形也御覽二十九時序部十四又文􅃟西征賦游仙詩臨終詩廣絕交論等注並引三王之統若循連環云云三王之治若循環之無端如水之勝火御覽七十六皇王部一王者一質一文據天地之道白虎通三正篇正色三而復者也文􅃟皇太子宴元圃賦詩注諸侯有德者一命以車服弓矢再命以虎賁三百人三命秬鬯諸侯三命者皆受天子之樂以祀其宗廟儀禮通解續宗廟樂舞又路史後紀十一陶唐紀引至以祀其宗廟止作略說案曰此與虞夏傳所言不同晉平公問師曠曰吾年七十欲學恐已暮師曠曰臣聞老而學者如執燭之明執燭之明孰與昧行公曰善藝文􅀋聚八十火部高郵王侍郞伯申曰執燭之執當爲熱熱古爇字說苑建本篇作炳燭炳乃焫之譌焫與爇同案曰自此以下七條諸書所引大傳未稱略說今以意定之宜入此篇子曰心之精神是謂聖孔子集語卷下又繹史八十六案曰孫之騄本入五行傳葢以爲思心曰䜭䜭作聖之訓也似近之子曰君子不可以不學見人不可以不飾不飾無貌無貎不敬不敬無禮無禮不立夫遠而光者飾也近而逾明者學也譬之圩邪水潦集焉菅蒲生焉從上觀之誰知非源水也孔子集語卷下案曰大戴禮勸學篇與此大同子張曰仁者何樂於山也孔子曰夫山者恺然高恺然高則何樂焉夫山草木生焉鳥獸蕃焉財用殖焉生財用而無私爲焉四方皆代焉毎無私予焉出雲風以通乎天地之間陰陽和合雨露之澤萬物以成百姓以饗此仁者之所以樂於山者也太平御覽四百十九人事部六十又三十八地部三恺然作嵬嵬然無恺然高以下八字鳥作禽財用作林木風作雨無生財以下八字又無代焉每三字又文􅃟頭陀寺碑文注引夫山至無私與焉案曰孔叢引此又代作伐子貢曰葉公問政於夫子子曰政在附近而來遠魯哀公問政子曰政在於論臣齊景公問政子曰政在於節用三君問政夫子應之不同然則政有異乎子曰荆之地廣而都狹民有離志焉故曰在於附近而來遠哀公有臣三人內比周以惑其君外障距諸侯賓客以蔽其明故曰政在論臣齊景公奢於臺榭淫於苑囿五官之樂不解一旦而賜人百乘之家者三故曰政在節用孔子集語卷下案曰韓非子難三家語辯政說苑政理篇與此大同漢書武帝紀元朔六年詔葢孔子對定公㠯徠遠哀公㠯論臣景公以節用非期不同所急異也臣瓚注曰論語及韓子皆言葉公問政於孔子孔子答以悅近來遠今云定公與二書異東郭子思問於子貢曰夫子之門何其雜也子貢曰夫櫽括之㫄多枉木良醫之門多疾人砥礪之㫄多頑鈍夫子聞之曰修道以俟天下來者不止是以雜也孔子集語卷下又繹史九十五案曰說苑雜言篇與此同惟子思之思作惠荀子法行篇與此小異東郭子惠作南郭惠子劉恕外紀卷九載東郭子惠問於子貢云云不著所徵然與說苑異與書傳同則書傳之文也思當爲惠子夏讀書畢見夫子夫子問焉子何爲於書對曰書之論事也昭昭若日月之明離離若參辰之錯行上有堯舜之道下有三王之義商所受於夫子者志之弗敢忘也雖退而窮居河濟之間深山之中壤室編蓬爲戶於中彈琴詠先王之道則可發憤慷􅁣矣藝文􅀋聚六十四居處部四又五十五雜文部一又草部下文􅃟蘇子卿古詩注左太冲招隱詩注非有先生論注節引御覽百卉四子夏讀書畢孔子問曰吾子何爲於書子夏曰書之論事昭昭若日月焉所受於夫子者弗敢忘退而窮居河濟之間深山之中壤室蓬戶彈琴瑟以歌先王之風有人亦樂之無人亦樂之上見堯舜之道下見三王之義可以忘死生矣孔子愀然變容曰嘻子殆可與言書矣雖然見其表未見其裏闚其門未入其中顔回曰何謂也孔子曰丘常悉心盡志以入其中則前有高岸後有大谿塡塡正立而已六誓可以觀義五誥可以觀仁甫刑可以觀誡洪範可以觀度禹貢可以觀事皋陶謨可以觀治堯典可以觀美外紀卷九又文􅃟夏侯常侍誄注引子見其表未見其裏御覽四百十九人事部六十困學紀聞卷二小學紺珠卷四並引六誓以下案曰外紀引子夏讀書畢一條未舉所徵然文􅃟注御覽困學紀聞分引數條並與此合是爲書傳文無疑薛季宣書古文訓序亦有此文末有通斯七者書之大義舉矣二句亦不稱所出而末敘七觀云是故帝典可以觀美大禹謨禹貢可以觀事皋陶謨益稷可以觀政洪範可以觀度六誓可以觀義五誥可以觀仁甫刑可以觀戒其序次與孔叢子同與御覽困學紀聞所引大傳七觀異則非書大傳之文明矣孔叢言大禹謨益稷者蓋作僞者羼入而不知真古文與今文皆無大禹謨其益稷一篇則統於皋陶謨中也又韓詩外傳說此事以爲子夏讀詩子曰參女以爲明主爲勞乎昔者舜左禹而右皋陶尙書大傳諸書所引有未審何篇無所附者今雜綴於此伊尹母方孕行汲化爲枯桑其夫尋至水濱見桑穴中有兒乃收養之錦繡萬花谷前集卷十引尙書大傳民擊壤而歌鑿井而飮畊田而食帝力何有禮記經解正義引尙書傳周人以仁接民而天下莫不仁故曰大矣注言文王仁故謂之大矣太平御覽四百十九人事部六十文王施政而物皆聽文􅃟褚淵碑文注沈休文奏彈王源注周人可比屋而封文􅃟七命注四子講德論勸進今上箋奏彈王源等注成王削桐葉爲珪以封唐叔禮記大傳正義公爵劉名也毛詩音義周公兼思三王之道以施於春秋冬夏困學紀聞卷八戰者憚警之也白虎通誅伐篇藝文􅀋聚五十九武部又御覽三百四兵部三十五又三百八兵部三十九警並作驚王者躬耕所以供粢盛文􅃟籍田賦注煙氛郊社不修山川不祝風雨不時霜雪不降責於天公臣多弑主孼多殺宗五品不訓責於人公城郭不繕溝池不修水泉不隆水爲民害責於地公論衡卷十五順鼓篇又丹鉛總錄卷二十六瑣語􅀋引小異案曰韓詩外傳卷十八亦說天公人公地公此與夏傳天子三公又爲一義季夏可以大赦罪人北堂書鈔夏衣錦尙詩考異字異義困學紀聞卷三注讀爲絅或爲絺困學紀聞卷三剴切毛詩雨無正正義矜寡孤獨天民之窮而無吿者皆有常餼毛詩大田正義外無曠夫内無怨女毛詩雄雉序正義正義云書傳曠夫謂未有室家者老而無妻謂之鰥老而無夫謂之寡幼而無父謂之孤老而無子謂之獨行而無資謂之乏居而無食謂之困此皆天下之至悲哀而無吿者故聖人在上君子在位能者任職必先施此無使失職御覽四百七十七人事部百十八又毛詩何草不黃正義周禮遺人廪人疏節引火發於密水􅂥於深記纂淵海卷一水火引尙書大傳萬卷菁華前集案曰韓昌黎外集擇言解有火􅂥於密水發於深二語葢本書大傳凡宗廟有先王之主曰都無曰邑唐釋湛然止觀輔行傳宏決卷第四之三注引尙書大傳案曰傳文宗廟二字似有誤子夏葉拱而進困學紀聞卷二案曰葉拱二字亦見家語辯樂解魏文侯問子夏子夏乃遷延而退文􅃟難蜀父老注髴髴周成王時州靡國獻之爾雅釋獸疏案曰山海經海內南經梟陽國髴髴注引周書成王時云云是逸周書王會解文也爾雅疏明引大傳未審當在何篇抑或邢叔明記憶之誤與注灌是獻尸尸得獻乃祭酒以灌地也皇侃論語義疏八佾篇
