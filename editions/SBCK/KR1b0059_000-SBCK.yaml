body:
  text: 尙書大傳定本序尙書大傳四十一篇見漢書藝文志鄭康成序謂出自伏生至康成詮次爲八十三篇隋書經籍志唐書藝文志崇文總目郡齋讀書志並著錄三卷唐志别出暢訓一卷疑卽略說之譌舊唐志􅀡云尙書暢訓三卷伏勝注繆甚自葉夢得晁公武皆言今本首尾不倫􅈂齋書錄解題言印板刓闕宋世已無完本迄明遂亡近人編輯有仁和孫晴川本德州盧雅雨本曲阜孔叢伯本孫盧本多殽舛孔氏善矣而分篇強復漢志之舊非也其他譌漏猶不免焉今覆加稽覈楬所據依稍參愚管而爲之案三卷首爲序錄一卷其所芟除别爲訂誤一卷末載漢書五行志綴以它書所引劉氏五行傳論三卷總爲八卷序曰伏生以明經爲秦博士漢孝文時年且百歲計其生在周末得見詩書古文且博識先秦舊書雅記多漢諸儒所未聞遭時燔災明哲退隱嬴祚旣顚守道不出初抱百篇藏之山中漢興亡失求得二十九篇而九共帝告嘉禾揜誥臩命諸闕篇猶能言其作意述其佚句文帝命掌故􅏯錯從受尙書而伏生亦自以二十九篇授張生歐陽生敎於齊魯之間迄武宣世有歐陽大小夏侯氏立學官是爲今尙書孔安國晩得壁中古文多逸書十六篇顧絶無師說終漢之世獨傳二十九篇而已何則二十九篇今文具存文字異者不過數百其餘與古文大恉略均足相推校逸十六篇旣無今文可攷遂莫能盡通其義凡古文易書詩禮論語孝經所以傳悉由今文爲之先驅今文所無輒廢古春秋左氏傳賴張蒼先修其業故傳禮古經五十六卷傳士禮十七篇與后戴同而三十九篇逸禮竟廢書亦猶是也向微伏生則唐虞三代典謨誥命之經煙銷灰滅萬古長夜夫天爲斯文篤生名德期頤之壽以昌大道豈偶然哉尙書今學精或不逮古文然亦各守師法賈逵以爲俗儒康成以爲嫉此蔽冐不悛迺謂當時博士末師破碎章句之過而伏生大傳條􅁧大義因經屬恉其文辭爾雅深厚最近大小戴記七十子之徒所說非漢諸儒傳訓之所能及也康成百世儒宗獨注大傳其釋三禮每援引之及注古文尙書洪範五事康誥孟侯文王伐崇耆之歲周公克殷踐奄之年咸據大傳以明事豈非閎識博通信舊聞者哉且夫伏生之學尤善於禮其言巡狩朝覲郊尸迎日廟祭族燕門塾學校養老擇射貢士考績郊遂采地房堂路寢之制后夫人入御太子迎問諸侯之法三正之統五服之色七始之素八伯之樂皆唐虞三代遺文往往六經所不備諸子百家所不詳漢始定天下庶事艸剏獨一叔孫通略定制度雜以秦儀若迺正朔服色郊望宗廟之事數世猶未章焉假令當高帝時伏生年未篤老尊其高節安車禮徵與張蒼等考舊章立經制議禮樂則魯兩生息面諛違古之誚綘灌諸臣冺年少紛更之讒規橅粗定然後繼以賈誼董仲舒河間獻王王吉劉向之倫先後討論法象明備成康之治何必不復見西京今其書散佚十無四五猶可寶重宋朱子與勉齋黃氏纂儀禮經傳通解攈摭大傳獨詳蓋有禆禮學不虛也五行傳者自夏侯始昌至劉氏父子傳之皆善推禍福著天人之應漢儒治經莫不明象數陰陽以窮極性命故易有孟京卦氣之候詩有翼奉五際之要春秋有公羊災異之條書有夏侯劉氏許商李尋洪範之論班固本大傳㩜仲舒别向歆以傅春秋告往知來王事之表不可廢也是以錄漢書五行志附於後以備一家之學云東越陳壽祺
