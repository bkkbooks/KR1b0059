  text: 尙書大傳卷三
  hash: sha256:043a135cd36244e78bc17ebf20e79ed61ff39c5b542ffd3dd08f7f0457ffe345
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0059_SBCK_002-1a}
body:
  text: 周􅀓大誓案曰洛誥傳曰周書自大誓就召誥而盛於洛誥然則今文周書首大誓也唯四月太子發上祭于畢下至于孟津之上注四月周四月也發周武王也卒父業故稱太子也乃告於司徒司馬司空諸節亢才予無知以先祖先父之有德之臣左右小子予受先公戮力賞罰以定厥功明于先祖之遺太子發升于舟中流白魚入于舟王跪取出俟以燎羣公咸曰休哉太平御覽百四十六皇親部十二案曰亢才史記周本紀作信哉才哉古通同年王大理伯申云亢乃允字之誤司馬子長以訓詁改經文故爲信也八百諸侯俱至孟津白魚入舟尙書孔序正義卷一引書傳有八百諸侯俱至孟津白魚入舟之事與大誓同武王伐紂觀兵于孟津有火流于王屋化爲赤烏三足御覽百八十一居處部九周將興之時有大赤烏銜穀之種而集王屋之上者武王喜諸大夫皆喜周公曰茂哉茂哉天下之見此以勸之也恐恃之春秋䌓露同􅀋相勸篇引尙書􅀓言武王伐紂至于商郊停止㝛夜士卒皆歡樂歌舞以待旦禮記祭統正義案曰正義云舞莫重于武㝛夜者皇氏云師說書􅀓云云武㝛夜其樂名也此據書􅀓釋武㝛夜最確王升舟入水鼓鐘惡觀臺惡將舟惡宗廟惡注惡皆爲亞亞次也觀臺靈臺知天時占候者也宗廟遷主周禮肆師注引尙書􅀓十七字惡仍作亞儀禮經􅀓通解續因事之祭卷二十六上引􅀓注案曰周禮肆師疏曰王升舟以下者謂說武王於文王受命十一年觀兵之時武王於孟津渡河升舟入水在前鐘鼓亞亞王舟後觀臺亞者觀臺可以望氛祥亞鼔鐘後將舟亞者以社主主殺戮而軍將同故名社主爲將將舟亞在觀臺後宗廟亞者宗廟則遷主也亞在將舟後惟丙午王逮師前師乃鼓䵾譟師乃慆前歌後舞注慆喜也衆大喜前歌後舞也御覽四百六十七人事部一百八引􅀓注全惟前師無前字此句六字又見周禮大司馬注又御覽五百七十四樂部十二案曰周禮大司馬注引書曰前師乃鼓䵾譟賈疏云書􅀓文彼說武王伐紂事隷釋魏大饗碑士有拊譟之歡民懷惠康之德拊譟與䵾譟同文􅃟二十一秋胡詩注引班彪冀州賦曰感鳬藻以進樂兮後漢書杜詩􅀓士卒鳬藻劉陶􅀓武旅有鳬藻之士錢詹事大昕廿二史考異曰鳬藻卽䵾譟也王逸楚詞章句曰武王三軍人人樂戰並馳驅赴敵爭先前歌後舞鳬噪讙呼惠徵君棟後漢書補注曰䵾譟漢人讀爲鳬噪言如鳬之噪呼杜詩劉陶􅀓又作鳬藻釋云如鳬之戲於藻非尙書之義也壽祺謂䵾譟鳬藻字别而聲義同此或歐陽夏侯之異李賢後漢書注言如鳬之戲於藻所謂望文生義差之遠矣蔡邕集上加元服與羣臣上壽表云臣等不勝踴躍鳬藻魏志文帝紀注臣妾遠近莫不鳬藻此亦均本大傳用爲讙呼之義矣顔延年秋胡詩鳬藻馳目成似與李賢注同意亦失之又案藝文􅀋聚引樂緯稽耀嘉曰武王承命興師誅於商萬國咸喜軍渡孟津前歌後舞是書􅀓所說伐紂之事也丕天之大律注云律法也奉天之大法唐律疏義卷一又翻譯名義集九卷案曰漢書郊祀志引大誓曰正稽古立功立事可以永年丕天之大律是此五字乃古文大誓詞而大􅀓載之也牧誓大戰篇武王與紂戰於牧之野紂之卒輻分紂之車瓦裂紂之甲魚鱗下賀乎武王文􅃟宣德皇后令注引至此與作伐牧之野無之字魚作如乎作于王下有也字紂死武王皇皇若天下之未定召太公而問曰入殷奈何太公曰臣聞之也愛人者兼其屋上之烏此句又引見毛詩名物解八不􅋢人者及其􅇧餘注􅇧餘里落之壁何如武王曰不可召公趨而進曰臣聞之也有罪者殺無罪者活咸劉厥敵母使有餘烈何如武王曰不可周公趨而進曰臣聞之也各安其宅各田其田母故母私惟仁之親後漢書申屠剛􅀓引武王入殷周公曰各安其宅各田其田無故無新惟仁之親何如武王曠乎若天下之已定遂入殷封比干之墓表商容之閭發鉅橋之粟散鹿臺之財歸傾宫之女又引見後漢書郞顗􅀓注而民知方曰王之於仁人也死者封其墓况於生者乎王之於賢人也亾者表其閭况於在者乎王之於財也聚者散之况於復藉乎王之於色也在者歸其父母况於復徵乎通鑑前編武王十三年引全又記纂淵海六十一引太公曰愛人者兼其屋上之烏注出尙書太􅀓大戰篇是此篇皆大戰篇之文也記纂淵海又引憎人者惡其胥餘案曰說苑貴德篇韓詩外􅀓三載太公召公周公之語與此略同大戰篇云太公曰罵女母歎唾女母乾母歎母乾是謂艱難吳曾能改齋漫錄卷二引尙書大􅀓大戰篇洪範武王勝殷繼公子祿父注武庚字祿父尙書洪範序正義引鄭云武王勝殷繼公子祿父注祿父紂之子也釋箕子囚箕子不忍周之釋走之朝鮮注誅我君而釋己嫌苟免也此注惟見通鑑前編武王聞之因以朝鮮封之注朝鮮今樂浪郡箕子旣受周之封不得無臣禮故於十三祀來朝太平御覽卷七百八十四夷部一又通鑑前編引書洪範大傳自首至封之止並注又御覽二百一封建部四路史後紀十二並節引汩亂也華嚴經第七十八音義卷下案曰此疑洪範􅀓汨陳五行之訓水火者百姓之所飮食也金木者百姓之所興作也土者萬物之所資生也是爲人用尙書洪範正義引書傳八政何以先食傳曰食者萬物之始人事之本也故八政先食尙書洪範正義文􅃟籍田賦注又白帖食御覽八百四十七飮食部五洪範曰不叶于極不麗于咎毋侮鰥寡而畏高明困學紀聞卷二引大傳聖人在上其君子不誦無用之言其工不作無用之器其商不通無用之物御覽四百一人事部四十二聖人者民之父母也母能生之能食之父能敎之能誨之聖王曲僃之者也能生之能食之能敎之能誨之也爲之城郭以居之爲之宮室以處之爲之庠序學校以敎誨之爲之列地制畝以飮食之故書曰作民父母以爲天下王此之謂也御覽四百一人事部四十二晦而月見西方謂之朓注朓條也條達行疾貌朓則侯王其荼注荼緩也朔而月見東方謂之側匿注側匿猶縮縮行遲貌側匿則侯王其肅注肅急也日君象也月臣象也君政急則日行疾月行徐臣逡遁不進君政緩則日行徐月行疾臣放恣也太平御覽四引􅀓注全注君政緩上誤衍朓則侯王其徐徐緩也十字又誤荼爲徐今刪又周禮保章氏疏引傳又散見文􅃟元皇后哀䇿文月賦舞賦注藝文􅀋聚一穀梁傳序疏後漢書蔡邕傳注文􅃟月賦注引鄭注作朓條達行疾貌也元皇后哀策文注引鄭注作朓猶條達也當从之側匿猶縮縮當作猶縮朒案曰文􅃟舞賦注引鄭􅏏尙書五行傳注闇跳行疾皃是鄭注條達一作闇跳也側匿一作朒一作朏說文朏月未成之名晦而月見西方謂之朓朔而月見東方謂之縮朒此則側匿與縮朒聲近義一也漢書五行志晦而月見西方謂之朓朔而見東方謂之仄匿仄匿則侯王其肅朓則侯王其舒劉向以爲朓者疾也君舒緩則臣驕慢故日行遲而月行疾也仄匿者不進之意君肅急則臣恐懼故日行疾而月行遲不敢迫近君也不舒不急以正失之者食朔日劉歆以爲舒者侯王展意顓事臣下促急故月行疾也肅者王侯縮朒不任事臣下弛縱故月行遲也當春秋時侯王率多縮朒不任事故食二日仄匿者十八食晦日朓者一此其效也案此漢志據伏生書傳爲說仄匿并作仄慝字之譌而劉歆則作縮朒側匿猶縮朒也孟康注漢書曰朓者月行疾在日前故早見仄匿者行遲在日後當没而更見是也蔡卞毛詩名物解禮曰大明生於東月生於西蓋朔而月出西方夕見暮見也故王者早見曰朝暮見曰夕義取諸此所謂朝夕放於日月者也至望然後出於東方夕見尙書大傳以爲晦而月見西方謂之朏朔而月見東方謂之朒蓋言異也又事文􅀋聚亦引尙書大傳晦而月見西方謂之朓朔而月見東方謂之朏諸書所引朓朒朏闇跳側匿縮朒各字每相互異攷後漢書盧植傳植上封事諫曰臣聞日晦而月見謂之朓王侯其舒李賢注五行傳劉向所著字與此小異然則伏劉諸本固有别矣惟朏與朓異它書朓作朏者誤尙書大傳洪範五行傳維王后元祀注王謂禹也后君也祀年也禹始居攝爲君之元年也注又見通鑑前編帝令大禹步于上帝注帝舜也步推也于於也上帝謂天也令禹推演天道謂覩得失反覆也注又見玉海又文􅃟演連珠注引步推也又通鑑前編引注末句維時洪祀六沴用咎于下注用此時始大祀六沴之用咎于下者用極其祀之也案曰文淵閣本儀禮通解續此注用作言始上有禹字者下有咎凶也民其祀之令消也十字是用知不畏而神之怒注而乃也舜任禹禹能治其道口無其神舜知禹敬神之怒可知也若六沴作見若是共禦注若順也共讀曰恭禦止也帝用不差神則不怒注也舜見禹知人之無復疑也五福乃降用章于下八字又見周禮疾醫疏注降下也章明也若六沴作見若不共禦六伐旣侵六極其下注侵陵也庶幾行罰殺萬物也凶也禹乃共辟厥德受命休令注厥其也休美也禹於是恭明孳孳受舜之美令奉行之爰用五事建用王極注王極或皆爲皇極初禹治水得神龜􅀒文於洛於以盡得天人陰陽之用至是奉帝命而陳之也案曰注初禹以下至末據通鑑前編引補儀禮通解續無長事注長猶君也一曰貌貌之不恭是謂不肅注肅敬也君貌不恭則是不能敬其事也案曰此注儀禮通解續缺貌不能敬事也六字據續漢書五行志及注補下同厥咎狂注君臣不敬則倨慢如狂矣案曰儀禮通解續注鈌君倨二字據續漢志補厥罰常雨注貎曰木木主春春氣生生氣失則踰其節故常雨也案曰儀禮通解續缺注貌氣失則四字據續漢志補厥極惡注生氣失故於人則爲惡案曰厥極惡注續漢志儀禮通解續並缺見文獻通考卷八十八郊社考時則有服妖注服貌之飾也時則有龜孼注龜蟲之生於水而游於春者也屬木時則有雞禍注雞畜之有冠翼者也屬貌時則有下體生于上之痾注痾病也貌氣失之病也時則有靑􅌌靑祥注靑木色也􅌌生於此祥自外來也維金沴木注沴殄也凡貌言視聽思心案曰思心二字儀禮通解續無據續漢志注增一事失則逆人之心人心逆則怨木金水火土氣爲之傷傷則衝勝來乘殄之於是神怒人怨將爲禍亂故五行先見變異以譴吿人也及妖孼禍痾􅌌祥皆其氣􅀋暴作非常爲時怪者也各以物象爲之占也案曰自貌之不恭至惟金沴木􅀓注全節並見續漢書五行志及劉昭注文獻通考郊社考次二事曰言言之不從是謂不艾案曰艾各本多作乂據漢書五行志文獻通考引作艾注艾治也君言不從則是不能治其事也厥咎僭注君臣不治則僭差矣厥罰常陽案曰漢志續漢志引並作陽葢今文也各本作暘乃改從古文非注言曰金金主秋秋氣殺殺氣失故常陽也案曰注言曰金三字續漢志缺據文獻通考卷八十八引增厥極憂注殺氣失故於人爲憂時則有詩妖注詩之言志也時則有介蟲之孼注蝝螽蜩蟬之􅀋蟲之生於火而藏於秋者也屬金案曰注蟲之二字續漢志缺據文獻通考引增時則有犬禍注犬畜之以口吠守者也屬言時則有口舌之痾注言氣失之病時則有白􅌌白祥維木沴金案曰惟木沴金周禮疾醫太祝疏引木作火當從之作木者誤也又曰自言之不從至維木沴金傳注全節並見續漢五行志及劉昭注文獻通考郊社考次三事曰視視之不明是謂不悊注悊視瞭也君視不明則是不能瞭其事也厥咎荼注荼緩也君視不瞭則荼緩矣案曰注荼緩也三字惟見玉海天文五據增厥罰常奥案曰他書所引多作燠惟續漢志作奥今從之注視曰火火主夏夏氣長長氣失故常奥也厥極疾注長氣失故於人爲疾時則有草妖注草視之物可見者莫衆於草案曰文獻通考引注無草視之三字時則有倮蟲之孼注􅁞螟蟲之􅀋蟲之生於火而藏於秋者也時則有羊禍注羊畜之遠視者也屬視時則有目痾時則有赤􅌌赤祥維水沴火案曰自視之不明至維水沴火傳注全節並見續漢志及劉昭注文獻通考郊社考次四事曰聽聽之不聰是謂不謀注君聽不聰則是不能謀其事也厥咎急注君臣不謀則急矣厥罰常寒注聽曰水水主冬冬氣藏藏氣失故常寒也厥極貧注藏氣失故於人爲貧時則有鼓妖注鼓聽之應也時則有魚孼注魚蟲之生於水而游於水者也時則有豕禍注豕畜之居閑衞而聽者也屬聽時則有耳痾注聽氣失之病時則有黑􅌌黑祥維火沴水案曰維火沴水周禮疾醫太祝疏引火作土當從之自聽之不聰至維火沴水傳注全節並見續漢五行志及劉昭注文獻通考郊社考次五事曰思心思心之不容是謂不聖注容當爲睿睿通也心明曰聖孔子說休徵曰聖者通也兼四而明則所謂聖聖者包貌言視聽而載之以思心者通以待之君思心不通則是非不能心明其事也案曰思心之不容此節注續漢志缺見文獻通考厥咎霿注霿冒也君臣心有不明則相􅀩冒矣案曰霿文獻通考引作雺非今從漢書五行志續漢五行志所引厥罰常風注思心曰土土王四時主消息生殺長藏之氣風亦出內雨陽寒奥之微皆所以殖萬物之命者也殖氣失故常風厥極凶短折注殖氣失則於人爲凶短折未齔曰凶未冠曰短未昏曰折案曰厥極凶短折注儀禮通解續缺見文獻通考郊社考時則有脂夜之妖注夜讀曰液時則有華孼注華當爲夸夸蚓蟲之生於土而遊於土者時則有牛禍注地厚德載物牛畜之任重者也屬思心案曰注地厚德載物五字惟見禮記月令正義今據補屬思心三字文獻通考引缺他本或作屬王極亦誤惟月令正義作屬思脫心字今據正義以上下文定補時則有心腹之痾注思心氣失之病時則有黃􅌌黃祥維木金水火沴土注志論皆言君不寛容則地動􅏏或疑焉今四行來沴土地乃動臣下之相帥爲畔逆之象君不通於事所致也以爲不寛容亦皆爲陰勝陽臣强君之異案曰自思心之不容至惟木金水火沴土傳並見漢志續漢志鄭注全節惟見文獻通考郊社考及禮記月令正義續漢志缺鄭注志論謂漢書五行志劉向等五行傳論也王之不極是謂不建案曰王字漢志續漢志並作皇劉昭注云尙書大傳作王文獻通考玉海引同注王君也不名體而言王者五事象五行則王極象天也人法天元氣純則不可以一體而言之也天變化爲陰爲陽覆成五行經曰厤象日月星辰敬授民時論語曰爲政以德譬如北辰是則天之通於人政也孔子說春秋曰政以不由王出不得爲政則是王君出政之號也極中也建立也王象天以性情覆成五事爲中和之政也王政不中則是不能立其事也案曰王之不極以下至星辰逆行注見續漢五行志劉注惟注人法天至而言之也續漢志缺見文獻通考厥咎瞀注瞀與思心之咎同耳故子駿傳曰瞀眊眊亂也君臣不立則上下亂矣案曰瞀漢志續漢志引並作眊劉昭注云尙書大傳作瞀鄭注引劉子駿五行傳以眊釋瞀是也文獻通考郊社考引作雺與思心傳同非續漢志注引此注脫子駿二字今從文獻通考厥罰常陰注王極象天天陰養萬物養氣失故常陰也厥極弱注天爲剛德剛氣失故於人爲弱易曰貴而无位高而无民賢人在下位而无輔此之謂弱或云懦不毅也案曰續漢志注引此注毅作敬誤時則有射妖注射王度之極也射人將發矢必先於此儀之發矢則必中於彼矣君將出政亦先於朝廷度之出則應於民心射其象也時則有龍虵之孼注龍蟲之生於淵行於無形游於天者也屬天蛇龍之􅀋也或曰龍無角者曰虵時則有馬禍注天行健馬畜之疾行者也屬王極時則有下人伐上之痾注夏侯勝說伐宜爲代書亦或作代陰陽之神曰精氣情性之神曰魂魄君行不由常侜張無度則魂魄傷也王極氣失之病也天於不中之人恆耆其味厚其毒增以爲病將以開賢代之也春秋傳所謂奪伯有魄者是也不名病者病不著於身體也案曰注味厚其三字續漢志注無見儀禮通解續二十六文獻通考郊社考自時則有龜孼注龜蟲之生至時則有下人伐上之痾注情性之神日魂魄儀禮通解續二十六并缺引今據續漢五行志注文獻通考引補時則有日月亂行星辰逆行注亂謂薄食鬬竝見逆謂贏縮反明經天守舍之􅀋也不言沴天天至尊無能沴之者離逢非沴維鮮之功謂此也案曰續漢五行志注引此節注王君也至守舍之􅀋也缺不言沴天至謂此也二十三字見儀禮通解續二十六維五位復建辟厥沴注君失五事則五行相沴違其位復立之者當明其吉凶變異則知此爲貌邪言輒改過以共禦之至司之口月又必齋肅祭祀以撫其神則凶咎除矣不言六位天不違其位也案曰注君失五事至不違其位也見儀禮通解續案又曰貌邪言下有脫文當以言視聽思心之失與貌邪並列也文獻通考引此注亦略今無從補曰二月三月維貌是司四月五月維視是司六月七月維言是司八月九月維聰是司十月十一月維思心是司十二月與正月維王極是司注司主也此月數夏數也夏數得天之正􅏏或疑焉此用五事之次則四月五月主視六月七月主言非也口五行王相之次則八月九月主聽十月十一月主思心亦非也子駿傳曰二月三月維貌是司四月五月維視是司六月七月惟思心是司八月九月惟言是司十月十一月維聽是司十二月與正月維王極是司於四時之氣似近其􅀋也凡六沴之作歲之朝月之朝日之朝則后王受之歲之中月之中日之中則公卿受之歲之夕月之夕日之夕則庶民受之注自正月盡四月爲歲之朝自五月盡八月爲歲之中自九月盡十二月爲歲之夕上旬爲月之朝中旬爲月之中下旬爲月之夕平且至食時爲日之朝禺中至日昳爲日之中下側至黃昏爲日之夕受之受其凶咎也其二辰以次相將其次受之注二辰謂日月也假令歲之朝也日月中則上公受之日月夕則下公受之歲之中也日月朝則孤卿受之日月夕則大夫受之歲之夕也日月朝則上士受之日月中則下士受之其餘差以尊卑多少則悉矣案曰注歲之中也四字則孤卿受之五字日月夕則四字儀禮通解續文獻通考引並脫惟續漢五行志注具今據補星辰莫同注莫夜也星辰之變夜見亦與晝同初昏爲朝夜半爲中將晨爲夕或曰將晨爲朝初昏爲夕也是離逢非沴維鮮之功注離憂也逢見也是謂憂見之象非沴也言五行非能沴天者也鮮殺也功成也維凶咎之殺已成故天垂變異以示人也禦貌于喬忿注止貌之失者在於喬忿也驕忿者是不恭之形也喬忿謂若傲很明德忿戾無期之􅀋也案曰注謂若上惟儀禮通解續重喬忿二字以其月從其禮祭之參乃從注從順也三祭之其神乃順不怒也禦言于訖衆以其月從其禮祭之參乃從注訖止也止言之失者在於去止衆止衆者是不從之刑也止衆謂若周威厲王弭􅉪以障民口之􅀋也禦視于忽似以其月從其禮祭之參乃從注止視之失者在於去忽似忽似者是不明之刑也忽似謂若亂於是非象龔滔天及不辨鹿馬之􅀋也案曰注謂若上惟儀禮通解續重忽似二字禦聽于怵攸以其月從其禮祭之參乃從注怵讀爲獸不狘之狘攸讀爲風雨所漂颻之颻止聽之失者在於去怵攸怵攸者是不聰之刑也怵攸謂若老夫灌灌小子蹻蹻誨爾訰訰聽我眊眊之􅀋禦思心于有尤以其月從其禮祭之參乃從注尤過也止思心之失者在於去欲有所過欲有所過者是不容之刑也欲有所過謂若昭公不知禮而習小儀不脩政而欲誅季氏之􅀋也案曰注者是不容上儀禮通解續脫有所過三字今增謂若昭公上惟通解續多欲有所過四字禦王極于宗始以其月從其禮祭之參乃從注宗尊也止王極之失者在於尊用始祖之法度不言其惡者人性僃於五德得失在斯王不極則五事皆失非一惡也大者易姓小者滅身其能宗始則錄延其受命之君承天制作猶天之敎命也故掌祖廟之藏者謂之天府也六沴之禮散齊七曰致齊新器絜祀用赤黍三日之朝于中庭祀四方從東方始卒于北方注禮志致齊三日周禮凡祭祀前期十日宗伯帥執事卜日是爲齊一旬乃祀也今此致齊卽祀者欲得容三祀也蓋八日爲致齊期九日朝而初祀亦一旬有一日事乃畢也新器赤黍改過之宐也中庭明堂之庭也或曰朝廷之廷也此祀五精之神其牲器粢盛有常禮記其異者也不祀天非正月亦以此禮祀此神也案曰太平御覽五百二十四引傳致齊下衍三日二字非儀禮通解續文獻通考引並無玩注則傳不當有此二字一本御覽從東方始下衍自南至西四字亦非通解續通考並無御覽引注自禮志至事乃畢也止其祀禮曰格祀注篇名也今亾曰某也方祀曰播國率相行祀注篇中大祝贊主人辭也某天子名也方祀祀四方也播讀曰藩藩國謂侯相助也言諸侯率其常事來卽助行祭之禮也其祝也案曰祝字他書所引作祀今據御覽五百二十四引改注大祝吿神以君悔過之辭也周禮大祝掌六祝之辭以事鬼神祇祈福祥求永貞也曰若爾神靈洪祀六沴是合注神靈謂木精靈威仰火精赤熛怒土精含樞紐金精白招矩水精叶光紀及木帝太皥火帝炎帝土帝黃帝金帝少皞水帝顓頊木官勾􅉭火官祝融土官后土金官蓐收水官􅏏㝠皆是也古者生能其事死在祀典配其神而食合猶爲也六沴是神靈所爲也無差無傾無有不正注言神靈正􅈂無口􅀋所謂口皆是也若民有不敬事則會批之于六沴注若民廣謂天下有過者也事六事也會合也批推也言天下有過神靈亦合內推於六沴天子以天下爲任者也六事之機以縣示我案曰玉海引縣作垂非觀注宐作縣注六事貌言視聽思心王極也機天文也天文運轉以縣見六事之變異示我我謂天子我民人無敢不敬事上下王祀注我與民人無敢不敬畏六事上下君祀之所縣示變異者言皆悔過也上君祀靈威仰下君祀太皞之屬也以上自傳首維王后元祀至上下王祀止傳注並見儀禮經傳通解續卷二十六下因事之祭惟五事鄭注不全又文獻通考卷八十八郊社考祈禳引同但傳注間有詳略玉海天文五引自傳首至上下王祀惟不引六沴之禮至卒於北方又續漢書五行志引貌之不恭至星辰逆行傳注惟思心之不容至木金水火沴土一節注又引凡六沴之作至其次受之傳注又太平御覽八百七十四咎徽部引傳爰用五事至星辰逆行又五百二十四禮儀部三引六沴之禮至上下王祀傳注卷十七時序部二引凡六沴之作至庶民受之又通鑑前編帝舜三十三載引傳首二句禹乃共辟至建用王極傳注今并合諸書參考又周禮疾醫太祝注羊人序官疏文􅃟演連珠注石闕銘注尙書洪範正義禮記月令正義白虎通灾變篇後漢書申屠剛傳注穀梁傳桓十四年注並節引田獵不宿注不宿不宿禽也角主天兵周禮四時習兵因以田獵禮志曰天子不合圍諸侯不掩羣過此則暴天物爲不宿禽角南有天庫將軍騎官飮食不享注享獻也禮志曰天子諸侯無事則歲三田一爲乾豆二爲賓客三爲充君之庖周禮獸人冬獻狼夏獻麋春秋獻獸物此獻禮之大略也出入不節注角爲天門房有三道出入之象也奪民農時注房心農時之候也季冬之月命農師計耦耕事是時房心晨中春秋傳曰辰爲農祥后稷之所經緯也及有姦謀注亢爲朝廷房心爲明堂謀事出政之象則木不曲􅈂注君行此五者爲逆天東宫之政東宫於地爲木木性或曲或􅈂人所用爲器者也無故生不暢茂多有折槁是爲木不曲􅈂木金水火土謂之五材春秋傳曰天生五材民並用之其政逆則神怒神怒則材失性不爲民用其他變異皆屬沴沴亦神怒凡神怒者日月五星旣見適於天矣以上傳自田獵不宿至木不曲􅈂見續漢書五行志一注見劉注棄法律逐功臣注東井主法令也功臣制法律者也或曰喙主尙食七星主衣裳張爲食厨翼主天倡經曰臣作朕股肱耳目予欲左右有民女翼予欲觀古人之象日月星辰山龍華蟲作繢宗彝藻火粉米黼黻絺繡以五采章施于五色作服女明予欲聞六律五聲八音在治曶以出納五言女聽是則食與服樂臣之所用爲大功也七星北有酒旗南有天厨翼南有器府殺太子注五行火生土天文以參繼東井四時以秋代夏殺太子之象也春秋傳曰夫千乘之主將廢正而立不正必殺正也以妾爲妻注軒轅爲后妃屬南宫其大星女主之位女御在前妾爲妻之象也則火不炎上注君行此四者爲逆天南宮之政南宫於地爲火火性炎然上行人所用爲亨飪者也無故因見作􅀬燔熾爲害是爲火不炎上其他變異皆屬沴也以上自棄法律至火不炎上傳並見續漢書五行志二注見劉注案曰續志引火不炎上傳在金不從革之後今依大傳五事之次移前又此節傳亦見開元占經水火占篇治宮室飾臺榭内淫亂犯親戚侮父兄則稼穡不成以上傳自治宫室至稼穡不成見續漢書五行志四好攻戰注參伐爲武府攻戰之象輕百姓注輕之者不重民命春秋傳曰師出不正反戰不正勝也飾城郭注昴畢閒爲天街甘氏經曰天街保塞孔途道衢保塞城郭之象也月令曰四鄙入保注末七字見御覽咎徵部一侵邊竟注畢主邊兵則金不從革注君行此四者爲逆天西宫之政西宮於地爲金金性從形而革人所用爲器者也無故冶之不銷或入火飛亾或鑄之裂形是爲不從革其他變異皆屬沴也以上傳自好攻戰至金不從革見續漢書五行志四注自參伐爲武府至皆屬沴也見續志四劉昭注簡宗廟不禱祠注虚危爲宗廟廢祭祀注牽牛主祭祀之牲逆天時注日在星紀周以爲正日在􅏏􅑎殷以爲正皆不得四時之正逆天時之象也春秋定十五年夏五月辛亥郊譏連卜三正以至失時是其􅀋也則水不潤下注君行此四者爲逆天北宫之政也北宫於地爲水水性浸潤下流人所用灌漑者也無故源流竭絕川澤以涸是爲不潤下其他變異皆屬沴也以上傳自簡宗廟至水不潤下見續漢書五行志三注自虚危爲宗廟至皆屬沴也並見續志三劉昭注又傳田獵不宿以下至末亦見御覽八百七十四咎徵部一無鄭注東方之極自碣石東至日出榑木之野帝太皞神勾􅉭司之自冬日至數四十六日迎春於東堂距􅀖八里堂高八尺堂階八等靑稅八乘旂旐尙靑田車載矛號曰助天生倡之以角舞之以羽此迎春之樂也孟春之月御靑陽左个禱用牡索祀於艮隅貌必恭厥休時雨朔令曰挺羣禁開閉闔通窮室達障塞待優游其禁母伐林木仲春之月御靑陽正室牲先脾設主於戸索祀於震正朔令曰棄怒惡解役罪免優患休罰刑閉關梁其禁田獵不宿飮食不享出入不節奪民農時及有姦謀季春之月御靑陽右个薦用鮪索祀於㢲隅朔令曰宣庫財和外怨撫四方行柔惠止剛强九門磔禳出疫於郊以禳春氣南方之極自北戸南至炎風之野帝炎帝神祝融司之自春分數四十六日迎夏於南堂距􅀖七里堂高七尺堂階七等赤稅七乘旂旐尙赤田車載弓號曰助天養倡之以徵舞之以鼓鼗此迎夏之樂也孟夏之月御明堂左个嘗麥用彘索祀於㢲隅視必明厥休時燠朔令曰爵有德賞有功惠賢良舉力農其禁母隳防仲夏之月御明堂正室牲先肺設主於竃索祀於離正朔令曰振貧窮惠孤寡慮休疾出大祿行大賞其禁棄法律逐功臣殺太子以妾爲妻乃令民雩季夏之月御明堂右个牲先心設主於中霤索祀於坤隅思必睿案曰睿當爲容厥休時風朔令曰起毁宗立無後封廢國立賢輔䘏喪疾中央之極自昆侖中至大室之野帝黃帝神后土司之土王之曰禱用牲迎中氣於中室樂用黃鍾之宫爲民祈福命世婦治服章令民口虐案曰虐字有誤盧氏本缺此字其禁治宮室飾臺榭內淫亂犯親戚侮父兄西方之極自流沙西至三危之野帝少皞神蓐收司之自夏日至數四十六日迎秋於西堂距􅀖九里堂高九尺堂階九等白稅九乘旌旄尙白田車載兵號曰助天收唱之以商舞之以干戚此迎秋之樂也孟秋之月御總章左个嘗穀用犬索祀於坤隅言必從厥休時暘案曰暘當作陽朔令曰審用法僃盜賊禁姦邪飭羣牧謹貯聚其禁母弛戎僃仲秋之月御總章正室牲先肝設主於門索祀於兌正朔令曰謹功築遏溝瀆修囷倉决刑獄趣收斂其禁好攻戰輕百姓飾城郭侵邊竟乃令民畋醵庶甿畢入于室曰時殺將至母罹其菑季秋之月御總章右个薦用田禽索祀於乾隅朔令曰除道路守門閭陳兵甲戒百官誅不法除道成梁以利農夫北方之極自丁令北至積雪之野帝顓頊神糸㝠司之自秋分數四十六日迎冬於北堂距􅀖六里堂高六尺堂階六等黑稅六乘旗旄尙黑田車載甲鐵號曰助天誅唱之以羽舞之以于戈此迎冬之樂也孟冬之月御􅏏堂左个祈年用牲索祀於乾隅聽必聰厥休時寒朔令曰申羣禁修障塞畢積聚繫牛馬收澤賦其禁母作淫巧仲冬之月御􅏏堂正室牲先腎設主於井索祀於坎正朔令曰􅊧外徒止夜樂誅詐僞省醖釀謹閉關其禁簡宗廟不禱祀廢祭祀逆天時乃令民罷土功季冬之月御􅏏堂右个薦用魚索祀於艮隅朔令曰省牲牷修農器收秸薪築囹圄謹葢藏乃大儺以禳疾命國爲酒以合三族君子說小人樂以上自東方之極至此見明黃佐六藝流別卷十七五行篇案曰六藝流別全載五行傳一篇自維王后元祀至上下王祀下卽接東方之極云云至小人樂惟無六沴之禮至卒於北方之節及田獵不宿至水不潤下一節篇題下云伏生尙書大傳紀帝舜命禹攝政初祀事盧氏本與六藝流別同而多六沴之禮一節及末田獵不宿至水不潤下一節今以盧本末一節咎徵移置東方之極云云之前於文爲順案又曰此節據六藝流别明云帝舜命禹攝政初祀事碻是伏書然其文頗不􅀋伏書又時與伏書相複他書亦無有稱引者惟皇覽稱逸禮與此大同皆可疑也尙書大傳卷三受業嘉應吳蘭修校
