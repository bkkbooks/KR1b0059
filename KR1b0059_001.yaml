body:
  text: 唐傳一堯典主春者張昏中可以穜穀主夏者火昏中可以穜黍叔主秋者虛昏中可以穜麥主冬者昴昏中可以收斂蓋藏田獵斷伐當告乎天子而天子賦之民故天子南面而視四星之中知民之緩急急則不賦籍則不舉力役故曰敬授人時此之謂也東方者何也動方也物之動也何以謂之春春出也萬物之出也故曰東方春也南方者何也任方也任方者物之方任何以謂之夏夏者假也吁荼萬物而養之外也故曰南方夏也西方者何也鮮方也鮮訊也訊者始入之貌始入者何以謂之秋秋者愁也愁者萬物愁而入也故曰西方者秋也北方者何也伏方也萬物之方伏物之方伏則何以謂之冬冬者中也中也者萬物方藏于中也故曰北方冬也陽盛則吁荼萬物而養之外也陰盛則呼吸萬物而藏之內也故曰吁吸也者陰陽之交接萬物之終始寅餞入日辨秩西成傳曰天子以秋命三公將帥選士厲兵以征不義決獄訟斷刑罰趨收斂以順天道以佐秋殺辨在朔易日短朔始也傳曰天子以冬命三公謹蓋藏閉門閭固封竟入山澤田獵以順天道以佐冬固藏也孔子對子張曰男子三十而娶女子二十而嫁女二十而通織紝績紡之事黼黻文章之美不若是則上無以孝于舅姑下無以事夫養子也舜父頑母嚚不見室家之端故謂之鰥書曰有鰥在下曰虞舜否不也堯為天子丹朱為太子舜為左右堯知丹朱之不肖必將壞其宗廟滅其社稷而天下同賊之故堯推尊舜而尚之屬諸侯焉納之大麓之野烈風雷雨不迷致之以昭華之玉舜漁于靁澤之中陶于河濱販于頓丘就時負夏舜耕于歷山夢眉與髮等舜修五禮五玉三帛舜以天德嗣堯西王母來獻白玉琯正月上日受終于文祖在旋機玉衡以齊七政旋機者何也傳曰旋者還也機者幾也微也其變幾微而所動者大謂之旋機是故旋機謂之北極受謂舜也上日元日萬物非天不生非地不載非春不動非夏不長非秋不收非冬不藏故書煙于六宗此之謂也古者圭必有冒言下之必有冒不敢專達也天子執冒以朝諸侯見則覆之故冒圭者天子所以與諸侯為瑞也諸侯執所受圭以朝于天子瑞也者屬也無過行者得復其圭以歸其國有過行者留其圭能正行者復之三年圭不復少黜以爵六年圭不復少黜以地九年圭不復而地畢削此謂諸侯之朝於天子也義則見屬不義則不見屬維元祀巡狩四嶽八伯壇四奧沈四海封十有二山兆十有二州樂正定樂名元祀代泰山貢兩伯之樂焉陽伯之樂舞侏離其歌聲比余謠名曰晳陽儀伯之樂舞鼚哉其歌聲比大謠名曰南陽中祀大交霍山貢兩伯之樂焉夏伯之樂舞謾彧其歌聲比中謠名曰初慮羲伯之樂舞將陽其歌聲比大謠名曰朱于秋祀柳穀華山貢兩伯之樂焉秋伯之樂舞蔡俶其歌聲比小謠名曰苓落和伯之樂舞玄鶴其歌聲比中謠名曰歸來幽都宏山祀貢兩伯之樂焉冬伯之樂舞齊落歌曰縵縵并論八音四會歸假于禰祖用特五載一巡守群后德讓貢正聲而九族具成雖禽獸之聲猶悉關于律樂者人性之所自有也故聖王巡十有二州觀其風俗習其性情因論十有二俗定以六律五聲八音七始著其素蔟以為八此八伯之事也分定於五此五嶽之事也五聲天音也八音天化也七始天統也古者巡守以遷廟之主行出以幣帛皮圭告于祖遂奉以載于齊車每舍奠焉然後就舍反必告奠卒斂幣玉藏之兩階之間蓋貴命也五年一朝王者亦貴得天下之歡心以事其先王因助祭以述其職故分四方諸侯為四輩輩主一時古者諸侯于天子五年一朝見其身述其職述其職者述其所職也見諸侯問百年大師陳詩以觀民風俗命市納賈以觀民好惡山川神祇有不舉者為不敬不敬者削以地宗廟有不順者為不孝不孝者黜以爵變禮易樂者為不從不從者君流改制度衣服為畔畔者君討有功者賞之書曰明試以功車服以庸以賢制爵以庸制祿故人慎德興功輕利而重義古之帝王必有命民民能敬長憐孤取舍好讓舉事力者命于其君得命然後得乘飾車駢馬衣文駢錦未有命者不得衣不得乘乘衣有罰庶人木車單馬衣布帛未命為士者車不得有飛軨不得朱軒古者諸侯之於天子也三年一貢士天子命與諸侯輔助為政所以通賢共治示不獨專重民之至大國舉三人次國舉二人小國舉一人一適謂之攸好德再適謂之賢賢三適謂之有功有功者天子一賜以車服弓矢再賜以秬鬯三賜以虎賁百人號曰命諸侯命諸侯得專征得專征者鄰國有臣弒其君孽代其宗者弗請于天子征之而歸其地于天子可也有不貢士謂之不率正不率正者天子絀之一不適謂之過再不適謂之敖三不適謂之誣誣者天子絀之一絀少絀以爵再絀少絀以地三絀而爵地畢唐虞象刑而民不敢犯苗民用刑而民興犯漸唐虞之象刑上刑赭衣不純中刑雜屨下刑墨幪以居州里而民恥之唐虞象刑犯墨者蒙皂巾犯劓者赭其衣犯臏者以墨𢄐臏處而畫之犯大辟者布衣無領帝猶反側晨興闢四門來仁賢書曰三歲考績三考黜陟幽明其訓曰三歲而小考者正職而行事也九歲而大考者黜無職而賞有功也其賞有功也諸侯賜弓矢者得專征賜鈇鉞者得專殺賜圭瓚者得為鬯以祭不得專征者以兵屬於得專征之國不得專殺者以獄屬於得專殺之國不得賜圭瓚者資鬯於天子之國然後祭三年一使三公黜陟天子三公一曰司徒公二曰司馬公三曰司空公百姓不親五品不訓則責之司徒蠻夷滑夏寇賊姦宄則責之司馬溝瀆雍遏水為民害則責之司空舜讓于德不怡惟刑之謐哉堯南撫交址堯時麒麟在郊藪堯使契為田
