body:
  text: 虞夏傳四禹貢夏成五服外薄四海東海魚須魚目南海魚革珠璣大貝西海魚骨魚幹魚脅北海魚劍魚石出瑱擊閭河魭江鱓大龜五湖玄唐鉅野蔆鉅定蠃濟中詹諸孟諸靈龜降谷玄玉大都𩷏魚魚刀咸會於中國五嶽視三公四瀆視諸侯其餘山川視伯小者視子男高山大川五嶽四瀆之屬五嶽謂岱山霍山華山恆山嵩山也江河淮濟為四瀆禹奠南方霍山五嶽皆觸石而出雲扶寸而合不崇朝而雨天下大川相閒小川相屬東歸於海非水無以準萬里之平非水無以通遠道任重也東原底平大而高平者謂之大原下而平者謂之隰隰之言溼也下溼曰隰澤障曰陂順流而下曰沿文皮千合禺鐵熒播既都被明都甘誓王者存二代之後與己為三所以通三統立三正是故周人以日至為正殷人以日至三十日為正夏以日至六十日為正周以至動殷以萌夏以牙天有三統物有三變故正色有三天有三生三死故土有三王王持一生死是故夏以孟春為正殷以季冬為正周以仲冬為正夏以十三月為正色尚黑以平旦為朔殷以十二月為正色尚白以鷄鳴為朔周以十一月為正色尚赤以夜半為朔不以三月後為正者萬物不齊莫適所統故必以三微之月為歲之三正也三統者所以序生也三正者所以統天下也是故三統三正若循連環周則又始窮則反本也夏以孟春為正者貴形也戰者憚驚之也王者一質一文據天地之道三王之治若循環之無端如水之勝火
