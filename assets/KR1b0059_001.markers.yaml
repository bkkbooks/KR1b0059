  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 尙書大傳卷二虞夏傳皋繇謨翊輔也華嚴經第七十四音義卷下引尙書大傳案曰此今文尙書夙夜翊明有家之訓今文見史記五帝本紀古者諸侯之於天子也三年一貢士天子命與諸侯輔􅂇爲政所以通賢共治示不獨專重民之至大國舉三人次國舉二人小國舉一人一適謂之攸好德注適猶得也注見後漢書蔡邕傳注再適謂之賢賢三適謂之有功有功者天子賜以車服弓矢再賜以秬鬯三賜以虎賁百人號曰命諸侯命諸侯得專征者鄰國有臣弑其君孼伐其宗者注孼支子也宗適子也注見儀禮經傳通解集注三十三雖弗請於天子而征之可也征而歸其地於天子注征伐也注見儀禮通解集注有不貢士謂之不率正者注率循也正由也注見儀禮通解集注天子絀之一不適謂之過注謂三年時也再不適謂之敖注謂六年時也三不適謂之誣注謂九年時也注見禮記射義正義誣者天子絀之一絀少絀以爵注言少絀明以漸也再絀少絀以地三絀而爵地畢注凡十五年後漢書左周黃傳論注儀禮經傳通解王制之已有不貢士以下十字通解引作諸侯之有不率正者又見禮記射義正義小異路史後紀十一陶}
