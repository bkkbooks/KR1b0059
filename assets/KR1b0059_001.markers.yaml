  - {type: variant, offset: 1912, length: 5, content: 南撫交阯堯, SBCK: 典傳一入太誓傳周以至動一條檀弓正義公羊傳隱元年疏竝云略說文而此本入甘誓傳古之帝王必有大學小學一條王制正義引作周傳天子諸侯必有公桑􅁞室一條毛詩瞻卬正義引作夏傳祭之爲言察也一條御覽五百二十四引作周傳此本皆誤入略說又說命傳似當爲毋逸傳毋佚其在高宗乃或諒陰三年不言武成傳似當爲牧誓傳今文牧誓載史記微子之命似當爲微子麥秀之歌當在行遯}
  - {type: variant, offset: 1912, length: 5, content: 南撫交阯堯, krp: 典傳一入太誓傳周以至動一條檀弓正義公羊傳隱元年疏竝云略說文而此本入甘誓傳古之帝王必有大學小學一條王制正義引作周傳天子諸侯必有公桑𧖟室一條毛詩瞻卬正義引作夏傳祭之爲言察也一條御覽五百二十四引作周傳此本皆誤入略說又說命傳似當爲毋逸傳毋佚其在高宗乃或諒陰三年不言武成傳似當爲牧誓傳今文牧誓載史記微子之命似當爲微子麥秀之歌當在行遯}
