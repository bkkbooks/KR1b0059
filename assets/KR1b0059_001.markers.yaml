  - {type: variant, offset: 1721, length: 0, content: '', WYG: 予辯下土使民平平使民無傲玉海虞傳有九共篇夏書禹之君民也罰弗及強而天下治天子衣服其文華蟲作繢宗彛藻火山龍諸侯作繢宗彛藻火山龍子男宗彛藻火山龍大夫藻火山龍士山龍又曰山龍青也華蟲黄也作繢黒也宗彛白也藻火赤也天子服五諸侯四次國服}
