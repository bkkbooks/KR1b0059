  - {type: variant, offset: 1215, length: 0, content: '', WYG: 其餘山川視伯小者視子男尚書正義云其尊卑所視王制及書傳之文鄭𤣥曰謂視其牲幣粢盛籩豆爵獻之數五岳皆觸石出雲扶寸而合不崇朝而雨天下後漢章帝紀注藝文類聚引大傳鄭𤣥曰四指為寸扶音膚惟元祀廵守一作狩四嶽八伯壇四奥沉四海封十有二山兆十有二州樂正定樂名元祀代泰山貢兩伯之樂焉東嶽陽伯之樂舞侏一作株離其歌聲比余謡名曰晳陽儀伯之樂舞鼚哉其歌聲比大南名曰南陽中祀大交霍山貢兩伯之樂焉夏伯之樂舞謾哉一作或其歌聲比中謡名曰初慮羲伯之樂舞將陽其歌聲比大謡名曰朱干干一作}
