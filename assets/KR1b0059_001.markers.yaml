  - {type: variant, offset: 0, length: 718, content: 唐傳一堯典主春者張昏中可以穜穀主夏者火昏中可以穜黍尗主秋者虛昏中可以穜麥主冬者昴昏中可以收斂蓋藏田獵斷伐當告乎天子而天子賦之民故天子南面而視四星之中知民之緩急急則不賦籍則不舉力役故曰敬授人時此之謂也東方者何也動方也物之動也何以謂之春春出也萬物之出也故曰東方春也南方者何也任方也任方者物之方任何以謂之夏夏者假也吁荼萬物而養之外也故曰南方夏也西方者何也鮮方也鮮訊也訊者始入之皃始入者何以謂之秋秋者愁也愁者萬物愁而入也故曰西方者秋也北方者何也伏方也萬物之方伏物之方伏則何以謂之冬冬者中也中也者萬物方藏于中也故曰北方冬也陽盛則吁荼萬物而養之外也陰盛則呼吸萬物而藏之內也故曰吁吸也者陰陽之交接萬物之終始寅餞入日辯秩西成傳曰天子以秋命三公將帥選士厲兵以征不義決獄訟斷刑罰趨收斂以順天道以佐秋殺辯在朔易日短朔始也傳曰天子以冬命三公謹蓋藏閉門閭固封竟入山澤田獵以順天道以佐冬固藏也孔子對子張曰男子三十而娶女子二十而嫁女二十而通織紝績紡之事黼黻文章之美不若是則上無以孝于舅姑下無以事夫養子也舜父頑母嚚不見室家之端故謂之鰥書曰有鰥在下曰虞舜否不也堯為天子丹朱為太子舜為左右堯知丹朱之不肖必將壞其宗廟滅其社稷而天下同賊之故堯推尊舜而尚之屬諸侯焉納之大麓之野烈風雷雨不迷致之以昭華之玉舜漁于靁澤之中陶于河濱販于頓丘就時負夏舜耕于歷山夢眉與髮等舜修五禮五玉三帛舜以天德嗣堯西王母來獻白玉琯正月上日受終于文祖在旋機玉衡以齊七政旋機者何也傳曰旋者還也機者幾也微也其變幾微而所動者大謂之旋機是故旋機謂之北極受謂舜也上日元日萬物非天不生非地不載非春不動非夏不長非秋不收非冬不藏故書煙于六宗此之謂也古者圭必有冒言下之必有冒不敢專達也天子執冒以朝諸侯見則覆之故冒圭者天子所以, WYG: ''}
