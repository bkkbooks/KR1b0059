  - {type: variant, offset: 1719, length: 0, content: '', WYG: 選注詩疏孔子曰舜以天徳嗣堯西王母來獻白玉琯白虎通溝瀆壅遏水為民害田廣不墾則責之司空百姓不親五品不順則責之司徒蠻夷猾夏冦賊姦軌則責之司馬藝文類聚北堂書抄舜無登而髙不行而逺拱揖於天下而天下稱仁舜好生惡殺鳳凰巢其木一作樹仁閔覆下則稱旻天説文引虞書今尚書歐陽説春曰昊天夏曰蒼天秋曰旻天冬曰上天詩周禮爾雅疏舜將禪禹八風脩一作循通歌大化大訓六府九原而夏道興鄭𤣥曰四章皆歌禹之功所謂九叙惟歌九徳之歌于此猶可攷惟五祀奏鍾石奏一作定論人聲及乃鳥獸咸變於前秋養耆老而春食孤子一作春食餔於乃浡然招樂興於大麓之野報一作執事還歸二年談然談一作䜎一作􅨳乃作大唐之歌其樂曰舟張辟雝鶬鶬相從八風囬囬鳳皇喈喈歌者三年昭然乃知乎王世明有不世之義招為賔客雍為主人始奏肆夏納以孝成舜為賔而禹為主人樂正道贊曰尚考太室之義唐為虞賔至今衍於四海成禹之變時俊乂百工相和而歌卿雲帝唱之曰卿雲爛兮禮一作糺一作紏李善引大傳作體縵縵兮一作漫漫日月光華旦復旦兮八伯咸進稽首曰明明上天爛然星陳日月光華𢎞於一人帝乃載歌曰日月有辰一作常一作恒星辰有行四時從一作順經萬姓幾誠一作百姓允臧一作萬物允成施于論樂配天之靈遷於賢聖莫不咸聼鼚乎皷之軒乎儛之精華已竭一作英華欲遂褰裳去之於時八風循涌卿雲藂藂蟠龍僨信於其藏蛟魚躍踊於其淵魚鱉咸出於其穴遷虞而事夏也鄭𤣥曰舜始欲改堯樂百獸之屬率舞談猶灼也大唐之歌美堯禪也招雍皆樂章名也賔入奏招主入奏雍也始謂尸入時也納謂薦獻時也肆夏孝成指樂章名也舜既使禹攝天子之事于祭祀避之居賔客之位獻酒則為亞獻尚考猶言古考謂徃時也太室明堂之中央室也義當為儀儀禮也謂祭太室禮堯為舜賔之也衍猶溢也言堯之禪天下至於今其徳義溢於四海也縵縵教化廣逺也復旦明明相代也藂藂言和氣相應也十有四祀鐘石笙筦變聲樂未罷疾風發屋天大雷雨帝沈首而笑曰明哉非一人天下也乃見於鐘石路史聖人與聖也猶規之相周矩之相襲文選注九共傳}
