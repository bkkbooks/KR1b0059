  - {type: variant, offset: 5, length: 0, content: '', SBCK: 益稷合於皋陶謨盤庚三篇合爲一康王之誥合於顧命經典釋文曰卽馬鄭所注二十九篇案曰二十九篇古文分合皆與伏生本同惟顧命一篇馬分王出在應門以下爲康王之誥耳今之舜典古文今文皆合於堯典今之益稷古文今文皆合於皋陶謨蓋百篇固別有舜典益稷古文益稷作棄稷而漢世求之不得僞孔乃于堯典皋謨各謬析爲二篇也漢書五行志董仲舒治公羊春秋始推陰陽爲儒者宗宣元之後劉向治穀梁春秋數其禍福傳以洪範與仲舒錯至向子歆治左氏傳其春秋意已乖矣言五行傳又頗不同孝武時夏矦始昌通五經善推五行傳以傳族子夏矦勝下及許商皆以敎所賢弟子其傳與劉向同唯劉歆傳獨異漢書楚元王傳成帝卽位詔向頜校中五經秘書向見尙書洪範箕子爲武王陳五行陰陽休咎之應向乃集合上古以來厯春秋六國至秦漢符瑞灾異之記推迹行事連傅禍福著其占驗比􅀋相從各有條目凡十一篇號曰洪範五行傳論奏之贊曰劉氏洪範論發明大傳著天人之應漢書夏侯勝傳從始昌受尙書及洪範五行傳說灾異會昭帝崩昌邑王嗣立數出勝當乘輿前諫曰天久陰而不雨臣下有謀上者陛下出欲何之王怒謂勝爲妖言縛以屬吏吏白大將軍霍光是時光與車􅀐將軍張安世謀欲廢昌邑王光讓安世以爲泄語安世實不言廼召問勝勝對言在洪範傳曰皇之不極厥罰常陰時則下人有伐上者惡察察言故云臣下有謀光安世大驚以此益重經術士漢書李尋傳治尙書獨好洪範灾異晉書五行志文帝時宓生創紀大傳其言五行庶徵僃矣班固據大傳采仲舒劉向劉歆著五行志宋書五行志伏生剏紀大傳五行之體始詳水經注卷五河水篇漯水又東逕漢徵君伏生墓南碑碣尙存以明經爲秦博士秦坑儒士伏生隱焉漢興敎於齊魯之間􅁧五經尙書大傳文帝安車徵之年老不行乃使掌故歐陽生等受尙書於徵君號曰伏生者也案曰伏生未嘗徧􅁧五經掌故受尙書者乃􅏯錯非歐陽生水經注有誤後漢書鄭􅏏傳凡􅏏所注周易尙書毛詩儀禮禮記論語孝經尙書大傳中候乾象厤又著天文七政論魯禮禘祫議六藝論毛詩譜駮許愼五經異議答臨孝存周禮難凡百餘萬言孝經序疏鄭志目錄記鄭之所注五經之外有中候大傳七政論乾象厤六藝論毛詩譜答臨碩難周禮許愼異義釋廢疾發墨守箴膏肓答甄守然等書經典釋文序錄尙書大傳三卷伏生作隋書經籍志尙書大傳三卷鄭􅏏注大傳音三卷顧彪􅁧尙書洪範五行傳論十一卷漢光祿大夫劉向注伏生尙書傳四十一篇以授同郡張生張生授千乘歐陽生濟南伏生之傳惟劉向父子所著五行傳是其本法而又多乖戾隋書五行志易以八卦定吉凶書以九疇論休咎春秋以灾祥驗行事漢時有伏生董仲舒京房劉向之倫能言灾異六經有足觀者初學記伏生爲尙書傳四十一篇歐陽大小夏矦傳其學各有能名是曰今文尙書劉向五行傳蔡邕勒石經皆其本舊唐書經籍志尙書暢訓三卷伏勝注案曰尙書大傳有略說一篇諸經義疏每引之隋志無大傳而有暢訓伏生無此書暢訓當爲略說形近之譌三卷當爲一卷此伏生所􅁧不可謂注舊志此條多謬新唐書亦然第新書列大傳三卷又出暢訓一卷疑舊志尙有脫誤尙書洪範五行傳論十一卷劉向􅁧唐書藝文志伏勝注大傳三卷暢訓一卷劉向洪範五行傳論十一卷册府元􅀛顧彪􅁧大傳音三卷崇文總目尙書大傳三卷漢濟南伏勝􅁧後漢大司農鄭􅏏注伏生本秦博士以章句授諸儒故博引異言援經而申證云見文獻通考中興書目鄭康成敘曰葢自伏生也伏生爲秦博士至孝文時年且百歲張生歐陽生從其學而授之音聲猶有譌誤先後猶有差舛重以篆隷之殊不能無失生終後數子各論所聞以已意彌縫其闕別作章句又特撰大義因經屬指名之曰傳劉子政校書得而上之凡四十一篇至􅏏始詮次爲八十三篇見玉海卷三十七郡齋讀書志尙書大傳三卷右秦伏生勝􅁧鄭康成注下與中興書目同今本四卷首尾不倫􅀡齋書錄解題尙書大傳凡八十有三篇當是其徒歐陽張生之徒雜記所聞然未必當時本書也印板刓闕合更求完善本葉夢得曰自安國學行歐陽氏遂廢今世所見惟伏生大傳首尾不倫言不雅馴至以天地人四時爲七政以金縢作於周公殁後何可盡據其流爲劉向五行傳夏矦氏灾異之說失孔子本意益遠遂初堂書目尙書􅀋尙書大傳不注卷數文獻通攷經籍攷尙書大傳三卷通志藝文略伏生大傳三卷鄭􅏏注洪範五行傳論十一卷漢光祿大夫劉向五行傳記一篇漢許商宋史藝文志伏勝大傳三卷鄭􅏏注宋史李燾傳尙書大傳雜記一卷孫退谷承澤庚子銷夏記唐王維伏生圖摩詰妙畫傳世者人止知有江干雪霽圖余曾一見之乃後人臨本至人物之妙有非唐人所能及者伏生圖一老儒生伏几而坐手持一卷乃授經圖也宋高宗題簽云王維寫濟南伏生上用乾卦小圓璽卷舊在金陵黃琳家顧遯園客座贅譚載都元敬嘗在黃美之家見此圖驚嘆不置不知何年入故內今復傳出劉體仁公㦷七頌堂識小錄伏生圖席地憑几短鬚雞皮眞九十老人而眉目靜遠則大儒也宣和題王維寫伏生數字字極楷上用乾卦印背亦精絹装朱彜尊王維伏生圖跋右王維所􅀞伏生上有宋思陵題字庚戌十月觀于退谷孫侍郞齋生濟南人也予遊濟南于長白山之陰相生墓案曰水經注漯水又東逕漢徵君伏生墓南云云見其祠宇庳隘至不容筵几有司牲醪歲時之饗或闕焉不修世人無知重生者葢經學之不明久矣思秦之時書生訟言封禪致有坑儒之禍生爲秦博士得免其明哲有過人者及漢興隱士􅀒一時之望莫若商山四皓初未聞講習經義傳之弟子則其年雖八十餘衣冠甚偉與土木何異生獨能于微言旣絕之時敎學齊魯老而益勤卒傳之晁錯斯文未喪天若有意于生而錫之年者百世之後宜師其人而識其貌焉維之所畫特想像爲之而已然蓺事旣神其精思所感必或見之觀是圖者不問知其爲生此思陵所以寶惜而親題之也世之法書善畫多祕之內府人旣未得觀間復流傳于世藏之者非其人則觀者亦取非其人此書畫之厄也是圖之得歸孫氏非至幸與再題王維伏生圖是圖庚戌冬觀于北平孫侍郞塾室因跋其尾旣而歸干棠邨梁相國今爲漫堂宋公所藏主雖三易不墮秦會之賈師憲嚴惟中之手濟南生亦幸矣桉中興書目館閣續錄桉曰宋嘉定間人編次維所畫濟南伏生圖曾歸祕閣儲藏故宋元以來題跋獨少宋公定爲眞蹟知孫梁二公賞鑒略同也案曰宣和畫譜王維寫濟南伏生像亦見淸河書畫舫建立伏博士始末載陽湖孫氏平津館叢書嘉慶元年十二月十一日署按察使司孫咨山東學院曹爲咨呈事本司査國家擇先聖賢之後置五經博士授以世職所以崇儒重道典禮優渥其制仿自明景泰時歴代增置至我朝修明祀典自孔門十哲上溯周公旁及關裔下至宋儒皆爲置立五經博士至周至備考列朝五經博士之設或以制禮作樂或以身通六藝或以闡揚道統惟漢代諸儒承秦絶學之後傳授經文經義去古不遠皆親得七十子之傳若伏生鄭康成其功在經學絕續之際較七十子爲難又迥在唐宋諸儒之上今世祠墓子孫現在本屬鄒平高密之境允宜會同貴院將二賢學行奏請國家予以曠典以昭先賢傳道之報考尙書出於伏生壁藏又口授其義始有今文廿八篇顯於世及孔壁得古文書孔安國以今文讀之其無今文可証者凡十六篇竟不能讀又無能註者謂之逸書存于故府今之孔傳梅頥所上非孔壁古文朱文公疑之是漢無伏生則尙書不傳傳而無伏生亦不明其義卽古文書後出孔壁無伏生之今文亦不能識讀是伏生一人爲唐虞三代微言道統之所寄今鄒平有伏氏諸城有宓氏皆其後也鄭康成爲東州大儒於易書詩禮論語孝經皆有傳註欽定諸經義疏多引鄭注唐儒正義推闡其說宋儒章句沿襲其詞至乎三代禮儀服物典章周程張朱註解不出鄭註範圍亦或遜其精密故范史以孔書遂明稱之核其行事見于史傳亦無可議今其祠墓子孫現在高密前學院阮曾加修葺又爲設奉祀生或以前代置五經博士重在道統不知道存乎經統本于堯舜禹湯文武伏生不傳尙書道何所存統何所述東晉板蕩經師失傳諸經之義豈能臆說賴鄭康成集漢儒之大成經義無康成則淵源幾絕唐宋諸儒何由復傳道統幸値我國家久道化成興廢繼絕伏生鄭康成祠墓子孫適在東省地方官自宜陳請增置五經博士以爲世職維學院有激揚風化之責事關崇奉先賢本司不便專政爲此咨呈貴院挈本司銜名具稿上聞並祈指正裁奪賜覆施行嘉慶三年十二月初三日鄒平縣知縣李詳濟南府金爲查明先賢嫡裔詳請承襲以隆祀典事卷查嘉慶二年正月初四日􅀩本府票內開一件爲咨呈事嘉慶元年十二月十六日􅀩學院曹牌開嘉慶元年十二月十一日據署臬司孫咨稱先儒伏生鄭康成宜陳請增置五經博士等情到院查五經博士承襲定例由藩司核議詳請撫部院具題咨部辦理兹據呈請增設事關題請應飭該地方官查明伏生鄭康成嫡裔開造事實淸册妥議通詳等因到府合行轉飭又於嘉慶三年五月二十一日􅀩本府憲票前事內開本年五月十二日􅀩布政司票開前准臬司咨查先儒伏生後裔伏氏係鄒平縣人增置五經博士以光祀典等因當經抄錄行查去後迄今日久未據詳覆合行飭催等因到縣􅀩此遵卽差查去後嗣據卑縣伏生鄕伏中興同伏敬祖呈稱爲遵諭陳明懇恩轉詳事切身始祖名勝爲秦博士及漢文時口授傳今文尙書宋咸平三年追封乘氏伯居古濟南城東關今祠墓在鄒平城者十八里二世三世四世名諱無考至五世祖孺當漢武時客東武因家焉六世七世亦無考八世祖名理當代名儒受詩于匡衡九世祖名湛漢成時拜大司徒封陽都侯家藏宗圖二世三世四世以及六世七世闕名與漢書所載伏氏世系適相符合實無從再爲􅃀查闕文十世祖名翕爲湛之子亦嗣陽都侯爵至十六世祖典當漢獻時國除累世傳至元代有名伏步者當順帝末年靑州府屬縣兵􅂽特甚遷居鄒平北鄕載在家乘步係始祖四十六世孫湛祖三十八世孫此回籍鄒平之始祖也又傳至六十一世名永芳前任縣主程於康熈三十五年選爲奉祀乾隆十一年前任縣主雷又選身父名紹先爲奉祀均􅀩賜給縣文可驗又傳至身爲始祖六十三世孫身姪孫爲始祖六十五世孫現今􅀩各憲飭查後裔宜陳請增置五經博士身年已老邁不堪承襲身姪孫敬祖年十歲現在從師肄業於嘉慶元年奉祀陪祭爲始祖六十五世孫爲湛祖五十七世孫守墓祭奠歴經數百年矣理合將遷徙回籍緣由懇請轉詳上憲奏請授敬祖世襲五經博士以昭二千餘年曠典伏祈恩准轉詳計粘呈宗圖一紙等情據此卑職會同儒學覆查無異該鄒平縣知縣李瓊林查看得奉憲飭査先儒伏生後裔請增置五經博士一案緣伏生名勝爲秦博士及漢文時口授今文尙書至宋咸平時追封乘氏伯居古濟南城東關今祠墓在卑職城北十八里伏生鄕春秋官爲致祭伏生五世孫伏儒漢武時遷居東武卽今之靑州府屬也載在漢書至元代有名伏步者係伏生四十六世孫當順帝末年値靑屬兵􅂽遷居卑縣城北伏生鄕累世相傳至六十一世名永芳康熈年間前任程令選爲奉祀令其陪祭至乾隆十一年間前任雷令又選六十二世孫伏繼宗之兄伏紹先爲奉祀生均未詳給部照今紹先之子伏中興係伏生六十三世孫現在年老務農不能承襲惟査六十五世孫敬祖年甫十齡從師讀書克承儒業卑職伏思國家崇儒重道凡先賢後裔咸增置五經博士以昭曠典今查先儒伏生自秦火之後口授尙書今文二十八篇以顯於世是漢無伏生則尙書不􅀓􅀓而無伏生亦不明其義誠如前臬憲所咨伏生一人爲唐虞三代微言道統之所寄允宜選擇嫡裔早爲承襲以昭褒崇盛典今查伏敬祖是否係伏生嫡派長支長孫除宗圖之外别無考証惟盡卑縣境内現在除伏繼宗伏中興伏敬祖三人並無伏姓其人則伏敬祖爲伏生嫡派似無疑義應請卽令伏敬祖承襲五經博士以符盛典緣奉飭議理合取具宗圖並地隣戸族甘結造具履歴淸册加具印結會同儒學具文祥請憲臺察核施行嘉慶五年十二月初十日布政使司全詳巡撫部院惠爲詳請增設五經博士以光祀典事嘉慶五年四月初三日􅀩前巡撫部院蔣批據鄒平縣先儒伏生增設五經博士緣由􅀩批查增設五經博士事關鉅典未便草率據詳先儒伏氏祠墓子孫俱在該縣城北有無碑誌書籍考証其祠堂建始何年現在作何修理墓道何所曾否設有奉祀生現在本支人數若干詳內均未查明聲敘礙難核辨仰布政司轉飭詳細􅃀切查明祠墓實據取具世系宗譜圖說詳請察奪仍候學院批示繳等因批司􅀩此當經錄批轉飭詳查祠墓實據去後兹據濟南府知府德生詳據鄒平縣知縣李瓊林詳稱遵卽覆査據卑縣伏生鄕伏繼宗呈稱緣身始祖名勝前爲秦博士宋咸平二年追封乘氏伯爵配享聖廟東廡墓在鄒平縣城北一十八里伏生鄕卽今縣誌所載古濟南郡東關也其祠之創建年遠莫稽墓前碑記至順二年重修禮部尙書張起巖撰文後歴元明以及國朝重修數次俱有縣誌碑文可考縣誌内載伏墓林煙圖爲邑十六景之一又載墓有牆旁有祠祠旁有書院爲朔望講學之所今墓與書院俱廢僅有墓坵墓道碑在鄒邑城東七里舖東西大路北與墓南北對値相隔十八里墓東南旁現有祠三間東西書樓二座祭庭三間大門一座查漢書載伏生世系始祖名勝卽傳經之伏生二世無名三世有記載無名四世無名五世名儒武帝時客東武因家焉六世七世俱無名八世名理當代大儒以詩授成帝至湛爲始祖九世孫光武徵拜大司徒封陽都侯漢書與身家所傳譜系相合雖有闕名實足信古而傳後且嘗考家乘圖說有始祖四十六世孫名步爲身十七世祖當元朝末年自靑歸鄒世守祠墓治祭陪祭已數百餘年至康熈三十五年前任縣主程選身父名永芳爲奉祀名載重修碑記乾隆十二年前任縣主雷又選身堂兄名紹先爲奉祀給縣印札實未領有部照紹先係現在詳請承襲五經博士伏敬祖之曾祖也現今本支人數身爲始祖六十二世孫外惟姪曾孫敬祖爲始祖六十五世孫身年七十六歲無子嗣敬祖年十歲祖父皆没從師温習四書並熟易書詩三經則爲乘氏伯嫡裔大宗堪充􅄈設五經博士􅃟者止有敬祖一人身伏思傳經支葉閱二千餘年之久僅存此一老一幼零丁狐獨如一線之未絕耳懇恩轉詳計粘宗圖一紙等情據此卑職覆查無異擬合取具宗圖具文詳請本府核轉等情到府卑府覆查無異擬合將送到宗圖册結轉詳本使司核轉等情到司據此該本使司查得先儒伏生爲有漢大儒口授尙書于秦火之餘厥功甚鉅似宜􅃟擇嫡裔承襲博士以光祀典兹據濟南府縣查明伏生六十五代孫伏敬祖克承儒業堪膺充補五經博士之職取造册結宗圖前來理合備由具文詳請憲臺察核施行嘉慶七年正月十九日山東巡撫和疏題爲請詳增設五經博士以光祀典事云云該臣看得先儒伏生爲有漢大儒口授尙書於秦火之餘厥功甚鉅似宜選擇嫡裔承襲博士以光祠典今據布政使吳俊詳稱據濟南府行據鄒平縣查明伏生六十五代孫伏敬祖克承儒業堪以充補五經博士之職取造册結宗圖墨搨碑文並伏生所載縣誌文記詳送到司擬合詳情㑹核具題等情呈詳前來臣覆查無異除册結宗圖墨搨文記送部外謹會同學政臣劉合詞具題伏祈皇上睿鑒勅部議覆施行謹會題請旨嘉慶七年四月初二日禮部疏題前事云云該臣等議得自古先賢鉅儒博考經濟垂世立敎或顯達未及其身斯旌揚宜歸於後兹據該撫疏稱先儒伏生六十五代孫伏敬祖請設爲五經博士等語臣等伏查伏勝爲秦博士秦時焚書六經幾至息傳漢孝文時求能治尙書者天下無有賴伏勝口授尙書於晁錯自是典謨誓誥之文藉以不墜其傳經之功甚鉅旣據該撫查明伏勝祠墓碑記遺蹟尙存嫡泒子孫世系可考似應􅄈設世襲五經博士一員以廣酧庸之典以昭崇文之治應如該撫所請伏勝六十五代孫伏敬祖立爲五經博士先行咨部註册俟伊年及十五以上給咨送部考試驗其文理明順再行題請承襲咨吏部給劄恭候命下之日行文吏部並該撫查照辦理臣等未敢擅便謹題請旨本月初四日奉旨依議欽此嘉慶十年十二月十七日禮部疏題爲請旨事准前任山東巡撫全保咨稱前准禮部議覆前任山東巡撫和寕題請伏生後裔􅄈設五經博士一疏內開伏勝六十五代孫伏敬祖應請立爲五經博士俟年及十五以上給咨送部考試再行題請承襲等因於嘉慶七年四月初二日題初四日奉旨依議欽此欽遵在案今據署布政司金光悌詳稱據濟南府詳據鄒平縣查明應襲五經博士伏敬祖年十七歲應令赴部考試取具印甘各結呈送轉請給咨赴部考試等情詳送前來理合給咨該博士親賫赴部投逓考試等因移咨到部該臣等議得例載先儒後裔應承襲五經博士人員年十五歲以上者由該省督撫給咨赴部考試如果文理明順題准承襲等語查先儒後裔前經臣部于嘉慶七年題准􅄈設五經博士俟伊六十五代孫伏敬祖年及十五以上該撫送部考試驗其文理明順再行題請承襲等因在案今據前任山東巡撫全保咨稱伏勝後裔伏敬祖現年十七歲例應送部考試前來經臣部考試得伏敬祖文理明順與承襲之例相符應准其承襲五經博士恭候命下臣部行知吏部照例給劄臣等未敢擅便謹題請旨本月十九日奉旨依議欽此重修伏生祠記暴秦焚滅經籍欲愚黔首黔首固未可愚祇自愚以速滅亡而經籍之在人心者如日月之揭乎天固亦不可得而滅也噫秦􅁅已冷漢業聿新孰謂禍難㪚亡之餘間有伏生巋然久存獨能壽遺經於胸臆以傳來學而新生民之耳目哉是盖天相斯人􅂌之以九十之年而其所以託之者有在也濟南鄒平縣治東北十餘里號伏生鄕伏生之墓在焉卽墓所有祠歲久弊漏縣尹大寕曹明叔視事之歲躬拜祠下顧瞻徘徊睠先賢之所藏仰遺像之有託􅁣然興懷營修完飾輪奐一新率邑人士與凡在官者具牲醴以祀復專其子獻來請曰願有述起巖緬維先生之有功於斯文天下所共知後世論次其功贈乘氏伯號曰大儒從享孔廟天下通祀惟鄒以其鄕􅀗私展其敬旣列祠縣學又卽墓建祠其趨向可知也會曹尹復能崇墓葺祠俾邑人益知有以景仰前哲而進于學於以化民成俗是眞能舉其職矣起巖濟產也聞其請故不敢辭旣書其事因附所見俾來者有攷仍繫以銘按漢儒林傳伏生名勝爲秦博士壁藏書以避禁兵後亡數十篇獨以二十九篇敎于齊魯文帝欲召時年已九十餘老不能行詔掌故晁錯往受之衞宏云伏生老不能正言言不可曉使其女傳語敎錯孔安國書序但云失其本經口以傳授藝文志尙書二十九篇乃其所受者漢儒謂之今文隋經藉志乃云伏生口傳二十八篇作書傳四十一篇以授同郡張生張生授千乘歐陽生歐陽生授倪寛寛授歐陽之子世傳至曾孫高謂之歐陽學又張生傳夏侯都尉有大小夏侯學宋葉夢得以書出伏生者二十三篇傳歐陽歙崇文總目尙書大傳二卷爲伏勝撰晁氏以爲勝終之後歐陽生張生各誦所聞特撰大義名之曰傳其說互有不同要之今文尙書出於伏生者則一也先生爲秦博士秦坑儒無所施其學其學至漢始傳然則先生之學旣施於漢而名以顯於後世故余不繫之秦而繫之漢題曰漢濟南伏先生祠碑云銘曰於維先生始焉則屯終焉則亨獨抱遺經以淑後人以慰幽貞行法俟命天錫耄年庸待治平竟以所授列於學宮其道大明書以人傳人以書顯垂萬世名稽古之力斯文與俱兹不曰榮從祀孔廟徧於寰區罔不敬承矧兹梁鄒鄕墓攸在礪世作程沉沉亢扃體魄斯安祠以妥靈茂宰尙賢有壞必葺遹觀厥成於鄕於學祀享相望閱千百齡穹碑有銘被之􅃶歌用侑爾牲元至順二年禮部尙書張起巖撰尙書大傳卷一上受業嘉應吳蘭修校}
