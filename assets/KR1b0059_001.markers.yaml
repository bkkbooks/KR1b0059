  - {type: variant, offset: 3, length: 0, content: '', SBCK: 貢士至小國舉一人儀禮集傳集注三十三引伏書禮諸侯三年一貢士至三絀而地畢小異又禮書卷一百八漢書武帝紀注後漢書蔡邕傳注通典􅃟舉一文􅃟晉武帝華林園集詩注困學紀聞卷五竝節引書稱天工人其代之傳曰夫成天地之功者未嘗不蕃昌也濳夫論卷二思賢篇天子衣服其文華蟲作繢宗􅂜藻火山龍諸侯作繢宗􅂜藻火山龍子男宗􅂜藻火山龍大夫藻火山龍士山龍故書曰天命有德五服五章哉禮書卷三又卷一引至士山龍止山龍純靑華蟲純黃作會宗􅂜純黑藻純白火純赤隋書禮儀志七引尙書大傳下云以此相閒而爲五采八字恐非大傳文今不錄山龍靑也華蟲黃也作繢黑也宗􅂜白也藻火赤也天子服五諸侯服四次國服三大夫服一士服一注元或疑焉禮書卷一又卷三案此注有闕又御覽六百九十服章部七注五采相錯非一色也隋書禮儀志引鄭􅏏議已非之云案曰續漢書輿服志孝明皇帝永平二年初詔有司采周官禮記尙書皋陶篇乘輿從歐陽氏說公􅀸以下從大小夏侯氏說又曰衣裳玉佩備章采乘輿刺繡公侯九􅀸以下皆織成又曰顯宗初服旒冕衣裳赤舄絇屨以祠天地養三老五更于三雍天子三公九􅀸特進侯侍祠侯祀天地明堂皆冠旋冕衣裳􅏏上纁下乘輿備文日月星辰十二章三公諸侯用山龍九章九􅀸以下用華蟲七章皆備五采後漢書明帝紀永平二年注引董巴輿服志日顯宗初服冕衣裳以祀天地衣裳以􅏏上纁下乘輿備文日月星辰十二章三公諸侯用山龍九章􅀸已下用華蟲七章皆五色采乘輿刺繡公􅀸已下皆織成陳留襄邑獻之徐廣車服注曰漢明帝案古禮備其服章天子郊廟衣皂上絳下前三幅後四幅衣畵而裳繡然則顯宗更定服章所謂從歐陽夏侯說卽此是也然書傳之文無日月星辰而云天子服五何與陳祥道禮書卷三引尙書大傳山龍靑也宗彝白藻火赤陳氏辨之曰大夫之服自􅏏冕而下士之服自皮弁而下固無藻火山龍矣旣日子男宗彝藻火山龍士山龍又曰次國服三大夫服二士服一是自戾也壽祺案書傳所言虞制也固與周禮不同書􅀓服五服四服三服二服一者言其采色非言其章數前後之文未嘗相戾永平初定冕服公􅀸已下從大小夏侯說乘輿服從歐陽說日月星辰十二章三公諸侯用山龍九章􅀸已下用華蟲七章則是歐陽說冕服章數仍以十二九七爲節大小夏侯說冕服章數乃自天子至公侯以九爲節􅀸以下以七爲節明矣尙書益稷正義引鄭糸書注云自日月至黼黻凡十二章天子以飾祭服至周而變之以三辰爲旂旗王肅以爲舜時三辰卽畵於旌旗不在衣也天子山龍華蟲耳攷王肅雖善賈馬之學而其父朗師楊賜則治歐陽尙書者肅解虞書作服與伏生大傳相合葢亦用今文家記也大􅀓五服無日月星辰又無粉米黼黻故知五服是采色非章數也隋書禮儀志大業元年虞世基奏近代故實依尙書大傳山龍純靑華蟲純黃作繪宗彝純黑藻純白火純赤以此相間而爲五采後周故事升日月於旌旗乃闕三辰而章無十二但有山龍華蟲作繪宗彝藻火粉米黼黻乃與三公不異開皇中就裏欲生分別故衣重宗彝裳重黼黻合重二物以就九章爲十二等但每一物上下重行衮服用九鷩服用七今重此三物乃非典故據此虞世基旣言近代服依書􅀓而後周於山龍華蟲作繪宗彝藻火之外仍有粉米黼黻此章數也大􅀓以山龍爲靑華蟲爲黄作繢宗彝四字連讀爲黑藻爲白火爲赤陳祥道引云作繢黑也宗彝白也藻火赤也分作繢宗彝爲二合藻火爲一非伏生本文由所見大􅀓本誤當從隋志更正又引云子男宗彝藻火山龍以次國服三核之子男下宗彝亦誤衍宐刪陳氏反以是疑􅀓文自戾過矣說文十三糸部繪會五采繡也引虞書山龍華蟲作繪以後漢書明帝紀乘輿刺繡公􅀸已下皆織成攷之則大􅀓五服亦皆謂繡非畵也鄭康成注尙書始云繪讀爲繢凡畵者爲繢與伏許異作繪何以爲黑也說文十上黑部䵳沃黑色十二下女部嬒女黑色也繪之爲黑此其義六律者何黃鍾㽔賓無射太蔟夷則姑洗是也故天子左五鍾右五鍾注六律爲陽六吕爲陰凡律吕十二各一鍾天子宫縣黃鍾㽔賓在南北其餘則在東西天子將出則撞黃鍾周禮樂師注引黃鍾下有之鍾二字右五鍾皆應注黃鍾在陽陽氣動西五鍾在陰陰氣靜君將出故以動吿靜靜者皆和也馬鳴中律步者皆有容駕者皆有文御者皆有數步者中規折還中矩立則磬折拱則枹鼓注言聲合於樂體比於禮也然後太師奏登車吿出也注周禮王出入奏王夏入則撞㽔賓周禮樂師注引㽔賓下有之鍾二字左五鐘皆應注㽔賓在陰東五鍾在陽君入故以靜吿動動者則亦皆和之也以治容貌容貌得則氣得氣得則肌膚安肌膚安則色齊矣注入故欲其靜也㽔賓聲狗吠􅇾鳴及倮介之蟲皆莫不延頸以聽㽔賓注皆守物及陰之􅀋也在內者皆玉色在外者皆金聲注玉色反其正性也金聲其事殺然後少師奏登堂就席吿入也注少師佐成大師之事者也此言至樂相和物動相生同聲相應之義也以上傳注全見儀禮經傳通解集傳集注卷二十七樂記又周禮樂師注儀禮大射儀疏禮記玉藻正義後漢書班固傳注文􅃟東都賦注太平御覽三百八十八卷人事部二十九古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子有問無以對責之疑可志而不志責之丞可正而不正責之輔可揚而不揚責之弼其爵視􅀸其祿視次國之君也禮記文王世子正義通典卷二十職官二儀禮經􅀓通解集􅀓集注王制之丙玉海卷百二十又史記夏本紀注漢書伏湛􅀓注太平御覽卷七十六路史後紀並節引古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子中立而聽朝則四聖維之是以慮無失計舉無過事故書曰欽四鄰此之謂也通鑑前編帝舜元載注天子必有四鄰前儀後丞左輔右弼􅀡立而敢斷廣心而從欲輔善而相承謂之輔廉潔而切􅀡謂之弼華嚴經第八十音義卷下案曰􅀡立而敢斷下當脫謂之儀三字廣心而從欲下篇脫謂之丞三字以下文輔弼二句文法知之案曰萬卷菁華前集引云道是周公也克是太公也弼是召公也丞是史佚也故成王中立而聽朝則四聖維之與前篇所引不同此大戴記保傳篇及賈子新書文也􅂶二書作克此以文字相近􅀋書誤耳古者帝王升歌淸廟之樂注淸廟樂章名大琴練􅁌達越大瑟朱􅁌達越以韋爲鼓謂之搏拊何以也注練􅁌朱􅁌互文也越下孔也凡練􅁌達越搏拊者象其德寬和君子有大人聲不以鐘鼓竽瑟之聲亂人聲淸廟升歌者歌先人之功烈德澤也注烈業也故欲其淸也其歌之呼也注呼出聲也曰於穆淸廟肅雝顯相注肅雝顯相四海敬和明德來助祭傳注肅雝以下共十七字見毛詩淸廟正義於者歎之也穆者敬之也淸者欲其在位者徧聞之也故周公升歌文王之功烈德澤苟在廟中嘗見文王者愀然如復見文王故書曰􅅮拊琴瑟以詠祖考來假此之謂也儀禮經傳通解集􅀓集注卷二十七樂記全引傳注又見通解續宗廟樂舞二十五又禮記樂記正義引首二句云虞書􅀓又樂記正義引以章爲鼓以下八字又毛詩文王周頌譜淸廟序淸廟諸正義文􅃟江文通雜體詩白帖琴朱子詩集傳陳暘樂書並節引拊革裝之以穅周禮太師疏載白虎通引尙書大傳又見禮記樂記正義引白虎通曲阜孔廣林曰周禮禮記疏兩引白虎通如此賈孔皆云今書傳無其文案白虎通今亦無此文其禮樂篇引書傳云搏拊鼓振以秉疑卽革裝以穅之譌博拊鼓振以秉琴瑟練絲徽􅁌鳴者貴玉聲也白虎通禮樂舜彈五􅁌之琴歌南風之詩而天下治風俗通卷六琴稱謹案尙書云云案曰尙書無此文蓋出書傳舜之時西王母來獻白玉琯風俗通聲音第六又漢書律志一上孟康注元首明哉股肱良哉元首君也股肱臣也文選褚淵碑文注夏傳禹貢夏成五服外薄四海注言德廣之所及東海魚須魚目注所貢物魚須今以爲簪又魚目今以雜珠南海魚革珠璣大貝注魚革今以飾小車􅅶兵室之口貝古以爲貨王莽時亦然西海魚骨魚幹魚脅注魚幹魚脅未聞北海魚劒魚石出瑱擊閭注魚劒魚兵如劒也魚石頭中石也出瑱狀如凝膏在水上擊閭狀如鮐魚大五六尺今海家謂之口口河魭注魭當作黿黿狀如鼈而大月令季夏命漁人伐鮫取鼉登龜取黿也江鱓大龜注鱓或作鼉鼉狀如蜥蝪長六七尺鱓或爲鱣鱣鯉也五湖􅏏唐注五湖揚州浸也今屬吳元唐未聞鉅野蔆注鉅野大野也魯藪今屬山陽蔆芰鉅定蠃注鉅定澤也今屬樂安所有故縣則屬齊蠃蝸牛也濟中詹諸注詹諸鼃黽也孟諸靈龜注孟諸宋藪也龜俯者靈周禮天龜曰靈屬降谷􅏏玉注降讀如厖降之降或作函谷今河南穀城西關山也大都魚魚刀注大都明都魚今江南以爲鮑魚刀魚兵如刀者也咸會於中國注言德能及之異物來至也傳注並見玉晦王會解注後又初學記政理部三御覽七百六十六襍物部一九百四十七蟲豸部四九百七十五果部十二禮書五十一爾雅翼卷三十錦繡萬花谷後集卷十八困學紀聞二禹成五服齒革羽毛器僃禹貢合注太平御覽七百六十六文皮千合史記貨殖􅀓索隱白羽之矰路史疏仡紀高辛高山大川五嶽四瀆之屬史記夏本紀集解五嶽謂岱山霍山崋山恆山嵩山也白虎通巡守篇江河淮濟爲四瀆白虎通巡守風俗通山澤第十謹案尙書大傳禮三正記五嶽皆觸石而出雲扶寸而合不崇朝而雨天下注四指爲扶藝文􅀋聚卷一天部上文􅃟應休璉與從弟君苗君胄書注又後漢書章帝紀御覽卷八卷十天部又事􅀋賦三大川相間小川相屬東歸於海水經注序大水小水東流歸海也文􅃟海賦注郭有道碑文注百川趨於東海文􅃟郭有道碑文注又吳都賦海賦孫子荆爲石仲容與孫皓書注又長歌行注作百川赴東海非水無以準萬里之平非水無以通遠道任重也藝文􅀋聚卷八水部御覽五十八地部二十三又白帖水記纂淵海卷一水藝文引無遠字記纂引無道字五嶽視三公四瀆視諸侯其餘山川視伯小者視子男注所視者謂其牲幣粢盛籩豆爵獻之數非謂尊卑禮記王制正義引夏傳曰並注又尙書舜典正義引注又風俗通山澤第十引其餘山川下作或伯或子男大小爲差注所視者三字据書疏增又禮書禹奠南方霍山注謂奠祭也兩漢刋誤補遺引夏傳曰東原㡳平大而高平者謂之大原水經汾水注六下而平者謂之隰隰之言溼也御覽五十七地部二十三夏􅀓曰下溼曰隰毛詩桑正義引夏傳曰順流而下曰沿事􅀋賦七引書大􅀓圻者天子之境也諸侯曰境天子游不出封圻諸侯非朝聘不出境路史國名紀八天子游不出封圻不吿祖廟注周禮方千里曰王圻詩曰􅀖圻千里惟民所止儀禮經􅀓通解續二十六上因事之祭夏傳天子三公一曰司徒公二曰司馬公三曰司空公注周禮天子六􅀸與太宰司徒同職者則謂之司徒公與宗伯司馬同職者則謂之司馬公與司冦司空周職者則謂之司空公一公兼二􅀸舉下以爲稱傳注並見周禮地官序官疏又匠人疏引書􅀓云司徒公司馬公司空公又大戴禮保傅篇注引今尙書說三公司馬司徒司空也案曰漢書百官公􅀸表或說司馬主天司徒主人司空主土是爲三公案曰禮記月令命太尉正義云按書傳有司馬公司徒公司空公領三􅀸此夏制也百姓不親五品不訓則責之司徒御覽二百七職官部蠻夷猾夏冦賊奸宄則責之司馬御覽二百九職官部溝瀆壅遏水爲民害田廣不􅛮則責之司空御覽二百八職官部案曰朱子文集云伏生書多說司徒司馬司空注坐而論道謂之三公通職名無正官名考工記序工疏引夏傳注司馬在前周禮序官疏引夏傳古者天子三公每一公三􅀸佐之每一􅀸三大夫佐之每一大夫三元士佐之故有三公九􅀸二十七大夫八十一元士所與爲天下者若此而已御覽二百二職官部二儀禮經傳通解王制之戊集􅀓集注三十二又藝文􅀋聚四十五職官一引至三元士佐之注自三公至元士凡百二十此夏時之官也周之官三百六十禮志曰有虞氏官五十夏后百殷二百周三百近之未得其實也據夏周推其差則有虞之官六十夏后氏百二十殷二百四十周三百六十爲有所法儀禮集傳集注三十二又御覽二百三引首三句舜攝時三公九􅀸百執事此堯之官也故使百官事舜路史後紀陶唐注所謂六􅀸者后稷司徒秩宗司馬士共工爲六􅀸路史後紀十四夏后紀下引大傳夏書注又禮記曲禮下正義案曰路史引此條爲夏書注則是注說有虞之官制如此也上條引舜攝時堯之官制當與此注相屬故人之夏傳此篇當是說甘誓乃召六􅀸之文天子諸侯必有公桑􅁞室就川而爲之築官有三尺注官當爲宫雉長三丈高一丈度長以長度高以高則􅁞宫高一丈禮志曰仞有三尺七尺曰仞案曰毛詩瞻卬正義引此傅注云彼文􅀡云宫有三尺宫下當脫仞字也棘牆而外閉之大昕之朝注季春朔日之朝也三宮之夫人浴種於川世婦卒􅁞獻繭於夫人注此諸侯之禮天子則獻繭於后繅三盆手注手猶親也言后夫人親以手總之也毛詩瞻卬正義分引傳注云尙書夏􅀓文又齊民要術卷五節引傳首三句大昕之朝二句又儀禮鄕射記疏引注尙書大傳卷二下案曰周禮攷工記輿人疏禮記文王世子正義毛詩文王序正義路史後紀十四困學紀聞卷二並引殷傳殷傳帝吿困學紀聞卷二云殷傳有帝吿篇玉海卷三十七殷傳未命爲士者不得乘飾車攷工記輿人疏引殷􅀓未命爲士者不得乘朱軒注軒輿也士以朱飾之軒車通稱也文􅃟别賦注又張景陽咏史詩注顏延年曲水詩序注褚淵碑文注安陸昭王碑文注未命爲士車不得有飛軨注如今窗車也文􅃟七發劇奏美新注未命爲士不得衣繡廣韻四十九宥繡字注太平御覽布帛部二士乘飾車兩馬庶人單馬木車公羊隱元年疏庶人單馬木車衣布帛路史後紀十一注帝吿篇書曰施章乃服明上下困學紀聞卷二案曰外紀卷二成湯令未命之爲士者車不得朱軒及有飛軨不得乘飾車駢馬衣文繡命然後得以順有德通志器服畧湯令未命之士不得朱軒及飛軨不得飾車駢馬衣文繡旣命然後得以旌有德據二書所言皆本伏生大􅀓二書皆云湯令則知此文在殷傳無疑今並錄以補書􅀓之闕逸湯誓殷傳湯誓云夏人飮酒醉者持不醉者不醉者持醉者相和而歌曰盍歸于亳盍歸于亳注亳湯之都也注惟見繹史十四亳亦大矣故伊尹退而閒居深聽歌聲注思其故也是時伊尹在桀更曰覺兮較兮吾大命格兮注覺兮謂先知者較兮謂􅀡道者格至也吾謂桀也去不善而就善何不樂兮伊尹入吿于桀曰大命之亾有日矣桀僩然歎啞然笑曰天之有日猶吾之有民也日有亾哉日亾吾乃亾矣注自比于天言常在也比于日言去復來也住見文􅃟西征賦注是以伊尹遂去夏適湯路史後紀十四夏后紀引伏書又藝文􅀋聚帝王部二太平御覽八十三皇王部八御覽不重盍歸于亳句又藝文御覽並無僩然歎三字今依路史増日有亾哉四字惟見文􅃟西征賦汪史記殷本紀集解據増藝文􅀋聚十二帝王部二太平御覽八十三皇王部八御覽無注吾謂桀也四字通鑑前編夏桀四十歲引新序注云大􅀓與此大同小異湯放桀居中野士民皆奔湯桀與其屬五百人南徙千里止於不齊不齊士民往奔湯桀與其屬五百人徙於魯魯士民復奔湯桀曰國君之有也吾聞海外有人與五百人俱去太平御覽八十三皇王部八湯放桀而歸於亳三千諸侯大會湯取天子之壐置之於天子之坐左復而再拜從諸侯之位湯曰此天子之位有道者可以處之矣夫天下非一家之有也唯有道者之有也唯有道者宜處之湯以此三讓三千諸侯莫敢卽位然後湯卽天子之位太平御覽八十三皇王部桀殺刑彌厚而民彌暴故爾梁遠遂以是亾注故爾窮其近也梁讀爲掠路史後紀十四夏后紀下引殷􅀓案曰傳及注故字有誤湯之君民聽寬而獄省太平御覽八十三皇王部八桀無道囚湯後釋之諸侯八譯來朝者六國北堂書鈔十帝王部來遠漢南諸侯聞之歸之四十國路史後紀夏后紀下湯伐桀之後大旱七年史卜曰當以人爲禱湯乃翦髮斷爪自以爲牲而禱於桑林之社而雨大至方數千里左傳襄十年正義案曰湯禱旱之事見吕覽景亳之命費昌爲御路史後紀十四夏后紀下般庚書曰若德明哉湯任父言卑應言困學紀聞卷二漢藝文志考證古者諸侯始受封則有采地百里諸侯以三十里七十里諸侯以二十里五十里諸侯以十五里其後子孫雖有罪黜其采地不黜使其子孫賢者守之世世以祠其始受封之人此之謂興滅國繼絕世書曰兹予大享于先王爾祖其從與享之此之謂也路史國名紀四案曰韓詩外傳與此同高宗肜曰武丁祭成湯有飛雉升鼎耳而雊武丁問諸祖已祖已曰雉者野鳥也不當升鼎今升鼎者欲爲用也遠方將有來朝者乎故武丁內反諸已以思先王之道三年編髮重譯來朝者六國藝文􅀋聚鳥部太平御覽九百十七羽族部四又御覽八十三皇王部八又論衡是應篇祖已作祖乙又後漢書郞顗􅀓注記纂淵海六十六孔子曰吾於高宗肜日見德之有報之疾也注肜日尙書篇名御覽皇王部八又後漢書郞顗傳注武丁之時外紀卷二此句上有成湯之後四字下有王道虧三字困學紀聞卷二此句下有先王道虧刑罰犯七字桑穀俱生於朝七曰而大拱注兩手搤之曰拱生七日而見其大滿兩手也注上六字又見史記殷本紀集解生七日以下十一字惟見尙書咸乂正義武丁召其相而問焉其相曰吾雖知之吾不能言也問諸祖已曰桑穀野艸也注此木也而云草未聞劉向以爲艸妖野艸生於朝亾乎武丁懼側身脩行思昔先王之政興滅國繼絕世舉逸民明養老之禮重譯來朝者六國注九州之外國也太平御覽八十三皇王部八引傳注惟無注生七日以下十一字又尙書咸乂正義引七日大拱四字又漢書五行志引傳俱生於朝二句又外紀卷二記纂淵海卷六十六朕兆又史記殷本紀集解索隱並節引又繹史十七引重譯上有三年之後四字案曰外紀劉恕曰按伏生劉向以武丁有桑穀而向著說苑以大戊武丁時俱有桑穀吕氏春秋湯時穀生於廷比旦而大供韓詩外傳三日而大拱皆與書序不同壽祺案尙書咸又正義引帝王世紀亦以爲大戊事鄭注所引劉氏說乃劉向五行􅀓論語見漢書五行志西伯戡耆案曰尙書音義黎尙書大􅀓作耆外紀卷二西伯勝黎伏生司馬遷作耆路史國名紀卷一大􅀓作西伯戡耆卷六云大􅀓作戡耆漢藝文志考證卷一大􅀓以西伯戡黎爲戡耆伯夷避紂居北海之濱太公避紂居東海之濱皆率其黨曰盍歸乎吾聞西伯昌善養老此二人者蓋天下之大老也往而歸之是天下之父歸之也天下之父歸之其子曷往聖賢羣輔錄引尙書大􅀓周文王至磻溪見吕望文王拜之尙父曰望釣得玉璜刻曰周受命吕佐檢德合於今昌來提初學記武部漁御覽八百三十四資產十四又白帖溪御覽六十七地部十三案曰釣璜事與尙書中候同周文王至磻溪見吕尙釣文王拜尙云望釣得玉黄剜曰姬受命吕佐檢德合於今昌來提注釣得魚中得玉璜也佐檢猶助提者取也半璧曰璜開元占經器服休咎占篇引傳及鄭元云虞人與芮人質其成於文王入文王之境則見其人萌讓爲士大夫入其國則見士大夫讓爲公􅀸二國相謂曰此其君亦讓以天下而不居也讓其所爭以爲閒田文􅃟西征賦注又毛詩緜正義通鑑前編舉要紂十四祀文王一年質虞芮二年伐于三年伐密須四年伐畎夷紂乃囚之四友獻寶乃得免於虎口出而伐耆左傳襄三十一年正義正義又引鄭􅏏尙書注據書􅀓爲說云紂聞文王斷虞芮之訟後又三伐皆勝始畏而惡之拘于羑里紂得散宜生等獻寶而釋文王文王釋而伐黎案曰于他書引竝作邘從史記集解徐廣引改正案曰据毛詩文王序正義禮記文王世子正義兩引殷􅀓言獻寶後克耆事則左傳正義引此條卽殷傅文無疑而毛詩文王序疏引文王受命一年斷虞芮之訟云云稱尙書周􅀓禮記正義先引書傳云五年伐耆後引殷􅀓云五年之初得散宜生等獻寶云云是周傳别有受命一年以下之文也西伯得四友獻寶免於虎口而克耆毛詩文王序正義引殷􅀓云五年之初得散宜生等獻寶而釋文王文王出則克耆六年伐崇則稱王禮記文王世子正義引殷傳云旣伐于崈詩攷詩異字異義散宜生南宮括閎夭三子相與學訟於太公遂與三子見文王於羑里獻寶以免文王毛詩緜正義引書􅀓散宜生南宮括閎夭三子相與學訟於太公四子遂見西伯於羑里毛詩文王序正義引書傳散宜生等受學於太公太公除師學之禮酌酒切脯約爲朋友公羊定四年疏引書傳散宜生閎夭南宮括三子者學乎太公太公見三子知爲賢人遂酌酒切脯除爲師學之禮約爲朋友太平御覽四百六人事部四十七散宜生閎夭南宮适三子者學乎太公見三子知三子之爲賢人遂酌酒切脯約爲朋友御覽六十二飯食部二十又藝文􅀋聚七十二食物部閎夭南宫适散宜生三子學於太公望望曰嗟乎西伯賢君也四子遂見西伯於羑里注散宜生文王四臣之一也吕尙有勇而爲將散宜生有文德而爲相繹史十九太公之羑里見文王散宜生遂之犬戎氏取美馬駮身朱鬛雞目六字又見山海經海内北經注又爾雅翼卷十八引作驄身朱髦此下有除凡取九六焉六字之西海之濱取白狐靑翰注翰毛之辰大者注見文􅃟羽獵賦憿吳將校部曲注又藝文􅀋聚祥瑞部下作長毛也之於陵氏取怪獸案曰吳中本取怪獸下有大不辟虎狼閒六字傳文無騶字注有閒大也虞蓋騶虞也八字尾倍其身名曰騶虞八字見御覽八百九十獸部二之有參氏取姜女之江淮之浦取大貝如車渠注渠車罔也注見文􅃟江賦注引鄭元曰陳於紂之廷紂出見之還而觀之曰此何人也散宜生遂趨而進曰吾西蕃之臣昌之使者見繹史十九引此三十字紂大悅曰非子罪也崇侯也遂遣西伯伐崇御覽六百四十一刑法部七又御覽人百七珍寶部六又御覽八百九十獸部二又尙書顧命正義儀禮士喪禮貝三實于笄疏周禮天府疏藝文􅀋聚八十四寶玉部下九十九祥瑞部下文􅃟江賦注爾雅翼十八路史國名紀路史餘論五夢溪筆談二十二記纂淵海四藝文􅀋聚文􅃟注御覽珍寶部獸部引此文之上並有文王囚於羑里六字案曰六韜亦說散宜生等獻寶事與此小異文王以閎天太公望南宮括散宜生爲四友玉海官制周文王胥附奔輳先後禦侮謂之四隣以免於羑里之害懿子曰夫子亦有四隣乎繹史九十五孔子曰文王得四臣丘亦得四友焉自吾得囘也門人加親是非胥附與自吾得賜也遠方之士日至是非奔輳與自吾得師也前有輝後有光是非先後與自吾得由也惡言不人於門是非禦侮與文王有四臣以免虎口丘亦有四友以禦侮毛詩緜正義後漢書祭彤傳注引孔子曰至是非禦侮邪止疏附疏作胥奔走走作輳今依改四與字皆作邪又世說新語卷五品􅍨注引與後漢書注同孔子集語卷下引全與亦作邪門作耳又玉海官制人物繹史九十五引至是非禦侮與止又御覽三百六十六人事七節引門亦作耳又小學紺珠節引又文􅃟安陸昭王碑文注引周書與此略同微子微子將往朝周過殷之故墟見麥秀之蔪蔪曰此父母之國宗廟社稷之所立也志動心悲欲哭則爲朝周俯泣則婦人推而廣之作雅聲文􅃟魏都賦辨亾論下注歌曰麥秀蔪蔪兮黍禾彼狡童兮不我好兮文􅃟思舊賦注注狡童謂紂文􅃟宣德皇后令注引鄭元曰微子朝周過殷故墟見麥秀之蔪蔪兮禾黍之也曰此故父母之國乃爲麥秀之歌曰麥秀漸漸兮禾黍油油彼狡童兮不我好仇學齊估畢卷二案曰文􅃟思舊賦注引歌作黍禾於韻不協非也蓋緣篇首云云而誤當從學齊佔畢所引作油油與仇協韻禮記樂記正義引黍禾之油油爲箕子歌亦誤曲阜孔廣林說史繩祖云史記尙書傳所載之歌只差末句一句惟書傳序與歌蔪蔪不同宋玉笛賦枚乘七發皆作麥秀蔪兮注麥􅉭也字之稍差不爲要切但史記以爲箕子而書大傳以爲微子且稱父母之國尤爲有理不知司馬何所據而與書傳扺梧􅁘尙書大傳卷二受業嘉應吳蘭修校尙書大傳卷一序錄史記儒林傳言尙書自濟南伏生漢書儒林傳漢興言書自濟南伏生伏生者裴駰集解張晏曰伏生名勝伏氏碑云案曰漢書儒林傳注引張晏曰名勝伏生碑云史記索隱曰案張華云名勝漢紀云字子賤華當爲晏字之誤濟南人也故爲秦博士孝文帝時欲求能治尙書者天下無有乃聞伏生能治欲召之是時伏生年九十餘矣不能行於是乃詔太常使掌故朝錯往受之秦時焚書伏生壁藏之其後兵大􅁸流亾漢定伏生求其書亾數十篇獨得二十九篇卽以敎於齊魯之間學者由是頗能言尙書諸山東大師無不涉尙書以敎矣伏生敎濟南張生及歐陽生歐陽生敎千乘兒寛兒寛旣通尙書以文學應郡舉詣博士受業受業孔安國張生亦爲博士而伏生孫以治尙書徵不能明也自此之後魯周霸孔安國雒陽賈嘉頗能言尙書事漢書儒林傳同漢書蓺文志尙書經二十九卷本注大小夏矦二家歐陽經三十二卷師古曰此二十九卷伏生傳授者案漢志三字舊亦作二誤今據玉海所引改傳四十一篇歐陽章句三十一卷大小夏矦解故二十九篇歐陽說義二篇劉向五行傳記十一卷許商五行傳記一篇易曰河出圖雒出書聖人則之故書之所􅁸遠矣至孔子篹焉上斷於堯下訖於秦凡百篇而爲之序言其作意秦燔書禁學濟南伏生獨壁藏之漢興亾失求得二十九篇以敎齊魯之間訖孝宣世有大小夏矦氏立於學官劉向以中古文校歐陽大小夏矦三家經文酒誥脫簡一召誥脫簡二率簡二十五字者脫亦二十五字簡二十二字者脫亦二十二字文字異者七百有餘脫字數十漢書儒林傳顏師古注引衞宏定古文官書序云案曰官舊作尙近金壇段若膺始據韓昌黎集正其誤今从之伏生老不能正言言不可曉也使其女傳言敎錯齊人語多與潁川異錯所不知者凡十二三略以其意屬讀而已儒林傳贊曰自武帝立五經博士開弟子員設科射策勸以官祿訖於元始百有餘年傳業者寖盛支葉蕃滋一經說至百餘萬言案曰儒林傳言信都秦恭延君增師法至百萬言桓譚新論亦云大師衆至千餘人葢祿利之路然也初書唯有歐陽至孝宣世復立大小夏矦尙書後漢書伏湛傳九世祖勝字子賤所謂濟南伏生者也初自伏生已後世傳經學淸静無競故東州號爲伏不鬭云顏氏家訓書證篇曰孔子弟子虙子賤爲單父宰卽虙羲之後俗字亦爲宓或復加山今兖州永昌郡城舊單父地也東門有子賤碑漢世所立乃云濟南伏生卽子賤之後是虙之與伏古來通字誤以爲宓較可知矣案曰伏生旣爲虙子賤之後不應與其遠祖同字而史記索隱引漢紀以爲伏生字子賤恐卽因漢碑而展轉致誤漢碑固不誤也今漢紀無此文不知小司馬何據然范蔚宗後漢書實云伏生名勝字子賤其名則是其字則非也湖本史記載索隱引漢紀作紀年引張晏作張華皆誤尙書正義按伏生所傳三十四篇謂之今文則夏侯勝夏侯建歐陽和伯三家所傳及蔡邕所勒石經是也隋志三家並立而歐陽是盛晉永嘉之亂歐陽大小夏侯尙書並亡史記正義引七錄云三家至西晉並亡梅頤本尙書序伏生口以傳授裁二十餘篇伏生以舜典合於}
