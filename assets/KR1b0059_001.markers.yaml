  - {type: variant, offset: 1900, length: 0, content: '', WYG: 公一公兼二卿舉下以是稱是其中參六官之事貌屬木言屬金視屬火聼屬水思屬土水火者百姓之求飲食也金木者百姓之所興作也土者萬物之所資生也是為人用尚書正義王者一質一文據天地之道白虎通正朔三而改文質再而復三統者所以序生也三正者所以統天也是故三統三正也三王之統若循連環周則又始窮則反本也選注太平御覽詩疏云三正者謂夏與唐虞也正朔三而改夏以建寅為正則}
  - {type: page-break, offset: 1900, content: '', id: KR1b0059_WYG_001-21b, image: WYG0068/WYG0068-0396d.png}
  - {type: page-break, offset: 1900, content: '', id: KR1b0059_WYG_001-22a, image: WYG0068/WYG0068-0397a.png}
  - {type: variant, offset: 1901, length: 0, content: '', WYG: 當以建子堯當以建丑是謂三正也尚書大傳卷一欽定四庫全書尚書大傳卷二松陽縣教諭孫之騄輯商書殷傳帝告篇書曰施章乃服明上下玉海湯誓傳桀無道囚湯後釋之諸侯八譯來者六國北堂書抄引大傳伊尹母孕行汲水化為枯桑其夫尋至水濵見桑穴中有兒乃収養之夏人飲酒醉者持不醉者不醉者持醉者相和而歌曰盍歸於亳亳亦大矣故伊尹退而閑居深聼樂聲更曰覺兮較兮吾大命格兮去不善而就善何樂兮伊尹入告於桀一作王曰大命之亡亡一作去有日矣桀啞笑曰天之有日猶吾之有民民一作人日有亡哉日亡吾亦亡矣是以伊尹遂去夏適湯鄭𤣥曰深聼樂聲思其故也是時伊尹仕桀覺兮謂先知者較兮謂直道者也格至也吾語桀也自比於天言常在也比於日言去復來也伊尹相湯伐桀戰於鳴條春秋地名考引大傳湯放桀也居中野士民皆奔湯桀與其屬五百人南徙千里止于不齊士民往奔湯桀與其屬五百人徙於魯魯士民復奔湯桀曰國君之有也吾聞海外有人與五百人俱去行而無資謂之乏居而無食謂之困周禮疏引大傳鄭𤣥曰止曰居食謂米也咸乂傳亳有祥桑榖共生於朝七日大拱索隠引尚書大傳鄭𤣥曰兩手搤之曰拱説命傳詩曰非知之艱行之惟艱周禮疏引尚書傳髙宗肜日傳武丁祭成湯有雉飛升鼎耳而雊問諸祖己曰雉者野鳥也不當升鼎升於鼎者欲為用也無則逺方將有來朝者乎故武丁内反諸已以思先王之道三年辮髮重譯至者六國孔子曰吾於髙宗肜日見徳之有報之疾也西伯戡黎傳書正義西伯戡黎引伏生傳春子曰文王治岐玉海引大傳施政而物皆聼文選注周文王至磻溪見吕望文王拜之尚父望釣得玉璜刻曰周受命呂佐檢徳合於令昌來提西伯既戡黎紂囚之羑里爾雅疏引尚書大傳太公之羑里見文王散宜生遂至犬戎氏取美馬駮身朱鬛雞目者之西海之濵取白狐青翰之於氏一作於陵氏取怪獸尾倍其身名曰虞之有參氏一作莘取美女之江淮之浦取大貝如車渠陳於紂庭紂悦曰非子罪也崇侯也遂遣西伯伐崇鄭𤣥曰翰長毛也虞葢騶虞也散宜生閎夭南宫括三子者學於太公太公見三子之為賢人遂酌酒切脯除為師學之禮約為朋友散宜生南宮适閎夭三子相與學訟於太公四子遂見西伯於羑里獻寳以免文王孔子曰文王得四臣吾亦得四友自吾得回也門人加親是非胥附耶自吾得賜也逺方之士日至是非奔奏耶自吾得師也前有光後有輝是非先後耶自吾得繇也惡言不至門是非禦侮耶文王有四臣以免虎口丘亦有四友以禦侮公羊疏詩疏引殷傳曰西伯得四友獻寳免於虎口而克耆又引大傳曰得三子獻寳紂釋文王而出伐黎㣲子傳大夫七十而致仕老于鄉里名曰父師士曰少師以教鄉人子弟於門塾之基而教之學焉儀禮疏引書傳畧説七十杖於朝鄭𤣥曰朝當為國者致仕者以朝乗車輲輪鄭𤣥曰乗車安車言輲輪明其小也㣲子將朝周過殷之墟見麥秀之蔪蔪曰此父母之國宗廟社稷之所立也志動心悲欲哭則朝周俯泣則婦人推而廣之作雅聲為麥秀之歌歌曰麥秀漸漸兮禾黍油油彼狡童兮不我好仇選注鄭𤣥曰狡童謂紂也周書周傳狄人將攻太王亶父召耆老而問焉曰狄人何欲耆老對曰欲菽粟財貨太王亶父曰與之毎與狄人至不止太王亶父贅其耆老而問之曰狄人又何欲乎耆老對曰又欲土地太王亶父曰與之耆老曰君不為社稷乎太王亶父曰社稷所以為民也不可以所為民亡民也耆老對曰君縱不為社稷不為宗廟乎太王亶父曰宗廟吾私也不可以私害民遂䇿杖而去過梁山邑於岐山國人束脩奔而從之者二千乗一止而成三千戸之邑鄭𤣥曰岐山在梁山西南贅為屬虞人與芮人質其成於文王入文王之境則見其人萌}
