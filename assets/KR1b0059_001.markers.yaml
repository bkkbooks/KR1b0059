  - {type: variant, offset: 681, length: 0, content: '', SBCK: 注煙祭也字當爲禋馬氏以爲六宗謂日月星辰泰山河海也經曰肆􅀋于上帝禋于六宗望秩于山川徧于羣神月令天子祈來年于天宗如此則六宗近謂天神也以周禮差之則爲星辰司中司命風師雨師也御覽十八時序部三儀禮經傳通解續二十六上因事之祭又御覽五百二十八禮儀部七績漢祭祀志中注北堂書鈔引並無注案曰注司中宋本御覽作司人非煙舊作湮路史餘論五云禋于六宗大傳作煙則事止燔燎据此大傳字从火㫄垔作煙故鄭注􅀡釋之曰祭也周禮大宗伯疏引尙書洛誥注云禋芬芳之祭康成注周禮以禋祀祀昊天上帝云禋之言煙周人尙􅆨煙氣之􅆨聞者也是鄭据書堯典煙于六宗之文以解禮也他書誤爲湮字則注語不可通矣史晨祀孔子廟碑以供煙祀樊毅修西嶽廟記奠柴燎煙西京賦升高煙于太乙魏受禪碑煙于六宗與大傳合古者圭必有冒言不敢專達之義也天子執冒以朝諸侯見則覆之注君恩覆之臣敢進周禮玉人疏}
  - {type: page-break, offset: 681, content: '', id: KR1b0059_SBCK_001-28b}
