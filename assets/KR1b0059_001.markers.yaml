  - {type: variant, offset: 1722, length: 1, content: 歲, WYG: 大夫服二士服一山堂}
  - {type: variant, offset: 1724, length: 2, content: 績三, WYG: 索引大傳鄭𤣥曰𤣥或疑焉華蟲五色之蟲藻水草蒼色予欲聞六律五聲八音七始詠漢律厯志索隠曰七始詠古文在治忽今文采政忽史記作來始滑古者天子必有四鄰前曰疑後曰丞一作承左曰輔右曰弼天子有問無以對責之疑可志而不志責之丞承可正而不正責之輔可揚而不揚責之弼其爵視卿其禄視大國之君孝經疏大國作次國搏拊鼓振以秉琴瑟練絲徽絃鳴者貴玉聲也白虎通古者帝王升歌清廟大瑟練絃達越大琴朱絃達越以韋為鼓謂之搏拊鄭𤣥曰清廟樂章名越下孔也山堂}
  - {type: page-break, offset: 1724, content: '', id: KR1b0059_WYG_001-17a, image: WYG0068/WYG0068-0394c.png}
