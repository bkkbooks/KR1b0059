  - {type: variant, offset: 1664, length: 0, content: '', WYG: 公羊疏引唐傳今入虞傳鄭𤣥曰純縁也時人尚徳義犯刑者但易之衣服自為大恥屨履也幪巾也使不得冠飾子張曰堯舜之聖一人不刑而天下治何則教誠而愛深也一夫而被此五刑子龍子曰未可謂能為書孔子不然也五刑有此教路史注引大傳子贛曰堯舜之王一人不刑而天下冶敬誠而愛深也鄭𤣥曰二人俱罪吕侯之説刑也被此五刑喻犯數罪也故子曰教然耳犯數罪猶}
  - {type: page-break, offset: 1664, content: '', id: KR1b0059_WYG_001-12b, image: WYG0068/WYG0068-0392b.png}
  - {type: variant, offset: 1665, length: 3, content: 居州里, WYG: 上一罪刑之子曰古之聼民者有過必赦小罪勿増大罪勿纍老弱不受刑有過不受罰是故老}
  - {type: variant, offset: 1669, length: 2, content: 民恥, WYG: 受刑謂}
