  - {type: variant, offset: 645, length: 0, content: '', SBCK: 御覽二十九時序部十四又史記五帝紀正義天官書索隱玉海天文上引大傳與此不同葢誤案曰隋書天文志引尙書攷靈曜璇璣中而星未中爲急急則日過其度月不及其㝛璇璣未中而星中爲舒舒則日不及其度月過其㝛璇璣中而星中爲調調則風雨時庶艸蕃蕪而百穀登萬事康也玉海天文門引此文首有昏明主時乃命中星者九字是書緯言抂旋機以定中星之法也注渾儀中筩爲旋機外規爲玉衡也史記天官書索隱引鄭元注大傳云}
