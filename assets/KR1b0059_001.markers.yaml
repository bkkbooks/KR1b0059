  - {type: variant, offset: 1734, length: 2, content: 三歲, WYG: 積隂為地故地者濁隂也地不滿東南故水潦塵埃歸焉子張曰仁者何樂乎山也子曰夫山者恺然髙恺然髙則何樂焉山草木生焉禽獸畜焉財用殖焉生財用}
