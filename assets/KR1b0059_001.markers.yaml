  - {type: variant, offset: 1216, length: 0, content: '', WYG: 秋祀栁榖華山貢兩伯之樂焉秋伯之樂舞蔡俶其歌聲比小謡名曰苓落和伯之樂舞𤣥鶴其歌聲比中謡名曰歸來祀幽都宏山貢兩伯之樂焉冬伯之樂舞齊落齊一作濟歌曰縵縵并論八音四㑹歸格於禰祖用特五載一廵守群后徳讓貢正聲而九族奏具成鄭𤣥曰沉祭名祭水曰沈兆域也為營域以祭十二州之分星也陽伯春伯秩宗伯夷為之路史引大傳曰伯夷之子為西岳株離舞曲名言象物生株離也儀伯羲仲之後鼚動貌哉始也南任也夏伯夏官司馬棄為之羲伯羲叔之後秋伯秋官士也臯陶為之和伯和叔之後蔡哀也俶始也宏山即恒山冬伯冬官司空垂為之樂者人性所自有也故聖王廵十有二州觀其風俗習其情性因論十有二俗定以六律五聲八音七始五音}
