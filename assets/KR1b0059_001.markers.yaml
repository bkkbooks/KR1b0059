  - {type: variant, offset: 1842, length: 0, content: '', SBCK: 公羊隱八年何休解詁疏云書傳文堯南撫交阯水經注三十七淹水注堯時麒麟在郊藪毛詩麟趾序正義引唐傳云堯使契爲田路史發揮卷四注引伏氏書弃爲田路史後紀十一云伏書亦謂弃爲田虞傳案曰尙書正義卷二云伏生雖有一虞夏傳以外亦有虞傳夏傳九共傳案曰困學紀聞卷二云虞傳有九共篇漢藝文志考證云大傳篇有九共書曰予辯下土使民平平使民無敖困學紀聞卷二玉海卷三十七路史後紀十一引作民以無敖九共以諸侯來朝各述其土地所生美惡人民好惡爲之貢賦政敎略能記其語曰予辯下土使民平平使民無敖薛季宣書古文訓十六引伏生稱五年一朝公羊桓元年注徐疏云虞傳文古者諸侯之於}
