  - {type: variant, offset: 820, length: 8, content: 伯壇四奧沈四海封, SBCK: 百六珍寶部五文獻通考節引畱其圭下有三年二字天子執瑁以朝諸侯見則覆之故圭瑁者天子所與諸侯爲瑞也瑞也者屬也諸侯執所受圭與璧以朝於天子無過者得復其圭以歸其國其餘有過者畱其圭能正行者復還其圭三年圭不復少絀以爵六年圭不復少絀以地九年圭不復而地削此謂諸侯之朝于天子也義則見屬不義則不見屬白虎通文質篇又路史後紀}
