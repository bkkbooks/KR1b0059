  - {type: 'tls:seg', offset: 1911, content: '', id: KR1b0059_CHANT_001-19a.4}
  - {type: variant, offset: 1911, length: 0, content: '', SBCK: 予欲聞五聲六律八音采政忽禺鐵滎播旣都被明都予辛壬娶塗山癸甲生啓有火自上復于下至于王屋流爲烏其色赤其聲魄上刑挾輕下刑挾重天齊乎人假我一日以上雖系今文尙書然不宜與傳相亂其采女則有逸罰句本爾雅注恐是引般庚或粊誓之文而小有誤今竟依邢氏斷爲今文采粊誓曰􅖏乃擭敜乃阱引見周禮注下句亦引見說文攴部眞古文也今竟依賈疏斷爲今文皆不足據其篇次之亂者如古者處師一條雜記正義引作洛誥傳五嶽視三公一條王制正義引作夏傳此本竝入咎繇謨天子三公一條据考工記序工正義引鄭夏傳注云云又古者天子三公一條通解王制之戊引注云此夏時之官是兩文竝在夏傳中而此本一入}
