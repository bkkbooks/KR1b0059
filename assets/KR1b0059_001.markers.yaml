  - {type: variant, offset: 1902, length: 0, content: '', WYG: 為士大夫入其國則見士大夫讓為卿二國相謂曰此其君亦讓以天下而不居也讓其所争以為閒田文選注文王受命一年斷虞芮之訟二年伐䢴禮記正義引大傳作伐鬼方三年伐宻須四年伐犬戎五年伐耆六年伐崇七年而崩文王受命四年伐昆夷采薇為伐昆夷而作鄭𤣥曰犬夷昆夷也詩曰昆夷喙矣泰誓傳泰誓本非伏生所傳今并歸於伏生故史遷及儒林傳云伏生獨得二十九篇以教齊魯太子發升舟中流白虎通引尚書曰太子發升於舟白魚入於王舟王跪取出燎羣公咸曰休哉今文惟丙午王還劉歆三統歴引今文泰誓云丙午逮師師乃鼓譟師乃慆前歌後舞格於上天下地咸曰孜孜無怠大明疏引泰誓鄭𤣥曰慆喜也衆大喜前歌後舞也鄭司農引書傳曰前師乃鼔譟亦謂喜也司馬在前大明疏引泰誓周禮序引夏傳王肅曰司馬太公也正稽古立功立事可以永年丕天之大律律郊祀志引今文鄭𤣥曰丕大也律法也王升舟入水鼓鍾亞觀臺亞將舟亞宗廟亞周禮注有火自上復於下至於王屋流為烏其色赤其聲魄今文泰誓歐陽尚書火流}
