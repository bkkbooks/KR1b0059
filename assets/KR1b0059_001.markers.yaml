  - {type: variant, offset: 1796, length: 0, content: '', WYG: 為簮又魚目今以雜珠魚革今以飾小車}
  - {type: variant, offset: 1797, length: 0, content: '', WYG: 室之口貝古以為貨魚幹魚脅未詳魚釼魚兵如釼也魚石頭中石也出填狀如凝脂在水上擊閭狀如鮐魚大五六尺今海家謂之缺字魭當作黿黿狀如鼈而大鱓或作鼉鼉狀如蜥蜴長六七尺鱓或為鱣鱣鯉也五湖揚州浸也今}
  - {type: page-break, offset: 1797, content: '', id: KR1b0059_WYG_001-20b, image: WYG0068/WYG0068-0396b.png}
  - {type: variant, offset: 1798, length: 4, content: 於得專征, WYG: 呉元唐未聞鉅大也野魯藪今屬山陽蔆芰鉅定澤也今屬樂安有故縣屬齊蠃蝸牛瞻諸鼃黽也孟諸宋藪也龜俯者靈周禮天龜曰靈屬隆讀如釐降}
