  - {type: variant, offset: 1727, length: 3, content: 黜陟幽, WYG: 索引尚書大傳曰大琴敬絃達越大瑟朱絃達越葢越底孔也疏達通之也朱絃練而朱之也葢絲不練則勁而聲清練則熟而聲濁孔小則聲急大者聲遲故疏越以遲其聲然後不至於太急練絲以濁其聲然後不失之太清拊革著以穅白虎通引尚書大傳今書傳無著穅之文鄭元注樂記拊者以韋為表装之以穅穅一名相因以名焉今齊人或謂穅為相故知穅為相即拊也余按孔安國傳搏拊以韋為之實之以穅所以節樂疑非伏傳以白虎通引存焉正朔所不加即君子所不臣也白虎通引大傳元首}
