  - {type: variant, offset: 1847, length: 0, content: '', SBCK: 節据文􅃟曲水詩序注乃十有五祀事路史乃與歌雍重篇聯爲一時今詳審文義納以敎成以上當爲十四祀事下當接歌者二年而廟中苟有歌大化大訓六府九原而夏道興舜爲賓客以下當從􅃟注爲十五祀事其上當据前編増祀者貳尸一語如此則文從而不紊矣聖賢羣輔錄云十有五祀後又有百工相和而歌慶雲八伯稽首而進見是􅀸雲之歌在十五祀後也通鑑前篇引虞夏傳維十有四祀帝乃雍而歌者重篇下卽接云于時俊乂百工相和而歌􅀸雲云云亦失次今參訂諸書所徴更定之如左今重定傳文維五祀定鐘石論人聲乃及鳥獸咸變於前故更箸四時推六律六吕詢十有二變而道宏廣五作十道孝力爲右秋養耆老而春食孤子乃浡然招樂興於大鹿之野報一作執事還歸二年􅨳然乃作大唐之歌樂}
