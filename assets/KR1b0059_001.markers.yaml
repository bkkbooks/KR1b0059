  - {type: variant, offset: 1847, length: 0, content: '', krp: 節据文選曲水詩序注乃十有五祀事路史乃與歌雍重篇聯爲一時今詳審文義納以敎成以上當爲十四祀事下當接歌者二年而廟中苟有歌大化大訓六府九原而夏道興舜爲賓客以下當從選注爲十五祀事其上當据前編増祀者貳尸一語如此則文從而不紊矣聖賢羣輔錄云十有五祀後又有百工相和而歌慶雲八伯稽首而進見是卿雲之歌在十五祀後也通鑑前篇引虞夏傳維十有四祀帝乃雍而歌者重篇下卽接云于時俊乂百工相和而歌卿雲云云亦失次今參訂諸書所徴更定之如左今重定傳文維五祀定鐘石論人聲乃及鳥獸咸變於前故更箸四時推六律六吕詢十有二變而道宏廣五作十道孝力爲右秋養耆老而春食孤子乃浡然招樂興於大鹿之野報一作執事還歸二年􅨳然乃作大唐之歌樂}
  - {type: variant, offset: 1848, length: 0, content: '', SBCK: 舟張辟雍鶬鶬相從八風回回鳳皇喈喈歌者三年昭然乃知乎王世明有不世之義維十有三祀帝乃稱王而入唐郊猶以丹朱爲尸於時百執事咸昭然乃知王世不絕爛然必自有繼祖守宗廟之君維十有四祀鐘石笙筦變聲樂未罷疾風發屋天大雷雨帝沈首而笑曰明哉非一人之天下也乃見於鐘石案曰雷雨下當依宋書符瑞志補桴鼓播地鐘磬亂行舞人頓伏樂正狂走帝乃擁璿持衡凡二十二字又發屋下補拔木二字明哉下補天下二字乃見于鐘石下補笙筦乎三字帝乃雍而歌者重篇此下當依路史後紀十二補樂正重贊舞人復綴乃更容貳節僃十有二變凡十八字招爲賓客而雍爲主人始奏肆夏納以孝成還歸二年而廟中苟有歌大化大訓六府九原而夏道興維十有五祀祀者貳尸舜爲賓客而禹爲主人樂正進贊曰尙考太室之義唐爲虞賓至今衍於四海成禹之變垂於萬世之後於時􅀸雲聚俊乂集百工相和而歌􅀸雲帝乃倡之曰􅀸雲爛兮礼案曰礼字當作糺縵縵兮日月光華旦復旦兮八伯咸進稽首曰明明上天爛然星陳日月光華宏予一人帝乃再案曰再字一作載歌旋持衡曰日月有常星辰有行四時從經萬姓允誠於予論樂配天之靈遷于賢聖莫不咸聽鼚乎鼓之軒乎舞之菁華已竭褰裳去之于時八風循通􅀸雲藂藂蟠龍賁信於其藏蛟魚踊躍於其淵龜鼈咸出於其穴遷虞而事夏也尙書大傳卷一下受業嘉應吳蘭修校尙書大傳辨譌尙書大傳南宋時已多佚脫今坊間盛行盧氏雅雨堂本譌漏不可勝舉如納之大麓之野烈風雷雨不迷致之以昭華之玉乃尙書逸篇文見水經濁漳水注而誤入唐傳厥兆天子爵乃尙書逸篇文見白虎通爵篇而誤入母逸傳太平御覽兵部三十五引白虎通曰戰者何謂也尙書大傳曰戰者憚驚之也又曰諸侯之義非天子之命不得動衆􅁸伐殺不義者所以強􅆬弱枝尊天子卑諸侯也又曰以下仍是白虎通文見今本誅伐篇而誤入鮮誓傳困學紀聞云費誓說文作粊史記作肹太傳作鮮度作刑以誥四方周禮注云度作詳刑案此大傳作鮮四字斷句度作刑以下又一事而誤連鮮度作刑以誥四方爲句入甫刑傳學禮帝入東學至化輯于下矣一段乃大戴禮􅍖傅篇文注亦盧辯注而誤連宣王問於春子條入略說補遺所採亦多誤毛詩生民正義偁上傳云下傳云皆謂毛傳又引五帝傳云堯見天因邰而生后稷因之案此乃卽有邰家室句毛傳文疏五帝二字有譌而誤仞爲大傳文􅃟應休璉與從弟君苗君胄書注引尙書大傳曰扶寸而合不崇朝而雨天下鄭􅏏曰四指爲扶下云扶音膚此三字乃李善語而誤并爲鄭注毛詩文王正義書傳之美太公言其翼佐文武身有殊勛世祚太公以表東海案正義所偁書傳似泛舉傳記非謂伏生大傳盧學士文弨續補遺載神農始治農功一條二十二字出楊泉物理論容成作厤一條出世本竝見藝文􅀋聚卷五歲時部下及御覽卷十六日者陽德之母一條十八字月羣陰之宗一條十五字竝出皇甫謐年厤見藝文􅀋聚卷一天部御覽天四湛濁爲地至故地者濁陰也一條三句首句出神農書下二句出黃帝素問竝見􅀋聚卷六地部分引河色黃赤一條二十五字出物理論見􅀋聚卷八水部上及御覽六十一往古之時至女媧殺黑龍以祭冀州一條二十一字出淮南子下引鄭注云冀州取地以爲名也云云三十一字乃釋名文竝見􅀋聚卷六州部連引堯南撫交阯一條見水經三十七淹水注惟首五字是大傳文其下于禹貢荆州之南云云十五字乃酈道元語洧盤之水出崦嵫山一條出禹大傳此別一古書見楚詞章句五年一朝一條見公羊傳桓元年注惟首四字疏云虞傳文其下王者亦貴得天下之歡心云云三十五字乃何休語文王受命四年伐昆夷一條見詩大雅譜正義惟首九字是大傳文下云采薇爲伐昆夷而作乃孔穎達語成王之幼在襁褓一條見詩斯干正義下云襁褓縳兒被也五字亦穎達語綴之以食而弗殊有族食族燕之禮也一條見毛詩角弓正義上句引禮記大傳下句則穎達語武王伐紂都洛邑未成陰寒大雪一條九十八字出金匱見􅀋聚卷二雪部凡羣妃御見之法一條自首至望後反之七十八字乃周禮九嬪注文自凡進御君所至旣御著于右手四十八字乃詩邶風靜女毛傳文自孔子曰日者天之明至使婦從夫放月紀二十九字亦周禮九嬪注文正義以爲出孝經援神契黃帝妃嫫母一條二十二字乃列女傳文引見􅀋聚十五后妃部夏刑二百一條十八字乃周禮}
