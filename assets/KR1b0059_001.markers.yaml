  - {type: variant, offset: 832, length: 288, content: 兆十有二州樂正定樂名元祀代泰山貢兩伯之樂焉陽伯之樂舞侏離其歌聲比余謠名曰晳陽儀伯之樂舞鼚哉其歌聲比大謠名曰南陽中祀大交霍山貢兩伯之樂焉夏伯之樂舞謾彧其歌聲比中謠名曰初慮羲伯之樂舞將陽其歌聲比大謠名曰朱于秋祀柳穀華山貢兩伯之樂焉秋伯之樂舞蔡俶其歌聲比小謠名曰苓落和伯之樂舞玄鶴其歌聲比中謠名曰歸來幽都宏山祀貢兩伯之樂焉冬伯之樂舞齊落歌曰縵縵并論八音四會歸假于禰祖用特五載一巡守群后德讓貢正聲而九族具成雖禽獸之聲猶悉關于律樂者人性之所自有也故聖王巡十有二州觀其風俗習其性情因論十有二俗定以六律五聲八音七始著其素蔟以為八此八伯之事也分定於五此五嶽之事也五聲天音也八音天化也七始天統也, SBCK: 堂考索演䌓露玉海竝節引}
