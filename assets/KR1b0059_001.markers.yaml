  - {type: 'tls:seg', offset: 1795, content: '', id: KR1b0059_CHANT_001-17a.21}
  - {type: variant, offset: 1795, length: 0, content: '', WYG: 謂之太原郡取稱焉水經注引大傳堯南撫交趾於禹貢荆州之南垂幽荒之外故越也水經注㳙一作洧盤之水出崦嵫山禺鐵在遼西索隠今文尚書滎播既都今文被明都今文文皮千合索隠數兩謂之合也予辛壬娶塗山癸甲生啟索隠曰葢今文尚書百川趨於海大水小水東流洶洶礚礚皆水聲也文選注夏成五服外薄四海東海魚須魚目南海魚革珠璣大貝西海魚骨魚幹魚脅北海魚釼魚石出填擊閭河魭江鱓大龜五湖元唐鉅野蓤鉅定嬴濟中瞻諸孟諸靈龜隆谷一作隂谷大都魚魚刀青丘青䨼丹丘丹雘此二句山海經廣注引大傳咸㑹於中國初學記太平御覽俱引大傳鄭𤣥曰言徳廣之所及所貢物魚須今}
  - {type: page-break, offset: 1795, content: '', id: KR1b0059_WYG_001-19b, image: WYG0068/WYG0068-0395d.png}
