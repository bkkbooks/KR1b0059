  - {type: variant, offset: 1672, length: 0, content: '', SBCK: 注純緣也時人尙德義犯刑者但易之衣服自爲大恥屨履也幪巾也使不得􅃣飾御覽六百四十五刑法部十一又文􅃟求賢良詔注七命注初學記二十白帖象刑荀子正論篇注竝節引唐虞之象刑上刑赭衣不純中刑雜屨下刑墨幪以居州里而反於禮注純緣也時人尙德義犯刑者但易之衣服自爲大恥周禮罷民亦然上刑易三中刑易二下刑易一輕重之差公羊傳襄二十九年疏案曰傳末而反於禮四字公羊襄二十九年疏作而民恥之據路史後紀十一紀陶唐云唐傳作而反于禮甫刑傳以三刑爲有虞氏者非今依改案又曰路史引而反於禮四字爲唐傳下卽言三刑非有虞制是此四字與上刑中刑下刑云云相屬皆在唐傳中路史此下又釋云純緣也幪巾也周禮罷民亦然上刑易三下刑易一輕重之差也皆用鄭注文則唐傳有此節傳注甚明吳中本以此四字上條而民恥之下非也}
  - {type: page-break, offset: 1672, content: '', id: KR1b0059_SBCK_001-31a}
  - {type: page-break, offset: 1672, content: '', id: KR1b0059_SBCK_001-31b}
  - {type: variant, offset: 1672, length: 0, content: '', WYG: 悖弱而受刑謂之剋不赦有過謂之賊率過以小謂之枳故與其殺不辜寧失有罪與其増以有罪寧失過以有赦鄭𤣥曰延罪無辜曰纍惟刑之謐哉今文大夫有石材庶人有石承鄭𤣥曰石材柱下礩也石承當柱下布也以外出為飾舜入}
