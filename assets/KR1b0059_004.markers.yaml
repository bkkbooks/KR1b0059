  - {type: variant, offset: 531, length: 0, content: '', SBCK: 章帝紀注又通典賓禮一引末云必用三微之月爲正時物尙微以明王者受命扶微章成此正使其道重大正始也案}
  - {type: variant, offset: 531, length: 7, content: 曰高宗梁闇三年, WYG: 大傳云嵗事既畢餘子皆入學十五入小學十八入大學距冬至四十五日始出學𫝊農事上老平明坐於右塾庶老坐於左塾餘子畢出然後歸夕亦如之餘子皆入父之齒隨行兄之齒鴈行朋友}
