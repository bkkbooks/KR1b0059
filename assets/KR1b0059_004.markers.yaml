  - {type: punctuation, offset: 271, content: 「, id: KR1b0059_CHANT_004-bkkpn75}
  - {type: variant, offset: 271, length: 0, content: '', WYG: 嗟子乎}
  - {type: variant, offset: 272, length: 0, content: '', WYG: 盖吾先君文武之風也夫周禮疏引大傳鄭𤣥曰八州州立二百一十國畿内九十三國磬樂器其形曲折於穆清廟周公升歌文王之功烈徳澤尊在廟中嘗見文王者愀然如復見文王文選注於者歎之穆者敬之詩疏引大傳肅雝顯相四海敬和明徳來助祭以敬和為諸侯者義得兩通也詩疏王者躬耕所以供粢盛選注引大傳祭之為言察也察者至也至者人事也人事至然後祭祭者薦也薦之為言在也在也者在其道也藝文類聚引尚書大𫝊曰祭之為察也薦至也言人事至於神也廟者貌也以其一作其以貌言之也宗子燕族人於堂宗婦燕族人於房序之以昭穆儀禮疏引大𫝊綴之以食而弗殊有族食族燕之禮也夏后逆於廟庭殷人逆於堂周人逆於户公羊疏引書𫝊戰鬭不可不習故於蒐狩以閑之也閑之者貫之也貫之者習之也凡祭取餘獲陳於澤然後卿大夫相與射也中者雖不中也取不中者雖中也不取何以然所以貴揖讓之取也而賤勇力之取曏之取也於囿中勇力之取爾雅疏曏之取於囿中勇力之取也今之取也於澤宫揖讓之取也澤習禮之處非所以行禮其射又主中此主皮之射與}
