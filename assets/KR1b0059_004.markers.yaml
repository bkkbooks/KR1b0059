  - {type: variant, offset: 257, length: 0, content: '', WYG: 有事諸侯皆侍尊卑}
  - {type: variant, offset: 258, length: 3, content: 坐左復, WYG: 義儀禮疏鄭𤣥曰事謂祭祀宗室有事族人皆侍終日大宗已侍於賔奠然後燕私儀禮疏燕私者合}
  - {type: page-break, offset: 258, content: '', id: KR1b0059_WYG_003-6b, image: WYG0068/WYG0068-0411b.png}
