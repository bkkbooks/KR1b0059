  - {type: variant, offset: 233, length: 0, content: '', WYG: 行而無資謂之乏居而無食謂之困周禮疏引大傳鄭𤣥曰止曰居食謂米也咸乂傳亳有祥桑榖共生於朝七日大拱索隠引尚書大傳鄭𤣥曰兩手搤之曰拱説命傳詩曰非知之艱行之惟艱周禮疏引尚書傳髙宗肜日傳武丁祭成}
