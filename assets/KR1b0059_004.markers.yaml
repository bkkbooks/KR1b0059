  - {type: variant, offset: 559, length: 2, content: 梁闇, WYG: 造士困學紀聞尚書大傳曰愛人者兼其屋上之烏然則惡而知其善愛而知其惡者寡矣埤雅傳記火發於宻水洩於深萬卷菁華前集引大傳道是周公也克是太公也按大戴記賈}
