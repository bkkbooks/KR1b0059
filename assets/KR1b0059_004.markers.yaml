  - {type: variant, offset: 262, length: 2, content: 再拜, WYG: 與族人飲飲而不醉是不親醉而不出是不敬詩疏鄭𤣥曰謂卿大夫以下宗室大宗之家尚書酒誥疏云大傳因此言宗室將有事族人皆入侍得有醉與不醉而出與不出之事酒誥傳酒誥曰王曰封唯曰若圭璧盖脱簡之文也法言曰酒誥之篇俄空焉今亡夫召誥傳乃社于新邑羊一牛一豕一侯甸任衛作國伯謂殷也大社唯松東社唯栢南社唯梓西社唯栗北社唯槐白虎通引尚書洛誥傳古之處師八家而為隣三隣而為朋三朋而為里五里而為邑十邑而為都十都而為師州十有二師焉家不盈三口者不朋由命士以上者不朋鄭𤣥曰州凡四十三萬二千家葢虞夏之數也周公攝政四年建侯衛五年營成周六年制禮作樂七年致政成王鄭𤣥曰建侯衛是封衛侯康叔論封衛之事是四年作康誥也召誥論營洛邑成周之事是五年作召誥也洛誥論致政成王之事是七年作洛誥也周公將作禮樂優游之三年不能作君子恥其言而不見其}
  - {type: page-break, offset: 262, content: '', id: KR1b0059_WYG_003-7a, image: WYG0068/WYG0068-0411c.png}
