  - {type: variant, offset: 627, length: 214, content: 之隱乎則孝子三年弗居矣故曰義者彼也隱者此也遠彼而近此則孝子之道備矣高宗有親喪居廬三年然未嘗言國事而天下無背叛之心者何也及其為太子之時盡已知天下人民之所好惡是以雖不言國事也知天下無背叛之心高宗肜日武丁祭成湯有雉飛升鼎耳而雊武丁問諸祖己祖己曰雉者野鳥不當升鼎今升鼎者欲為用也無則遠方將有來朝者乎故武丁內反諸己以思先王之道三年編髮重譯來朝者六國孔子曰吾於高宗肜日見德之有報之疾也高宗之訓湯之後武丁之前先王道虧刑罰犯桑榖俱生于朝七日而大, SBCK: 夏葉}
