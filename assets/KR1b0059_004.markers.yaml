  - {type: variant, offset: 526, length: 0, content: '', krp: 儀禮通解續二二十三天神又禮記玉藻正義引祀上帝於南郊卽春迎日於東郊作書傳略}
  - {type: variant, offset: 527, length: 0, content: '', SBCK: 又毛詩噫嘻正義禮記郊特牲正義宋書禮志玉海王者存二王之後與已爲三所以通三統立三正周人以至日爲正殷人以日至後三十日爲正夏人以日至後六十日爲正天有三統土有三王三王者所以統天下也注所存二王後者}
