  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書經部二尚書大傳書類附録提要臣等謹案尚書大傳三卷補遺一卷國朝孫之騄輯之騄字晴川錢塘人按漢書藝文志伏生所傳經二十九卷傳四十一篇隋志作尚書大傳三卷鄭康成序謂章句之外别撰大義劉子政校書得而上之其篇次與藝文志合舊唐書志云伏勝注大傳三卷暢訓三卷新唐書志則作伏勝注大傳三卷又暢訓一卷已闕二卷至宋史藝文志暢訓遂不著録葢已散佚故自明代以來僅留大傳殘本脱畧漫漶殆不可讀之騄詮次其文又博采諸書所引補其佚闕以成此本凡卷中不注出處者皆殘本之原文其注某書某書者皆之騄所蒐輯也刻成之後續有所得不及逐條附入因又别為補遺一卷綴之卷末近揚州别有刻本相較頗有異同葢亦雜采補綴今與此本並著于録以存古書之梗概總之皆非伏生之舊矣其注乃鄭康成作今殘本尚題其名新舊唐書並作伏生注大傳葢史文之悞也乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書尚書大傳卷一松惕縣教諭孫之騄輯易曰河出圖雒出書聖人則之書之所起逺矣至孔子得黄帝𤣥孫帝魁之書迄於秦穆公凡三千二百四十篇斷逺取近定可為世法者凡百二篇而為之序遭秦滅學燔書漢興旁求儒雅聞故秦博士伏勝能傳其業詔太常使掌故晁錯往受焉而伏生年且百嵗不能正言言不可曉使其女誦二十八篇口授晁錯曰堯典臯陶謨禹貢甘誓湯誓盤庚髙宗肜日西伯戡黎微子牧誓洪範金縢大誥康誥酒誥梓材召誥洛誥多方多士立政無逸君奭顧命呂刑文侯之命費誓秦誓凡二十八篇自是傳其學者有歐陽大小夏侯宣帝時復有河内女子得泰誓一篇獻之與伏生女所誦合二十九篇漢志所謂經二十九卷是也故言書者始濟南伏生伏生創大傳四十一篇以授同郡張生張生授千乗歐陽生歐陽生授同郡兒寛寛授歐陽生之子世世傳之至曾孫歐陽髙謂之尚書書是本名尚則伏生所加也歐陽之學又有夏侯都尉受業於張生以授族子始昌始昌傳族子勝為大夏侯之學勝傳從子建别為小夏侯之學故有歐陽大小夏侯三家並立迄漢東京相傳弗絶中興書目云伏生為秦博士至孝文時且百嵗張生歐陽生從其學而授之生終後數子各論所聞以己意彌縫其間别作章句因經屬指名之曰傳劉向校書得而上之凡四十一篇至鄭康成始銓為八十三篇及晉永嘉之亂歐陽大小夏侯尚書並亡濟南伏生之傳唯劉向父子所著五行傳是其本法而又多乖戾隋志大傳三卷鄭元注顧彪撰音二卷舊唐書志伏生注大傳三卷又暢訓三卷新唐書伏生暢訓一卷暢訓已不復傳而隋志所稱大傳者今遺缺漫滅前後差舛無卷帙倫次可理余披覽羣籍鈔綴殘文尋其端委釐成三卷仍舊名也至伏生之四十一篇與康成銓次之八十三篇之文篇目既亡孰從而詢焉虞書三五傳燧人以火紀陽也陽尊故托燧皇於天伏羲以人事紀故托羲皇於人盖天非人不因人非天不成也神農悉地力植穀故託農皇於地天地人之道偹而三五之運興矣燧人為燧皇以火紀官藝文類聚伏羲氏作八卦路史注伏羲氏没神農氏作神農氏没黄帝堯舜氏作羅璧識遺黄帝者光也厚也中和之色徳施四序與地同功故先黄以别之也風俗通顓者順也頊者信也慤也言其承文治之以質使天下遵化皆貴真慤也嚳者考也成也言其考明法度美譽醇然若酒之芬香也堯者髙也明也言其隆興煥炳最髙明也舜者准也循也言其准行道以循堯緒也禹者輔也輔續舜後庶績洪茂自堯以上王者子孫據國而紀功徳浸盛故造諡舜禹本以白衣砥美行顯名升為天子雖復制諡不如名著故因名焉湯者攘也言其攘除不軌改亳為商成就王道天下熾昌文武皆以其長能擅國之謂王能制殺生之威之謂王唐傳克明峻徳苟子書曰克明明徳以親九族九族既睦陳思工表引傳辯章百姓索隠引今文尚書歐陽説云九族乃異姓有親屬者父族四母族三妻族二鄭𤣥曰辯别也章明也神農始治農功正節氣審寒温以為蚤晚之期故立歴名一作日容成作歴黄帝命容成造葢天儀日者陽徳之母陽外發故日以晝明名曰曜靈月羣隂之宗光内影以宵曜名曰夜光主春者張昏中可以種稷一作穀主夏者火昏中可以種黍主秋者虚昏中可以種麥主冬者􅄧昏中可以収斂葢藏畋獵斷伐當告於天子而天子賦之民故天子南面而視四星之中知民之緩急急則不賦籍不舉力役故曰敬授民時此之謂也周禮疏及太平御覽鄭𤣥曰籍公家之常徭辯秩東作索隠引大傳辯秩南譌辯秩西成周禮疏辯秩據書傳而言書曰分命和仲度西曰栁榖周禮注疏云書曰者是濟南伏生書鄭𤣥曰五色聚為栁日入時具五色便在伏物索隠引大傳以正月朝迎日於東郊所以為萬物先而尊事天也迎日之詞曰維某年某月上日明光於上下勤施於四方旁作穆穆維予一人一夲無一人二字某敬拜迎日於郊宋書志引尚書大傳書傳畧説云祀上帝於南郊即春迎日於東郊東方者何也物之動也物之動何以謂之春春出也物之出也故謂東方春也南方者何也任方也任方者物之方任何以謂之夏夏者假也吁荼萬物養之外者也故曰南方夏也西方者何也鮮方也鮮訊也訊者始入之貌始入者何以謂之秋秋者愁也愁者物方愁而入也故曰西方者秋也北方者何伏方也伏方者萬物之方伏也伏方何以謂之冬冬者中也中也者物方藏於中也故曰北方冬也陽盛則吁荼萬物而養之外也隂盛則隂吸萬物而藏之内也故曰呼吸者隂陽之交接萬物之始終否不也文選注引大傳古之王者必有命民民能敬長憐孤取舍好讓舉事力者于其君得命然後得乗飾車駢馬衣文錦未有命者不得衣不乗車車衣者有罰藝文類聚玉藻疏唐傳云古者有命民有飾車駢馬衣錦未命為士不得朱軒車不得有飛鈴文選注鄭𤣥曰軒輿也士以朱飾之飛鈴如今窻車士乗飾車兩馬庻人單馬木車衣布帛選注公羊疏碩人詩曰衣錦尚蘏説文引大傳堯時麒麟在郊藪選注詩疏引唐傳外無曠夫内無怨女詩疏孔子對子張曰舜父頑毋嚚無室家之端故謂之鰥尚書正義詩疏引唐傳虞傳舜販於頓丘一作須丘就時負夏陶於河濵漁雷澤之中堯致舜天下贈以昭華之玉藝文類聚贈以苕華之玉一本堯得舜推而尊之贈以昭華之玉鄭𤣥曰負夏衛地雷澤兖州澤今屬濟隂堯推尊舜屬諸侯致天下於大麓之野路史引虞夏傳鄭𤣥曰山足曰麓麓者録也古者天子命大事命諸侯則為壇國之外堯聚諸侯命舜陟位居攝致天下之事使大録之舜讓於徳不怡索隠引今文正月上日受終於文祖作璿璣玉衡以齊七政璿璣者何也曰璿者還也璣者幾也㣲也其變幾㣲而所動者大謂之璿璣是故璿璣謂之北極受謂舜也上日元日也文祖堯文徳之祖廟鄭𤣥曰轉運者為璣持正者為衡索隠鄭注大傳云渾儀中筩為璇璣外規為玉衡也文祖五府之大名猶周之明堂也七政謂春秋冬夏天文地理人道所以為政也人道正而萬事順成又七政布位日月時之正五星時之紀日月有薄食五星有錯聚七者得失在人君之政故謂之為政玉海引大傳類祭天名也以祀類祭之奈何天位在南方就南郊祭之事也今文尚書夏侯歐陽説月令疏引萬物非天不生非地不載非春不動非夏不長非秋不収非冬不藏故書曰禋於六宗此之謂也生一作覆鄭𤣥曰六宗星辰司中司命風伯雨師也星五緯也辰謂日月所㑹十二次也司中司命文昌第五第四星也風師箕也雨師畢也歐陽和伯夏侯建曰六宗上不謂一作及天下不謂地傍不謂四方在六者之間助隂陽變化者也古者圭必有冒一作瑁言下之必有冐不敢專達也天子執冐瑁以朝諸侯見則覆之故冒圭者天子所與諸侯為瑞也瑞也者屬也無過行者得復其圭以歸其國有過行者留其圭能改過者復之三年圭不復少黜以爵六年圭不復少黜以地九年圭不復而地畢削此謂諸侯之於天子也義則見屬不義則不見屬周禮疏白虎通及山堂考索鄭𤣥曰君恩覆之臣敢進古者諸侯之於天子五年一朝朝見其身述其職述其職者述其所職也選注五年一朝王者亦貴得天下之歡心以事其先王因助祭以述其職故分四方諸侯為四輩輩主一時公羊疏引虞傳五嶽謂岱山霍山華山恒山嵩山也白虎通大傳又爾雅疏引虞夏傳霍山為南嶽江河淮濟為四瀆風俗通引大傳五嶽視三公四瀆視諸侯其餘山川視伯小者視子男尚書正義云其尊卑所視王制及書傳之文鄭𤣥曰謂視其牲幣粢盛籩豆爵獻之數五岳皆觸石出雲扶寸而合不崇朝而雨天下後漢章帝紀注藝文類聚引大傳鄭𤣥曰四指為寸扶音膚惟元祀廵守一作狩四嶽八伯壇四奥沉四海封十有二山兆十有二州樂正定樂名元祀代泰山貢兩伯之樂焉東嶽陽伯之樂舞侏一作株離其歌聲比余謡名曰晳陽儀伯之樂舞鼚哉其歌聲比大南名曰南陽中祀大交霍山貢兩伯之樂焉夏伯之樂舞謾哉一作或其歌聲比中謡名曰初慮羲伯之樂舞將陽其歌聲比大謡名曰朱干干一作于秋祀栁榖華山貢兩伯之樂焉秋伯之樂舞蔡俶其歌聲比小謡名曰苓落和伯之樂舞𤣥鶴其歌聲比中謡名曰歸來祀幽都宏山貢兩伯之樂焉冬伯之樂舞齊落齊一作濟歌曰縵縵并論八音四㑹歸格於禰祖用特五載一廵守群后徳讓貢正聲而九族奏具成鄭𤣥曰沉祭名祭水曰沈兆域也為營域以祭十二州之分星也陽伯春伯秩宗伯夷為之路史引大傳曰伯夷之子為西岳株離舞曲名言象物生株離也儀伯羲仲之後鼚動貌哉始也南任也夏伯夏官司馬棄為之羲伯羲叔之後秋伯秋官士也臯陶為之和伯和叔之後蔡哀也俶始也宏山即恒山冬伯冬官司空垂為之樂者人性所自有也故聖王廵十有二州觀其風俗習其情性因論十有二俗定以六律五聲八音七始五音天音也八聲天化也七始天統也選注北堂書抄詩譜見諸侯問百年太師陳詩以觀民命風俗命市納賈以觀民好惡山川神祗有不舉者為不敬不敬者削以地宗廟有不順者為不孝不孝者黜以爵變禮易樂為不從不從者君流改制度衣服為畔畔者君討有功者賞之白虎通引尚書大傳天子命諸侯輔助為政所以通賢共治示不獨尊重民之至大國舉三人次國舉二人小國舉一人公羊疏云書傳文矜寡孤獨天民之窮而無告者皆有常餼詩疏唐虞象刑而民不敢犯苗民用刑而民漸興犯唐虞之象刑上刑赭衣不純中刑雜屨下刑墨幪公羊疏引唐傳今入虞傳鄭𤣥曰純縁也時人尚徳義犯刑者但易之衣服自為大恥屨履也幪巾也使不得冠飾子張曰堯舜之聖一人不刑而天下治何則教誠而愛深也一夫而被此五刑子龍子曰未可謂能為書孔子不然也五刑有此教路史注引大傳子贛曰堯舜之王一人不刑而天下冶敬誠而愛深也鄭𤣥曰二人俱罪吕侯之説刑也被此五刑喻犯數罪也故子曰教然耳犯數罪猶以上一罪刑之子曰古之聼民者有過必赦小罪勿増大罪勿纍老弱不受刑有過不受罰是故老而受刑謂之悖弱而受刑謂之剋不赦有過謂之賊率過以小謂之枳故與其殺不辜寧失有罪與其増以有罪寧失過以有赦鄭𤣥曰延罪無辜曰纍惟刑之謐哉今文大夫有石材庶人有石承鄭𤣥曰石材柱下礩也石承當柱下布也以外出為飾舜入唐郊以丹朱為尸禮正義惟十有三祀帝乃稱王而入唐郊鄭𤣥曰舜承堯帝猶反側晨興闢四門來仁賢選注詩疏孔子曰舜以天徳嗣堯西王母來獻白玉琯白虎通溝瀆壅遏水為民害田廣不墾則責之司空百姓不親五品不順則責之司徒蠻夷猾夏冦賊姦軌則責之司馬藝文類聚北堂書抄舜無登而髙不行而逺拱揖於天下而天下稱仁舜好生惡殺鳳凰巢其木一作樹仁閔覆下則稱旻天説文引虞書今尚書歐陽説春曰昊天夏曰蒼天秋曰旻天冬曰上天詩周禮爾雅疏舜將禪禹八風脩一作循通歌大化大訓六府九原而夏道興鄭𤣥曰四章皆歌禹之功所謂九叙惟歌九徳之歌于此猶可攷惟五祀奏鍾石奏一作定論人聲及乃鳥獸咸變於前秋養耆老而春食孤子一作春食餔於乃浡然招樂興於大麓之野報一作執事還歸二年談然談一作䜎一作􅨳乃作大唐之歌其樂曰舟張辟雝鶬鶬相從八風囬囬鳳皇喈喈歌者三年昭然乃知乎王世明有不世之義招為賔客雍為主人始奏肆夏納以孝成舜為賔而禹為主人樂正道贊曰尚考太室之義唐為虞賔至今衍於四海成禹之變時俊乂百工相和而歌卿雲帝唱之曰卿雲爛兮禮一作糺一作紏李善引大傳作體縵縵兮一作漫漫日月光華旦復旦兮八伯咸進稽首曰明明上天爛然星陳日月光華𢎞於一人帝乃載歌曰日月有辰一作常一作恒星辰有行四時從一作順經萬姓幾誠一作百姓允臧一作萬物允成施于論樂配天之靈遷於賢聖莫不咸聼鼚乎皷之軒乎儛之精華已竭一作英華欲遂褰裳去之於時八風循涌卿雲藂藂蟠龍僨信於其藏蛟魚躍踊於其淵魚鱉咸出於其穴遷虞而事夏也鄭𤣥曰舜始欲改堯樂百獸之屬率舞談猶灼也大唐之歌美堯禪也招雍皆樂章名也賔入奏招主入奏雍也始謂尸入時也納謂薦獻時也肆夏孝成指樂章名也舜既使禹攝天子之事于祭祀避之居賔客之位獻酒則為亞獻尚考猶言古考謂徃時也太室明堂之中央室也義當為儀儀禮也謂祭太室禮堯為舜賔之也衍猶溢也言堯之禪天下至於今其徳義溢於四海也縵縵教化廣逺也復旦明明相代也藂藂言和氣相應也十有四祀鐘石笙筦變聲樂未罷疾風發屋天大雷雨帝沈首而笑曰明哉非一人天下也乃見於鐘石路史聖人與聖也猶規之相周矩之相襲文選注九共傳書曰予辯下土使民平平使民無傲玉海虞傳有九共篇夏書禹之君民也罰弗及強而天下治天子衣服其文華蟲作繢宗彛藻火山龍諸侯作繢宗彛藻火山龍子男宗彛藻火山龍大夫藻火山龍士山龍又曰山龍青也華蟲黄也作繢黒也宗彛白也藻火赤也天子服五諸侯四次國服三大夫服二士服一山堂考索引大傳鄭𤣥曰𤣥或疑焉華蟲五色之蟲藻水草蒼色予欲聞六律五聲八音七始詠漢律厯志索隠曰七始詠古文在治忽今文采政忽史記作來始滑古者天子必有四鄰前曰疑後曰丞一作承左曰輔右曰弼天子有問無以對責之疑可志而不志責之丞承可正而不正責之輔可揚而不揚責之弼其爵視卿其禄視大國之君孝經疏大國作次國搏拊鼓振以秉琴瑟練絲徽絃鳴者貴玉聲也白虎通古者帝王升歌清廟大瑟練絃達越大琴朱絃達越以韋為鼓謂之搏拊鄭𤣥曰清廟樂章名越下孔也山堂考索引尚書大傳曰大琴敬絃達越大瑟朱絃達越葢越底孔也疏達通之也朱絃練而朱之也葢絲不練則勁而聲清練則熟而聲濁孔小則聲急大者聲遲故疏越以遲其聲然後不至於太急練絲以濁其聲然後不失之太清拊革著以穅白虎通引尚書大傳今書傳無著穅之文鄭元注樂記拊者以韋為表装之以穅穅一名相因以名焉今齊人或謂穅為相故知穅為相即拊也余按孔安國傳搏拊以韋為之實之以穅所以節樂疑非伏傳以白虎通引存焉正朔所不加即君子所不臣也白虎通引大傳元首明哉股肱良哉元首君也股肱臣也選注引大傳禹貢傳湛濁為地又曰積隂為地故地者濁隂也地不滿東南故水潦塵埃歸焉子張曰仁者何樂乎山也子曰夫山者恺然髙恺然髙則何樂焉山草木生焉禽獸畜焉財用殖焉生財用而無私為四方皆伐無私與焉出雲雨以通乎天地之間隂陽和合雨露之澤萬物以成百姓以饗此仁者之樂於山也圻者天子之境也諸侯曰境天子游不出封圻諸侯非朝聘不出境路史注引大傳河色黄赤衆川之流葢濁之積也百里一小曲千里一大曲一直非水無以准萬物之平非水無以通道任重也下而平者謂之隰隰之猶言濕也往古之時四極廢九州裂於是女媧殺黒龍以祭冀州鄭𤣥曰冀州取地以為名也其地有險有易帝王所都亂則冀治弱則冀强荒則冀豐也東原底平大而髙平者謂之太原郡取稱焉水經注引大傳堯南撫交趾於禹貢荆州之南垂幽荒之外故越也水經注㳙一作洧盤之水出崦嵫山禺鐵在遼西索隠今文尚書滎播既都今文被明都今文文皮千合索隠數兩謂之合也予辛壬娶塗山癸甲生啟索隠曰葢今文尚書百川趨於海大水小水東流洶洶礚礚皆水聲也文選注夏成五服外薄四海東海魚須魚目南海魚革珠璣大貝西海魚骨魚幹魚脅北海魚釼魚石出填擊閭河魭江鱓大龜五湖元唐鉅野蓤鉅定嬴濟中瞻諸孟諸靈龜隆谷一作隂谷大都魚魚刀青丘青䨼丹丘丹雘此二句山海經廣注引大傳咸㑹於中國初學記太平御覽俱引大傳鄭𤣥曰言徳廣之所及所貢物魚須今以為簮又魚目今以雜珠魚革今以飾小車兵室之口貝古以為貨魚幹魚脅未詳魚釼魚兵如釼也魚石頭中石也出填狀如凝脂在水上擊閭狀如鮐魚大五六尺今海家謂之缺字魭當作黿黿狀如鼈而大鱓或作鼉鼉狀如蜥蜴長六七尺鱓或為鱣鱣鯉也五湖揚州浸也今屬呉元唐未聞鉅大也野魯藪今屬山陽蔆芰鉅定澤也今屬樂安有故縣屬齊蠃蝸牛瞻諸鼃黽也孟諸宋藪也龜俯者靈周禮天龜曰靈屬隆讀如釐降之降或如函谷今河南榖城西闗山也大都明都魚今江南以為鮑魚魚刀魚兵如刀者也言徳能及之異物來至也禹貢合注引大傳曰禹成五服齒革羽毛器乃備甘誓傳戰者憚警之也白虎通藝文類聚天子三公一曰司徒公二曰司馬公三曰司空公各兼二卿周禮正義山堂考索引大傳鄭𤣥曰夏書云六卿者后稷司徒秩宗司馬作士共工也周禮天子六卿與太宰司徒同職者則謂之司徒公與宗伯司馬同職者則謂之司馬公與司寇司空同職者則謂之司空公一公兼二卿舉下以是稱是其中參六官之事貌屬木言屬金視屬火聼屬水思屬土水火者百姓之求飲食也金木者百姓之所興作也土者萬物之所資生也是為人用尚書正義王者一質一文據天地之道白虎通正朔三而改文質再而復三統者所以序生也三正者所以統天也是故三統三正也三王之統若循連環周則又始窮則反本也選注太平御覽詩疏云三正者謂夏與唐虞也正朔三而改夏以建寅為正則舜當以建子堯當以建丑是謂三正也尚書大傳卷一欽定四庫全書尚書大傳卷二松陽縣教諭孫之騄輯商書}
