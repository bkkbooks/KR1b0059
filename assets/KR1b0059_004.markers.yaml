  - {type: variant, offset: 239, length: 1, content: 薄, WYG: 鄉里名曰父師士曰少師以教鄉人子弟於門塾之基而教之學焉儀禮疏引書傳畧説七十杖於朝鄭𤣥曰朝當為國者致仕者以朝乗車輲輪鄭𤣥曰乗車安車言輲輪明其小也㣲子將朝周過殷之墟見麥秀之蔪蔪曰此父母之國宗廟社稷之所立也志動心悲欲哭則朝周俯泣則婦人推而廣之作雅聲為麥秀之歌歌曰麥秀漸漸兮禾黍油油彼狡童兮不我好仇選注鄭𤣥曰狡童謂紂也周書周傳狄人將攻太王亶父召耆老而問焉曰狄人何欲耆老對曰欲菽粟財貨太王亶父曰與之毎與狄人至不止太王亶父贅其耆老而問之曰狄人又何欲乎耆老對曰又欲土地太王亶父曰與之耆老曰君不為社稷乎太王亶父曰社稷所以為民也不可以所為民亡民也耆老對曰君縱不為社稷不為宗廟乎太王亶父曰宗廟吾私也不可以私害民遂䇿杖而去過梁山邑於岐山國人束脩奔而從之者二千乗一止而成}
