  - {type: variant, offset: 528, length: 0, content: '', SBCK: 使郊天以天子禮祭其始祖受命之王自行其正朔服色此謂通天三統尙書微子之命正義引傳注案曰末句三統或作之統案毛詩生民正義云王者存先代所以通天三統此用書傳及鄭注作通天三統是也案曰漢書成帝紀十綏和元年詔曰蓋聞王者必存二王之後所㠯通三統也本此天有三統物有三變故正色有三天有三生三死故土有一王王特一生死禮記檀弓上正義引書傳略}
  - {type: variant, offset: 528, length: 0, content: '', krp: 使郊天以天子禮祭其始祖受命之王自行其正朔服色此謂通天三統尙書微子之命正義引傳注案曰末句三統或作之統案毛詩生民正義云王者存先代所以通天三統此用書傳及鄭注作通天三統是也案曰漢書成帝紀十綏和元年詔曰蓋聞王者必存二王之後所㠯通三統也本此天有三統物有三變故正色有三天有三生三死故土有一王王特一生死禮記檀弓上正義引書傳略}
  - {type: variant, offset: 529, length: 0, content: '', SBCK: 周以至動殷以萌夏以牙注謂三王之正也至動冬日至物始動也物有三變故正色有三天有三生三死故土有三王王特一生死是故周人以日至爲正殷人以日至三十日爲正夏以日至六十日爲正是故三統三正若循連環周則又始窮則反本公羊傳隱元年疏引書傳略說夏以孟春爲正殷以季冬爲正周以仲冬爲正夏以十三月爲正色尙黑以平旦爲朔殷以十二月爲正色尙白以雞鳴爲朔周以十一月爲正色尙赤以夜半爲朔不以二月後爲正者萬物不齊莫適所統故必以三微之月也三正之相承若順連環也白虎通三正篇又御覽二十九時序部十四引同惟二月作二三月所統作所立末句無順字又御覽二十六時序部十一初學記歲時下夏以十三月爲正色尙黑以平旦爲朔殷以十二月爲正色尙白以雞鳴爲朔周以十一月爲正色尙赤以夜半爲朔必以三微之月爲正者當爾之時物皆尙微王者受}
