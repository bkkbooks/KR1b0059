  - {type: variant, offset: 532, length: 0, content: '', SBCK: 書傳說正朔二字最晰周以至動殷以萌夏以牙注謂三王之政也至動冬至日物始動也物有三變故正色有三天有三生三死注異時生者恆異時死是故周人以日至爲正殷人以日至三十日爲正夏以日至六十日爲正天有三統土有三王注統本也三統者所以序生也三正者所以統天下也三統若循連環周則又始窮則反本也夏以孟春爲正者貴形也御覽二十九時序部十四又文􅃟西征賦游仙詩臨終詩廣絕交論等注並引三王之統若循連環云云三王之治若循環之無端如水之勝火御覽七十六皇王部一王者一質一文據天地之道白虎通三正篇正色三而復者也文􅃟皇太子宴元圃賦詩注諸侯有德者一命以車服弓矢再命以虎賁三百人三命秬鬯諸侯三命者皆受天子之樂以祀其宗廟儀禮通解續宗廟樂舞又路史後紀十一陶唐紀引至以祀其宗廟止作略說案曰此與虞夏傳所言不同晉平公問師曠曰吾年七十欲學恐已暮師曠曰臣聞老而學者如執燭之明執燭之明孰與昧行公曰善藝文􅀋聚八十火部}
