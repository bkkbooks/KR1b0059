  - {type: variant, offset: 0, length: 0, content: '', krp: 尙書大傳卷五略說遂火爲遂皇伏羲爲戲皇神農爲農皇也遂人以火紀火太陽也陽尊故託遂皇於天伏羲以人事紀故託戲皇於人葢天非人不因人非天不成也神農悉地力種穀疏故託農皇於地天地人之道僃而三五之運興矣風俗通皇霸第一引尙書大傳說又太平御覽七十七皇王部二又七十八皇王部三又火部一初學記九事類賦注藝文類聚十一帝王路史因提紀並節引案曰孫之騄本首列此條目爲三五傳無據不可從今姑入之略說爲近似伏羲氏没神農氏作神農氏没黃帝堯舜氏作羅璧識遺卷二引大傳言案曰識遺云敘三五傳次甚明伏羲氏作八卦路史後紀卷一太昊紀上注天立五帝以爲相四時施生法度明察春夏慶賞秋冬刑罰帝者任德設刑以則象之言其能行天道舉錯審諦也黃帝始制冠冕垂衣裳上棟下宇以避風雨禮文法度興事創業黃者光也厚也中和之色德施四季與地同功故先黃以别之也顓者專也頊者信也言其承易文之以質使天下蒙化皆貴貞慤也嚳者考也成也言其考明法度醇美嚳然若酒之芬香也堯者高也饒也言其隆興煥炳最高明也舜者推也循也言其推行道德案曰四字原文誤在舜者推也之上今移此循堯緒也風俗通義皇霸卷一五帝篇謹案易尙書大傳云云又御覽七十七皇王部二載風俗通同惟無黃帝始制以下二十五字又無嚳然二字饒也二字蒙化之蒙作遵末四句作舜者准也循也言其准行道以循堯緒也當從之准循與舜聲近推則遠矣今本風俗通字誤堯八睂舜四瞳子禹其跳湯扁文王四乳八睂者如八字者也其跳者踦也注其發聲也踦步足不能相過也扁者枯也注言湯體半小象扁枯言皆不善也御覽三百六十三人事部四又玉篇卷四目部初學記九帝王部路史有虞紀荀子非相篇注案曰荀子非相篇曰禹跳湯偏堯舜參眸子楊倞注引尸子曰舜兩眸子是謂重明作事成法出言成章又引尸子曰禹之勞十年不窺其家手不爪脛不生毛偏枯之病步不相過人曰禹歩吕氏春秋曰禹通水濬川顏色黎黑步不相過多聞而齊給注齊疾也史記五帝本紀索隱案曰此葢尙書大傳說黄帝語乃命五史以書五帝之蠱事李鼎祚周易集解載伏曼容註引此釋云然爲訓者正以太古之時无爲无事也成王問周公曰舜之冠何如焉周公曰古之人有冒皮而勾領者然鳳皇巢其樹麒麟聚其域也北堂書鈔冠成王問周公曰舜何人也周公曰其政也好生而惡殺文選檄蜀文注路史後紀十二有虞紀注舜好生惡殺鳳皇巢其樹御覽九百十五羽族部二又九百二十八羽族部十五事類賦注十八玉海百九十九古之人衣上有冒而勾領注言在德不在服也古之人三皇時也冒覆項也勾領繞頸也禮正服方領也荀子哀公篇楊倞注周公對成王云古人冒而勾領注古人謂三皇時以冐覆頭勾領繞頸至黃帝則有冕也禮記冠義篇目正義引略說案曰禮記冠義疏引此文爲略說則自北堂書鈔以下四條皆略說文也晏子曰古者有紩衣攣領而王天下者矣淮南子曰古有鍪頭而卷領以王天下與略說同意荀子哀公篇魯哀公問舜冠於孔子孔子不對三問不對哀公曰寡人問舜冠於子何以不言也孔子對曰古之王者有務而拘領者矣其政好生而惡殺焉注務讀爲冒拘與勾同是以鳳在列樹麟在郊野鳥鵲之巢可俯而窺也君不問而問舜冠所以不對也荀子作哀公問孔子書傳作成王問周公傳聞異詞舜不登而高不行而遠拱揖於天下而天下稱仁御覽八十一皇王部六又四百十九人事部六十夏后氏主敎以忠儀禮士喪禮疏引書傳略說周人之敎以文上敎以文君子其失也小人薄注文謂尊卑之差制也習文法無悃誠也文選運命論注案曰士喪禮疏引夏后氏主敎以忠稱書傳畧說此文選注所引周人之敎以文云云當相連屬中間尙有脫文及說}
  body:
  - {type: punctuation, offset: 0, content: 《, id: KR1b0059_CHANT_004-bkkpn1}
  - {type: variant, offset: 1, length: 0, content: '', SBCK: 人之敎耳帝命周公踐阼朱草暢生御覽八百七十三休徵部二周公輔幼主不矜功則􅕴莢生注矜夸也御覽八百七十三休徵部二引}
  - {type: variant, offset: 1, length: 0, content: '', krp: 人之敎耳帝命周公踐阼朱草暢生御覽八百七十三休徵部二周公輔幼主不矜功則􅕴莢生注矜夸也御覽八百七十三休徵部二引}
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 又文􅃟鮑昭詠史詩注引傳及注又記纂淵海卷四王者德及皇天則祥風􅁸御覽九天部九又八百七十二休徵部二初學記一王者德下究地之厚則朱草生御覽八百七十三休徵部二又文􅃟魯靈光殿賦注王元長曲水詩序注非有先生論注記纂淵海卷四又開元占經竹木草藥占篇引曰德光地序則朱草生文選注同狄人將攻太王亶甫御覽甫作父此下重亶父二字召耆老而問焉曰狄人何欲耆老對曰欲得菽粟財貨太王亶甫曰與之每與狄人至不止太王亶甫贅其耆老而問之毛詩綿正義引贅作屬案曰桑柔正義引孟子曰太王屬其耆老書傳云贅其耆老是贅爲屬據此則緜正義作屬者誤也今改正曰狄人又何欲乎耆老對曰又欲君土地太王亶甫曰與之耆老曰君不爲社稷乎太王亶甫曰社稷所以爲民也不可以所爲民亾民也耆老對曰君縱不爲社稷不爲宗廟乎太王亶甫曰宗廟吾私也不可以私害民遂策杖而去逾梁山邑岐山注梁山在岐山東北注見毛詩公劉正義岐山在梁山西南注見毛詩緜正義周人奔而從之者三千乘一止而成三千戶之邑毛詩緜正義引書傳略說又御覽七百九十九四夷部二又禮記哀公問正義毛詩豳風譜正義並引書傳畧說又毛詩桑柔天作正義節引周人禮記正義作國人案曰毛詩緜正義引書傳又引韓奕箋云梁山在馮翊夏陽縣西北鄭於書傳注云岐山在梁山西南然則梁山之袤其東當夏陽縣西北其西當岐山東北自豳適周當踰之也宣王問於春子曰寡人欲行孝弟之義爲之有道乎注宣王齊君陳敬仲之後也春子曰昔者衞聞之樂正子注樂正子曾子弟子也曰文王之治岐也五十者杖於家}
  - {type: page-break, offset: 2, content: '', id: KR1b0059_SBCK_004-4b}
  - {type: page-break, offset: 2, content: '', id: KR1b0059_SBCK_004-5a}
  - {type: page-break, offset: 2, content: '', id: KR1b0059_SBCK_004-5b}
  - {type: variant, offset: 2, length: 1, content: 六, WYG: ''}
