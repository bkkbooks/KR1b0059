  - {type: variant, offset: 563, length: 0, content: '', krp: 曰仁者何樂於山也孔子曰夫山者恺然高恺然高則何樂焉夫山草木生焉鳥獸蕃焉財用殖焉生財用而無私爲焉四方皆代焉毎無私予焉出雲風以通乎天地之間陰陽和合雨露之澤萬物以成百姓以饗此仁者之所以樂於山者也太平御覽四百十九人事部六十又三十八地部三恺然作嵬嵬然無恺然高以下八字鳥作禽財用作林木風作雨無生財以下八字又無代焉每三字又文選頭陀寺碑文注引夫山至無私與焉案曰孔叢引此又代作伐子貢曰葉公問政於夫子子曰政在附近而來遠魯哀公問政子曰政在於論臣齊景公問政子曰政在於節用三君問政夫子應之不同然則政有異乎子曰荆之地廣而都狹民有離志焉故曰在於附近而來遠哀公有臣三人內比周以惑其君外障距諸侯賓客以蔽其明故曰政在論臣齊景公奢於臺榭淫於苑囿五官之樂不解一旦而賜人百乘之家者三故曰政在節用孔子集語卷下案曰韓非子難三家語辯政說苑政理篇與此大同漢書武帝紀元朔六年詔葢孔子對定公㠯徠遠哀公㠯論臣景公以節用非期不同所急異也臣瓚注曰論語及韓子皆言葉公問政於孔子孔子答以悅近來遠今云定公與二書異東郭子思問於子貢曰夫子之門何其雜也子貢曰夫櫽括之㫄多枉木良醫之門多疾人砥礪之㫄多頑鈍夫子聞之曰修道以俟天下來者不止是以雜也孔子集語卷下又繹史九十五案曰說苑雜言篇與此同惟子思之思作惠荀子法行篇與此小異東郭子惠作南郭惠子劉恕外紀卷九載東郭子惠問於子貢云云不著所徵然與說苑異與書傳同則書傳之文也思當爲惠子夏讀書畢見夫子夫子問焉子何爲於書對曰書之論事也昭昭若日月之明離離若參辰之錯行上有堯舜之道下有三王之義商所受於夫子者志之弗敢忘也雖退而窮居河濟之間深山之中壤室編蓬爲戶於中彈琴詠先王之道則可發憤慷慨矣藝文類聚六十四居處部四又五十五雜文部一又草部下文選蘇子卿古詩注左太冲招隱詩注非有先生論注節引御覽百卉四子夏讀書畢孔子問曰吾子何爲於書子夏曰書之論事昭昭若日月焉所受於夫子者弗敢忘退而窮居河濟之間深山之中壤室蓬戶彈琴瑟以歌先王之風有人亦樂之無人亦樂之上見堯舜之道下見三王之義可以忘死生矣孔子愀然變容曰嘻子殆可與言書矣雖然見其表未見其裏闚其門未入其中顔回}
