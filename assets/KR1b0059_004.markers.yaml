  - {type: variant, offset: 678, length: 0, content: '', WYG: 莫不仁故曰大矣有徳者尊其位而重其禄諸侯之義非天子之命不得動衆起兵殺不義者所以强幹弱枝尊天子卑諸侯也撞㽔賔在外者皆金聲在内者皆玉色御覽大傳云周成王時州靡國獻狒狒呉任臣字彚補尚書大傳宣王問於春子曰寡人欲行孝弟之義為之有道乎春子曰昔者衛聞之樂正子曰文王之治岐也云云困學紀聞子夏葉拱而進困學紀聞引大傳余居龍塢之明年借書於趙子公千得困學紀聞太平御覽二書公千好學而樂與朋友共之其識見有過人者今録大傳四十餘則皆前書未有得趙子書而補之不能忘所自也夫以余之孤陋}
