  - {type: variant, offset: 571, length: 0, content: '', krp: 文訓序亦有此文末有通斯七}
  - {type: variant, offset: 572, length: 0, content: '', SBCK: 書之大義舉矣二句亦不稱所出而末敘七觀云是故帝典可以觀美大禹謨禹貢可以觀事皋陶謨益稷可以觀政洪範可以觀度六誓可以觀義五誥可以觀仁甫刑可以觀戒其序次與孔叢子同與御覽困學紀聞所引大傳七觀異則非書大傳之文明矣孔叢言大禹謨益稷者蓋作僞者羼入而不知真古文與今文皆無大禹謨其益稷一篇則統於皋陶謨中也又韓詩外傳說此事以爲子夏讀詩子曰參女以爲明主爲勞乎昔者舜左禹而右皋陶尙書大傳諸書所引有未審何篇無所附者今雜綴於此伊尹母方孕行汲化爲枯桑其夫尋至水濱見桑穴中有兒乃收養之錦繡萬花谷前集卷十引尙書大傳民擊壤而歌鑿井而飮畊田而食帝力何有禮記經解正義引尙書傳周人以仁接民而天下莫不仁故曰大矣注言文王仁故謂之大矣太平御覽四百十九人事部六十文王施政而物皆聽文􅃟褚淵碑文注沈休文奏彈王源注周人可比屋而封文􅃟七命注四子講德論勸進今上箋奏彈王源等注成王削桐葉爲珪以封唐叔禮記大傳正義公爵劉名也毛詩音義周公兼思三王之道以施於春秋冬夏困學紀聞卷八戰者憚警之也白虎通誅伐篇藝文􅀋聚五十九武部又御覽三百四兵部三十五又三百八兵部三十九警並作驚王者躬耕所以供粢盛文􅃟籍田賦注煙氛郊社不修山川不祝風雨不時霜雪不降責於天公臣多弑主孼多殺宗五品不訓責於人公城郭不繕溝池不修水泉不隆水爲民害責於地公論衡卷十五順鼓篇又丹鉛總錄卷二十六瑣語􅀋引小異案曰韓詩外傳卷十八亦說天公人公地公此與夏傳天子三公又爲一義季夏可以大赦罪人北堂書鈔夏衣錦尙詩考異字異義困學紀聞卷三注讀爲絅或爲絺困學紀聞卷三剴切毛詩雨無正正義矜寡孤獨天民之窮而無吿者皆有常餼毛詩大田正義外無曠夫内無怨女毛詩雄雉序正義正義云書傳曠夫謂未有室家者老而無妻謂之鰥老而無夫謂之寡幼而無父謂之孤老而無子謂之獨行而無資謂之乏居而無食謂之困此皆天下之至悲哀而無吿者故聖人在上}
