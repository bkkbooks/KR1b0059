  - {type: variant, offset: 251, length: 2, content: 璽置, WYG: 意下得大國之援則有亢陽之心以御臣下興邢丘之役以勞百姓則臣下離心而不從故應是而秋大旱也魯宣公十年秋大旱是時公與齊伐萊夫伐國亢陽節也師徒百姓所不欲也故應而大旱旱所謂常陽不謂常陽而謂旱者以旱為災也旱之為言乾也萬物傷於乾而不得水也君持亢陽之節暴虐于下興師旅勞民衆以起城邑臣下悲怨而心不從故陽氣盛而失度旱災應也枉矢者弓矢之象也枉矢之所觸天下之所伐滅亡之象也七國之兵戰于梁地故天狗先降梁壘見以其象也狗者守禦之類也所降以威守禦也蜮如鼈三足生於南越南越婦人多淫故其地多蜮淫女惑亂之氣所生詩疏榖梁疏引洪範五行傳蓍之為言耆也百年一本生百莖此草木之夀亦知吉凶者聖人以問鬼神周易音義藝文類聚引洪範五行傳季夏可以大赦罪人尚書大傳歴者聖人所以揆天行而紀萬國也北堂書抄引尚書洪範五行傳雷與天地為長子以其􅈡長萬物與其出入也霜者殺伐之表雨雪者隂之蓄積甚也夫握方諸之鏡處深澤之下而上引太清物類相隨可不慎耶秦昭王三十八年上郡大飢山木盡死蜂食民苗民無所食飢而不損兹謂泰厥灾水厥咎亡谷永傳引洪範尚書大傳卷二欽定四庫全書尚書大傳卷三松陽縣教諭孫之騄輯金縢傳成王之幼云在襁褓褓縛兒被也詩疏引大傳古尚書説武王崩時成王年十二後二年管蔡作亂周公東辟之王與大夫盡弁以開金縢之書時成王年十四公羊疏王命周公踐祚朱草暢生王者徳下究地之厚則朱草生徳光地序則朱草生選注引尚書大傳王者徳及皇天則祥風起周公輔幼主不矜功則蓂莢生鄭𤣥曰矜夸也成王問周公舜何人也曰其政好生而惡殺古之王者必立大學小學使王子公卿大夫元士之適子十有五年始入小學見小節焉踐小義焉二十始入大學見大節焉踐大義焉故入小學知父母之道長幼之序入大學知君臣之儀上下之位小胥取小學之賢者登之天子天子以為左右鄭𤣥曰小學在公宫之左大學在郊天子當為太子周公居攝踐祚而治元世子法於伯禽使之左右所以養成王也元記為亢伯禽與康叔朝於成王見于周公三見而三笞康叔有駭色謂伯禽曰有商子者賢人也與子見之乃見商子而問焉商子曰南山之陽有木焉名曰橋二子往視之見橋實髙髙然而上反以告商子商子曰橋者父道也南山之隂有木焉名曰梓二子復往觀焉見梓實晉晉而循反以告商子商子曰梓者子道也二子明日見周公入門而趨登堂而跪拂其首勞而食之曰汝安見君子乎二子以實對公曰君子哉商子也文選注藝文類聚成王問周公曰舜之冠何如焉周公曰古之人有冒皮而勾􅏋然鳳皇巢其樹麒麟聚其域也北堂書抄引大傳古人衣上有冒而句領者荀子注引尚書大傳鄭𤣥曰言在徳不在服也古人三皇時也冒覆頂也句領繞頸也禮正服方領天子太子年十八曰孟侯孟侯者于四方諸侯來朝迎于郊問其所不知也問人民之所好惡土地所生山川所有無及父在時皆知之儀禮疏詩正義禮行人疏俱引書傳畧説天中記引大傳鄭𤣥曰孟迎也十八嚮入太學為成人博問庶事玉海曰孟侯者四方諸侯來朝迎於郊或可逺郊勞使世子為之是以孝經注亦云世子郊迎郊迎即郊勞也雖據夏法周亦然管叔蔡叔監禄父武王死成王幼周公盛養成王使召公奭為傅周公身居位聴天下為政管叔疑周公而流言于國曰公將不利於王奄君蒲姑一作薄姑謂禄父曰武王既死矣成王尚幼矣周公見疑矣此百世之一時也請舉事然後禄父及三監叛奄君導之禄父遂與三監叛周公疾曰吾死必𦵏於成周示天下臣於成王也周公死天乃雷雨以風禾盡偃大木斯拔國恐王與大夫開金縢之書執書以泣曰周公勤勞王家予幼人弗及知乃不𦵏于成周而𦵏之於畢示天下不敢臣師古引尚書大傳一本周公薨成王欲𦵏}
