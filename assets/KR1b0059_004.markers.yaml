  - {type: variant, offset: 841, length: 309, content: 拱武丁召其相而問焉其相曰吾雖知之吾不能言也問諸祖己祖己曰桑榖者野艸也野艸生於朝亡乎武丁懼側身修行思昔先王之政興滅國繼絕世舉逸民明養老之禮諸侯重譯來朝者六國西伯戡耆文王一年質虞芮二年伐于三年伐密須四年伐畎夷紂乃囚之散宜生南宮括閎夭三子相與學訟於太公太公見三子知為賢人遂酌酒切脯除為師學之禮約為朋友四子遂見西伯于牖里散宜生遂之犬戎氏取美馬駮身朱鬣雞目取九六焉之西海之濱取白狐青翰之於陵氏取怪獸大不辟虎狼閒尾倍其身名曰虞之有參氏取美女之江淮之浦取大貝如車渠陳於紂之庭紂出見之還而觀之曰此何人也散宜生遂趨而進曰吾西蕃之臣昌之使者紂大悅曰非子罪也崇侯也遂遣西伯伐崇五年之初得散宜生等獻寶而釋文王文王出則克耆六年伐崇則稱王既伐于崇, WYG: 傳補遺}
