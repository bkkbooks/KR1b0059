  - {type: variant, offset: 237, length: 1, content: 歸, WYG: 雊問諸祖己曰雉者野鳥也不當升鼎升於鼎者欲為用也無則逺方將有來朝者乎故武丁内反諸已以思先王之道三年辮髮重譯至者六國孔子曰吾於髙宗肜日見徳之有報之疾也西伯戡黎傳書正義西伯戡黎引伏生傳春子曰文王治岐玉海引大傳施政而物皆聼文選注周文王至磻溪見吕望文王拜之尚父望釣得玉璜刻曰周受命呂佐檢徳合於令昌來提西伯既戡黎紂囚之羑里爾雅疏引尚書大傳太公之羑里見文王散宜生遂至犬戎氏取美馬駮身朱鬛雞目者之西海之濵取白狐青翰之於氏一作於陵氏取怪獸尾倍其身名曰虞之有參氏一作莘取美女之江淮之浦取大貝如車渠陳於紂庭紂悦曰非子罪也崇侯也遂遣西伯伐崇鄭𤣥曰翰長毛也虞葢騶虞也散宜生閎夭南宫括三子者學於太公太公見三子之為賢人遂酌酒切脯除為師學之禮約為朋友散宜生南宮适閎夭三子相與學訟於太公四子遂見西伯於羑里獻寳以免文王孔子曰文王得四臣吾亦得四友自吾得回也門人加親是非胥附耶自吾得賜也逺方之士日至是非奔奏耶自吾得師也前有光後有輝是非先後耶自吾得繇也惡言不至門是非禦侮耶文王有四臣以免虎口丘亦有四友以禦侮公羊疏詩疏引殷傳曰西伯得四友獻寳免於虎口而克耆又引大傳曰得三子獻寳紂釋文王而出伐黎㣲子傳大夫七十而致仕老}
