  - {type: variant, offset: 128, length: 394, content: 矣王僩然歎啞然笑曰天之有日猶吾之有民也日有亡哉日亡吾乃亡矣是以伊尹遂去夏適湯湯放桀居中野士民皆奔湯桀與其屬五百人南徙千里止于不齊不齊士民往奔湯桀與屬五百人徙于魯魯士民復奔湯桀曰國君之有也吾聞海外有人與五百人俱去湯放桀而歸于薄三千諸侯大會湯取天子之璽置之于天子之坐左復而再拜從諸侯之位湯曰此天子之位有道者可以處之矣夫天下非一家之有也唯有道者之有也唯有道者宜處之湯以此三讓三千諸侯莫敢即位然後湯即天子之位桀殺刑彌厚而民彌暴故爾梁遠遂以是亡獄省桀無道囚湯後釋之諸侯八譯來朝者六國湯代桀之後大旱七年史卜曰當以人為禱湯乃翦髮斷爪自以為牲而禱于桑林之社而雨大至方數千里景亳之命費昌為御般庚書曰若德明哉湯任父言卑應言古者諸侯始受封則有采地百里諸侯以三十里七十里諸侯以二十里五十里諸侯以十五里其後子孫雖有罪黜其采地不黜使其子孫賢者守之世世以祠其始受封之人此之謂興滅國繼絕世書曰茲予大享于先王爾祖其從與享之, SBCK: ''}
