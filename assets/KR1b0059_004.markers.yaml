  - {type: variant, offset: 570, length: 0, content: '', SBCK: 丘常悉心盡志以入其中則前有高岸後有大谿塡塡正立而已六誓可以觀義五誥可以觀仁甫刑可以觀誡洪範可以觀度禹貢可以觀事皋陶謨可以觀治堯典可以觀美外紀卷九又文􅃟夏侯常侍誄注引子見其表未見其裏御覽四百十九人事部六十困學紀聞卷二小學紺珠卷四並引六誓以下案曰外紀引子夏讀書畢一條未舉所徵然文􅃟注御覽困學紀聞分引數條並與此合是爲書傳文無疑薛季宣書}
  - {type: variant, offset: 570, length: 0, content: '', WYG: 周書自泰誓就召誥而盛於洛誥傳曰士卒鳬藻言其和睦歡恱如鳬之戱於水藻也埤雅引}
  - {type: variant, offset: 570, length: 0, content: '', krp: 丘常悉心盡志以入其中則前有高岸後有大谿塡塡正立而已六誓可以觀義五誥可以觀仁甫刑可以觀誡洪範可以觀度禹貢可以觀事皋陶謨可以觀治堯典可以觀美外紀卷九又文選夏侯常侍誄注引子見其表未見其裏御覽四百十九人事部六十困學紀聞卷二小學紺珠卷四並引六誓以下案曰外紀引子夏讀書畢一條未舉所徵然文選注御覽困學紀聞分引數條並與此合是爲書傳文無疑薛季宣書}
  - {type: variant, offset: 571, length: 0, content: '', SBCK: 文訓序亦有此文末有通斯七}
