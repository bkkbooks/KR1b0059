  - {type: variant, offset: 242, length: 0, content: '', WYG: 戸之邑鄭𤣥曰岐山在梁山西南贅為屬虞人與芮人質其成於文王入文王之境則見其人萌讓為士大夫入其國則見士大夫讓為卿二國相謂曰此其君亦讓以天下而不居也讓其所争以為閒田文選注文王受命一年斷虞芮之訟二年伐䢴禮記正義引大傳作伐鬼方三年伐宻須四年伐犬戎五年伐耆六年伐崇七年而崩文王受命四年伐昆夷采薇為伐昆夷而作鄭𤣥曰犬夷昆夷也詩曰昆夷喙矣泰誓傳泰誓本非伏生所傳今并歸於伏生故史遷及儒林傳云伏生獨得二十九篇以教齊魯太子發升舟中流白虎通引尚書曰太子發升於舟白魚入於王舟王跪取出燎羣公咸曰休哉今文惟丙午王還劉歆三統歴引今文泰誓云丙午逮師師乃鼓譟師乃慆前歌後舞格於上天下地咸曰孜孜無怠大明疏引泰誓鄭𤣥曰慆喜也衆大喜前歌後舞也鄭司農引書傳曰前師乃鼔譟亦謂喜也司馬在前大明疏引泰誓周禮序引夏傳王肅曰司馬太公也正稽古立功立事可以永年丕天之大律律郊祀志引今文鄭𤣥曰丕大也律法也王升舟入水鼓鍾亞觀臺亞將舟亞宗廟亞周禮注有火自上復於下至於王屋流為烏其色赤其聲魄今文泰誓歐陽尚書火流于王屋化為鴉其聲魄索隠云按今文泰誓流為鵰牧誓傳唯四月太子發上祭于畢下至于盟津之上乃告於司馬司徒司空諸節亢才予無知以先祖先父之有徳之臣左右小子予受先公戮力賞罰以定厥功明于先祖之遺太子發渡於中流白魚入于舟王跪取以燎羣公咸曰休哉今文尚書鄭𤣥曰燔魚以祭變禮也武王伐紂戰于牧野紂之卒輻分紂之車瓦裂紂之甲如鱗下賀於武王也選注引大傳武王入殷表商容之閭歸傾宫之女武王殺紂繼公子禄父鄭𤣥曰繼者以武庚為商後也武王伐紂都洛邑未成隂寒大雪深丈餘甲子旦不知何五大夫乗馬車從兩騎止於門外王使師尚父謝賔幸臨之尚父使人持一器粥出進五車兩騎軍使者具以告尚父曰五車兩騎四海之神與河伯雨師耳尚父各以其名進之五神皆驚相視而嘆洪範五行傳武王釋箕子之囚箕子不忍周之釋走之朝鮮武王聞之因以朝鮮封之箕子既受周之封不得無臣禮故於十二祀來朝武王因其朝而問洪範惟王后元祀帝令大禹歩於上帝維時洪範六沴用咎于下是用知不畏而神之怒若六沴作見若是共禦一作供御帝用不差神則不怒五福乃降用章於下若六沴作見若不共禦六伐既侵六極其下禹乃共辟厥徳受命休令爰用五事建用王極鄭𤣥曰王謂禹也帝舜也歩推也令禹推衍天道五事象五行則王極象天也長事一曰貌貌之不恭是謂不肅厥咎狂厥罰恒一作常雨厥極惡時則有服妖白虎通引大傳作服乗龜孽雞禍下體生於上之痾青𤯝青祥唯金沴木次二事曰言言之不從是謂不乂厥咎僣厥罰恒𤾉厥極憂時則有詩妖介蟲之孽犬禍口舌之痾白𤯝白祥維木沴金次三事曰視視之不明是謂不悊厥咎荼厥罰恒燠厥極疾時則有草妖倮蟲之孽羊禍目痾赤𤯝赤祥惟水沴火次四事曰聼聼之不聰是謂不謀厥咎急厥罰恒寒厥極貧時則有鼔妖魚孽豕禍耳痾黑𤯝黑祥惟火沴水次五事曰思心思心之不容一作睿是謂不聖厥咎霿一作雺厥罰恒風厥極㓙短折時則有脂液之妖華孽牛禍心腹之痾黄𤯝黄祥金木水火沴土王之不極是謂不建厥咎眊厥罰恒隂厥極弱時則有射妖龍蛇之孽馬禍下人代一作伐上之痾日月亂行星辰逆行鄭𤣥曰肅敬也君貌不恭則是不能敬其事也君臣不敬則倨慢如狂貌曰木木主春春氣生生氣失則踰其節故常雨也服貌之飾也龜蟲之生于水而游於春者属木鷄畜之有冠翼者也属貌痾病也貌氣失之病也青木色也眚生於此祥自外來也沴殄也乂治也君言不從則是不能治其事也君臣不治則僣差矣金主秋秋氣殺殺氣失故常𤾉也殺氣失故於人為憂詩之言志也蝝螽蜩蟬之類生於秋而藏於秋者也屬金犬畜之以口吠者屬言言氣失之病視瞭也君視不明則是不能瞭其事也荼一作舒君臣不瞭則舒緩矣視曰火火主夏夏氣長長氣失故常燠長氣失故於人為疾草視之物可見者莫衆於草蠶螟蟲之類蟲之生于火而藏於秋者也倮一作蠃羊畜之逺視者也屬視君聼不聰則是不能謀其事也君臣不謀則急矣聼曰水水主冬冬氣藏藏氣失故常寒藏氣失故於人為貧鼓聼之應也魚蟲之生於水而游於水者也豕畜之居閑衛而聼者也屬聼儀禮鄭注引尚書傳羊屬火豕屬水聼氣失之痾未齓曰㓙未冠曰短未婚曰折王君也不名體而言王者五事象五行則王極象天也天變化為隂為陽覆成五行眊大傳作瞀瞀思心之咎同耳王極象天天隂養萬物隂氣失故常隂天為剛徳剛氣失故於人為弱愚懦不壯毅曰弱射王極之變也射人將發矢必先於此儀之發則中於彼矣君將出政亦先於朝廷度之出則應于民心射其象也龍蟲之生於淵行無形遊於天者也屬天蛇龍之類也天行健馬畜之疾行者也屬王極夏侯勝説伐宜為代書亦或作代隂陽之神曰精神性情之神曰魂魄君行不由常侜張無度則是魂魄傷也王極氣失之病也天於不中之人恒耆其毒増以為病將以開賢代之也春秋所謂奪伯有魄者是也不名病者病不著於身體也亂謂薄食鬭並見逆謂縮反明經天守舍之類也惟五位復辟厥沴曰二月三月惟貌是司四月五月維視是司六月七月維言是司八月九月維聴是司十月十一月維思心是司十二月與正月維王極是司凡六沴之作嵗之朝月之朝日之朝則后王受之嵗之中月之中日之中則正卿受之嵗之夕月之夕日之夕則庶民受之其二辰以次相將其次受之鄭𤣥曰自正月盡四月謂嵗之朝自五月盡八月為嵗之中自九月盡十二月為嵗之夕上旬為月之朝中旬為月之中下旬為月之夕平旦至食時為日之朝隅中至日昳為日之中晡時至黄昏為日之夕受之受其㓙咎也二辰謂日月也假令嵗之朝也日月中則上公受之日月夕則下公受之嵗之中也日月朝則孤卿受之日月夕則大夫受之嵗之夕也日月朝則上士受之日月中則下士受之其餘差以尊卑多少則悉矣星辰莫同是離逢非沴維鮮之功禦貌於喬忽以其月從其禮祭之參乃從禦言於訖衆以其月從其禮祭之參乃從禦視於忽似以其月從其禮祭之參乃從禦聴於怵攸以其月從其禮祭之參乃從禦思心於有尤以其月從其禮祭之參乃從禦王極於宗始以其月從其禮祭之參乃從六沴之禮散齋七日致齋三日新器潔祀用赤黍三日之朝于中庭祀四方從東方始卒於北方其祀禮曰格祀曰某也方祀曰播國率相行祀曰若爾神靈洪祀六沴是合無差無傾無有不正若民有不敬事則㑹批之六沴六事之機以懸示我我民人無敢不敬事上下王祀鄭𤣥曰格祀篇名也今亡沴殄也凡貌言視聴思心一事失則逆人之心人心逆則怨木金水火土氣為之傷傷則衝勝來乗殄之於是民怨神怒將為禍亂故五行先見變異以譴告人也及妖孽禍痾𤯝祥皆其氣類暴作非常為時怪者也各以物象為之占也田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直棄法律逐功臣殺太子以妾為妻則火不炎上治宫室飾臺榭内淫亂犯親戚侮父兄則稼穡不成好攻戰輕百姓飾城郭㑴邉境則金不從革簡宗廟不禱祠廢祭祀逆天時則水不潤下鄭𤣥曰不宿不宿禽也角主天兵周禮四時習兵因以田獵禮志曰天子不合圍}
