  - {type: variant, offset: 3, length: 0, content: '', SBCK: 十者杖於鄕七十者杖於朝注朝當爲國見君揖杖注揖當爲去八十者杖於朝見君揖杖注揖挾也君曰趣見客毋俟朝注不欲久停老者也古者七十致仕來者客之也以朝乘車輲輪注乘車安車也言輲輪明其小也案曰此注見禮記曲禮正義引書傳略說案曰儀禮通解引注無言輲輪以下七字云見前乘安車注葢通解前引曲禮載疏引書傳及注之文故此處不重載鄭注也今補御爲僕送至於家注御君之御也而孝弟之義達於諸侯九十杖而朝見君建杖注建樹也君曰趣見毋俟朝以朝車送之舍天子重鄕養注舍館也重猶尊也養以禮食之也卜筮巫醫御於前祝咽祝哽以食禮書引作祝饐祝鯁乘車輲輪胥與就膳徹注胥樂官也就成也胥成膳徹謂以樂食之也送至於家君如有欲問明日就其室以珍從注明日明旦而孝弟之義達於四海此文王之治岐也君如欲行孝弟之大義盍反文王之治岐儀禮經傳通解十九五學引傳注又玉海七十四未引注九十以下至達於四海又見禮書五十篇首見困學紀聞卷五案曰禮記曲禮正義引書傳略說致仕者以朝乘車輲輪在此篇呂氏春秋春居問於齊宣王王稱之春居王氏困學紀聞以爲卽大傳所謂春子家語言養老事則孔子之問哀公疑王肅剽書傳而爲之大夫士七十而致仕老於鄕里大夫爲父師士爲少師注所謂里庶尹也古者仕焉而已者歸敎於閭里耰鉏已藏祈樂已入注祈樂當爲新穀歲事已畢餘子皆入學注餘子猶衆子也古者適子恆代父而仕也十五始入小學見小節踐小義十八入大學見大節踐大義焉注小節小義正謂始口典口師受業大節大義謂博習盡識也距冬至四十五日始出學傅農事注立春學止上老平明坐於右塾庶老坐於左塾餘子畢出然後皆歸夕亦如之注上老父師也庶老少師也餘子皆入父之齒隨行兄之齒鴈行朋友不相踰輕任并重任分頒白者不提􅂝出入皆如之儀禮通解卷九學制第十六引傳注全又禮書四十九引傳全又儀禮鄕飮酒疏禮記曲禮王制正義並節引稱書傳略說又尙書洛誥正義禮記學記正義藝文􅀋聚三十八禮部御覽五百三十四禮儀部十三並節引􅀋聚御覽已畢並作欲畢又見文獻通考玉海困學紀聞卷八案曰門塾之學漢書食貨志白虎通公羊傳宣十年注禮記學記注皆有此說葢本書傳尙書洛誥正義引書傳此文而釋之曰是敎農人以義也以爲予其明農哉之證然則略說亦是申解洛誥此句經文耳傳曰已有三牲必田狩者孝子之意以爲已之所養不如天地自然之性逸豫肥美禽獸多則傷五穀因習兵事又不空設故因以捕禽獸所以共承宗廟示不忘武僃又因以爲田除害鮮者何也秋取嘗也注取禽嘗祭秋取嘗何以也習鬥也習鬥也者男子之事也然而戰鬥不可空習故於蒐狩閑之也閑之者貫之也貫之者習之也己祭取餘􅀗陳於澤注澤射宫也然後卿大夫相與射命中者雖不中也取命不中者雖中也不取何以也所以貴揖讓之取而賤勇力之取也鄕之取也於囿中勇力之取也於澤揖讓之取也儀禮集傳集解卷三十六王制之壬引傳注又儀禮鄕射記注引戰鬥以下至末何以也也作然又毛詩六月正義周禮大司馬囿人疏禮記郊特牲射義正義玉海射並節引案曰此條諸書所引不言何篇盧氏本入之略說無所據觀傳文專􅇚鮮字爲秋取嘗疑是鮮誓之傳未敢斷也天子太子年十八曰孟侯注孟迎也注惟見毛詩豳譜正義孟侯者於四方諸侯來朝迎於郊者問其所不知也問之人民之所好惡土地所生美珍怪異山川之所有無及父在時皆知之注十八嚮入太學爲成人博問庶事也太平御覽百四十六皇親部十二引全惟傳首無天子二字注無孟迎也三字毛詩豳風譜正義節引作書傳略說有天子二字又尙書康誥正義毛詩采菽正義儀禮覲禮疏禮記月令正義周禮大行人疏藝文􅀋聚十六儲宫部古者}
