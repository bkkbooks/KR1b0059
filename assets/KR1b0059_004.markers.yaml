  - {type: variant, offset: 533, length: 5, content: 宗梁闇三年, SBCK: 郵王侍郞伯申曰執燭之執當爲熱熱古爇字說苑建本篇作炳燭炳乃焫之譌焫與爇同案曰自此以下七條諸書所引大傳未稱略說今以意定之宜入此篇子曰心之精神是謂聖孔子集語卷下又繹史八十六案曰孫之騄本入五行傳葢以爲思心曰䜭䜭作聖之訓也似近之子曰君子}
