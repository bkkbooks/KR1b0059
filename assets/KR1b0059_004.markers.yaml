  - {type: variant, offset: 527, length: 0, content: '', krp: 又毛詩噫嘻正義禮記郊特牲正義宋書禮志玉海王者存二王之後與已爲三所以通三統立三正周人以至日爲正殷人以日至後三十日爲正夏人以日至後六十日爲正天有三統土有三王三王者所以統天下也注所存二王後者}
