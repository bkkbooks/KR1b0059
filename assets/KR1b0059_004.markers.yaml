  - {type: 'tls:seg', offset: 264, content: '', id: KR1b0059_CHANT_004-4a.7}
  - {type: variant, offset: 265, length: 0, content: '', WYG: 恥其行而不見其隨將大作恐天下莫我知將小作恐不能揚父祖功業徳澤然後營洛以觀天下之心于是四方諸侯率其羣黨各攻位于其庭周公曰示之以力役且猶至況導之以禮樂乎然後敢作禮樂書曰作新大邑於東國洛四方民大和㑹此之謂也詩疏引大傳卜洛邑營成周改正朔立宗廟序祭祀易犧牲制禮樂一統天下合和四海而致諸侯皆莫不衣紳端冕以奉祭祀者太廟之中繽乎其猶模繡也天下}
  - {type: page-break, offset: 265, content: '', id: KR1b0059_WYG_003-8a, image: WYG0068/WYG0068-0412a.png}
  - {type: variant, offset: 268, length: 2, content: 位湯, WYG: 悉來進受命於周公而退見文武之尸者千七百七十三諸侯皆莫不磬折玉音金聲玉色然後周公與升歌而弦文武諸侯在廟中者伋然淵其志和其聲愀然若復見文武之身然後}
  - {type: page-break, offset: 268, content: '', id: KR1b0059_WYG_003-8b, image: WYG0068/WYG0068-0412b.png}
