  - {type: variant, offset: 274, length: 0, content: '', WYG: 大射張皮侯賔射張五采之侯燕射張獸侯儀禮鄭注引大𫝊鄭𤣥曰澤射宫也周禮疏引書傳云戰者男子之事因蒐狩以閲之閲之者串之多士傳武王入殷周公曰各安其宅各田其田無故無新唯仁之新申屠剛傳注引大傳天子堂九雉諸侯七雉伯子男五雉雉長三丈度髙以髙度長以長周禮疏詩疏鄭𤣥曰雉長三丈髙一丈則墻髙一丈儀禮疏天子堂廣九雉三分其廣以二為内五分其内以一為髙東房西房北堂各三雉明堂位正義天子賁庸諸侯疏杼鄭𤣥曰賁大也言大墻正直也疏衰也杼亦墻也言衰殺其上下不得正直天子將出撞黄鍾之鐘右五鐘皆應入則撞㽔賔之鐘左五鐘皆應太師于是奏樂周禮注鄭𤣥曰黄鍾陽聲之音陽主動出則撞之右五鐘謂林鐘至應鐘右主静是動以告静者㽔賔在午隂生之月隂主静入亦是静左五鐘謂大吕至中吕左陽主動入静以告動也太府于時奏采薺肆夏古者后夫人將侍君前息燭后舉燭至房中釋朝服襲燕服然後入御于君鷄初鳴太師奏鷄鳴於陛夫人鳴佩玉於房中告去也然後應門擊柝告闢也然後少師告質明於陛下然後夫人入庭君出朝凡羣妃御見之法月與后妃其象也卑者宜先尊者宜後自九嬪以下九九而御于王所女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕十五日而徧望後反之凡進御君所女史必書其日月授之以環以進退之生子月辰則以金環退之當御者以銀環進之蓍著于左手既御蓍著于右手孔子曰日者天之明月者地之理隂契制故月上屬為天使婦從夫放月紀一本有陽字鄭𤣥曰朝服展衣燕服褖衣陛周禮疏作簷下黄帝妃嫫母于四妃之班居下貌甚醜而最賢心每自退多方傳周公居攝一年救亂二年克殷三年伐奄多方魏収曰周公居攝乃云一年救亂似不稱元曰惟五月丁亥王來自奄遂踐奄踐之者籍之也籍之謂殺其身執其家瀦其宫詩疏引多方傳鄭𤣥曰奄國在淮夷之旁周公居攝之時亦叛王與周公征之三年滅之自此而來歸殺君之室雖生美菜有義之士弗食大夫有汙瀦之宫雖生美菜有義之士不食二本不同古者十稅一多于十稅一謂之大桀小桀少于十稅一謂之大貊小貊王者十一而税而頌聲作矣故書曰越唯有胥賦小大多政公羊傳古者什一而藉多乎什一大桀小桀寡乎什一大貊小貊無逸傳厥兆天子爵白虎通引書無逸傳古者百里之國三十里之遂二十里之郊九里之城三里之宫七十里之國二十里之遂九里之郊五里之城一里之宫五十里之國九里之遂三里之郊一里之城以城為宫周禮疏引無逸傳鄭𤣥曰𤣥或疑焉按詩疏引書傳云三十里之國三里之郊立政傳古者天子三公每一公三卿佐之每一卿三大夫佐之每一大夫三元士佐之藝文類聚天子三公一曰司徒二曰司馬三曰司空九卿二十七大夫八十一元士凡百二十在天為山川北堂書抄引今尚書夏侯歐陽説太師天公也太傅地公也太保人公也烟氛不修山川不祀風雨不時雪霜不降責在天公城郭不繕溝池不脩水泉不隆責在地公臣多弑主孽多殺宗五品不訓責在人公聖人在位其君不誦無用之言其工不作無用之器其商不通無用之物周人之教以文上教以文君子其失也小人薄文選注鄭𤣥曰文謂尊卑之差制也習文法無悃誠也周民可比屋而封選注引大傳君奭傳徐幹中論云召公見周公之既反政而猶不知疑其貪位周公為之作君奭然後悦君奭曰昔在上帝周田觀文王之徳記緇衣呂刑傳夏后氏不殺不刑死罪罰二千饌索隠引大傳馬融曰饌音選決闗梁踰城郭而畧盗者其刑臏男女不以義一作禮交者其刑宫觸易一作逆君命革輿服制度姦軌盜攘傷人者其刑劓非事而事之出入不以道義而誦不詳一作祥之辭者其刑墨降畔冦賊劫畧奪攘矯䖍者其刑死此二千五百罪之目畧也其刑書則亡夏刑大辟二百臏辟三百宫辟五百劓墨各千周禮疏鄭𤣥曰周改臏作刖刖斷足也宫丈夫割其勢女子椓其隂閉于宫中非事而事之今所不當為也犯劓者赭衣大辟者布衣文選注墨罰疑赦其罰百率夏侯歐陽説上刑挾輕下刑挾重劉愷傳犯墨者蒙巾犯劓者赭其衣犯臏者象其臏犯大辟者衣無領北堂書抄引尚書大𫝊天齊乎人假我一日後漢楊賜𫝊獄貨非可寳也然寳之者未能行其法者也貪人之實受人之財未有不受命以矯其上者也親下以矯其上者未有能成其功者也子夏曰昔者三王慤然欲錯刑遂罰遂罰平心而應之和然後行之然且曰吾意者以不平慮之乎吾意者以不和平之乎如此者三然後行之此之謂慎罰鄭𤣥曰錯處也遂行也子曰古之刑者省之今之刑者繁之古者有禮然後有刑是以刑省也今也反是無禮而齊之以刑是以繁也書曰伯夷降典折民以刑謂有禮然後有刑也聴訟之術大畧有三治必寛寛之術歸于察察之術歸于義是故聴而不寛是亂也寛而不察是慢也古之聴訟者言不越情情不越義是故聴民之術怒必畏畏思義小罪勿兼鄭𤣥曰怒責也因責之罪必思兼謂思其辭思其義思義重罪小可求以出之也子曰今之聴民者求所以殺之古之聴民者求所以生之不得其所以生之之道乃刑殺君與臣㑹焉子曰聴訟者雖得其情必哀矜之死者不可復生斷者不可復續也子如衛人謂曰公甫不能聴獄子曰非公甫不能聴獄也公甫之聴獄也有罪者懼無罪者恥民近禮矣子曰呉越之俗男女同川而浴其刑重而不勝由無禮也中國之教内外有别男女不同椸架不同巾櫛其刑重而勝由有禮也語曰夏后不殺不刑罰有罪而民不輕犯夏刑三千條唐長孫律疏序引尚書大傳晉傳古者一弓百矢周禮疏云尚書文侯之命平王賜晉文侯古者諸侯之於天子三年一貢士一適謂之攸好徳再適謂之賢賢三適謂之有功有功者天子賜之車服弓矢號曰命諸侯有不貢士謂之不率正一不適謂之過再不適謂之傲三不適謂之誣誣者天子絀之一絀以爵再絀以地三絀而爵地畢也黄瓊傳注鄭𤣥曰適猶得也山堂考索引伏生大傳曰諸侯之於天子三年一貢士一適謂之好徳再適謂之賢賢三適謂之有功一不適謂之過再不適謂之傲三不適謂之誣其適則有衣服弓矢秬鬯虎賁之賞其不適則有黜爵之罰以兵屬於得專征伐者鄭𤣥曰謂七命以下不得弓矢賜者奏百人之樂致𤣥鶴之舞北堂書抄引尚書大傳晉平公問師矌曰吾年七十欲學恐已暮師矌曰臣聞老而學者如執燭之明執燭之明孰與昧行公曰善魏文侯問子夏子夏遷延而退選注引大𫝊魯傳周公封以魯身未嘗居魯也選注伯禽將歸于魯周公謂伯禽之傅曰汝將行盍志而子美徳乎對曰其為人寛好自用以慎此三者其美徳也已周公曰嗚呼以人惡為美徳虖君子好以道徳故其民歸道彼其寛也出無辨矣是其好自用也以斂益之也彼其慎也是其所以淺也吾語女吾文王之子武王之弟成王之叔父吾於天下不賤矣然而吾所執贄而見者十人還贄而相見者三十人貌執之士者百有餘人欲言而請畢事者千有餘人於是吾僅得三士焉以正吾身以定天下吾所以得三士者亡於十人與三十人中乃在百人與千人之中故上士吾薄為之貌下士吾厚為之貌人人皆以我為越踰好士然故士至士至而後見物見物然後知是非之所在戒之哉汝其以魯國驕人幾矣荀子注引大傳鄭𤣥曰贄者所執以至也君子見於所尊敬必執贄以將其厚意也十人公卿之中也三十人羣士之中也百人羣大夫之中也周初淮浦徐州並起為寇伯禽伐之于鮮誓鮮誓史記伯禽作肹誓索隠曰按尚書大傳作鮮誓周禮注粊誓曰􅖏乃獲敜乃阱爾雅郭璞注引費誓曰汝則有逸罰䟽云今文子貢曰葉公問政于夫子子曰政在于附近而來逺魯哀公問政子曰政在於論臣齊景公問政子曰政在於節用三君問政夫子應之不同然則政有異乎子曰荆之地廣而都狹民有離志焉故曰政在於附近而來逺哀公有臣三人内比周以惑其君外障拒諸侯賔客以蔽其明故曰政在論臣齊景公奢於臺榭淫於苑囿五官之樂不解一旦而賜人百乗之家者三故曰政在節用秦誓傳書曰邦之榮懐亦尚一人之慶知秦穆之霸也白虎通引尚書書序傳子曰參女以明王為勞乎昔者舜左禹而右臯陶不下席而天下治子曰君子不可以不學見人不可以不飾不飾無貌無貌不敬不敬無禮無禮不立夫逺而光者飾也近而逾明者學也譬之如汙邪水潦集焉菅蒲生焉從上觀之誰知其非源水也稷鉏已藏嵗事欲畢餘子皆學十三始入小學見小節踐小義十八始入大學見大節踐大義書傳畧説太平御覽藝文類聚俱引尚書大傳多文一作聞而齊給索隠引大傳鄭𤣥曰齊疾也堯八眉舜四瞳子禹其跳湯扁文王四乳八者如八字者也其跳者踦也扁者枯也言皆不善也鄭𤣥曰其發聲也踦歩足不能相通也枯言湯體半小象偏枯東郭子思問於子貢曰夫子之門何其雜也子貢曰夫隠栝之家多枉木良醫之門多疾人砥礪之旁多頑鈍夫子聞之曰修道以俟天下來者不止是以雜也六誓可以觀義五誥可以觀仁甫刑可以觀誠洪範可以觀度禹貢可以觀事臯陶可以觀治堯典可以觀美子夏讀書畢見夫子夫子問焉子何為於書子夏對曰書之論事也昭昭如日月之代明離離如一作若參辰一作星之錯行上有堯舜之道下有三王之義商所受於夫子者志之不敢忘也雖退而窮居一作巖居河濟之間深山之中作壤室編蓬户常於此彈琴以詠先王之道則可發憤慷慨矣孔子謂子夏曰子見其表未見其裏也尚書大傳者漢伏生勝之所作也孔子刪書斷自虞始迄秦穆公据古書三千二百四十篇定百有二篇率三十而取一葢其慎也書罹秦火澌滅殆盡秦博士伏生勝能誦習其書既使其女口授􅄯掌故錯二十八篇漢世列之為經又創以己意為大傳四十一萹别授同時張生由是學者逓相傳習為伏氏尚書之學劉向校之凡四十一篇鄭康成銓次為八十三篇至晉永嘉之亂而大傳無完書矣隋志大傳三卷舊唐書志亦云然近世亦復希覯又惡覩所謂四十一篇八十三篇者哉獨時時散見於他説而尚書經生家多漫不措意但知蔡傳及兩孔氏註疏辨析孰為古文今文之有無同異而已孫君晴川博學嗜古惜此書為九十老生從秦燼之餘苦心掇拾昌明聖緒輔翼典常不忍聴其等於隕籜飄風終歸冺没於是旁搜羣籍凡傳紀百家所援大傳單辭儷句莫不心識手抄都為一書釐成三卷合於隋唐志舊目虞夏商周仍以時代相次典謨誓誥各從其類咸有條貫無相紊越使千百年古學之遺散而幾完斷而復續可謂有功昔賢嘉惠來哲而孫君猶以目未覩四十一篇八十三篇者為憾好學深思之士立心固如是雖然漢太史遷不云乎其言尤雅其所表見皆不虚此三卷者後有藝文志當為首録矣晴川沈繹祖拜䟦尚書大傳卷三欽定四庫全書尚書大傳補遺松陽縣教諭孫之騄輯五帝傳堯見天因邰而生后稷詩疏引論衡引大傳曰鳳凰在列樹蕭索輪囷是謂卿雲楊升菴引尚書大傳髙山大川五嶽四瀆之屬史記正義引書傳曰澤障曰陂新唐書引書謂菜為茹詩疏政者齊中也謂春秋冬夏天文地理人道所以為政也道正而萬事順成故天道政之大也史記正義前玉海所引無首句天子諸侯必有公桑蠶室就川而為之大昕之朝夫人浴種於川齊民要術引古者聖帝之治天下也五十已下非烝祭不敢遊飲唯六十以上遊飲也大戴記注引男三十而娶女二十而嫁書曰有鰥在下曰虞舜仝上引大傳古學彚纂引大傳曰男三十而娶女二十而嫁通於織紝紡績之事黼黻文章之美不若是則上無以孝于舅姑而下無以事夫養子堯為天子丹朱為太子舜為左右堯知丹朱之不肖必將壊其宗廟滅其社稷而天下同賊之故堯推尊舜而尚之屬諸侯致天下於大麓之野太平御覽引尚書大傳三王之治如環之無端如水之勝火仝上髙宗有親䘮居廬三年然未嘗言國事而天下無背叛之心者何也及其為太子之時盡以知天下人民之所好惡是以雖不言國事也知天下無背叛之心仝上子張問曰髙宗梁闇三年不言何也孔子曰古者君薨王世子聴於冡宰三年不敢服先王之服履先王}
