  - {type: variant, offset: 255, length: 0, content: '', WYG: 成周天乃雷電以風禾即盡偃大木斯拔周人大恐王乃𦵏周公于畢示不敢臣也鄭𤣥曰昔周公𦵏不如禮天乃動威尚書五行傳云周公死成王不圖大禮故天大雷雨禾偃大木拔及成王寤金縢之䇿改周公之𦵏尊以王禮申命魯郊而天立復風雨禾稼盡起大誥傳周公先謀於同姓同姓從然後謀於朋友朋友從然後謀於天下天下從然後加之蓍龜是以君子聖人謀義不謀必成卜義不卜不義故卜必以義擊不義故戰必勝是以君子聖人謀則吉戰則勝太平御覽引大傳嘉禾傳大傳篇目有九共帝告嘉禾揜誥之類三苗貫葉一作桑而生子為一穗周公曰和氣所生以獻於文王之廟成王時有苗異莖而生同為一穗其大盈車長幾充箱人有上之者王召周公而問之公曰三苗為一穗天下其和為一乎果有越裳氏重譯而來交趾之南有越裳國周公居攝六年制禮作樂天下和越裳氏以三象重譯而獻白雉曰道路悠逺山川阻深音使不通故重譯而朝成王以歸周公公曰徳不加焉則君子不饗其質政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黄耉曰久矣天之無别風淮雨一作烈風淫雨意者中國有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦於宗廟周既衰於是稍絶鄭𤣥曰重譯欲其轉相曉也選注引康誥傳兹殷罰有倫今也反是諸侯不同聴每君異法聴無有倫是故法之難也父子兄弟罪不相及左傳苑何忌云杜注尚書康誥父不慈子不祗兄不友弟不恭不相及也左傳胥臣云又見後漢章帝詔}
