  - {type: variant, offset: 1045, length: 184, content: 祀帝乃稱王而入唐郊猶以丹朱為尸於是百執事咸昭然乃知王世不絕爛然必自有繼祖守宗廟之君還歸二年而廟中苟有歌大化大訓六府九原而夏道興維十有四祀鍾石笙管變聲樂未罷疾風發屋天大雷雨帝乃雍而歌者重篇沈首而笑曰明哉非一人之天下也乃見于鍾石笙筦乎維十有五祀祀者貳尸元首明哉股肱良哉元首君也股肱臣也翊輔也天功人其代之傳曰夫成天地之功者未嘗不蕃昌也有德者尊其位而重其祿予辛壬娶塗山癸甲生啟, SBCK: 受業嘉應吳蘭修校}
