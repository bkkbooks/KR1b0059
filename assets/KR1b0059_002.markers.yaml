  - {type: variant, offset: 186, length: 327, content: 命有德五服五章哉山龍青也華蟲黃也作會黑也宗彝白也璪火赤也天子服五諸侯服四次國服三大夫服二士服一六律者何黃鐘蕤賓無射大蔟夷則姑洗是也故天子左五鐘右五鐘天子將出則撞黃鐘之鐘右五鐘皆應之馬鳴中律步者皆有容駕者皆有文御者皆有數步者中規折還中矩立則磬折拱則抱鼓然後大師奏樂登車告出也入則撞蕤賓左五鐘皆應之以治容皃容皃得則氣得氣得則肌膚安肌膚安則色齊矣蕤賓聲狗吠彘鳴及倮介之蟲皆莫不延頸以聽蕤賓在內者皆玉色在外者皆金聲然後少師奏樂登堂就席告入也此言至樂相和物動相生同聲相應之義也古者天子必有四鄰前曰疑後曰承左曰輔右曰弼天子有問無以對責之疑可志而不志責之承可正而不正責之輔可揚而不揚責之弼其爵視上卿其祿視次國之君天子中立而聽朝則四聖維之是以慮無失計舉無過事故書曰欽四鄰, SBCK: 下王}
