  - {type: variant, offset: 830, length: 5, content: 義招為賓客, WYG: 一時也請舉事然後禄父及三監叛奄君導之禄父遂與三監叛周公疾曰吾死必𦵏於成周示天下臣於成王也周公死天乃雷雨以風禾盡偃大木斯拔國恐王與大夫開金縢之書執書以泣曰周公勤勞王家予幼人弗及知乃不𦵏于成周}
