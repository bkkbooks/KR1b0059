  - {type: variant, offset: 781, length: 8, content: 報事還歸二年䜎然, SBCK: 帝太皞神勾􅉭司之自冬日至數四十六日迎春於東堂距􅀖八里堂高八尺堂階八等靑稅八乘旂旐尙靑田車載矛號曰助天生倡之以角舞之以羽此迎春之樂也孟春之月御靑陽左个禱用牡索祀於艮隅貌必恭厥休時雨朔令曰挺羣禁開閉闔通窮室達障塞待優游其禁母伐林木仲春之月御靑陽正室牲先脾設主於戸索祀於震正朔令曰棄怒惡解役罪免優患休罰刑閉關梁其禁田獵不宿飮食不享出入不節奪民農時及有姦謀季春之月御靑陽右个薦用鮪索祀於㢲隅朔令曰宣庫財和外怨撫四方行柔惠止剛强九門磔禳出疫於郊以禳春氣南方之極自北戸南至炎風之野帝炎帝神祝融司之自春分數四十六日迎夏於南堂距􅀖七里堂高七尺堂階七等赤稅七乘旂旐尙赤田車載弓號曰助天養倡之以徵舞之以鼓鼗此迎夏之樂也孟夏之月御明堂左个嘗麥用彘索祀於㢲隅視必明厥休時燠朔令曰爵有德賞有功惠賢良舉力農其禁母隳防仲夏之月御明堂正室牲先肺設主於竃索祀於離正朔令曰振貧窮惠孤寡慮休疾出大祿行大賞其禁棄法律逐功臣殺太子以妾爲妻}
