  - {type: variant, offset: 718, length: 0, content: '', SBCK: 凶咎之殺已成故天垂變異以示人也禦貌于喬忿注止貌之失者在於喬忿也驕忿者是不恭之形也喬忿謂若傲很明德忿戾無期之􅀋也案曰注謂若上惟儀禮通解續重喬忿二字以其月從其禮祭之參乃從注從順也三祭之其神乃順不怒也禦言于訖衆以其月從其禮祭之參乃從注訖止也止言之失者在於去止衆止衆者是不從之刑也止衆謂若周威厲王弭􅉪以障民口之􅀋也禦視于忽似以其月從其禮祭之參乃從注止視之失者在於去忽似忽似者是不明之刑也忽似謂若亂於是非象龔滔天及不辨鹿馬之􅀋也案曰注謂若上惟儀禮通解續重忽似二字禦聽于怵攸以其月從其禮祭之參乃從注怵讀爲獸不狘之狘攸讀爲風雨所漂颻之颻止聽之失者在於去怵攸怵攸者是不聰之刑也怵攸謂若老夫灌灌小子蹻蹻誨爾訰訰聽我眊眊之􅀋禦思心于有尤以其月從其禮祭之參乃從注尤過也止思心之失者在於去欲有所過欲有所過者是不容之刑也欲有所過謂若昭公不知禮而習小儀不脩政而欲誅季氏之􅀋也案曰注者是不容上儀禮通解續脫有所過三字今增謂若昭公上惟通解續多欲有所過四字禦王極于宗始以其月從其禮祭之參乃從注宗尊也止王極之失者在於尊用始祖之法度不言其惡者人性僃於}
