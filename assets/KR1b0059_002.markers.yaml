  - {type: variant, offset: 107, length: 2, content: 稱仁, SBCK: 案曰此疑洪範􅀓汨陳五行之訓水火者百姓之所飮食也金木者百姓之所興作也土者萬物之所資生也是爲人用尙書洪範正義引書傳八政何以先食傳曰食者萬物之始人事之本也故八政先食尙書洪範正義文􅃟籍田賦注又白帖食御覽八百四十七飮食部五洪範曰不叶于極不麗于咎毋侮鰥寡而畏高明困學紀聞卷二引大傳聖人在上其君}
