  - {type: variant, offset: 719, length: 0, content: '', SBCK: 德得失在斯王不極則五事皆失非一惡也大者易姓小者滅身其能宗始則錄延其受命之君承天制作猶天之敎命也故掌祖廟之藏者謂之天府也六沴之禮散齊七曰致齊新器絜}
