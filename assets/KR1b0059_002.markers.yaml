  - {type: variant, offset: 604, length: 0, content: '', SBCK: 不由王出不得爲政則是王君出政之號也極中也建立也王象天以性情覆成五事爲中和之政也王政不中則是不能立其事也案曰王之不極以下至星辰逆行注見續漢五行志劉注惟注人法天至而言之也續漢志缺見文獻通考厥咎瞀注瞀與思心之咎同耳故子駿傳曰瞀眊眊亂}
