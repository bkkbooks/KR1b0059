  - {type: variant, offset: 1003, length: 0, content: '', SBCK: 樂也孟秋之月御總章左个嘗穀用犬索祀於坤隅言必從厥休時暘案曰暘當作陽朔令曰審用法僃盜賊禁姦邪飭羣牧謹貯聚其禁母弛戎僃仲秋之月御總章正室牲先肝設主於門索祀於兌正朔令曰謹功築遏溝瀆修囷倉决刑獄趣收斂其禁好攻戰輕百姓飾城郭侵邊竟乃令民畋醵庶甿畢入}
