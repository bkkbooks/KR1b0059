  - {type: variant, offset: 555, length: 3, content: 師焉家, SBCK: 晦而月見西方謂之朓注朓條也條達行疾貌朓則侯王其荼注荼緩也朔而月見東方謂之側匿注側匿猶縮縮行遲貌側匿則侯王其肅注肅急也日君象也月臣象也君政急則日行疾月行徐臣逡遁}
  - {type: variant, offset: 555, length: 3, content: 師焉家, krp: 晦而月見西方謂之朓注朓條也條達行疾貌朓則侯王其荼注荼緩也朔而月見東方謂之側匿注側匿猶縮縮行遲貌側匿則侯王其肅注肅急也日君象也月臣象也君政急則日行疾月行徐臣逡遁}
  - {type: punctuation, offset: 557, content: 。, id: KR1b0059_CHANT_002-bkkpn155}
  - {type: 'tls:seg', offset: 557, content: '', id: KR1b0059_CHANT_002-7a.10}
  - {type: variant, offset: 559, length: 3, content: 盈三口, SBCK: 進君政緩則日行徐月行疾臣放恣也太平御覽四引􅀓注全注君政緩上誤衍朓則侯王其徐徐緩也十字又誤荼爲徐今刪又周禮保章氏疏引傳又散見文􅃟元皇后哀䇿文月賦舞賦注藝文􅀋聚一穀梁傳序疏後漢書蔡邕傳注文􅃟月賦注引鄭注作朓條達行疾貌也元皇后哀策文注引鄭注作朓猶條達也當从之側匿猶縮縮當作猶縮朒案曰文􅃟舞賦注引鄭􅏏尙書五行傳注闇跳行疾皃是鄭注條達一作闇跳也側匿一作朒一作朏說文朏月未成之名晦而月見西方謂之朓朔而月見東方謂之縮朒此則側匿與縮朒聲近義一也漢書五行志晦而月見西方謂之朓朔而見東方謂之仄匿仄匿則侯王其肅朓則侯王其舒劉向以爲朓者疾也君舒緩則臣驕慢故日行遲而月行疾也仄匿}
  - {type: page-break, offset: 559, content: '', id: KR1b0059_SBCK_002-6a}
  - {type: variant, offset: 559, length: 3, content: 盈三口, krp: 進君政緩則日行徐月行疾臣放恣也太平御覽四引傳注全注君政緩上誤衍朓則侯王其徐徐緩也十字又誤荼爲徐今刪又周禮保章氏疏引傳又散見文選元皇后哀䇿文月賦舞賦注藝文類聚一穀梁傳序疏後漢書蔡邕傳注文選月賦注引鄭注作朓條達行疾貌也元皇后哀策文注引鄭注作朓猶條達也當从之側匿猶縮縮當作猶縮朒案曰文選舞賦注引鄭􅏏尙書五行傳注闇跳行疾皃是鄭注條達一作闇跳也側匿一作朒一作朏說文朏月未成之名晦而月見西方謂之朓朔而月見東方謂之縮朒此則側匿與縮朒聲近義一也漢書五行志晦而月見西方謂之朓朔而見東方謂之仄匿仄匿則侯王其肅朓則侯王其舒劉向以爲朓者疾也君舒緩則臣驕慢故日行遲而月行疾也仄匿}
  - {type: punctuation, offset: 563, content: ，, id: KR1b0059_CHANT_002-bkkpn156}
  - {type: 'tls:seg', offset: 563, content: '', id: KR1b0059_CHANT_002-7a.11}
  - {type: variant, offset: 564, length: 2, content: 朋由, SBCK: 進之意君肅急則臣恐懼故日行疾而月行遲不敢迫近君也不舒不急以正失之者食朔日劉歆以爲舒者侯王展意顓事臣下促急故月行疾也肅者王侯縮朒不任事臣下弛縱故月行遲也當春秋時侯王率多縮朒不任事故食二日仄匿者十八食晦日朓者一此其效也案此漢志據伏生書傳爲說仄匿并作仄慝字之譌而劉歆則作縮朒側匿猶縮朒也孟康注漢書曰朓者月行疾在日前故早見仄匿者行遲在日後當没而更見是也蔡卞毛詩名物解禮曰大明生於東月生於西蓋朔而月出西方夕見暮見也故王者早見曰朝暮見曰夕義取諸此所謂朝夕放於日月者也至望然後出於東方夕見尙書大傳以爲晦而月見西方謂之朏朔而月見東方謂之朒蓋言異也又事文􅀋聚亦引尙書大傳晦而月見西方謂之朓朔而月見東方謂之朏諸書所引朓朒朏闇跳側匿縮朒各字每相互異攷後漢書盧植傳植上封事諫曰臣聞日晦而月見謂之朓王侯其舒李賢注五行傳劉向所著字與此小異然則伏劉諸本固有别矣惟朏與朓異它書朓作朏者誤尙書大傳洪範五行傳維王后元祀注王謂禹也后君也祀年也禹始居攝爲君之元年也注又見通鑑前編帝令大禹步于上帝注帝舜也步推也于於也上帝謂天也令禹推演天道謂覩得失反覆也注又見玉海又文􅃟演連珠注引步推也又通鑑前編引注末句維時洪祀六沴用咎于下注用此時始大祀六沴之用咎于下者用極其祀之也案曰文淵閣本儀禮通解續此注用作言始上有禹字者下有咎凶也民其祀之令消也十字是用知不畏而神之怒注而乃也舜任禹禹能治其道口無其神舜知禹敬神之怒可知也若六沴作見若是共禦注若順也共讀曰恭禦止也帝用不差神則不怒注也舜見禹知人之無復疑也五福乃降用章于下八字又見周禮疾醫疏注降下也章明也若六沴作見若不共禦六伐旣侵六極其下注侵陵也庶幾行罰殺萬物也凶也禹乃共辟厥德受}
