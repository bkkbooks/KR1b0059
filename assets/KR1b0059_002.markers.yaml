  - {type: variant, offset: 10, length: 0, content: '', WYG: 大夫來聘桓公上得天子之意下得大國之援則有亢陽之心以御臣下興邢丘之役以勞百姓則臣下離心而不從故應是而秋大旱也魯宣公十年秋大旱是時公與齊伐萊夫伐國亢陽節也師徒百姓所不欲也故應而大旱旱所謂常陽不謂常陽而謂旱者以旱為災也旱之為言乾也萬物傷於乾而不得水也君持亢陽之節暴虐于下興師旅勞}
  - {type: page-break, offset: 10, content: '', id: KR1b0059_WYG_002-19b, image: WYG0068/WYG0068-0406d.png}
  - {type: variant, offset: 11, length: 3, content: 平平使, WYG: 衆以起城邑臣下悲怨而心不從故陽氣盛而失度旱災應也枉矢者弓矢之象也枉矢之所觸天下之所伐滅亡之象也七國之兵戰于梁地故天狗先降梁壘見以其象也狗者守禦之類也所降以威守禦也蜮如鼈三足生於南越南越婦人多淫故其地多蜮淫女惑亂之氣所生詩疏榖梁疏引洪範五行傳蓍之為言耆也百年一本生百莖此草木之夀亦知吉凶者聖人以問鬼神周易音義藝文類聚引洪範五行傳季夏可以大赦罪人尚書大傳歴者聖人所以揆天行而紀萬國也北堂書抄引尚書洪範五行傳雷與天地為長子以其􅈡長萬物與其出入也霜者殺伐之表雨雪者隂之蓄積甚也夫握方諸之鏡處深澤之下而上引太清物類相隨可不慎耶秦昭王三十八年上郡大飢山木盡死蜂食民苗}
