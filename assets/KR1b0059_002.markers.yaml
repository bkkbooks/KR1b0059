  - {type: variant, offset: 739, length: 1, content: 推, krp: 習兵因以田獵禮志曰天子不合圍諸侯不掩羣過此則暴天物爲不宿禽角南有天庫將軍騎官飮食不享注享獻也禮志曰天子諸侯無事則歲三田一爲乾豆二爲賓客三爲充君之庖周禮獸人冬獻狼夏獻麋春秋獻獸物此獻禮之大略也出入不節注角爲天門房有三道出入之象也奪民農時注房心農時之候也季冬之月命農師計耦耕事是時房心晨中春秋傳曰辰爲農祥后稷之所經緯也及有姦謀注亢爲朝廷房心爲明堂謀事出政之象則木不曲直注君行此五者爲逆天東宫之政東宫於地爲木木性或曲或直人所用爲器者也無故生不暢茂多有折槁是爲木不曲直木金水火土謂之五材春秋傳曰天生五材民並用之其政逆則神怒神怒則材失性不爲民用其他變異皆屬沴沴亦神怒凡神怒者日月五星旣見適於天矣以上傳自田獵不宿至木不曲直見續漢書五行志一注見劉注棄法律逐功臣注東井主法令也功臣制法律者也或曰喙主尙食七星主衣裳張爲食厨翼主天倡經曰臣作朕股肱耳目予欲左右有民女翼予欲觀古人之象日月星辰山龍華蟲作繢宗彝藻火粉米黼黻絺繡以五采章施于五色作服女明予欲聞}
  - {type: variant, offset: 742, length: 3, content: 六呂詢, SBCK: 五聲八音在治曶以出納五言女聽是則食與服樂臣之所用爲大功也七星北有酒旗南有天厨翼南有器府殺太子注五行火生土天文以參繼東井四時以秋代夏殺太子之象也春秋傳曰夫千乘之主將廢正而立不正必殺正也以妾爲妻注軒轅爲后妃屬南宫其大星女主之位女御在前妾爲妻之象也則火不炎上注君行此四者爲逆天南宮之政南宫於地爲火火性炎然上行人所用爲亨飪者也無故因見作􅀬燔熾爲害是爲火不炎上其他變異皆屬沴也以上自棄法律至火不炎上傳並見續漢書五行志二注見劉注案曰續志引火不炎上傳在金不從革之後今依大傳五事之次移前又此節傳亦見開元占經水火占篇治宮室飾臺榭内淫亂犯親戚侮父兄則稼穡不成以上傳自治宫室至稼穡不成見續漢書五行志四好攻戰注參伐爲武府攻戰之象輕百姓注輕之者不重民命春秋傳曰師出不正反戰不正勝也飾城郭注昴畢閒爲天街甘氏經曰天街保塞孔途道衢保塞城郭之象也月令曰四鄙入保注末七字見御覽咎徵部一侵邊竟注畢主邊兵則金不從革注君行此四者爲逆天西宫之政西宮於地爲金金性從形而革人所用爲器者也無故冶之不銷或入火飛亾或鑄之裂形是爲不從革其他變異皆屬沴也以上傳自好攻戰至金不從革見續漢書五行志四注自參伐爲武府至皆屬沴也見續志四劉昭注簡宗廟不禱祠注虚危爲宗廟廢祭祀注牽牛主祭祀之牲逆天時注日在星紀周以爲正日在􅏏􅑎殷以爲正皆不得四時之正逆天時之象也春秋定}
