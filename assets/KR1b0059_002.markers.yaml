  - {type: variant, offset: 576, length: 97, content: 升歌清廟之樂大琴練弦達越大瑟朱弦達越以韋為鼓謂之搏拊何以也君子有大人聲不以鐘鼓竽瑟之聲亂人聲清廟升歌者歌先人之功烈德澤也故欲其清也其歌之呼也曰於穆清廟於者歎之也穆者敬之也清者欲其在位者徧聞之也故, WYG: 死成王幼}
