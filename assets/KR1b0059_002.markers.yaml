  - {type: variant, offset: 22, length: 2, content: 琴歌, WYG: 道長幼之序入大學知君臣之儀上下之位小胥取小學之賢者登之天子天子以為左右鄭𤣥曰小學在公宫之左大學在郊天子當為太子周公居攝踐祚而治元世子法於伯禽使之左右所以養成王也元記為亢伯禽與康叔朝於成王見于周公三見而三笞康叔有駭色謂伯禽曰有商子者賢人也與子見之乃見商子而問焉商子曰}
