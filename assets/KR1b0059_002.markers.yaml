  - {type: variant, offset: 1008, length: 10, content: 修通卿雲藂藂蟠龍賁信, WYG: 禾即盡偃大木斯拔周人大恐王乃𦵏周公}
  - {type: variant, offset: 1009, length: 10, content: 通卿雲藂藂蟠龍賁信于, SBCK: 農器收秸薪築囹圄謹葢藏乃大儺以禳疾命國爲酒以合三族君子說小人樂以上自東方之極至此見明黃佐六藝流別卷十七五行篇案曰六藝流別全載五行傳一篇自維王后元祀至上下王祀下卽接東方之極云云至小人樂惟無六沴之禮至卒於北方之節及田獵不宿至水不潤下一節篇題下云伏生尙書大傳紀帝舜命禹攝政初祀事盧氏本與六藝流別同而多六沴之禮一節及末田獵不宿至水不潤下一節今以盧本末一節咎徵移置東方之極云云之前於文爲順案又曰此節據六藝流别明云帝舜命禹攝政初祀事碻是伏書然}
