  front:
  - {type: variant, offset: 0, length: 1, content: 虞, SBCK: 尙書大}
  - {type: page-break, offset: 0, content: '', id: KR1b0059_SBCK_002-1a}
  - {type: variant, offset: 0, length: 1, content: 虞, WYG: 唯四月太子發上祭于畢下至于盟津之上乃告於司馬司徒司空諸節亢才予無知以先祖先父之有徳之臣左右小子予受先公戮力賞罰以定厥功明于先祖之遺太子發渡於中流白魚入于舟王跪取以燎羣公咸曰休哉今文尚書鄭𤣥曰燔魚以祭變禮也武王伐紂戰于牧野紂之卒輻分紂之車瓦裂紂之甲如鱗下賀於武王也選注引大}
  - {type: page-break, offset: 0, content: '', id: KR1b0059_WYG_002-8a, image: WYG0068/WYG0068-0401a.png}
  - {type: variant, offset: 0, length: 1, content: 虞, krp: 尙書大}
  body:
  - {type: punctuation, offset: 0, content: 《, id: KR1b0059_CHANT_002-bkkpn1}
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 卷三周􅀓大誓案曰洛誥傳曰周書自大誓就召誥而盛於洛誥然則今文周書首大誓也唯四月太子發上祭于畢下至于孟津之上注四月周四月也發周武王也卒父業故稱太子也乃告於司徒司馬司空諸節亢才予無知以先祖先父之有德之臣左右小子予受先公戮力賞罰以定厥功明于先祖之遺太子發升于舟中流白魚入于舟王跪取出俟以燎羣公咸曰休哉太平御覽百四十六皇親部十}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 武王入殷表商容之閭歸傾宫之女武王殺紂繼公子禄父鄭𤣥曰繼者以武庚為商後也武王伐紂都洛邑未成隂寒大雪深丈餘甲子旦不知何五大夫乗馬車從兩騎止於門外王使師尚父謝賔幸臨之尚父使人持一器粥出進五車兩騎軍使者具以告尚父曰五車兩騎四海之神與河伯雨師耳尚父各以其名進之五神皆驚相視而嘆洪範五行傳武王釋箕子之囚箕子不忍周之釋走之朝鮮武王聞之因以朝鮮封之箕子既受周之封不得無臣禮故於十}
  - {type: page-break, offset: 2, content: '', id: KR1b0059_WYG_002-8b, image: WYG0068/WYG0068-0401b.png}
  - {type: variant, offset: 2, length: 0, content: '', krp: 卷三周傳大誓案曰洛誥傳曰周書自大誓就召誥而盛於洛誥然則今文周書首大誓也唯四月太子發上祭于畢下至于孟津之上注四月周四月也發周武王也卒父業故稱太子也乃告於司徒司馬司空諸節亢才予無知以先祖先父之有德之臣左右小子予受先公戮力賞罰以定厥功明于先祖之遺太子發升于舟中流白魚入于舟王跪取出俟以燎羣公咸曰休哉太平御覽百四十六皇親部十}
  - {type: punctuation, offset: 3, content: 》, id: KR1b0059_CHANT_002-bkkpn2}
  - {type: xml-element, offset: 3, content: '', id: KR1b0059_CHANT_002-bkkxmlele1}
  - {type: 'tls:seg', offset: 3, content: '', id: KR1b0059_CHANT_002-1a.1}
  - {type: 'tls:seg', offset: 3, content: '', id: KR1b0059_CHANT_002-1a.2}
  - {type: punctuation, offset: 3, content: 《, id: KR1b0059_CHANT_002-bkkpn3}
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 案曰亢才史記周本紀作信哉才哉古通同年王大理伯申云亢乃允字之誤司馬子長以訓詁改經文故爲信也八百諸侯俱至孟津白魚入舟尙書孔序正義卷一引書傳有八百諸侯俱至孟津白魚入舟之事與大誓同武王伐紂觀兵于孟津有火流于王屋化爲赤烏三足御覽百八十一居處部}
  - {type: page-break, offset: 3, content: '', id: KR1b0059_SBCK_002-1b}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 祀來朝武王因其朝而問洪範惟王后元祀帝令大禹歩於上帝維時洪範六沴用咎于下是用知不畏而神之怒若六沴作見若是共禦一作供御帝用不差神則不怒五福乃降用章於下若六沴作見若不共禦六伐既侵六極其下禹乃共辟厥徳受命休令爰用五事建用王極鄭𤣥曰王謂禹也帝舜也歩推也令禹推衍天道五事象五行則王極象天也長事一曰貌貌之不恭是謂不肅厥咎狂厥罰恒一作常雨厥極惡時則有服妖白虎通引大傳作服乗龜孽雞禍下體生於上之痾青𤯝青祥唯金沴木次二事曰言言之不從是謂不乂厥咎僣厥罰恒𤾉厥極憂時則有詩妖介蟲之孽犬禍口舌之痾白𤯝白祥維木沴金次三事曰視視之不明是謂不悊厥咎荼厥罰恒燠厥極疾時則有草妖倮蟲之孽羊禍目痾赤𤯝赤祥惟水沴火次四事曰聼聼之不聰是謂不謀厥咎急厥罰恒寒厥極貧時則有鼔妖魚孽豕禍耳痾黑𤯝黑祥惟火沴水次五事曰思心思心之不容一作睿是謂不聖厥咎霿一作雺厥罰恒風厥極㓙短折時則有脂液之妖華孽牛禍心腹之痾黄𤯝黄祥金木水火沴土王之不極是謂不建厥咎眊厥罰恒隂厥極弱時則有射妖龍蛇之孽馬禍下人代一作伐上之痾日月亂行星辰逆行鄭𤣥曰肅敬也君貌不恭則是不能敬其事也君臣不敬則倨慢如狂貌曰木木主春春氣生生氣失則踰其節故常雨也服貌之飾也龜蟲之生于水而游於春者属木鷄畜之有冠翼者也属貌痾病也貌氣失之病也青木色也眚生於此祥自外來也沴殄也乂治也君言不從則是不能治其事也君臣不治則僣差矣金主秋秋氣殺殺氣失故常𤾉也殺氣失故於人為憂詩之言志也蝝螽蜩蟬之類生於秋而藏於秋者也屬金犬畜之以口吠者屬言言氣失之病視瞭也君視不明則是不能瞭其事也荼一作舒君臣不瞭則舒緩矣視曰火火主夏夏氣長長氣失故常燠長氣失故於人為疾草視之物可見者莫衆於草蠶螟蟲之類蟲之生于火而藏於秋者也倮一作蠃羊畜之逺視者也屬視君聼不聰則是不能謀其事也君臣不謀則急矣聼曰水水主冬冬氣藏藏氣失故常寒藏氣失故於人為貧鼓聼之應也魚蟲之生於水而游於水者也豕畜之居閑衛而聼者也屬聼儀禮鄭注引尚書傳羊屬火豕屬水聼氣失之痾未齓曰㓙未冠曰短未婚曰折王君也不名體而言王者五事象五行則王極象天也天變化為隂為陽覆成五行眊大傳作瞀瞀思心之咎同耳王極象天天隂養萬物隂氣失故常隂天為剛徳剛氣失故於人為弱愚懦不壯毅曰弱射王極之變也射人將發矢必先於此儀之發則中於彼矣君將出政亦先於朝廷度之出則應于民心射其象也龍蟲之生於淵行無形遊於天者也屬天蛇龍之類也天行健馬畜之疾行者也屬王極夏侯勝説伐宜為代書亦或作代隂陽之神曰精神性情之神曰魂魄君行不由常侜張無度則是魂魄傷也王極氣失之病也天於不中之人恒耆其毒増以為病將以開賢代之也春秋所謂奪伯有魄者是也不名病者病不著於身體也亂謂薄食鬭並見逆謂縮反明經天守舍之類也惟五位復辟厥沴曰二月三月惟貌是司四月五月維視是司六月七月維言是司八月}
