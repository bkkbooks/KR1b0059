  - {type: variant, offset: 1003, length: 0, content: '', krp: 樂也孟秋之月御總章左个嘗穀用犬索祀於坤隅言必從厥休時暘案曰暘當作陽朔令曰審用法僃盜賊禁姦邪飭羣牧謹貯聚其禁母弛戎僃仲秋之月御總章正室牲先肝設主於門索祀於兌正朔令曰謹功築遏溝瀆修囷倉决刑獄趣收斂其禁好攻戰輕百姓飾城郭侵邊竟乃令民畋醵庶甿畢入}
  - {type: variant, offset: 1004, length: 0, content: '', SBCK: 室曰時殺將至母罹其菑季秋之月御總章右个薦用田禽索祀於乾隅朔令曰除道路守門閭陳兵甲戒百官誅不法除道成梁以利農夫北方之極自丁令北至積雪之野帝顓頊神糸㝠司之自秋分數四十六日迎冬於北堂距􅀖六里堂高六尺堂階六等黑稅六乘旗旄尙黑田車載甲鐵號曰助天誅唱之以羽舞之以于戈此迎冬之樂也孟冬之月御􅏏堂左个祈年用牲索祀於乾隅聽必聰厥休時寒朔令曰申羣禁修障塞畢積聚繫牛馬收澤賦其禁母作淫巧仲冬之月御􅏏堂正室牲先腎設主於井索祀於坎正朔令曰􅊧外徒止夜樂誅詐僞省醖釀謹閉關其禁簡宗廟不禱祀廢祭祀逆天}
