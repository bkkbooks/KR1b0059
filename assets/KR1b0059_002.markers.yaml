  - {type: variant, offset: 571, length: 2, content: 朋古, SBCK: 寛容則地動􅏏或疑焉今四行來沴土地乃動臣下之相帥爲畔逆之象君不通於事所致也以爲不寛容亦皆爲陰勝陽臣强君之異案曰自思心之不容至惟木金水火沴土傳並見漢志續漢志鄭注全節惟見文獻通考郊社考及禮記月令正義續漢志缺鄭注志論謂漢書五行志劉向等五行傳論也王之不極是謂不建案曰王字漢志續漢志並作皇劉昭注云尙書大傳作王文獻通考玉海引同注王君也不名體而言王}
