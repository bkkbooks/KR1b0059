  - {type: variant, offset: 720, length: 2, content: 奏鐘, SBCK: 用赤黍三日之朝于中庭祀四方從東方始卒于北方注禮志致齊三日周禮凡祭祀前期十日宗伯帥執事卜日是爲齊一旬乃祀也今此致齊卽祀者欲得容三祀也蓋八日爲致齊期九日朝而初祀亦一旬有一日事乃畢也新器赤黍改過之宐也中庭明堂之庭也或曰朝廷之廷也此祀五精之神其牲器粢盛有常禮記其異者也不祀天非正月亦以此禮祀此神也案曰太平御覽五百二十四引傳致齊下衍三日二字非儀禮通解續文獻通考引並無玩注則傳不當有此二字一本御覽從東方始下衍自南至西四字亦非通解續通考並無御覽引注自禮志至事乃畢也止其祀禮曰格祀注篇名也今亾曰某也方祀曰播國率相行祀注篇中大祝贊主人辭也某天子名也方祀祀四方也播讀曰藩藩國謂侯相助也言諸侯率其常事來卽助行祭之禮也其祝也案曰祝字他書所引作祀今據御覽五百二十四引改注大祝吿神以君悔過之辭也周禮大祝掌六祝之辭以事鬼神祇祈福祥求永貞也曰若爾神靈洪祀六沴是合注神靈謂木精靈威仰火精赤熛怒土精含樞紐金精白招矩水精叶光紀及木帝太皥火帝炎帝土帝黃帝金帝少皞水帝顓頊木官勾􅉭火官祝融土官后土金官蓐收水官􅏏㝠皆是也古者生能其事死在祀典配其神而食合猶爲也六沴是神靈所爲也無差無傾無有不正注言神靈正􅈂無口􅀋所謂口皆是也若民有不敬事則會批之于六沴注若民廣謂天下有過者也事六事也會合也批推也言天下有過神靈亦合內推於六沴天子以天下爲任者也六事之機以縣示我案曰玉海引縣作垂非觀注宐作縣注六事貌言視聽思心王極也機天文也天文運轉以縣見六事之變異示我我謂天子我民人無敢不敬事上下王祀注我與民人無敢不敬畏六事上下君祀之所縣示變異者言皆悔過也上君祀靈威仰下君祀太皞之屬也以上自傳首維王后元祀至上下王祀止傳注並見儀禮經傳通解續卷二十六下因事之祭惟五事鄭注不全又文獻通考卷八十八郊社考祈禳引同但傳注間有詳略玉海天文五引自傳首至上下王祀惟不引六沴之禮至卒於北方又續漢書五行志引貌之不恭至星辰逆行傳注惟思心之不容至木金水火沴土一節注又引凡六沴之作至其次受之傳注又太平御覽八百七十四咎徽部引傳爰用五事至星辰逆行又五百二十四禮儀部三引六沴之禮至上下王祀傳注卷十七時序部二引凡六沴之作至庶民受之又通鑑前編帝舜三十三載引傳首二句禹乃共辟至建用王極傳注今并合諸書參考又周禮疾醫太祝注羊人序官疏文􅃟演連珠注}
