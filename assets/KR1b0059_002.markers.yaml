  - {type: variant, offset: 104, length: 0, content: '', krp: 之已定遂入殷封比干之墓表商容之閭發鉅橋之粟散鹿臺之財歸傾宫之女又引見後漢書郞顗傳注}
  - {type: variant, offset: 105, length: 1, content: 天, SBCK: 民知方曰王之於仁人也死者封其墓况於生者乎王之於賢人也亾者表其閭况於在者乎王之於財也聚者散之况於復藉乎王之於色也在者歸其父母况於復徵乎通鑑前編武王十三年引全又記纂淵海六十一引太公曰愛人者兼其屋上之烏注出尙書太􅀓大戰篇是此篇皆大戰篇之文也記纂淵海又引憎人者惡其胥餘案曰說苑貴德篇韓詩外􅀓三載太公召公周公之語與此略同大戰篇云太公曰罵女母歎唾女母乾母歎母乾是謂艱難吳曾能改齋漫錄卷二引尙書大􅀓大戰篇洪範武王勝殷繼公子祿父注武庚字祿父尙書洪範序正義引鄭云武王勝殷繼公子祿父注祿父紂之子也釋箕子囚箕子不忍周之釋走之朝鮮注誅我君而釋己嫌苟免也此注惟見通鑑前編武王聞之因以朝鮮封之注朝鮮今樂浪郡箕子旣受周之封不得無臣禮故於十三祀來朝太平御覽卷七百八十四夷部一又通鑑前編引書洪範大傳自首至封之止並注又御覽二百一封建部四路史後紀十二並節引汩亂也華嚴經第七十八音義卷}
