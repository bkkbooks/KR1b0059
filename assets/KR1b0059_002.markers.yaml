  - {type: variant, offset: 567, length: 1, content: 士, SBCK: 休令注厥其也休美也禹於是恭明孳孳受舜之美令奉行之爰用五事建用王極注王極或皆爲皇極初禹治水得神龜􅀒文於洛於以盡得天人陰陽之用至是奉帝命而陳之也案曰注初禹以下至末據通鑑前編引補儀禮通解續無長事注長猶君也一曰貌貌之不恭是謂不肅注肅敬也君貌不恭則是不能敬其事也案曰此注儀禮通解續缺貌不能敬事也六字據續漢書五行志及注補下同厥咎狂注君臣不敬則倨慢如狂矣案曰儀禮通解續注鈌君倨二字據續漢志補厥罰常雨注貎曰木木主春春氣生生氣失則踰其節故常雨也案曰儀禮通解續缺注貌氣失則四字據續漢志補厥極惡注生氣失故於人則爲惡案曰厥極惡注續漢志儀禮通解續並缺見文獻通考卷八十八郊社考時則有服妖注服貌之飾也時則有龜孼注龜蟲之生於水而游於春者也屬木時則有雞禍注雞畜之有冠翼者也屬貌時則有下體生于上之痾注痾病也貌氣失之病也時則有靑􅌌靑祥注靑木色也􅌌生於此祥自外來也維金沴木注沴殄也凡貌言視聽思心案曰思心二字儀禮通解續無據續漢志注增一事失則逆人之心人心逆則怨木金水火土氣爲之傷傷則衝勝來乘殄之於是神怒人怨將爲禍亂故五行先見變異以譴吿人也及妖孼禍痾􅌌祥皆其氣􅀋暴作非常爲時怪者也各以物象爲之占也案曰自貌之不恭至惟金沴木􅀓注全節並見續漢書五行志及劉昭注文獻通考郊社考次二事曰言言之不從是謂不艾案曰艾各本多作乂據漢書五行志文獻通考引作艾注艾治也君言不從則是不能治其事也厥咎僭注君臣不治則僭差矣厥罰常陽案曰漢志續漢志引並作陽葢今文也各本作暘乃改從古文非注言曰金金主秋秋氣殺殺氣失故常陽也案曰注言曰金三字續漢志缺據文獻通考卷八十八引增厥極憂注殺氣失故於人爲憂時則有詩妖注詩之言志也時則有介蟲之孼注蝝螽蜩蟬之􅀋蟲之生於火而藏於秋者也屬金案曰注蟲之二字續漢志缺據文獻通考引增時則有犬禍注犬畜之以口吠守者也屬言時則有口舌之痾注言氣失之病時則有白􅌌白祥維木沴金案曰惟木沴金周禮疾醫太祝疏引木作火當從之作木者誤也又曰自言之不從至維木沴金傳注全節並見續漢五行志及劉昭注文獻通考郊社考次三事曰視視之不明是謂不悊注悊視瞭也君視不明則是不能瞭其事也厥咎荼注荼緩也君視不瞭則荼緩矣案曰注荼緩也三字惟見玉海天文五據增厥罰常奥案曰他書所引多作燠惟續漢志作奥今從之注視曰火火主夏夏氣長長氣失故常奥也厥極疾注長氣失故於人爲疾時則有草妖注草視之物可見者莫衆於草案曰文獻通考引注無草視之三字時則有倮蟲之孼注􅁞螟蟲之􅀋蟲之生於火而藏於秋者也時則有羊禍注羊畜之遠視者也屬視時則有目痾時則有赤􅌌赤祥維水沴火案曰自視之不明至維水沴火傳注全節並見續漢志及劉昭注文獻通考郊社考次四事曰聽聽之不聰是謂不謀注君聽不聰則是不能謀其事也厥咎急注君臣不謀則急矣厥罰常寒注聽曰水水主冬冬氣藏藏氣失故常寒也厥極貧注藏氣失故於人爲貧時則有鼓妖注鼓聽之應也時則有魚孼注魚蟲之生於水而游於水者也時則有豕禍注豕畜之居閑衞而聽者也屬聽時則有耳痾注聽氣失之病時則有黑􅌌黑祥維火沴水案曰維火沴水周禮疾醫太祝疏引火作土當從之自聽之不聰至維火沴水傳注全節並見續漢五行志及劉昭注文獻通考郊社考次五事曰思心思心之不容是謂不聖注容當爲睿睿通也心明曰聖孔子說休徵曰聖者通也兼四而明則所謂聖聖者包貌言視聽而載之以思心者通以待之君思心不通則是非不能心明其事也案曰思心之不容此節注續漢志缺見文獻通考厥咎霿注霿冒也君臣心有不明則相􅀩冒矣案曰霿文獻通考引作雺非今從漢書五行志續漢五行志所引厥罰常風注思心曰土土王四時主消息生殺長藏之氣風亦出內雨陽寒奥之微皆所以殖萬物之命者也殖氣失故常風厥極凶短折注殖氣失則於人爲凶短折未齔曰凶未冠曰短未昏曰折案曰厥極凶短折注儀禮通解續缺見文獻通考郊社考時則有脂夜之妖注夜讀曰液時則有華孼注華當爲夸夸蚓蟲之生於土而遊於土者時則有牛禍注地厚德載物牛畜之任重者也屬思心案曰注地厚德載物五字惟見禮記月令正義今據補屬思心三字文獻通考引缺他本或作屬王極亦誤惟月令正義作屬思脫心字今據正義}
