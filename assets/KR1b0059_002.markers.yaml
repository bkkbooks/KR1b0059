  - {type: variant, offset: 739, length: 1, content: 推, SBCK: 習兵因以田獵禮志曰天子不合圍諸侯不掩羣過此則暴天物爲不宿禽角南有天庫將軍騎官飮食不享注享獻也禮志曰天子諸侯無事則歲三田一爲乾豆二爲賓客三爲充君之庖周禮獸人冬獻狼夏獻麋春秋獻獸物此獻禮之大略也出入不節注角爲天門房有三道出入之象也奪民農時注房心農時之候也季冬之月命農師計耦耕事是時房心晨中春秋傳曰辰爲農祥后稷之所經緯也及有姦謀注亢爲朝廷房心爲明堂謀事出政之象則木不曲􅈂注君行此五者爲逆天東宫之政東宫於地爲木木性或曲或􅈂人所用爲器者也無故生不暢茂多有折槁是爲木不曲􅈂木金水火土謂之五材春秋傳曰天生五材民並用之其政逆則神怒神怒則材失性不爲民用其他變異皆屬沴沴亦神怒凡神怒者日月五星旣見適於天矣以上傳自田獵不宿至木不曲􅈂見續漢書五行志一注見劉注棄法律逐功臣注東井主法令也功臣制法律者也或曰喙主尙食七星主衣裳張爲食厨翼主天倡經曰臣作朕股肱耳目予欲左右有民女翼予欲觀古人之象日月星辰山龍華蟲作繢宗彝藻火粉米黼黻絺繡以五采章施于五色作服女明予欲聞}
