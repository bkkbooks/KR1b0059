  - {type: variant, offset: 3, length: 0, content: '', krp: 案曰亢才史記周本紀作信哉才哉古通同年王大理伯申云亢乃允字之誤司馬子長以訓詁改經文故爲信也八百諸侯俱至孟津白魚入舟尙書孔序正義卷一引書傳有八百諸侯俱至孟津白魚入舟之事與大誓同武王伐紂觀兵于孟津有火流于王屋化爲赤烏三足御覽百八十一居處部}
  - {type: variant, offset: 4, length: 17, content: 共予辯下土使民平平使民無敖舜彈五弦, SBCK: 周將興}
  - {type: variant, offset: 4, length: 3, content: 共予辯, WYG: 月維聴是司十月十一月維思心是司十二月與正月維王極是司凡六沴之作嵗之朝月之朝日之朝則后王受之嵗之中月之中日之中則正卿受之嵗之夕月之夕日之夕則庶民受之其二辰以次相將其次受之鄭𤣥曰自正月盡四月謂嵗之朝自五月盡八月為嵗之中自九月盡十二月為嵗之夕上旬為月之朝中旬為月之中}
  - {type: page-break, offset: 4, content: '', id: KR1b0059_WYG_002-12b, image: WYG0068/WYG0068-0403b.png}
