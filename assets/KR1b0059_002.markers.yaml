  - {type: variant, offset: 16, length: 1, content: 敖, WYG: 所食飢而不損兹謂泰厥灾水厥咎亡谷永傳引洪範尚書大傳卷二欽定四庫全書尚書大傳卷三松陽縣教諭孫之騄輯金縢傳成王之幼云在襁褓褓縛兒被也詩疏引大傳古尚書説武王崩時成王年十二後二年管蔡作亂周公東辟之王與大夫盡弁以開金縢之書時成王年十四公羊疏王命周公踐祚朱草暢生王者徳下究地之厚則朱草生徳光地序則朱草生選注引尚書大傳王者徳及皇天則祥風起周公輔幼主不矜功則蓂莢生鄭𤣥曰矜夸也成王問周公}
