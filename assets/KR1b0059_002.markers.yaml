  - {type: variant, offset: 714, length: 114, content: 之謂也維五祀奏鐘石論人聲乃及鳥獸咸變於前故更箸四時推六律六呂詢十有二變而道宏廣五作十道孝力為右秋養耆老而春食孤子乃浡然招樂興于大鹿之野報事還歸二年䜎然乃作大唐之歌其樂曰舟張辟雝鶬鶬相從八風回回鳳皇喈喈歌者三年昭然乃知乎王世明有不, WYG: 百}
  - {type: variant, offset: 716, length: 0, content: '', SBCK: 弱或云懦不毅也案曰續漢志注引此注毅作敬誤時則有射妖注射王度之極也射人將發矢必先於此儀之發矢則必中於彼矣君將出政亦先於朝廷度之出則應於民心射其象也時則有龍虵之孼注龍蟲之生於淵行於無形游於天者也屬天蛇龍之􅀋也或曰龍無角者曰虵時則有馬禍注天行健馬畜之疾行者也屬王極時則有下人伐上之痾注夏侯勝說伐宜爲代書亦或作代陰陽之神曰精氣情性之神曰魂魄君行不由常侜張無度則魂魄傷也王極氣失之病也天於不中之人恆耆其味厚其毒增以爲病將以開賢代之也春秋傳所謂奪伯有魄者是也不名病者病不著於身體也案曰注味厚其三字續漢志注無見儀禮通解續二十六文獻通考郊社考自時則有龜孼注龜蟲之生至時則有下人伐上之痾注情性之神日魂魄儀禮通解續二十六并缺引今據續漢五行志注文獻通考引補時則有日月亂行星辰逆行注亂謂薄食鬬竝見逆謂贏縮反明經天守舍之􅀋也不言沴天天至尊無能沴之者離逢非沴維鮮之功謂此也案曰續漢五行志注引此節注王君也至守舍之􅀋也缺不言沴天至謂此也二十三字見儀禮通解續二十六維五位復建辟厥沴注君失五事則五行相沴違其位復立之者當明其吉凶變異則知此爲貌邪言輒改過以共禦之至司之口月又必齋肅祭祀以撫其神則凶咎除矣不言六位天不違其位也案曰注君失五事至不違其位也見儀禮通解續案又曰貌邪言下有脫文當以言視聽思心之失與貌邪並列也文獻通考引此注亦略今無從補曰二月三月維貌是司四月五月維視是司六月七月維言是司八月九月維聰是司十月十一月維思心是司十二月與正月維王極是司注司主也此月數夏數也夏數得天之正􅏏或疑焉此用五事之次則四月五月主視六月七月主言非也口五行王相之次則八月九月主聽十月十一月主思心亦非也子駿傳曰二月三月維貌是司四月五月維視是司六月七月惟思心是司八月九月惟言是司十月十一月維聽是司十二月與正月維王極是司於四時之氣似近其􅀋也凡六沴之作歲之朝月之朝日之朝則后王受之歲之中月之中日之中則公卿受之歲之夕月之夕日之夕則庶民受之注自正月盡四月爲歲之朝自五月盡八月爲歲之中自九月盡十二月爲歲之夕上旬爲月之朝中旬爲月之中下旬爲月之夕平且至食時爲日之朝禺中至日昳爲日之中下側至黃昏爲日之夕受之受其凶咎也其二辰以次相將其次受之注二辰謂日月也假令歲之朝也日月中則上公受之日月夕則下公受之歲之中也日月朝則孤卿受之日月夕則大夫受之歲之夕也日月朝則上士受之日月中則下士受之其餘差以尊卑多少則悉矣案曰注歲之中也四字則孤卿受之五字日月夕則四字儀禮通解續文獻通考引並脫惟續漢五行志注具今據補星辰莫同注莫夜也星辰之變夜見亦與晝同初昏爲朝夜半爲中將晨爲夕或曰將晨爲朝初昏爲夕也是離逢非沴維鮮之功注離憂也逢見也是謂憂見之象非沴也言五行非能沴天者也鮮殺也功成}
