  - {type: variant, offset: 9, length: 0, content: '', WYG: 氣為之傷傷則衝勝來乗殄之於是民怨神怒將為禍亂故五行先見變異以譴告人也及妖孽禍痾𤯝祥皆其氣類暴作非常為時怪者也各以物象為之占也田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直棄法律逐功臣殺太子以妾為妻則火不炎上治宫室飾臺榭内淫亂犯親戚侮父兄則稼穡不成好攻戰輕百姓飾城郭㑴邉境則金不從革簡宗廟不禱祠廢祭祀逆天時則水不潤下鄭𤣥曰不宿不宿禽也角主天兵周禮四時習兵因以田獵禮志曰天子不合圍諸侯不掩羣過此則㬥天物為不宿禽角南有天庫將軍騎宫享獻也禮志曰天子諸侯無事則嵗三田一為乾豆二為賔客三為充君之庖周禮獸人冬獻狼夏獻麋春秋獻獸物此獻禮之大畧也角為天門房有三道出入之象也房心農時之候也季冬之月命農計耦耕事是時房心晨中春秋傳曰晨為農祥后稷之所經緯也亢為朝廷房心為明堂謀事出政之象君行此五者為逆天東宫之政東宫於地為木木性或曲或直人所用為器也無故生不暢茂多折槁是為木不曲直東井主法令也功臣制法律者也五行火生上天文以參繼東井四時以秋代夏殺太子之象也軒轅為后妃屬南宫其大星女主之位女御在前妾為妻之象也君行此四者為逆天南宫之政於地為火火性炎上然行人所用烹飪者也無故因見作熱燔熾為害是為火不炎上五行傳謂土失其性而為災也參伐為武府攻戰之象輕之者不重民命昴畢間為天街甘氏經曰天街保塞孔塗道衢保塞城郭之象也畢主邉兵君行此四者為逆天西宫之政西宫於地為金金性從刑而革人所用為器者也無故冶之不銷或入火飛亡或鑄之裂形是為金不從革虚危為宗廟牽牛主祭祀之牲月在星紀周以為正月在𤣥枵殷以為正皆不得四時之正逆天時之象也君行此四者為逆天北宮之政也北宫于地為水水性漫潤下流人所用灌溉者也無故源流遏絶川澤以涸是為水不潤下其他變異皆屬沴也天一生水地二生火天三生木地四生金前四疇乃王極之體所以建故配其生數地六成水天七成火地八成木天九成金後四疇乃王極之用所以行故配其成數天五生土故配之以王極一二三四皆由五數而成六七八九是水火木金皆賴乎土而成此王極所以為八疇之要樞也太平御覽八政何以先食食者萬物之始人之所本者也北堂書抄引大傳周以至動殷以萌夏以芽天有三統物有三變故正色有三天有三生三死故土有三王王特一生死檀弓公羊疏引書傳畧説太平御覽引尚書大傳鄭𤣥曰謂三王之正月也至動冬日至物始動也異時生者恒異時死夏以孟春月為正殷以季冬月為正周以仲冬月為正夏以十三月為正色尚黒以平旦為朔殷以十二月為正色尚白以鷄鳴為朔周以十一月為正色尚赤以夜半為朔不以二月後為正者萬物不齊莫適所統故必以三㣲之月也白虎通引尚書大傳子曰心之精神是謂聖孔子集語引大傳雲者起於山彌於天天氣亂故其罰恒隂選注北堂書抄引尚書五行傳君道虧則日蝕人憤怨則水涌溢隂氣積則下代上郭璞疏引洪範傳晦而月見西方謂之脁朔而月見東方謂之朒亦謂之側匿側匿侯王其肅脁則侯王其舒月生三日謂之魄尚書五行傳鄭𤣥曰魄亦作脁行疾貌朒行遲貌元首寛則望舒脁侯王肅則月匿影葢君舒緩則臣驕慢故日行遲而月行疾也月行中道移節應期徳厚受福重華畱之尚書洪範記明王踐位則日儷其精重光以見吉祥文選注心之大星天王也其前星太子也後星庶子也洪範五行傳辰星者北方水精也選注北辰謂之曜魄北堂書抄引尚書大傳祀上帝於南郊所以報天徳詩疏黄帝將亡則地裂尚書説地者成萬物者也北堂書抄引鴻範五行傳聖人者民之父母也母能生之能養之父能教之能誨之聖人曲偹之者也能生之能食之能教之能誨之也為之城郭以居之為之宫室以處之為之庠序之學以教誨之為之列地制畆以飲食之故書曰天子作民父母以為天下王此之謂也天中記引大傳乃命五史以書五帝之蠱事彼為訓者正以太古之時旡為旡事也今言蠱者是卦之惑亂也時既漸澆一作繞物情惑亂故事業因之而起惑矣左傳云女惑男風落山謂之蠱伏曼引尚書大傳夏不數浴非愛水也冬不數煬非愛火也魯桓公五年大雩旱也先是殺君而立有危亡之心而下有悲慟之氣外結大國娶于齊以為夫人後比二年天子}
