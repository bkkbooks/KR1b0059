  - {type: variant, offset: 746, length: 2, content: 有二, SBCK: 五年夏五月辛亥郊譏連卜三正以至失時是其􅀋也則水不潤下注君行此四者爲逆天北宫之政也北宫於地爲水水性浸潤下流人所用灌漑者也無故源流竭絕川澤以涸是爲不潤下其他}
